# Structured technology decisions
decisions:
  - title: Messaging abstraction — port-first with two adapters
    chosen: Single IWhatsAppGateway output port; Baileys + Cloud API infra adapters
    rejected:
      - Hardcode Baileys directly in a service
      - Cloud-API-only (no personal-number support)
    rationale: >
      Clean Architecture + agent/provider-agnostic rule. Provider SDKs live only
      in infrastructure/. Adapter is selectable in Settings, so the ToS/ban risk
      of Baileys is mitigated by a ban-safe Cloud API alternative behind the same
      contract.
  - title: Baileys dependency strategy — lazy optional import
    chosen: Dynamic import of baileys (non-literal specifier), declared OPTIONAL/user-installed, not in package.json deps
    rejected:
      - Add to dependencies and update lockfile
      - Add to optionalDependencies
    rationale: >
      Baileys' latest dist-tag is a release candidate (7.0.0-rc13); stable is the
      'legacy' tag 6.7.23. It carries a large, partly-native transitive tree
      (libsignal, protobufjs) that is a known cause of Next.js / Storybook /
      Electron bundler breakage, and adding it to package.json without a matching
      lockfile breaks `pnpm install --frozen-lockfile` in CI. A non-literal
      dynamic import keeps it out of the eager build graph (typecheck/build stay
      green whether or not it is installed) and lets the adapter surface a clear,
      localized install hint when absent. The adapter works the moment the user
      installs the package.
  - title: Cloud API transport
    chosen: Native fetch (Node 18+ global) — zero new dependencies
    rejected:
      - axios / node-fetch
    rationale: >
      The repo targets a Node version with global fetch; no HTTP dependency is
      needed for the Cloud API graph send + webhook handling.
  - title: Inbound dispatch — reuse existing use cases, never reimplement
    chosen: New thin use cases orchestrate CreateFeature / CreateApplication / SendInteractiveMessage / approve / reject / answer-question
    rejected:
      - Let the gateway/service create features directly
    rationale: >
      Code-quality rule — presentation/transport layers are thin; ALL business
      logic stays in use cases. The WhatsApp surface is just another presentation
      transport over the same core API.
  - title: Connection lifecycle — persistent watcher service
    chosen: WhatsAppConnectionService following NotificationWatcherService (singleton, start/stop/isRunning), bootstrapped in ui/_serve startup
    rejected:
      - Per-message connect/disconnect
      - A separate OS daemon process
    rationale: >
      A WhatsApp Web socket must stay connected to receive inbound messages. The
      proven watcher pattern already exists and is wired into server startup.
  - title: Thread <-> session mapping persistence
    chosen: New SQLite table whatsapp_thread_mappings (additive migration) behind IWhatsAppThreadMappingRepository
    rejected:
      - In-memory map (lost on restart)
      - Overload an existing table
    rationale: >
      Replies must route to the right feature/application/HITL gate across
      restarts. Additive migration per the backward-compat migration rule.


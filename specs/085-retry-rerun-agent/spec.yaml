  ## Problem Statement

  When a feature phase (e.g., planning) fails and the spec YAML is empty or
  unfilled, clicking retry should re-run the relevant agent instead of
  attempting to repair formatting on empty content. The repair node can only
  fix formatting issues, not generate content from scratch, so it gets stuck.


phases:
  - id: "phase-1"
    name: "Domain & Persistence Foundation"
    description: >
      Extend the domain model with the new bedrock-specific types and persist
      the enable flag. Adds the BedrockLifecycleAction enum and BedrockHealth /
      BedrockTierStatus value objects in TypeSpec, adds bedrockEnabled: boolean
      to Application, regenerates output.ts via pnpm tsp:compile, then lands a
      forward-only SQLite migration adding bedrock_enabled INTEGER NOT NULL
      DEFAULT 0 to the applications table. The persistence layer (repository
      mapper) is updated so callers can read/write the new field. This phase
      must come first because every later phase consumes the generated types.
    parallel: false

  - id: "phase-2"
    name: "Application Ports & Domain Errors"
    description: >
      Define the two new output-port interfaces before any infrastructure code
      is touched. IBedrockIntegrationService exposes init/sync/doctor/ship
      with explicit cwd parameters and an optional typed onProgress callback.
      IClaudeSettingsReconciler exposes a pure-functional mergeSettings
      contract. Typed domain errors (BedrockNotEnabledError,
      PipxNotInstalledError, BedrockBinaryMissingError,
      ClaudeSettingsMergeFailedError) are added alongside the ports. Locking
      the contracts here lets phases 3 and 4 progress against the same
      interfaces.
    parallel: false

  - id: "phase-3"
    name: "Infrastructure Adapters & DI"
    description: >
      Implement the two adapters behind the ports. ClaudeSettingsReconciler
      lives in infrastructure/services/filesystem/ and is pure-functional
      over parsed JSON. BedrockIntegrationService lives in
      infrastructure/services/integrations/ and consumes the injected
      ExecFunction token for short commands (doctor, --version), and falls
      through to child_process.spawn with windowsHide: true / args-as-array /
      no shell: true for streaming commands (init, sync). The reconciler is
      injected into the bedrock adapter. Both adapters are registered in the
      tsyringe container at the end of this phase.
    parallel: false

  - id: "phase-4"
    name: "Use Cases (TDD)"
    description: >
      Build EnableBedrockForApplication, RunBedrockLifecycle, and
      CheckBedrockHealth strictly RED-first. Each use case is a small
      tsyringe class consuming ports by string token
      (IApplicationRepository, IBedrockIntegrationService,
      IClaudeSettingsReconciler) and a domain error type.
      RunBedrockLifecycle dispatches on BedrockLifecycleAction and guards on
      bedrockEnabled = true. Unit tests use mocked ports from phase 2; no
      infrastructure imports anywhere in the application layer. All three
      use cases are registered in tsyringe with string-token aliases.
    parallel: false

  - id: "phase-5"
    name: "Tool Descriptor & Registry"
    description: >
      Widen the tool-metadata.ts tags union to include "memory", add the
      project-bedrock.json descriptor (per-OS pipx install command,
      bedrock --version verify, docs URL, tags: ["memory"]), and confirm the
      tool installer surfaces PipxNotInstalledError with per-platform
      remediation. No loader code changes — the existing dynamic loader
      picks up the new JSON automatically.
    parallel: false

  - id: "phase-6"
    name: "CLI Surface"
    description: >
      Create src/presentation/cli/commands/bedrock/ with thin Commander
      subcommands (init.command.ts, sync.command.ts, doctor.command.ts,
      ship.command.ts) and a top-level bedrock.command.ts that registers
      them with the parent program. Each subcommand resolves its use case
      from the tsyringe container and renders via the shared ui module.
      init / sync stream output by passing an onProgress callback that
      writes to process.stdout.
    parallel: false

  - id: "phase-7"
    name: "Web UI Toggle"
    description: >
      Add BedrockMemoryToggle React component under
      src/presentation/web/components/, wire it to a Server Action that
      resolves EnableBedrockForApplication via resolve(token), and place
      the toggle on the Application detail page. Ship the mandatory
      colocated .stories.tsx covering Default / Loading / Error states
      using decorators that mock the Server Action response.
    parallel: false

  - id: "phase-8"
    name: "Integration Tests & Verification"
    description: >
      Add the fixture-based integration tests required by the spec:
      (a) tool-installer descriptor loader picks up project-bedrock.json
      with the expected metadata; (b) ClaudeSettingsReconciler produces the
      union of shep+bedrock hook entries with no duplicates and no loss
      (multiple fixture scenarios — empty, shep-only, bedrock-only, both
      present, malformed bedrock payload triggers typed error). Then run
      pnpm validate, pnpm test:unit, pnpm test:int locally and confirm zero
      failures or warnings before pushing.
    parallel: false


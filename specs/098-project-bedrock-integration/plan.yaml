content: |
  ## Status

  - **Phase:** Planning
  - **Updated:** 2026-05-19
  - **Size:** M

  ## Architecture Overview

  The integration fits cleanly into shep's existing layered structure without
  inventing a new pattern. Each concern lands in the layer that already owns
  it:

  - **Domain (`packages/core/src/domain/`)** — TypeSpec-generated value
    objects (`BedrockLifecycleAction`, `BedrockHealth`, `BedrockTierStatus`),
    the `bedrockEnabled` field on `Application`, and a small number of typed
    domain errors. No external deps, no Node APIs.
  - **Application (`packages/core/src/application/`)** — Two new output
    ports (`IBedrockIntegrationService`, `IClaudeSettingsReconciler`) and
    three use cases that orchestrate them. Use cases inject ports by string
    token and remain presentation-agnostic — the same API drives CLI and
    web.
  - **Infrastructure (`packages/core/src/infrastructure/`)** — Two concrete
    adapters (one wrapping `child_process.spawn` + the injected
    `'ExecFunction'`, one reading/writing `.claude/settings.json`), the
    forward-only SQLite migration, the tool descriptor JSON, and the DI
    registration. The only files allowed to import `node:child_process` and
    `node:fs/promises` live here.
  - **Presentation (`src/presentation/`)** — A `shep bedrock` CLI command
    group and a single web toggle, both thin wrappers that resolve the same
    use cases from the container.

  Reuse is intentional throughout: the tool descriptor loader already walks
  `tool-installer/tools/`, the `ExecFunction` token already wraps `execFile`
  with the Windows `.cmd` quirks, the migration runner already accepts a
  forward-only ALTER TABLE with an idempotency guard, and the
  `cli/commands/<group>/` convention is shared with `app/`, `cycle/`,
  `feat/`, and others.

  ## Key Design Decisions

  **1. Two ports, not one.** The research considered folding `.claude/`
  reconciliation into a private helper inside `BedrockIntegrationService`.
  Promoting `IClaudeSettingsReconciler` to its own port keeps the bedrock
  adapter focused on subprocess orchestration and lets the merge logic be
  fixture-tested without spawning anything. It also future-proofs against a
  third `.claude/` writer (e.g. a future MCP installer) reusing the merge.

  **2. ExecFunction for short calls, spawn for streaming.** The injected
  `'ExecFunction'` token already handles Windows `.cmd` quoting and is
  trivially mockable in unit tests; using it for `doctor` and `bedrock
  --version` calls keeps the adapter consistent with `SkillInjectorService`.
  Streaming commands (`init`, `sync`) drop down to `child_process.spawn`
  with `windowsHide: true`, args-as-array, and no `shell: true` — required
  for long-running output where buffering would block the user. Both
  pathways hide behind the port method signatures, so the application layer
  is unaware.

  **3. TypeSpec-defined enum for lifecycle actions.**
  `BedrockLifecycleAction` (Init / Sync / Ship) is defined in TypeSpec and
  consumed across the use case, CLI argv parsing, and web action
  validation. Magic strings would violate the code-quality rule banning
  literals used in branching; per-action use-case classes would triple the
  wiring for identical orchestration. `doctor` stays separate because its
  return shape (per-tier health) differs structurally.

  **4. Persisted enable state on Application.** A single boolean column
  (`bedrock_enabled INTEGER NOT NULL DEFAULT 0`) mirrors how `setupComplete`
  and `cloudDeploymentProvider` are already modelled. The
  `pragma table_info(applications)` idempotency guard pattern from
  migrations 044, 049, 054, and 094 is reused verbatim. `down()` is a
  no-op per project convention.

  **5. Tool descriptor + tag union widening.** Adding `project-bedrock.json`
  is the smallest possible registration surface — the existing dynamic
  loader in `tool-metadata.ts` picks it up at module load with no code
  change. The `tags` string-literal union is widened to include `"memory"`
  (one-line change in the loader file) so the registry can filter the
  bedrock entry under its actual semantic category rather than the
  misleading `cli-agent`.

  **6. CLI command group convention reused exactly.** The shape
  `src/presentation/cli/commands/bedrock/<sub>.command.ts` matches `app/`,
  `cycle/`, `feat/`, `intake/`, etc. Each subcommand is the canonical thin
  wrapper: parse args, resolve use case, format output via the shared `ui`
  module. The `shep-cli-command-creator` agent is designed to scaffold this
  exact layout.

  **7. Web toggle via Server Action, not client fetch.** Server Actions are
  already used for the cloud-deploy toggle; the bedrock toggle follows the
  same pattern (`resolve(token)` inside the action, return new state,
  optimistic UI on the client). This keeps the client bundle slim and the
  wiring colocated with the component, and matches the rest of the
  Application detail page.

  **8. Streaming via typed onProgress callback.** `init` and `sync` take an
  optional `onProgress: (chunk: { stream: 'stdout' | 'stderr', data: string
  }) => void`. Plain TypeScript — no Node streams cross the port boundary.
  CLI pipes to `process.stdout`; web logs into `OperationLog`; tests pass a
  vitest spy. Mirrors `InstallToolUseCase.execute(tool, onData)` exactly.

  ## Implementation Strategy

  Phases are ordered to keep each step independently verifiable and to
  satisfy the TDD discipline:

  1. **Domain & Persistence first** so every later phase consumes the
     generated `BedrockLifecycleAction`, `BedrockHealth`, and `Application`
     types from a single source. The migration lands in this phase too so
     repository mappers can read/write `bedrockEnabled` end-to-end.
  2. **Application Ports** define the contract before any adapter exists —
     this is the boundary that all infrastructure must satisfy and all use
     cases must consume. Locking it early means phases 3 and 4 progress
     against the same interfaces.
  3. **Infrastructure Adapters** implement the ports. The reconciler is
     written before the bedrock adapter because the bedrock adapter injects
     it. DI registration closes this phase so the next phase can resolve
     real instances in tests.
  4. **Use Cases (TDD)** strictly RED-first. Each use case has its failing
     unit test committed before its implementation per the mandatory TDD
     rule. Ports are mocked; no infrastructure imports leak in.
  5. **Tool Descriptor & Registry** lands after the adapter exists so the
     CLI/web install flow can verify-then-invoke the real adapter when the
     user installs bedrock. This is a near-pure config change.
  6. **CLI Surface** wraps the use cases — thin, mechanical, one
     subcommand-per-file. Cannot precede use cases because Commander files
     import them.
  7. **Web UI Toggle** wraps the same `EnableBedrockForApplication` use
     case via Server Action. Mandatory `.stories.tsx` covers Default /
     Loading / Error.
  8. **Integration Tests & Verification** close the loop: fixture-based
     tests for the descriptor loader and for the `.claude/` merge,
     followed by `pnpm validate` end-to-end.

  Within each phase, every code task is RED-first per CLAUDE.md. Test files
  are committed before implementation files where ordering allows;
  otherwise they are committed together (single task, RED step authored
  first).

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | `.claude/settings.json` merge clobbers user content | Isolate logic in `ClaudeSettingsReconciler` port; pure-functional over parsed JSON; fixture-driven tests for empty / shep-only / bedrock-only / both / malformed cases; size guard (>1MB rejects); abort with typed error on parse failure rather than best-effort rewriting. |
  | Bedrock upstream changes its hook payload shape | Never parse bedrock's hook entries — only preserve shep's known entries by stable signature; bedrock entries pass through opaque. Reconciler is the single chokepoint to update if upstream contract shifts. |
  | Cross-platform subprocess quirks (Windows .cmd, paths) | Use the injected `'ExecFunction'` token (already Windows-aware) for short commands; spawn with `windowsHide: true` and args-as-array for streaming; `path.join` everywhere; integration tests run on the host OS in CI. |
  | pipx missing on user host | `doctor()` and the tool-installer verify path emit a typed `PipxNotInstalledError` with per-OS remediation strings (`brew install pipx`, `pip install --user pipx`); never silently fail. |
  | Subprocess argument injection / shell exposure | Forbidden by code-quality.md — `shell: true` is never set; all args passed as arrays; user-supplied `cwd` validated with `fs.access` before spawn (same precondition `SkillInjectorService` uses). |
  | Long bedrock init blocks UI | Streaming `onProgress` callback emits chunks as they arrive; CLI pipes to stdout in real time; web accumulates into OperationLog; no buffering. |
  | Migration breaks on existing installs | `pragma table_info(applications)` idempotency guard; `DEFAULT 0` covers existing rows atomically; no-op `down()` matches every other migration in tree; tested against a sample SQLite file before push. |
  | Bootstrap-ordering bugs in DI graph | Register adapter in `registerServices` (early stage) next to existing infrastructure services like `ISkillInjectorService`; use cases registered in `registerUseCases`; string tokens exported in `tokens.ts` so callers can never typo. |
  | Bedrock CLI not found after install | Verify via `bedrock --version` immediately after the install command in the tool-installer flow; surface typed `BedrockBinaryMissingError` if absent (PATH issue) with remediation pointing to `pipx ensurepath`. |
  | Web toggle desyncs after page reload | Server Action returns persisted state from `IApplicationRepository`; client renders from server-fetched `bedrockEnabled`; no client-only store. |
  | Storybook story drift breaking CI | Run `pnpm build:storybook` locally before push (mandated by `.claude/rules/cicd.md`); each story renders without Server Action calls via decorators that stub the action. |
  | Tag union widening breaks existing tools loader strictness | One-line change adding `"memory"` to the union in `tool-metadata.ts`; existing descriptors continue to validate; CLAUDE.md note added so future contributors know the union exists. |

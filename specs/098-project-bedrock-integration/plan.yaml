name: "project-bedrock-integration"
summary: >
  Implement project-bedrock as a first-class shep integration in eight phases.
  Start by extending the domain (TypeSpec field on Application plus a
  BedrockLifecycleAction enum and BedrockHealth value object) and adding the
  forward-only SQLite migration. Then introduce two application-layer ports
  (IBedrockIntegrationService and IClaudeSettingsReconciler) before standing up
  their infrastructure adapters with child_process.spawn / ExecFunction. Wire
  three use cases (EnableBedrockForApplication, RunBedrockLifecycle,
  CheckBedrockHealth) under TDD, register everything in tsyringe, then expose
  the feature through the existing tool descriptor loader, a shep bedrock CLI
  command group, and a single web toggle on the Application detail page.
  Finish with fixture-based integration tests for the descriptor loader and
  the .claude/settings.json merge before running pnpm validate end to end.


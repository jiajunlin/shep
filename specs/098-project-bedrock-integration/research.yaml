# Research Artifact (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "project-bedrock-integration"
summary: >
  project-bedrock plugs into shep as a first-class tool through three layered surfaces:
  a JSON tool descriptor (loaded automatically by tool-metadata.ts), an output port
  IBedrockIntegrationService backed by a child_process.spawn-based adapter, and three
  small use cases (EnableBedrockForApplication, RunBedrockLifecycle, CheckBedrockHealth)
  wired into the existing tsyringe DI container. The .claude/ collision is resolved by a
  diff-aware merge helper that runs SkillInjectorService first, runs `bedrock init`
  second, then reconciles the resulting settings.json arrays, keeping bedrock as an
  opaque upstream dependency.

relatedFeatures: []

technologies:
  - "Node.js / TypeScript (shep core)"
  - "tsyringe (DI container)"
  - "TypeSpec (tsp/) for domain models"
  - "Python 3.9+ / pipx (project-bedrock runtime)"
  - "Commander.js (CLI surface)"
  - "Next.js 15 (web UI surface)"
  - "Vitest (unit/integration tests)"
  - "better-sqlite3 + umzug (SQLite migrations)"
  - "Node child_process.spawn (subprocess invocation)"
  - "Storybook 9 (web component stories)"


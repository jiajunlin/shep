name: "project-bedrock-integration"
number: 98
branch: "feat/098-project-bedrock-integration"
oneLiner: "register project-bedrock as a first-class shep tool integration with install and project-init wiring"
userQuery: "integrate shep with https://github.com/robotaitai/project-bedrock\n"
summary: "Integrate project-bedrock (a Python CLI that maintains git-tracked, markdown-based\n\"project memory\" for AI coding agents) with shep so it can be discovered, installed,\nverified, and optionally bootstrapped inside shep-managed worktrees. The integration\nfollows shep's existing pluggable tool patterns (tool-installer JSON descriptors plus\nan infrastructure-layer service) and exposes bedrock's lifecycle (init, sync, ship,\ndoctor) to the application layer through a new output port.\n"
phase: "Requirements"
sizeEstimate: "M"
relatedFeatures: []
technologies:
  - "Node.js / TypeScript (shep core)"
  - "tsyringe (DI container)"
  - "TypeSpec (tsp/) for domain models"
  - "Python 3.9+ / pipx (project-bedrock runtime)"
  - "Commander.js (CLI surface)"
  - "Next.js (web UI surface)"
  - "Vitest (unit/integration tests)"
  - "Node child_process (subprocess invocation)"

name: "project-bedrock-integration"
summary: >
  24 tasks across 8 phases delivering the project-bedrock integration end to
  end. Phase 1 lands the TypeSpec changes and SQLite migration; Phase 2
  defines the application ports and domain errors; Phase 3 implements the
  reconciler and the bedrock adapter and registers them in DI; Phase 4
  authors the three use cases strictly RED-first; Phase 5 widens the tag
  union and adds the project-bedrock.json descriptor; Phase 6 ships the
  shep bedrock CLI command group; Phase 7 ships the web toggle plus the
  mandatory Storybook story; Phase 8 closes the loop with fixture-based
  integration tests and a full pnpm validate run.


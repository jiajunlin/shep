content: |
  ## Status

  - **Phase:** Implementation
  - **Updated:** 2026-05-19

  ## Summary

  The work is delivered in eight phases, ordered so each phase produces an
  artefact the next phase needs.

  **Phase 1 — Domain & Persistence Foundation.** Land the TypeSpec types
  (`BedrockLifecycleAction`, `BedrockHealth`, `BedrockTierStatus`), add
  `bedrockEnabled` to `Application`, regenerate `output.ts`, write the
  forward-only SQLite migration (101) with the standard `pragma table_info`
  guard, and update the application repository mapper so the new field
  round-trips. Tasks 1–4.

  **Phase 2 — Application Ports & Domain Errors.** Define
  `IBedrockIntegrationService`, `IClaudeSettingsReconciler`, and the four
  typed domain errors. Pure interfaces, zero infrastructure imports —
  locking the contract before any adapter exists. Tasks 5–7.

  **Phase 3 — Infrastructure Adapters & DI.** Implement
  `ClaudeSettingsReconciler` first (pure-functional, fixture-friendly),
  then `BedrockIntegrationService` (ExecFunction for short calls, spawn for
  streaming with `windowsHide: true` + args-as-array), then wire both into
  the tsyringe container via `registerServices` and `tokens.ts`. Tasks 8–10.

  **Phase 4 — Use Cases (TDD).** Author the three use cases strictly
  RED-first: `EnableBedrockForApplication` (idempotent persist + init),
  `RunBedrockLifecycle` (enum-dispatch + bedrockEnabled guard),
  `CheckBedrockHealth` (passthrough). Register all three in
  `registerUseCases`. Tasks 11–14.

  **Phase 5 — Tool Descriptor & Registry.** Widen the `tags` union to
  accept `"memory"` (one-line type change), then drop in
  `project-bedrock.json`. The existing dynamic loader picks it up — the
  web tools registry shows the entry automatically. Tasks 15–16.

  **Phase 6 — CLI Surface.** Scaffold `shep bedrock` as a command group
  under `src/presentation/cli/commands/bedrock/`, then implement four thin
  subcommand files (`init`, `sync`, `doctor`, `ship`). Each resolves its
  use case from the container, streams output through `onProgress` where
  applicable, and renders via `ui/index.ts`. Tasks 17–18.

  **Phase 7 — Web UI Toggle.** Add the Server Action wrapping
  `EnableBedrockForApplication`, build `BedrockMemoryToggle` with the
  mandatory colocated `.stories.tsx` covering Default / Loading / Error
  states, and place the toggle on the Application detail page. Tasks 19–21.

  **Phase 8 — Integration Tests & Verification.** Land the fixture-based
  integration tests for the `.claude/` merge (four scenarios incl.
  malformed-input typed error), then run `pnpm validate`, `pnpm test:unit`,
  `pnpm test:int`, and `pnpm build:storybook` locally before pushing.
  Tasks 22–24.

  Every code task in phases 1–7 follows RED-GREEN-REFACTOR. Non-code tasks
  (DI plumbing additions, validation runs, Storybook build) carry
  `tdd: null`. The overall budget — ~20 hours of focused work — sits
  comfortably inside the M sizing established in the spec.

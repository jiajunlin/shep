# Structured technology decisions
decisions:
  - title: "Branding storage approach"
    chosen: "Direct string edits in each file (no shared constant)"
    rejected:
      - "Create a shared branding constants module (e.g., src/domain/constants/branding.ts) imported by all surfaces — Rejected because the surfaces span Markdown, YAML, JSON, and TypeScript. Only 2-3 TypeScript files reference the descriptor, while the majority are non-code files (README, CONTRIBUTING, issue templates, CLAUDE.md). A shared module would only serve the TypeScript files, while Markdown/YAML/JSON files would still need manual string edits. The complexity of importing and maintaining a shared module is not justified for 2-3 call sites."
      - "Use a build-time template system to inject branding from a single source — Rejected because it adds build tooling complexity for a problem that occurs infrequently (branding changes are rare). The spec already documents both canonical descriptors as the single source of truth. A template system would require custom tooling for Markdown substitution, GitHub YAML processing, and package.json patching — massive over-engineering for a cosmetic change."
    rationale: >
      The branding surfaces are heterogeneous: Markdown files, YAML templates, JSON (package.json),
      and TypeScript source. No single mechanism can serve all of them. Direct edits are the simplest
      approach and match how the codebase currently handles these strings. The spec itself serves as
      the single source of truth for the canonical text, which is sufficient for the rare event of
      future branding updates. This aligns with the codebase principle of avoiding over-engineering.

  - title: "CONTRIBUTING.md restructuring approach"
    chosen: "Add Quick Contributions section above existing full-feature workflow, preserve existing content"
    rejected:
      - "Rewrite CONTRIBUTING.md from scratch with new structure — Rejected because the existing document is comprehensive and well-structured (283 lines, 12+ sections). A rewrite risks losing nuanced details about the development workflow, release process, and coding standards that were carefully crafted. The restructuring only needs to ADD a quick-fix path and REORGANIZE the top-level flow, not replace existing content."
      - "Split into multiple files (CONTRIBUTING-quick.md, CONTRIBUTING-full.md) — Rejected because GitHub only recognizes a single CONTRIBUTING.md for the community profile integration. Multiple files would also force contributors to choose which file to read before knowing which path applies to them, increasing friction rather than reducing it."
    rationale: >
      The existing CONTRIBUTING.md is well-written with good coverage of development standards.
      The issue is not content quality but content ordering — the mandatory spec-driven workflow
      appears first and deters casual contributors. The fix is additive: insert a Quick Contributions
      section near the top (after Getting Started) that provides the streamlined path, then clearly
      label the existing workflow section as the Full Feature path. This preserves all existing
      content while creating a clear fork in the reader's journey.

  - title: "CODE_OF_CONDUCT.md content approach"
    chosen: "Contributor Covenant v2.1 verbatim with project-specific contact email"
    rejected:
      - "Custom-written code of conduct tailored to the project — Rejected because it requires legal review, ongoing maintenance, and is less recognizable to open-source contributors. The Contributor Covenant is used by 100k+ projects and is immediately trusted by contributors."
      - "Abbreviated code of conduct with link to full Contributor Covenant — Rejected because GitHub's community profile checker expects the full text in the file, and an abbreviated version may miss enforcement guidelines that give the document teeth."
    rationale: >
      Contributor Covenant v2.1 is the de facto standard. It requires exactly one customization:
      replacing the [INSERT CONTACT METHOD] placeholder with the project's enforcement email.
      The text is available under CC BY 4.0, allowing free use with attribution. Using it verbatim
      ensures the document is complete, legally sound, and immediately recognizable.

  - title: "SECURITY.md disclosure approach"
    chosen: "Email-based private disclosure with structured response timeline"
    rejected:
      - "GitHub Security Advisories as primary channel — Rejected because it requires reporters to have GitHub accounts and understand the advisory workflow. Email is universally accessible and has zero learning curve for reporters of any experience level."
      - "Public issue with 'security' label — Rejected because it publicly exposes vulnerability details before a fix is available, creating a window for exploitation. Private disclosure is the industry standard for responsible reporting."
    rationale: >
      Email-based disclosure is the most accessible option and the standard for open-source projects
      of this size. The SECURITY.md will include: supported versions table, email address for reports,
      expected response timeline (acknowledge within 48h, triage within 7 days), and a clear statement
      not to open public issues for security vulnerabilities. GitHub Security Advisories can be
      mentioned as a secondary channel but email remains primary.

  - title: "Good-first-issue template format"
    chosen: "GitHub issue forms YAML (.yml) matching existing template patterns"
    rejected:
      - "Markdown-based issue template (.md) — Rejected because the existing templates (bug-report.yml, feature-request.yml, docs-improvement.yml) all use the YAML issue forms format. A Markdown template would be inconsistent and lacks structured form fields (dropdowns, required validation). The YAML format provides a better experience for maintainers creating beginner issues."
      - "No template, label-only approach — Rejected because without a template, good-first-issues lack consistent structure. Newcomers need clear problem statements, hints, expected outcomes, and links to docs. A template ensures every good-first-issue is well-structured, which the spec explicitly requires."
    rationale: >
      The codebase already uses GitHub issue forms YAML for all three existing templates. Following
      the same pattern (emoji prefix in name, description field, title prefix, labels array, body
      with typed fields) ensures visual and structural consistency. The template will include fields
      for: problem description, suggested approach/hints, files likely involved, expected outcome,
      relevant docs links, and a difficulty dropdown (trivial/easy/moderate). This template is
      maintainer-facing — used when creating issues for newcomers, not by newcomers themselves.

  - title: "Scope of 'Shep AI CLI' replacement"
    chosen: "Replace in spec-identified surfaces only (issue templates, CONTRIBUTING.md title, CLI entry comment)"
    rejected:
      - "Global find-and-replace of all 47+ 'Shep AI CLI' occurrences — Rejected because many occurrences are in documentation files (docs/), translation files (translations/), test fixtures, and internal comments that are not public-facing branding surfaces. A global replacement would create a massive diff touching files outside the spec scope, risk breaking translation keys, and conflate branding cleanup with a broader rename effort."
      - "Replace only in GitHub issue templates — Rejected because the spec explicitly identifies CONTRIBUTING.md title, CLI entry comment, and version command comment as surfaces needing alignment. Limiting to just issue templates would leave inconsistencies in other spec-identified files."
    rationale: >
      The spec defines a clear branding surface inventory. Replacing 'Shep AI CLI' in those specific
      surfaces achieves the goal of consistent public-facing branding. The 40+ other occurrences in
      docs/, translations/, and internal files are a separate cleanup effort that should not be
      conflated with this feature. The spec explicitly scopes the work to the listed surfaces.


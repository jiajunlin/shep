content: |
  ## Technology Decisions

  ### 1. Branding Storage Approach

  **Chosen:** Direct string edits in each file (no shared constant)

  **Rejected:**
  - Shared branding constants module — Only 2-3 TypeScript files need the descriptor; the majority of surfaces are Markdown, YAML, and JSON files that cannot import TypeScript modules. The complexity is not justified.
  - Build-time template system — Massive over-engineering for a cosmetic change that occurs infrequently. The spec itself serves as the single source of truth.

  **Rationale:** The branding surfaces are heterogeneous (Markdown, YAML, JSON, TypeScript). No single mechanism serves all of them. Direct edits are simplest and match the codebase's current approach. The spec documents both canonical descriptors as the reference point for future changes.

  ### 2. CONTRIBUTING.md Restructuring

  **Chosen:** Add Quick Contributions section above existing full-feature workflow, preserve existing content

  **Rejected:**
  - Full rewrite — The existing 283-line document is comprehensive and well-crafted. A rewrite risks losing nuanced details.
  - Split into multiple files — GitHub only recognizes a single CONTRIBUTING.md for community profile integration.

  **Rationale:** The issue is content ordering, not content quality. Insert a Quick Contributions section near the top (after Getting Started) with the streamlined path, then relabel the existing workflow as the Full Feature path. All existing content is preserved.

  ### 3. CODE_OF_CONDUCT.md Content

  **Chosen:** Contributor Covenant v2.1 verbatim with project-specific contact email

  **Rejected:**
  - Custom code of conduct — Requires legal review, ongoing maintenance, less recognizable.
  - Abbreviated version with link — GitHub community profile expects full text; abbreviated version lacks enforcement teeth.

  **Rationale:** Industry standard (100k+ projects), CC BY 4.0 licensed, requires only one customization (contact email placeholder).

  ### 4. SECURITY.md Disclosure Approach

  **Chosen:** Email-based private disclosure with structured response timeline

  **Rejected:**
  - GitHub Security Advisories as primary — Requires GitHub account and advisory workflow knowledge.
  - Public issue with security label — Exposes vulnerabilities before fix is available.

  **Rationale:** Email is universally accessible. File will include: supported versions, email address, response timeline (48h acknowledge, 7-day triage), and clear instruction not to open public issues.

  ### 5. Good-First-Issue Template Format

  **Chosen:** GitHub issue forms YAML (.yml) matching existing template patterns

  **Rejected:**
  - Markdown-based template (.md) — Inconsistent with existing YAML templates, lacks structured form fields.
  - Label-only approach — No template means inconsistent issue structure for newcomers.

  **Rationale:** All three existing templates use YAML issue forms. Following the same pattern (emoji prefix, description, title prefix, labels, typed body fields) ensures consistency. The template is maintainer-facing.

  ### 6. Scope of 'Shep AI CLI' Replacement

  **Chosen:** Replace in spec-identified surfaces only (issue templates, CONTRIBUTING.md, CLI comments)

  **Rejected:**
  - Global find-and-replace of all 47+ occurrences — Massive diff, risks breaking translation keys, conflates branding with rename effort.
  - Issue templates only — Misses other spec-identified surfaces.

  **Rationale:** The spec defines a clear surface inventory. Other occurrences (docs/, translations/, tests) are a separate cleanup effort.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | Contributor Covenant v2.1 | Code of Conduct text | Use (CC BY 4.0) | Industry standard, zero drafting, one placeholder to customize |
  | No new npm packages | N/A | N/A | This feature is entirely documentation and metadata — no runtime dependencies |
  | No new build tools | N/A | N/A | Direct file edits require no templating or build pipeline changes |

  ## Security Considerations

  - **SECURITY.md creation:** Establishes a formal vulnerability disclosure process where none exists today. Email-based private disclosure ensures vulnerabilities are not publicly exposed before a fix is available.
  - **No code changes:** All TypeScript modifications are string constant changes only (version-info.ts description, layout.tsx metadata, cli/index.ts comment). No new attack surfaces are introduced.
  - **package.json description:** Changing the npm description field does not affect any runtime behavior, authentication, or package integrity. It only changes what users see on npmjs.com.
  - **No secrets or credentials:** No files in this feature contain or reference secrets, API keys, or credentials.

  ## Performance Implications

  - **Zero runtime impact:** All changes are to string constants, metadata, and documentation files. No new code paths, no additional imports, no bundle size changes.
  - **Build verification:** The only performance-adjacent concern is ensuring `pnpm build` still passes after changing strings in version-info.ts and layout.tsx. These are compile-time checks, not runtime.
  - **No additional network calls:** The branding changes do not introduce any new API calls, fetch requests, or external service dependencies.

  ## Architecture Notes

  ### How This Fits the Existing Codebase

  - **version-info.ts** (`packages/core/src/domain/value-objects/version-info.ts`): Contains `DEFAULT_VERSION_INFO` with a `description` field set to "Autonomous AI Native SDLC Platform". This is a domain value object — the change is a string constant update with no API or type signature changes. The `VersionInfo` interface remains unchanged.

  - **layout.tsx** (`src/presentation/web/app/layout.tsx`): Contains Next.js metadata export with `description` field. The change is a metadata string update — no component, prop, or rendering changes.

  - **cli/index.ts** (`src/presentation/cli/index.ts`): Contains a JSDoc comment with "Autonomous AI Native SDLC Platform - CLI Interface". This is a comment-only change with zero runtime impact.

  - **CONTRIBUTING.md restructuring**: The existing document follows a linear flow (setup → contribute → standards → PR → release). The restructuring adds a fork after "Getting Started" where contributors choose between quick-fix and full-feature paths. This is a documentation architecture change, not a code architecture change.

  - **New files** (CODE_OF_CONDUCT.md, SECURITY.md, good-first-issue.yml): These are standard GitHub community health files placed at conventional locations. GitHub automatically detects root-level CODE_OF_CONDUCT.md and SECURITY.md for the community profile. The issue template goes in `.github/ISSUE_TEMPLATE/` alongside existing templates.

  ### File Change Inventory

  | File | Change Type | Risk |
  | ---- | ----------- | ---- |
  | README.md | Verify tagline alignment | None — already uses correct tagline |
  | package.json | Update description string | Low — npm metadata only |
  | layout.tsx | Update metadata description | Low — string constant only |
  | version-info.ts | Update DEFAULT_VERSION_INFO.description | Low — string constant only |
  | cli/index.ts | Update JSDoc comment | None — comment only |
  | CLAUDE.md | Update project description | None — AI context only |
  | CONTRIBUTING.md | Add quick-fix section, relabel full-feature, update CoC link, update community channels | Medium — largest structural change |
  | bug-report.yml | Replace "Shep AI CLI" with "Shep" | None — template text only |
  | feature-request.yml | Replace "Shep AI CLI" with "Shep" | None — template text only |
  | docs-improvement.yml | Verify (no change needed) | None |
  | config.yml | Verify contact links | None |
  | CODE_OF_CONDUCT.md (new) | Contributor Covenant v2.1 | None — standard template |
  | SECURITY.md (new) | Email-based disclosure policy | None — new file |
  | good-first-issue.yml (new) | Structured issue form | None — new template |


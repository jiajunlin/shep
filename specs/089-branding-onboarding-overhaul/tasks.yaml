# Markdown content (the full tasks document)
content: |
  ## Summary

  Nine tasks across three phases implement the branding-onboarding-overhaul feature.

  Phase 1 creates three standalone community health files in parallel: CODE_OF_CONDUCT.md
  (Contributor Covenant v2.1), SECURITY.md (email-based disclosure), and a good-first-issue
  GitHub issue template (YAML form matching existing template patterns). These are additive
  files with no dependencies on existing code.

  Phase 2 unifies branding across all existing surfaces. TypeScript string constants in
  version-info.ts and layout.tsx are updated to the canonical long descriptor, followed by
  a build verification. package.json, CLAUDE.md, and issue templates get simple string
  replacements. README.md is verified to already match the canonical short tagline.

  Phase 3 tackles the largest change: restructuring CONTRIBUTING.md. A new Quick Contributions
  section is inserted after Getting Started, providing the streamlined path for casual
  contributors. The existing workflow is relabeled as Full Feature Development. The Code of
  Conduct reference is updated to link to the new file, and the community channels placeholder
  is replaced with a GitHub Discussions message.

  The only task requiring build verification is task-4 (TypeScript string changes). All other
  tasks are documentation and configuration changes with no compilation impact.

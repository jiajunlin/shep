# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This feature makes zero architectural changes. All modifications are to string constants,
  metadata fields, documentation files, and GitHub configuration YAML. The changes fall into
  three categories:

  1. **New standalone files** — CODE_OF_CONDUCT.md, SECURITY.md, and good-first-issue.yml are
     additive community health files placed at standard GitHub-recognized locations (repo root
     and `.github/ISSUE_TEMPLATE/`). They have no imports, exports, or runtime impact.

  2. **String constant edits in TypeScript** — version-info.ts contains a `DEFAULT_VERSION_INFO`
     object with a `description` field (string literal). layout.tsx contains a Next.js metadata
     export with a `description` field. cli/index.ts has a JSDoc comment. All changes are
     string-only with no type signature, export, or behavioral modifications.

  3. **Documentation restructuring** — CONTRIBUTING.md gets a structural overhaul to add
     tiered contribution paths. This is a Markdown-only change with no code coupling.

  ## Key Design Decisions

  ### 1. Direct string edits (no shared branding constant)

  The branding surfaces span Markdown, YAML, JSON, and TypeScript. Only 2-3 TypeScript files
  reference the descriptor. A shared module would only serve those files while Markdown/YAML/JSON
  surfaces still need manual edits. The spec documents both canonical descriptors as the single
  source of truth, which is sufficient for future branding updates.

  ### 2. Two-tier canonical descriptors

  - **Short tagline** (README hero): "Run multiple AI agents in parallel. Each in its own worktree."
  - **Long descriptor** (metadata): "Autonomous AI-native SDLC platform — run parallel AI agents
    in isolated worktrees to automate the development cycle from idea to deploy."
  - **Product name**: "Shep" (not "Shep AI CLI", not "Shep AI")

  ### 3. Additive CONTRIBUTING.md restructuring (not rewrite)

  The existing 283-line document is comprehensive. The fix is content ordering — insert a
  Quick Contributions section after Getting Started, then relabel the existing workflow as the
  Full Feature path. All existing content is preserved with minimal modifications.

  ### 4. Contributor Covenant v2.1 verbatim

  Industry standard, CC BY 4.0 licensed, requires only one customization: the enforcement
  contact email placeholder (conduct@shep.bot).

  ### 5. Scoped 'Shep AI CLI' replacement

  Only replace in spec-identified surfaces (issue templates, CONTRIBUTING.md, CLI comment).
  The 40+ other occurrences in docs/, translations/, and internal files are a separate effort.

  ## Implementation Strategy

  **Phase ordering rationale:**

  Phase 1 (Community Health Files) comes first because these are new files with no dependencies.
  They can be created independently and provide immediate value when GitHub detects them.

  Phase 2 (Branding Unification) comes second because it touches existing files with simple
  string replacements. The TypeScript changes need a build verification step to ensure no
  compilation errors were introduced.

  Phase 3 (Contributor Onboarding) comes last because CONTRIBUTING.md restructuring is the
  most complex single-file change and references the CODE_OF_CONDUCT.md created in phase 1.
  It also includes the branding fix for the CONTRIBUTING.md title, which logically groups
  with the other CONTRIBUTING.md changes rather than splitting it into phase 2.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeScript string changes break build | Run `pnpm build` after phase 2 to catch compilation errors immediately |
  | CONTRIBUTING.md restructuring loses existing content | Additive approach — insert new sections, relabel existing ones, preserve all current text |
  | Contributor Covenant contact email is a placeholder | Use conduct@shep.bot pattern; maintainer can finalize during review |
  | Issue template YAML syntax errors | Follow exact patterns from existing templates (bug-report.yml, feature-request.yml) |
  | docs-improvement.yml needs changes | Research confirmed it does NOT contain "Shep AI CLI" — verification only, no edit needed |
  | Scope creep into translation files | Explicitly deferred per research decision; translation branding is a separate follow-up |

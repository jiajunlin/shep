name: "branding-onboarding-overhaul"
number: 89
branch: "feat/089-branding-onboarding-overhaul"
oneLiner: "Unify branding across all surfaces and reduce contributor onboarding friction"
summary: "Address feedback identifying inconsistent branding across public surfaces (README, package.json, web meta, CLI help, CONTRIBUTING) and high contributor onboarding friction from mandatory spec-driven workflow, TDD-first requirements, and missing welcoming signals. This feature unifies the product descriptor to a single canonical tagline, adds tiered contribution paths for casual contributors, and introduces community health files and good-first-issue templates.\n"
phase: "Requirements"
sizeEstimate: "M"
relatedFeatures:
  - "080-skill-branding-injection"
  - "079-pr-branding"
  - "087-co-author-branding"
  - "037-first-run-onboarding"
  - "056-welcome-onboarding-wizard"
technologies:
  - "Markdown"
  - "YAML"
  - "Next.js metadata"
  - "Commander.js CLI descriptions"
  - "TypeScript value objects"
  - "GitHub issue and PR templates"
  - "GitHub community health files"
relatedLinks:
  - title: "GitHub community health files documentation"
    url: "https://docs.github.com/en/communities/setting-up-your-project-for-healthy-contributions"
  - title: "Conventional Commits specification"
    url: "https://www.conventionalcommits.org/"
  - title: "Contributor Covenant Code of Conduct"
    url: "https://www.contributor-covenant.org/"
openQuestions:
  - question: "What should the canonical product descriptor be across all surfaces?"
    resolved: true
    options:
      - option: "README-style concrete tagline"
        description: "Use the README tagline 'Run multiple AI agents in parallel. Each in its own worktree.' as the canonical descriptor everywhere. Concrete, action-oriented, immediately tells users what the product does. May be too narrow for npm/web metadata where a broader positioning is expected."
        selected: false
      - option: "Two-tier descriptor system"
        description: "Define a short tagline (concrete, action-oriented) for hero/README use and a longer descriptor (positioning statement) for metadata fields like package.json and web meta. Allows different contexts to use the right level of detail while maintaining consistency within each tier."
        selected: true
      - option: "Abstract platform descriptor"
        description: "Use 'Autonomous AI Native SDLC Platform' everywhere. Consistent but abstract — new visitors cannot tell what the product actually does from this phrase alone. Poor for discovery and first impressions."
        selected: false
    selectionRationale: "A two-tier system gives both clarity and flexibility. The concrete tagline works for hero sections where you want immediate understanding. The longer descriptor works for metadata fields (npm, web meta, CLI help) where users expect a positioning statement. This avoids the false choice between 'too specific' and 'too abstract'."
    answer: "Two-tier descriptor system"
  - question: "What Code of Conduct should be adopted?"
    resolved: true
    options:
      - option: "Contributor Covenant v2.1"
        description: "Industry standard, widely recognized, used by 100k+ projects. Comprehensive coverage of expected behavior, enforcement guidelines, and scope. Well-maintained and versioned. May feel heavy for a small project but signals professionalism."
        selected: true
      - option: "Custom minimal CoC"
        description: "A short, custom-written code of conduct tailored to the project. Lighter weight but less recognized, requires maintenance, and may miss edge cases that Contributor Covenant covers."
        selected: false
    selectionRationale: "Contributor Covenant v2.1 is the de facto standard. It is immediately recognizable to open-source contributors, requires no custom drafting, and signals that the project takes community health seriously. The overhead of adopting it is near-zero."
    answer: "Contributor Covenant v2.1"
  - question: "How should the tiered contribution paths be structured?"
    resolved: true
    options:
      - option: "Two tiers: quick-fix and full-feature"
        description: "Quick-fix path (typos, docs, small bugs) with minimal process — just fork, fix, PR. Full-feature path retains spec-driven workflow and TDD. Simple to explain, clear boundary. Risk: ambiguity about what qualifies as 'quick-fix'."
        selected: true
      - option: "Three tiers: typo, enhancement, feature"
        description: "Typo/docs tier (no tests needed), enhancement tier (tests required, no spec), feature tier (full spec workflow). More granular but more complex to explain and harder for contributors to self-classify."
        selected: false
      - option: "Single path with optional steps"
        description: "One contribution path where spec workflow and TDD are marked as 'recommended for large changes' rather than mandatory. Simplest to document but loses the enforcement benefit for architectural changes."
        selected: false
    selectionRationale: "Two tiers provide the right balance. Quick-fix covers the 80% of casual contributions (typos, doc fixes, small bug fixes, config tweaks) that are currently blocked by the full spec workflow. The full-feature path remains rigorous for architectural changes. The boundary is easy to communicate: if your change touches more than 2-3 files or introduces new behavior, use the full path."
    answer: "Two tiers: quick-fix and full-feature"
  - question: "What security policy approach should SECURITY.md use?"
    resolved: true
    options:
      - option: "Email-based private disclosure"
        description: "Provide a security email address for private vulnerability reports. Simple, universal, works with any email client. Requires monitoring the email. Standard for most open-source projects."
        selected: true
      - option: "GitHub Security Advisories"
        description: "Use GitHub's built-in private vulnerability reporting feature. Integrated into the platform, structured format, automatic CVE assignment. Requires GitHub-specific knowledge from reporters."
        selected: false
    selectionRationale: "Email-based disclosure is the most accessible option. Contributors of all experience levels know how to send an email. GitHub Security Advisories can be added later as a secondary channel, but the primary channel should be the lowest-friction option."
    answer: "Email-based private disclosure"
  - question: "Should a good-first-issue GitHub issue template be created?"
    resolved: true
    options:
      - option: "Label-only approach"
        description: "Create the 'good first issue' label and manually apply it to suitable issues. No special template — maintainers curate which existing issues are beginner-friendly. Lower overhead but relies on active curation."
        selected: false
      - option: "Template plus label"
        description: "Create both a 'good first issue' label AND a new issue template that maintainers use to create well-structured beginner issues with context, hints, and expected outcomes. Higher initial effort but produces consistently welcoming issues."
        selected: true
    selectionRationale: "A template ensures that every good-first-issue has the structure a newcomer needs: clear problem statement, hints on where to look, expected outcome, and links to relevant docs. Without a template, good-first-issues often lack context and become frustrating for newcomers. The template is a one-time investment that pays off on every issue created with it."
    answer: "Template plus label"
  - question: "Should the CONTRIBUTING.md quick-fix path require conventional commits?"
    resolved: true
    options:
      - option: "Yes, require conventional commits for all PRs"
        description: "Maintains release automation consistency. Contributors must learn the format but it is well-documented and simple. Prevents manual changelog work and ensures semantic versioning works correctly."
        selected: true
      - option: "No, allow freeform commits for quick fixes"
        description: "Lowers the bar further for casual contributors. Maintainers would need to squash-merge with a conventional commit message. Adds burden to maintainers but removes friction for contributors."
        selected: false
    selectionRationale: "Conventional commits are simple enough that requiring them for all PRs is reasonable. The format is 'type(scope): description' — one line. The alternative (maintainer squash-merging with reformatted messages) adds ongoing maintenance burden and is error-prone. Quick-fix contributors can use 'fix(docs): correct typo in readme' without understanding the full commit spec."
    answer: "Yes, require conventional commits for all PRs"
content: "## Problem Statement\n\nExternal feedback identified three compounding problems hurting contributor conversion:\n\n1. **Brand inconsistency** — Public surfaces use at least five different product descriptors:\n   - README.md: \"Run multiple AI agents in parallel. Each in its own worktree.\"\n   - package.json: \"Autonomous AI Native SDLC Platform - Automate the development cycle from idea to deploy\"\n   - Web layout metadata: \"Autonomous AI Native SDLC Platform - Automate the development cycle from idea to deploy\"\n   - CLI help/version-info.ts: \"Autonomous AI Native SDLC Platform\"\n   - CONTRIBUTING.md title: \"Shep AI CLI\"\n   - CLAUDE.md: \"Autonomous AI Native SDLC Platform\"\n   - Issue templates: \"Shep AI CLI\"\n\n   A new visitor must reconcile these into a single mental model. The README tagline is the clearest\n   and most concrete, but it is contradicted by the more abstract \"Autonomous AI Native SDLC Platform\"\n   used in package.json, CLI, and web metadata.\n\n2. **Contributor onboarding friction** — The CONTRIBUTING.md guide requires:\n   - Mandatory `/shep-kit:new-feature` spec-driven workflow for ALL contributions\n   - TDD-first (RED-GREEN-REFACTOR) for ALL changes\n   - Clean Architecture layering rules\n   - Conventional commit format with strict scope/type enforcement\n   - Screenshots for UI changes\n   - Multiple test gates (unit, integration, E2E)\n\n   This is appropriate for architectural features but deters casual contributors who want to fix a\n   typo, improve docs, or submit a small bug fix. There is no tiered contribution path.\n\n3. **Missing welcoming signals** — The repository lacks:\n   - \"good first issue\" label and curated issues using it\n   - A \"quick contributions\" section in CONTRIBUTING.md for low-barrier changes\n   - CODE_OF_CONDUCT.md file (referenced in CONTRIBUTING line 7 but not present)\n   - SECURITY.md file\n   - Community channel links (line 266: \"links TBD\")\n   - Any mention of beginner-friendly or newcomer-welcoming patterns\n\n## Success Criteria\n\n- [ ] All branding surfaces (README, package.json, layout.tsx, version-info.ts, CLAUDE.md, CLI entry comment, issue templates, CONTRIBUTING.md) use one of exactly two approved descriptors: the short tagline or the long descriptor\n- [ ] No surface contains \"Shep AI CLI\" as a product descriptor (replaced with canonical branding)\n- [ ] CONTRIBUTING.md contains a clearly labeled \"Quick Contributions\" section with a streamlined path for typos, docs, and small bug fixes\n- [ ] CONTRIBUTING.md contains a clearly labeled \"Full Feature\" section that retains the spec-driven workflow and TDD requirements\n- [ ] CODE_OF_CONDUCT.md exists at repo root with Contributor Covenant v2.1 content\n- [ ] SECURITY.md exists at repo root with a vulnerability disclosure email and process\n- [ ] A good-first-issue GitHub issue template exists at `.github/ISSUE_TEMPLATE/good-first-issue.yml`\n- [ ] Community channel placeholder in CONTRIBUTING.md (line 266 \"links TBD\") is either filled with real links or replaced with a forward-looking message\n- [ ] `pnpm build` succeeds after all changes (no TypeScript compilation errors from version-info.ts or layout.tsx changes)\n- [ ] All existing issue templates updated to use canonical branding instead of \"Shep AI CLI\"\n\n## Functional Requirements\n\n- **FR-1: Canonical branding definition** — Define exactly two product descriptors: (a) a short tagline for hero/README use (concrete, action-oriented, ~15 words max), and (b) a longer positioning descriptor for metadata fields (package.json description, web meta, CLI help — ~25 words max). Document both in a branding reference comment in the spec so all surfaces can align.\n\n- **FR-2: Branding surface unification** — Update all files in the branding surface inventory to use the appropriate tier of the canonical descriptor:\n  - `README.md:14` — short tagline (already close, verify and align)\n  - `package.json:4` description — long descriptor\n  - `src/presentation/web/app/layout.tsx:21` metadata description — long descriptor\n  - `packages/core/src/domain/value-objects/version-info.ts:21` — long descriptor\n  - `CONTRIBUTING.md:1` title — \"Contributing to Shep\" (drop \"AI CLI\")\n  - `CLAUDE.md:5` project description — long descriptor\n  - `.github/ISSUE_TEMPLATE/bug-report.yml:2` — use \"Shep\" not \"Shep AI CLI\"\n  - `.github/ISSUE_TEMPLATE/feature-request.yml:2` — use \"Shep\" not \"Shep AI CLI\"\n  - `src/presentation/cli/index.ts:6` comment — long descriptor\n\n- **FR-3: Tiered contribution paths** — Restructure CONTRIBUTING.md to present two clearly separated contribution paths:\n  - **Quick-fix path**: For typos, documentation improvements, small bug fixes, and config tweaks. Requirements: fork, branch, fix, conventional commit, PR. No spec workflow, no TDD mandate, no architecture review. Test requirement limited to \"run `pnpm test` to verify you haven't broken anything.\"\n  - **Full-feature path**: For new features, architectural changes, and significant enhancements. Retains mandatory spec-driven workflow (`/shep-kit:new-feature`), TDD, Clean Architecture compliance, and full PR review criteria.\n\n- **FR-4: Quick contribution guide** — Add a \"Quick Contributions\" section near the top of CONTRIBUTING.md (before the full-feature workflow) with:\n  - Explicit list of what qualifies as a quick contribution (typos, doc fixes, small bug fixes, dependency bumps, config tweaks)\n  - Minimal steps: fork → branch → fix → commit → PR\n  - Link to conventional commit format (one-line explanation, not the full spec)\n  - Clear statement that TDD and spec workflow are NOT required for quick contributions\n\n- **FR-5: CODE_OF_CONDUCT.md** — Create `CODE_OF_CONDUCT.md` at repo root using Contributor Covenant v2.1. Include project-specific contact email for enforcement. Update CONTRIBUTING.md Code of Conduct section to link directly to the file.\n\n- **FR-6: SECURITY.md** — Create `SECURITY.md` at repo root with:\n  - Supported versions table (at minimum, latest release)\n  - Vulnerability reporting process via email\n  - Expected response timeline (e.g., acknowledge within 48 hours, triage within 7 days)\n  - Clear statement not to open public issues for security vulnerabilities\n\n- **FR-7: Good-first-issue template** — Create `.github/ISSUE_TEMPLATE/good-first-issue.yml` as a structured GitHub issue form with fields for:\n  - Problem or improvement description\n  - Suggested approach / hints\n  - Files likely to be involved\n  - Expected outcome\n  - Links to relevant documentation\n  - Difficulty estimate (trivial / easy / moderate)\n  This template is for maintainers to use when creating beginner-friendly issues.\n\n- **FR-8: Community channels update** — Replace the \"links TBD\" placeholder in CONTRIBUTING.md with either:\n  - Actual community channel links (if available), or\n  - A forward-looking message directing users to GitHub Discussions as the primary community channel, with a note that additional channels may be added\n\n- **FR-9: Issue template branding alignment** — Update all existing issue templates (bug-report.yml, feature-request.yml, docs-improvement.yml) to replace \"Shep AI CLI\" with \"Shep\" in their name and description fields.\n\n## Non-Functional Requirements\n\n- **NFR-1: Branding single-source-of-truth** — The two canonical descriptors must be documented in a single location (this spec's content section) so that future branding changes have one reference point. Any contributor updating branding should be able to find the canonical text without searching multiple files.\n\n- **NFR-2: Zero code breakage** — All changes to TypeScript files (version-info.ts, layout.tsx, cli/index.ts) must be string-only changes that do not alter any type signatures, exports, or runtime behavior. `pnpm build` must pass after all changes.\n\n- **NFR-3: Contributor time-to-first-PR** — The quick-fix contribution path must be completable by reading a single section of CONTRIBUTING.md (no cross-referencing to other docs required). Target: a contributor can understand the process in under 3 minutes of reading.\n\n- **NFR-4: Backward compatibility** — No changes to package.json fields other than `description`. No changes to CLI behavior, API signatures, or domain model. The branding changes are cosmetic/metadata only.\n\n- **NFR-5: Standard file locations** — CODE_OF_CONDUCT.md and SECURITY.md must be placed at the repository root (not in .github/) so GitHub automatically detects and surfaces them in the repository's community profile.\n\n- **NFR-6: Accessibility of community health files** — CODE_OF_CONDUCT.md, SECURITY.md, and CONTRIBUTING.md must use clear, jargon-free language accessible to contributors who may not be native English speakers.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | What should the canonical product descriptor be? | Two-tier descriptor system (short tagline + long descriptor) | Gives both clarity for hero sections and proper positioning for metadata fields. Avoids false choice between too specific and too abstract. |\n| 2 | What Code of Conduct should be adopted? | Contributor Covenant v2.1 | Industry standard, zero drafting effort, immediately recognizable to open-source contributors. |\n| 3 | How should tiered contribution paths be structured? | Two tiers: quick-fix and full-feature | Covers 80% of casual contributions while maintaining rigor for architectural changes. Clear boundary. |\n| 4 | What security policy approach for SECURITY.md? | Email-based private disclosure | Lowest friction for reporters. GitHub Security Advisories can be added as secondary channel later. |\n| 5 | Should a good-first-issue template be created? | Template plus label | Template ensures consistent structure newcomers need. One-time investment that pays off per issue. |\n| 6 | Should quick-fix path require conventional commits? | Yes, require for all PRs | Format is simple enough. Alternative (maintainer rewriting messages) adds ongoing burden. |\n\n## Canonical Branding Reference\n\n**Short tagline** (for README hero, marketing materials):\n> Run multiple AI agents in parallel. Each in its own worktree.\n\n**Long descriptor** (for package.json, web meta, CLI help, CLAUDE.md):\n> Autonomous AI-native SDLC platform — run parallel AI agents in isolated worktrees to automate the development cycle from idea to deploy.\n\n**Product name**: \"Shep\" (not \"Shep AI CLI\", not \"Shep AI\")\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `README.md` | High | Primary public surface — tagline verification and alignment |\n| `package.json` | High | npm registry description — first thing users see on npmjs.com |\n| `CONTRIBUTING.md` | High | Contributor onboarding overhaul — add tiered paths, quick-fix section, update CoC link, update community channels |\n| `src/presentation/web/app/layout.tsx` | Medium | Web meta description alignment |\n| `packages/core/src/domain/value-objects/version-info.ts` | Medium | CLI help/version description alignment |\n| `src/presentation/cli/index.ts` | Low | Comment-only — docstring alignment |\n| `CLAUDE.md` | Low | AI tooling context description |\n| `.github/ISSUE_TEMPLATE/bug-report.yml` | Medium | Branding alignment |\n| `.github/ISSUE_TEMPLATE/feature-request.yml` | Medium | Branding alignment |\n| `.github/ISSUE_TEMPLATE/docs-improvement.yml` | Medium | Branding alignment (verify current text) |\n| `.github/ISSUE_TEMPLATE/config.yml` | Low | Contact links may need updating |\n| `CODE_OF_CONDUCT.md` (new) | Medium | Missing community health file — Contributor Covenant v2.1 |\n| `SECURITY.md` (new) | Medium | Missing security policy — email-based disclosure |\n| `.github/ISSUE_TEMPLATE/good-first-issue.yml` (new) | Medium | New maintainer-facing template for beginner issues |\n| `docs/` | Low | Getting started docs reference alignment |\n\n## Dependencies\n\n- No code dependencies — this is primarily documentation and metadata changes\n- The `version-info.ts` change is a string constant, no API changes\n- The `layout.tsx` change is a metadata string, no component changes\n- The `package.json` description change requires no code changes but affects npm publishing\n- New files (CODE_OF_CONDUCT.md, SECURITY.md, good-first-issue.yml) are additive with no code dependencies\n- Contributor Covenant v2.1 text is freely available under CC BY 4.0\n\n## Size Estimate\n\n**M** — This touches 12-16 files but they are all documentation, configuration, and metadata strings.\nNo architectural changes, no new features, no tests needed for the branding changes. The CONTRIBUTING.md\nrestructuring is the largest single piece of work (adding tiered contribution paths, quick-fix guide).\nThree new files (CODE_OF_CONDUCT.md, SECURITY.md, good-first-issue.yml) are standard templates with\nminimal customization. Total effort is 1-2 days of focused documentation work.\n\n---\n\n_Generated by requirements agent — proceed with research_\n"

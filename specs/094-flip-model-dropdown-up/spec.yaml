# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The model picker dropdown in the chat tab renders below the trigger button. When the trigger is near the bottom of the viewport, the dropdown is clipped because it grows downward into hidden overflow. The fix must not add overflow scrolling.

  ## Solution

  Remove `avoidCollisions={false}` from the `PopoverContent` in `AgentModelPicker`. Radix UI's default collision-detection flips the popover upward automatically when there is insufficient space below.

  ## Success Criteria

  - [x] Model picker dropdown flips upward when the trigger is near the bottom of the viewport
  - [x] Dropdown still renders downward when there is sufficient space below
  - [x] No overflow was added

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | AgentModelPicker component | Fix | Removed avoidCollisions=false to restore Radix UI flip behaviour |

  ## Dependencies

  None identified.


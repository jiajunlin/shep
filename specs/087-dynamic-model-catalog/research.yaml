# Structured technology decisions
decisions:
  - title: Model catalog fetch strategy
    chosen: Native fetch via a per-executor listModels() method, called from the factory on demand
    rejected:
      - Call the AI SDK provider packages (openrouter-ai-sdk-provider, ai-sdk/togetherai) — they do not expose a listModels() API
      - Fetch at process boot and block startup — slow and fails if user has no token yet
    rationale: >
      The AI SDK provider packages focus on inference, not discovery. The REST
      endpoints are trivially callable with native fetch. A per-executor method
      keeps provider-specific response parsing encapsulated inside the
      infrastructure layer (rule: provider SDKs only in infrastructure).

  - title: Cache implementation
    chosen: In-memory Map on the factory, keyed by "{agentType}::{tokenHash}" with TTL (default 1 hour)
    rejected:
      - SQLite-backed persistent cache — overkill, model lists change infrequently and cost nothing to refetch
      - Module-level singleton cache — violates the "no singletons outside bootstrapping" rule
      - No cache — would hit provider API on every picker open
    rationale: >
      The factory is already a DI-injected singleton that caches executor
      instances; extending it with a model-list cache keeps the surface small
      and honors DI rules. Hashing the token into the key ensures we invalidate
      when a user rotates their API key. In-memory is sufficient because the
      cache naturally resets when the process restarts, which matches how
      stale-on-startup is acceptable for a discovery feature.

  - title: Async interface migration
    chosen: Change IAgentExecutorFactory.getSupportedModels to return Promise<string[]>
    rejected:
      - Add a parallel async method (getSupportedModelsAsync) and keep the sync one — leaves dead code and two sources of truth
      - Return sync fallback immediately and refresh in background — async in UI is already well-handled via server actions, complexity not justified
    rationale: >
      All current callers (web server action, CLI command) already operate in
      async contexts. Making the interface fully async is a clean cut and
      eliminates the dual-API smell. CLI agents with static lists return a
      resolved Promise trivially.

  - title: Fallback when API call fails
    chosen: Return the existing static curated list on error, log a warning, do not throw
    rejected:
      - Throw and surface the error to the UI — blocks the picker and looks broken when users have no token
      - Return an empty list — looks like the agent has no models
    rationale: >
      Three failure modes must gracefully degrade — no token configured yet,
      network offline, provider 5xx or rate-limit. In all three, showing a
      sensible default set is better than breaking the UI. The existing
      hardcoded OR/Together lists become the fallback payload rather than
      dead code.

  - title: Catalog shape — keep string[] or return richer DTO
    chosen: Return a CatalogEntry[] DTO with id, displayName, description, isFree, contextLength, pricing — bridged to string[] at the factory boundary for existing callers
    rejected:
      - Keep string[] only, look up metadata client-side — loses free-model detection (free variants are only discoverable from the API response)
      - Return provider-specific raw responses — couples the domain to vendor schemas
    rationale: >
      The UI needs more than an id list to show "Free" badges and
      pricing/context hints. A normalized CatalogEntry type lives in the
      application port layer so both the factory and server actions can
      consume it. getSupportedModels keeps its string[] contract (backed by
      getModelCatalog) so CLI agents and older callers continue to work.

  - title: UI search affordance threshold
    chosen: Show a search input inside the model list panel whenever the catalog exceeds 20 entries
    rejected:
      - Always show search — adds friction for providers with <10 models (claude-code, gemini-cli)
      - Never show search — 300 OpenRouter models are unnavigable
    rationale: >
      20 is below the point where scrolling becomes painful and above the size
      of every CLI-agent catalog in the repo today. Implemented as a simple
      client-side filter over displayName + id in the existing Popover.


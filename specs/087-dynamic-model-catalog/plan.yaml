content: |
  ## Status

  - **Phase:** Planning
  - **Updated:** 2026-04-11

  ## Architecture Overview

  ```
  ┌─────────────────────────────────────────────────────────────┐
  │                      Presentation                           │
  │                                                             │
  │  AgentModelPicker ──search filter──▶ renders CatalogEntry[] │
  │        │                                                    │
  │        ▼                                                    │
  │  getAllAgentModels() server action                          │
  └─────────┬───────────────────────────────────────────────────┘
            │ awaits
  ┌─────────▼───────────────────────────────────────────────────┐
  │                      Application                            │
  │                                                             │
  │  IAgentExecutorFactory                                       │
  │    getSupportedModels(type): Promise<string[]>  ◀── async    │
  │    getModelCatalog(type, token?): Promise<CatalogEntry[]>    │
  │                                                             │
  │  CatalogEntry { id, displayName, isFree, pricing, … }        │
  └─────────┬───────────────────────────────────────────────────┘
            │ implemented by
  ┌─────────▼───────────────────────────────────────────────────┐
  │                   Infrastructure                            │
  │                                                             │
  │  AgentExecutorFactory                                        │
  │   • catalogCache:  Map<"{type}::{tokenHash}", Entry>         │
  │   • TTL expiry check, lazy refresh                           │
  │   • on miss → executor.listModels() or static fallback       │
  │                                                             │
  │  OpenRouterExecutorService.listModels()                      │
  │   • GET https://openrouter.ai/api/v1/models                  │
  │   • normalize → CatalogEntry[]                               │
  │   • free = id.endsWith(':free') || pricing.prompt === "0"    │
  │                                                             │
  │  TogetherAiExecutorService.listModels()                      │
  │   • GET https://api.together.xyz/v1/models   (Bearer token)  │
  │   • filter type in {chat, language}                          │
  │   • free = pricing.input === 0 && pricing.output === 0       │
  └─────────────────────────────────────────────────────────────┘
  ```

  ## Implementation Strategy

  **MANDATORY TDD**: Every phase with executable code follows RED → GREEN → REFACTOR.

  **Order is load-bearing**:
  1. Phase 1 introduces the `CatalogEntry` DTO and the interface change — everything else depends on the type
  2. Phase 2 adds the factory's cache plus the async migration of `getSupportedModels()` with static fallback wired — existing callers still work because they already await the result
  3. Phases 3 & 4 add `listModels()` to each executor behind the same contract. They are independent and parallelizable (tagged `[P]`) — no shared files
  4. Phase 5 migrates the three callers (two server actions, one CLI command). Since phase 2 already made the interface async, phase 5 is a small compatibility pass
  5. Phase 6 extends the picker with a client-side search filter (threshold: >20 entries) and a "Free" badge
  6. Phase 7 runs the full verification suite

  **Zero-dependency guarantee**: No new runtime dependencies. Uses node built-in `fetch` and `crypto`.

  **Fallback posture**: Any failure in `listModels()` (no token, network, non-2xx, timeout) resolves to the existing hardcoded arrays — renamed to `OPENROUTER_FALLBACK_MODELS` / `TOGETHER_AI_FALLBACK_MODELS` — wrapped in a minimal `CatalogEntry[]` via a shared helper.

  ## Files to Create/Modify

  ### New Files

  | File | Purpose |
  | --- | --- |
  | `packages/core/src/application/ports/output/agents/model-catalog.types.ts` | `CatalogEntry` DTO + `IListsModels` optional mixin interface |
  | `tests/unit/infrastructure/services/agents/openrouter-list-models.test.ts` | Unit tests: fetch success, free detection, error fallback, timeout |
  | `tests/unit/infrastructure/services/agents/together-ai-list-models.test.ts` | Unit tests: fetch success, type filter, no-token short-circuit, error fallback |
  | `tests/unit/infrastructure/services/agents/agent-executor-factory-catalog.test.ts` | Unit tests: cache hit/miss, TTL expiry, token-rotation invalidation |

  ### Modified Files

  | File | Changes |
  | --- | --- |
  | `agent-executor-factory.interface.ts` | Add `getModelCatalog()`; change `getSupportedModels()` return to `Promise<string[]>` |
  | `agent-executor-factory.service.ts` | Add TTL cache; dispatch to executor `listModels()` for OR/Together; keep static fallback lists; rename hardcoded arrays |
  | `openrouter-executor.service.ts` | Add `listModels(): Promise<CatalogEntry[]>` with fetch + normalize + timeout |
  | `together-ai-executor.service.ts` | Same as above + require token; skip fetch if missing |
  | `mock-executor-factory.service.ts` | Update to return `Promise<string[]>`; add `getModelCatalog` stub |
  | `get-supported-models.ts` / `get-all-agent-models.ts` | Await new async interface; pass token through for catalog calls |
  | `model.command.ts` (CLI) | Await the now-async factory call |
  | `AgentModelPicker/index.tsx` | Accept `CatalogEntry[]`; render free badge; add `<input type="search">` when `models.length > 20`; filter case-insensitive on id + displayName |
  | `AgentModelPicker.stories.tsx` | New story variants: "With free models", "Large catalog with search" |
  | Tests (factory, actions, picker) | Update for async + new shape |
  | Storybook mocks | Return `CatalogEntry[]`-shaped data |

  ## Testing Strategy (TDD: Tests FIRST)

  **Every TDD phase starts with a RED test run.**

  ### Unit Tests (RED → GREEN → REFACTOR)

  - **Factory cache**: cache hit returns without fetching; cache miss calls executor; TTL expiry triggers refresh; rotating token invalidates prior entry; fetch rejection returns fallback list
  - **OpenRouter listModels**: parses live response fixture; detects `:free` suffix; detects zero-pricing free variant; 429/5xx → fallback; `AbortController` timeout → fallback
  - **Together listModels**: filters non-chat types; empty token short-circuits (no network); detects free via zero pricing; 401/429/5xx → fallback
  - **Server actions**: resolved catalog passes through; rejection resolves to fallback (never throws to UI)
  - **AgentModelPicker**: free badge renders when `isFree === true`; search input hidden at ≤20 entries; search filters case-insensitively; selecting a filtered entry still calls save

  ### Integration Tests

  None new. We explicitly do NOT hit live provider APIs in CI (flaky + rate-limited). Existing `factory-sdk-executors.test.ts` continues to cover the inference path.

  ## Risk Mitigation

  | Risk | Mitigation |
  | --- | --- |
  | Provider API response schema drifts | Normalize at the executor boundary with defensive optional chaining; log + fall back on parse failure |
  | Fetch hangs indefinitely | 10-second `AbortController` timeout on all requests |
  | Cache memory grows unbounded | Cache is keyed only by supported agent types (2 providers × small N of tokens), capped naturally. Entries expire per TTL |
  | Token leaks in logs | Hash tokens for cache keys; warning logs use `[token:***]`; no token in error messages |
  | Async interface change breaks downstream callers we missed | Phase 5 does a repo-wide grep for `getSupportedModels(`; TypeScript compile fails fast on any missed caller |
  | 300+ item list hurts picker render | Client-side search filter; rendering stays under 60fps because items are plain divs (no virtualization needed at this count) |
  | Windows path handling N/A | No filesystem writes in this feature — purely in-memory |

  ## Rollback Plan

  This feature is purely additive at the infrastructure layer and a signature change at the interface layer. Rollback is a single-revert of the feature branch. The static fallback lists remain in place permanently — if the dynamic fetching is ever disabled, the UI returns to its current behavior with no data loss.


      SelectProjectMemoryUseCase loads candidates (repo + org), ranks via the
      scorer, and greedily includes top entries up to a token budget. Each node
      selects its own subset at execution time (phase + derived task text); the
      CI-fix loop ranks by the actual failure logs; the interactive agent ranks
      by the feature name/description. Pluggable seam for future embeddings.

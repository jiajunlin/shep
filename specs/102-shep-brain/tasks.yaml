      refactor:
        - Tighten @doc strings and field optionality
    estimatedEffort: S

  - id: task-2
    title: Migration 109 — project_memory table
    description: >
      Additive, idempotent umzug migration creating `project_memory` with columns
      (id, repository_path, category, entry_key, content, source_feature_id,
      created_at, updated_at), a UNIQUE index on (repository_path, category,
      entry_key) for upsert, and a lookup index on repository_path. Mirrors
      migration 106 exactly.
    state: Done
    dependencies:
      - task-1
    acceptanceCriteria:
      - Migration creates table + indexes guarded by sqlite_master/index_list checks
      - Running migrations twice is a no-op (idempotent)

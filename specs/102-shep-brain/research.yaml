# Structured technology decisions
decisions:
  - title: Where memory is stored
    chosen: SQLite table `project_memory`, one row per memory entry, scoped by repositoryPath
    rejected:
      - A single YAML/JSON blob file in the repo (mempalace.yaml style)
      - Reusing LESSONS.md as the programmatic store
    rationale: >
      The repo already persists all durable state in the shared ~/.shep SQLite DB
      behind the repository pattern (umzug migrations, mapper, port). Per-entry rows
      enable categorisation, dedup by a stable key, querying by category, and
      incremental append after each merge without rewriting a whole file. LESSONS.md
      is human-prose and never parsed; mempalace.yaml is a file-room layout, not
      knowledge. A DB store keeps memory machine-updatable and agent-agnostic.
  - title: How memory reaches the agent at feature start
    chosen: New optional `projectMemory` state channel injected into analyze + research producer prompts
    rejected:
      - Writing memory to a temp file and passing it via --attach
      - Reading memory from a global singleton inside each node
    rationale: >
      LESSONS.md is explicit that nodes must read feature-scoped values from graph
      `state`, never a global singleton. Threading memory through a state channel
      (loaded once by the worker and surfaced in the early prompts) matches the
      existing pattern for per-feature flags and keeps nodes pure/testable. --attach
      is a CLI-only path and would not cover TUI/web-initiated features.
  - title: When and how memory is extracted
    chosen: New terminal LangGraph node `extract_memory` that runs after a successful merge and calls a record use case
    rejected:
      - Extracting inside the merge node before worktree cleanup
      - Post-processing in the worker after graph.invoke()
    rationale: >
      A dedicated node preserves checkpoint/resume semantics and conditional
      re-execution routing (merge currently routes to END; we re-point it to
      extract_memory → END). It keeps the merge node single-responsibility and lets
      extraction be skipped cleanly when the feature was not merged. The node uses
      the injected IAgentExecutor to summarise the just-merged change into structured
      entries, then persists them through the RecordProjectMemoryUseCase.
  - title: Entry shape and dedup
    chosen: Category enum + stable `entryKey` per (repositoryPath, category, entryKey) with upsert semantics
    rejected:
      - Free-form text entries with no key (append-only, unbounded growth)
    rationale: >
      A stable key lets the extraction step upsert ("preferred test runner is vitest")
      instead of appending duplicates every merge. Categories (Convention, Library,
      NamingPattern, ArchitectureDecision, CiFixResolution) let the read use case
      render a compact, sectioned blob and let future UI filter. Unbounded append
      would bloat the injected prompt over time.


  "Shep Brain" is a structured project-memory layer that captures a repository's
  conventions, preferred libraries, naming patterns, architecture decisions, and
  past CI-failure resolutions. Every feature agent reads this memory at the start
  of its workflow (the analyze/research phases), and a new post-merge extraction
  step in the LangGraph pipeline distils fresh learnings from each merged feature
  back into the store. The result: the Nth parallel agent is as context-aware as
  the first, so quality compounds over time instead of averaging down.

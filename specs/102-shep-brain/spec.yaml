# Markdown content (the actual spec)
content: |
  ## Problem Statement

  Shep's core value is running many AI feature-agents in parallel. The hidden
  cost of parallelism is **context drift**: every new feature agent starts as a
  blank slate. It re-discovers the stack, re-infers conventions, and sometimes
  contradicts what a sibling agent just built. There is no shared, durable place
  where the project's hard-won knowledge accumulates — `LESSONS.md` exists but is
  human-maintained and never read programmatically, and `mempalace.yaml` only
  describes a file-room layout. Nothing distils the outcome of a merged feature
  back into reusable guidance for the next one.

  We need a **persistent, structured, per-repository memory** that:
  - agents automatically read at the start of every feature, and
  - automatically grows after every merged PR.

  ## Success Criteria

  - [ ] A `ProjectMemory` domain model exists (TypeSpec-first) representing
        durable, categorised memory entries scoped to a repository.
  - [ ] Memory is persisted in SQLite via a dedicated repository behind an output
        port, with an additive migration following existing conventions.
  - [ ] A use case can read the current memory for a repository and render it as
        a compact context blob; another use case records/updates entries.
  - [ ] The feature-agent workflow injects the repository's memory blob into the
        early producer nodes (analyze/research) via a new state channel — no node
        reads a global singleton for it.
  - [ ] A new **post-merge extraction node** runs after a successful merge,
        distils conventions / library choices / CI-fix resolutions from the just-
        merged feature, and persists them through the record use case.
  - [ ] Memory injection and extraction are agent-agnostic — all model calls flow
        through `IAgentExecutorProvider`; no hardcoded agent type.
  - [ ] Full TDD coverage (RED→GREEN) for domain, repository, use cases, and the
        extraction node; all existing tests stay green.

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | tsp/ (domain) | New | New `ProjectMemory` entity + entry category enum |
  | domain/ | New | Generated types + any domain helper for memory rendering |
  | application/ | New | Output port + read/record use cases |
  | infrastructure (persistence) | New | Migration, SQLite repository, mapper |
  | infrastructure (agents) | High | New post-merge `extract_memory` graph node + state channel + prompt; injection into analyze/research prompts |
  | infrastructure (DI) | Medium | Register repository + use cases (class token + string alias) |

  ## Dependencies

  None identified — builds on existing LangGraph pipeline, SQLite repository
  pattern, and TypeSpec codegen already in the repo.

  ## Size Estimate

  **M** — One new entity, one migration, one repository, two use cases, and one
  new terminal graph node plus prompt-injection wiring. No web UI surface in this
  pass (memory is consumed by agents, surfaced read-only later). Most risk is in
  correctly hooking the post-merge node into the existing checkpoint/re-execution
  routing without breaking resume semantics.


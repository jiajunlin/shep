  contributor block, PR template, issue-template enhancements). Slicing follows
  the dependency graph: domain → ports/adapters → doctor → contributor use cases
  → agent → workflows → web → static docs (last so docs reference shipped
  capability). User confirmed single-bundled-PR delivery in product-question 9.


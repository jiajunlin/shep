phases:
  - id: "phase-1"
    name: "Domain & Persistence Foundation"
    description: |
      Define TypeSpec entities (Contributor, RecognitionEvent) and enums
      (ContributorLane, ContributorLevel, ContributionDifficulty,
      RecognitionKind); regenerate domain/generated/output.ts; create migrations
      101/102 with idempotent up() and the UNIQUE(contributor_id, kind,
      pr_number) constraint that backs NFR-11; build IContributorRepository
      and IRecognitionEventRepository (ports + SQLite adapters) wired through
      tsyringe by string token. Foundation everything else depends on.
    parallel: false

  - id: "phase-2"
    name: "Output Ports & Infrastructure Adapters"
    description: |
      Create the seven new output ports needed by the rest of the feature:
      IGitHubIssueWriter (Octokit REST + retry/throttling plugins, reusing
      existing gh-resolved token), IAllContributorsWriter (in-house markdown
      rewriter — no upstream bot), IOutreachPublisher (Discord-only in v1),
      IRecapPublisher (one adapter per channel: file, Discord, GitHub
      Discussion), and IDiagnostic (strategy abstraction for shep doctor).
      All adapters wired through tsyringe DI. No port file exceeds the
      ~300-line code-quality cap.
    parallel: false

  - id: "phase-3"
    name: "shep doctor — Use Case + CLI Command"
    description: |
      Build the strategy-pattern doctor: one IDiagnostic class per check
      (Node, pnpm, git, gh, agent CLIs via IAgentAuthDetectorService, .env,
      branch, working-tree, migration status, DI graph validation, TypeSpec
      freshness, test-suite health, security-scan status) under
      application/use-cases/doctor/diagnostics/. RunDoctorUseCase fans out
      via Promise.allSettled with a 3 s per-diagnostic timeout (NFR-7). New
      Commander command at presentation/cli/commands/doctor.command.ts that
      calls the use case and maps results to a structured table + non-zero
      exit code on any fail. Independent of the agent surface — ships value
      to existing maintainers immediately.
    parallel: false

  - id: "phase-4"
    name: "Contributor Use Cases (TDD-first)"
    description: |
      Land the nine application/use-cases/contributors/ use cases in
      dependency order: classify-into-lane (rules-first / agent-fallback) →
      propose-acceptance-criteria → groom-issue (composes the previous two) →
      welcome-first-time-contributor → detect-stale-good-first-issue →
      award-recognition (idempotent via schema UNIQUE + INSERT ON CONFLICT
      DO NOTHING) → generate-monthly-recap → publish-monthly-recap (fan-out
      via IRecapPublisher with ISupervisorAgent gate per channel) →
      draft-outreach-post (Discord-only). Every use case lands RED-first per
      CLAUDE.md TDD mandate. Every external side-effect runs through the
      spec-093 supervisor approval gate (NFR-5).
    parallel: false

  - id: "phase-5"
    name: "Contributor-Onboarding Agent (Custom-Agent Rail)"
    description: |
      Author the system prompt at prompts/contributor-onboarding/system.md
      (markdown so prompt diffs show up in PRs and adopting projects can
      fork). Register the agent via the existing CreateCustomAgentUseCase —
      no new built-in agent kind. Define the structured-output TypeSpec
      contract for the agent's grooming output. Provide one golden-path
      integration test that runs the agent against a fixture issue and
      asserts the output schema. Tool surface stays read-only by default;
      writes flow only through use cases that gate on the supervisor.
    parallel: false

  - id: "phase-6"
    name: "GitHub Actions Workflows + In-Shep Scheduling"
    description: |
      Add two event-driven workflows under .github/workflows/:
      welcome-first-time-contributor.yml on pull_request.opened and
      label-by-lane.yml on issues.opened. Each workflow invokes a Shep CLI
      subcommand that resolves and runs the corresponding use case. Register
      detect-stale-good-first-issue and the monthly recap on Shep's existing
      in-process scheduler (NOT GitHub Actions cron, per resolved
      product-question 10). Time-driven workflows run inside the Shep
      daemon; event-driven run in Actions where webhook latency is best.
    parallel: false

  - id: "phase-7"
    name: "Web Onboarding Contributor View + Leaderboard"
    description: |
      Extend src/presentation/web/app/onboarding/page.tsx with a contributor
      view (lane chooser dropdown, "pick your first issue" CTA backed by a
      use case, doctor-results summary if available). Add a
      ContributorLeaderboard component (read-only, top contributors by PR
      count for current month + all-time) backed by
      GetContributorLeaderboardUseCase which aggregates at request time
      via the repository (no materialized view in v1). Every new component
      ships with a colocated `.stories.tsx` covering Default / Loading /
      Empty / Error (per CLAUDE.md mandate). Playwright smoke covers the
      lane-chooser → first-issue flow.
    parallel: false

  - id: "phase-8"
    name: "Static Repo Files (Shipped Last)"
    description: |
      Last in commit order so docs reference real, shipped capability.
      Update CONTRIBUTING.md (30-second setup with `shep doctor`, lane
      catalogue, contributor ladder, "Contributing to Shep with Shep"
      walk-through). Create ROADMAP.md (Now/Next/Later → linking to
      specs/), ARCHITECTURE.md (10-minute tour → linking into
      docs/architecture/), and GOOD_FIRST_ISSUES.md (curated list grouped
      by lane and difficulty). Add the README "Contribute to Shep" block
      above-the-fold. Add .github/PULL_REQUEST_TEMPLATE.md
      (what/why/screenshots/checklist). Extend each existing
      .github/ISSUE_TEMPLATE/*.yml with structured `lane`, `difficulty`,
      and `acceptance criteria` fields parseable by the grooming agent.
    parallel: false


content: |
  ## Status

  - **Phase:** Implementation
  - **Updated:** 2026-05-06

  ## Summary

  53 tasks across 8 phases form one bundled PR (per resolved
  product-question 9). The structured `tasks` array above is the source of
  truth — this section narrates the overall flow.

  **Phase 1 (Foundation)** lands the domain model: four enums and two
  entities in TypeSpec, regenerated `domain/generated/output.ts`, two
  migrations (101 + 102) with the UNIQUE constraint that backs NFR-11
  recognition idempotency, and SQLite-backed `IContributorRepository` +
  `IRecognitionEventRepository` wired through DI.

  **Phase 2 (Ports & Adapters)** introduces the seven new output ports —
  `IGitHubIssueWriter` (Octokit + retry/throttling), `IAllContributorsWriter`
  (in-house markdown, no upstream bot), `IOutreachPublisher` (Discord-only
  v1), `IRecapPublisher` (three channel adapters), `IDiagnostic` (strategy
  abstraction for shep doctor) — and their adapters. Single DI sweep at the
  end ensures Phase 3 use cases can resolve their dependencies without
  re-touching DI.

  **Phase 3 (`shep doctor`)** delivers ten strategy-pattern diagnostic
  classes, the aggregating `RunDoctorUseCase`, and the Commander CLI command.
  Independently shippable; ships value to existing maintainers immediately
  even if no one ever uses the contributor surface.

  **Phase 4 (Contributor Use Cases)** lands the nine application use cases
  in dependency order — classify-into-lane → propose-acceptance-criteria →
  groom-issue (composes the previous two) → welcome-first-time-contributor
  → detect-stale-good-first-issue → award-recognition (idempotent) →
  generate-monthly-recap → publish-monthly-recap (multi-channel via
  supervisor) → draft-outreach-post — plus the two read use cases the web
  surface needs (get-contributor-leaderboard, get-curated-issues-by-lane).
  Every use case lands RED-first per CLAUDE.md TDD mandate.

  **Phase 5 (Custom Agent)** authors the system prompt at
  `prompts/contributor-onboarding/system.md`, defines the structured-output
  schema in TypeSpec for independent versioning, registers the agent via
  the existing `CreateCustomAgentUseCase` (no new built-in agent kind),
  and adds a deterministic golden-path integration test against a fixture
  issue.

  **Phase 6 (Workflows + Scheduling)** wires two CLI subcommands invoked by
  GitHub Actions, two event-driven `.github/workflows/` files
  (welcome-first-time-contributor on `pull_request.opened`, label-by-lane on
  `issues.opened`), and registers the time-driven jobs (stale detection,
  monthly recap) on Shep's existing in-process scheduler. The split
  follows resolved product-question 10: Actions for events, Shep daemon
  for cron.

  **Phase 7 (Web Surface)** adds four colocated components — Lane chooser,
  Curated issues list, Doctor summary, Contributor leaderboard — each with
  Storybook stories covering Default / Loading / Empty / Error per CLAUDE.md
  mandate, extends `src/presentation/web/app/onboarding/page.tsx` to
  compose them, and lands a Playwright smoke test for the lane-chooser →
  first-issue flow.

  **Phase 8 (Static Repo Files)** ships LAST so docs reference real,
  shipped capability: CONTRIBUTING.md update with `shep doctor` callout,
  three new top-level docs (ROADMAP, ARCHITECTURE, GOOD_FIRST_ISSUES),
  README "Contribute to Shep" block, PR template, and structured-field
  enhancements to existing issue templates. Plus the `.all-contributorsrc`
  initial file, the `recaps/.gitkeep` placeholder, and a LESSONS.md
  update capturing any patterns learned during the feature.

  Local verification before any push: `pnpm lint && pnpm typecheck &&
  pnpm test:unit && pnpm test:int && pnpm build` (per
  `.claude/rules/cicd.md`).

# Task Breakdown (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "ai-native-contributor-onboarding"
summary: |
  53 tasks across 8 phases delivering the full contributor-onboarding pipeline.
  Phase 1 lands the domain (TypeSpec entities + four enums) and persistence
  (two migrations + two SQLite repositories). Phase 2 builds the seven new
  output ports and their adapters. Phase 3 ships `shep doctor` (strategy
  pattern + CLI). Phase 4 delivers the nine contributor use cases TDD-first.
  Phase 5 registers the contributor-onboarding agent on the existing
  custom-agent rail. Phase 6 wires GitHub Actions event-driven workflows and
  in-Shep scheduling for time-driven jobs. Phase 7 extends the web onboarding
  route and adds the ContributorLeaderboard. Phase 8 finishes with the static
  repo polish (README block, CONTRIBUTING / ROADMAP / ARCHITECTURE /
  GOOD_FIRST_ISSUES, PR template, issue-template enhancements). Total
  effort estimate: 60h-72h focused work.

relatedFeatures:
  - "001-shep-kit"
  - "008-agent-configuration"
  - "013-feature-agent"
  - "088-import-repo-upstream"
  - "089-discord-readme-badge"
  - "093-agent-collaboration-supervision"
  - "095-devrel-release-notes"
  - "096-ai-release-notes"

technologies:
  - "TypeScript 5.x / Node.js 22+"
  - "TypeSpec (`tsp/`) — domain modeling"
  - "tsyringe — DI by string token"
  - "Commander.js — CLI"
  - "Next.js + React + Storybook — web UI"
  - "better-sqlite3 + umzug — persistence"
  - "Octokit REST + retry/throttling plugins"
  - "Vitest + Playwright — testing"
  - "ISupervisorAgent (spec 093) — approval gate"
  - "IAgentExecutorProvider — agent-agnostic LLM"


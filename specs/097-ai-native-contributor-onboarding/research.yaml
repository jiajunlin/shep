name: "ai-native-contributor-onboarding"
summary: |
  Technical research for feature 097 (ai-native-contributor-onboarding). Confirms the
  spec maps cleanly onto existing Shep building blocks: the custom-agent rail
  (CreateCustomAgentUseCase), ISupervisorAgent (the canonical human-approval gate
  from spec 093), IExternalIssueFetcher / IGitHubRepositoryService for reads,
  IAgentExecutorProvider for LLM calls, and the umzug + better-sqlite3 migration
  framework. Documents nine technology decisions, the resolved transport choice for
  GitHub writes (Octokit REST), the lane-classification strategy (rules-first with
  agent fallback), the all-contributors implementation (in-house markdown writer, no
  third-party bot), the diagnostic strategy pattern for `shep doctor`, and the
  unified publish pipeline reused from spec 095/096. Also corrects two paths
  referenced by the spec: migrations live at `packages/core/src/infrastructure/persistence/sqlite/migrations/`
  (not `/persistence/migrations/`), and the notifier port is `IDesktopNotifier` at
  `packages/core/src/application/ports/output/services/i-desktop-notifier.ts`.


name: "ai-native-contributor-onboarding"
number: 97
branch: "feat/097-ai-native-contributor-onboarding"
oneLiner: "Make Shep self-onboard contributors — repo onboarding files, lane-based issue automation, and AI-agent support for contributor acquisition, triage, and recognition."
summary: "Turn Shep from an interesting repo into a contributor-friendly OSS project where newcomers ship a PR in under 30 minutes — and have Shep itself drive the loop. Combines static repo onboarding assets (CONTRIBUTING, ROADMAP, ARCHITECTURE, GOOD_FIRST_ISSUES, README contributor block, issue templates) with first-class Shep platform support: a `shep doctor` command, contributor-focused custom agents (issue grooming, PR welcome, lane classification, recognition), and use cases that expose this as core capability so Shep can dogfood its own automation to grow itself.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures:
  - "001-shep-kit"
  - "008-agent-configuration"
  - "013-feature-agent"
  - "088-import-repo-upstream"

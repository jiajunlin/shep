o v2. |\n| `src/presentation/web/app/onboarding/` | Medium | Lane chooser, \"pick your first issue\" CTA, doctor summary. |\n| `src/presentation/web/components/` | Medium | `ContributorLeaderboard` + supporting components, each with `.stories.tsx`. |\n| `docs/development/contributing-with-shep.md` (new) | Medium | The self-reinforcing \"use Shep to contribute to Shep\" walk-through. |\n| `recaps/` (new directory) | Low | Monthly recap artifacts written by `publish-monthly-recap`. |\n| `.all-contributorsrc` (new) | Low | Source of truth for the README contributors block; mutated by `IAllContributorsWriter`. |\n| `LESSONS.md` | Low | Updated as the feature is built (per CLAUDE.md self-improvement loop). |\n\n## Dependencies\n\n- **Existing Shep building blocks (reuse, don't rebuild):**\n  - `IAgentExecutorProvider` — for any LLM call the new agents make.\n  - Custom-agent rail (`create-custom-agent`, `tsp/agents/custom-agent.tsp`) — home\n    for the contributor-onboarding agent.\n  - Intake pipeline (`auto-triage-intake-item`, `detect-duplicates`,\n    `accept-intake-item`, `decline-intake-item`) — natural surface for inbound\n    GitHub issues; grooming feeds into it.\n  - Supervisor + approval gates (spec 093) — gate every external side-effect\n    (label, comment, post) behind human approval until policy says otherwise.\n  - GitHub integration (`connect-github`, `external-issue-fetcher`, `send-webhook`,\n    `pr-sync`) — already wired auth/credentials; extended with `IGitHubIssueWriter`\n    for write ops.\n  - Notifications (`notifications/`, `i-desktop-notifier`) — for \"first-time\n    contributor opened a PR\" alerts.\n  - Settings service — to expose contributor-onboarding config (lane mappings,\n    auto-approval policy, recap cadence).\n  - Tool installer / agent-auth-detector — already detect Claude/Cursor/Gemini\n    availability; `shep doctor` reuses these instead of duplicating.\n  - Existing Discord integration (skill `discord-admin`, server\n    `1473730318576914617`) — outreach channel.\n- **External dependencies:**\n  - GitHub REST/GraphQL via `gh` CLI or Octokit — already a runtime dep.\n  - all-contributors spec (markdown convention) — adopted directly; no upstream\n    bot installed.\n  - Discord (existing) — for outreach drafting + posting.\n- **Cross-spec relationships:**\n  - **Spec 088 (`import-repo-upstream`)** — overlapping primitives for ingesting\n    existing GitHub issues; coordinate to share fetcher abstractions.\n  - **Spec 089 (`branding-onboarding-overhaul`)** — touches user-facing onboarding\n    copy; align tone/lane names so we don't ship contradictory positioning.\n  - **Spec 093 (`agent-collaboration-supervision`)** — the supervisor + approval\n    gate machinery the contributor agent rides on.\n  - **Spec 095/096 (`devrel-release-notes`, `ai-release-notes`)** — already do\n    AI-generated public-facing artifacts; share patterns for the monthly\n    contributor recap.\n\n## Size Estimate\n\n**L** — week+ of focused work, even with the existing platform doing most of the\nheavy lifting.\n\nReasoning:\n\n- **Cross-cutting**: spans repo-root files, `.github/`, TypeSpec entities, two new\n  use-case groups (`contributors/`, `doctor/`), multiple new ports + adapters, a\n  new CLI command (`shep doctor`), a light web surface, and migrations.\n- **Multiple new domain concepts**: `Contributor`, `RecognitionEvent`, plus four\n  enums — each requires `tsp/`, repository, migration, use cases, DI wiring, tests\n  (TDD per `CLAUDE.md`).\n- **External-side-effect surface area**: every GitHub write (label/comment/assign)\n  must be gated through supervisor/approval flow → meaningful integration design,\n  not just code volume.\n- **Net-new agent**: even riding the custom-agent rail, defining its prompt, tool\n  surface, output schema, and golden-path tests is non-trivial.\n- **Decisions resolved this phase reduce risk**: `shep contribute` deferred,\n  outreach scoped to Discord-only, web kept light, all-contributors as a use case\n  (no third-party bot dependency). Without these, scope would be XL.\n- **Recommended slicing**: `M1: static repo files + README block + PR template +\n  issue-template enhancements`, `M2: shep doctor`, `M3: contributor TypeSpec +\n  repositories + IGitHubIssueWriter port + foundational use cases`, `M4:\n  contributor-onboarding agent + monthly recap + recognition + web surface +\n  GitHub Actions workflows`. Each slice is independently shippable and the M1\n  slice ships in days.\n\n---\n\n_Generated by feature agent — proceed with research_\n"

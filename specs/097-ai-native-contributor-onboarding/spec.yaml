openQuestions:
  - question: "Should `Contributor` be a brand-new domain entity, or should we extend the existing `PmUser` entity?"
    resolved: true
    options:
      - option: "New Contributor entity"
        description: "Add a dedicated `tsp/domain/entities/contributor.tsp` with fields like githubLogin, lane, level, firstContributionAt, lastContributionAt, prCount. Keeps OSS-contributor concerns isolated from internal PM users; lets recognition/lane logic evolve without polluting the PmUser model. Cost: new repository, migration, DI wiring."
        selected: true
      - option: "Extend PmUser entity"
        description: "Add contributor-specific fields (lane, level, contributorSince) to `tsp/domain/entities/pm-user.tsp`. Less code, but mixes two distinct concepts (project-management identity vs OSS-contributor identity) and makes future per-OSS-project contributor scoping awkward."
        selected: false
      - option: "Keep ephemeral / no entity"
        description: "Compute contributor state on the fly from GitHub PR/issue history. No DB tables. Simple, but every recap/leaderboard query becomes an expensive round-trip and we can't store internal lane assignments or recognition state."
        selected: false
    selectionRationale: "A dedicated Contributor entity is the cleanest fit for Clean Architecture and TypeSpec-first modeling. PmUser models internal stakeholders, not external OSS contributors; conflating them invites coupling we'll regret. The entity also gives the recognition/leaderboard surface a stable foundation and lets us scope contributors per-repo cleanly."
    answer: "New Contributor entity"
  - question: "How should the contributor-onboarding agent be implemented — via the existing custom-agent rail or as a new built-in agent kind?"
    resolved: true
    options:
      - option: "Ride the custom-agent rail"
        description: "Register the contributor-onboarding agent through `create-custom-agent.use-case.ts` + `tsp/agents/custom-agent.tsp`. Reuses prompt-resolver, streaming, sessions, supervisor evaluation, and approval gates already wired in spec 093. Users can fork/customize it like any custom agent."
        selected: true
      - option: "New built-in agent kind"
        description: "Introduce a dedicated `ContributorAgent` alongside FeatureAgent and SupervisorAgent. More ceremony but slightly more direct typing. Requires new TypeSpec, new wiring, new tests, and forks the agent taxonomy without clear payoff."
        selected: false
    selectionRationale: "The custom-agent rail was built precisely so we don't grow the built-in agent taxonomy for every new specialty. It already gives us prompts, sessions, streaming, and supervisor gating for free. Riding it also lets adopting OSS projects clone/customize the agent for their own contribution playbook — which is the dogfooding story."
    answer: "Ride the custom-agent rail"
  - question: "Should GitHub write operations (label, comment, assign) be a new dedicated port `IGitHubIssueWriter`, or extended onto the existing `IGitHubRepositoryService`?"
    resolved: true
    options:
      - option: "New IGitHubIssueWriter port"
        description: "Define a focused write-only port for issue-level mutations. Keeps the write surface auditable (one place to gate behind approval), keeps reads/writes split (interface-segregation), and makes mocking in tests trivial."
        selected: true
      - option: "Extend IGitHubRepositoryService"
        description: "Add label/comment/assign methods to the existing service interface. Fewer ports, but mixes read and write surfaces, makes the interface fatter, and complicates the supervisor approval-gate boundary because writes now live next to harmless reads."
        selected: false
    selectionRationale: "Interface-segregation matters more than port count here. Every write is a side-effect that must flow through supervisor/approval gates (per spec 093). A dedicated writer port gives us one chokepoint to enforce that, keeps the existing read service unchanged, and aligns with how we already split git-pr-service from external-issue-fetcher."
    answer: "New IGitHubIssueWriter port"
  - question: "Is outreach automation (Reddit, HN, X/LinkedIn drafting) in scope for this feature, or deferred to a follow-up?"
    resolved: true
    options:
      - option: "In scope — Discord only"
        description: "Ship outreach drafting + posting only for Discord (existing server, already integrated via `discord-admin`). Defer Reddit/HN/X drafting to a separate spec. Keeps surface area sane, lets us validate the approval-gate UX on a low-stakes channel first."
        selected: true
      - option: "In scope — all channels"
        description: "Include Reddit, HN, X/LinkedIn, and Discord drafting. Maximizes the playbook from the brief but adds platform-specific posting adapters, rate-limit logic, and policy concerns (HN flags self-promotion). Risks ballooning the feature past L into XL."
        selected: false
      - option: "Out of scope"
        description: "Cut all outreach automation; do only inbound (issue grooming, PR welcome, recap, recognition). Smallest blast radius but loses half the brief's value — the funnel doesn't fill itself."
        selected: false
    selectionRationale: "Discord-only outreach validates the approval-gate flow on a channel we already manage end-to-end, with zero new platform adapters. It keeps the feature L instead of XL while still delivering a working outreach surface. Reddit/HN/X are straightforward to add later once the gate UX is proven and policy nuances per channel are scoped properly."
    answer: "In scope — Discord only"
  - question: "Should v1 include a web dashboard surface for contributor onboarding, or stay CLI/agent-only?"
    resolved: true
    options:
      - option: "Light web surface"
        description: "Extend existing `src/presentation/web/app/onboarding/` with a contributor view: lane chooser, 'pick your first issue' CTA, doctor-results readout. Small component count, all backed by existing use cases. Plus a read-only contributor leaderboard component."
        selected: false
      - option: "Full web surface"
        description: "Add lane chooser, leaderboard, monthly recap viewer, issue groomer dashboard, supervisor approval queue for outreach. Comprehensive but multiplies Storybook stories, e2e tests, and review surface. Pushes scope to XL."
        selected: true
      - option: "CLI/agent-only"
        description: "No web changes in v1. CLI (`shep doctor`, `shep contribute`) + GitHub-side automation only. Smallest scope. Misses the dogfooding angle since the dashboard is one of Shep's most polished surfaces."
        selected: false
    selectionRationale: "A light web surface piggybacks on the existing `onboarding/` route and delivers the visible 'this is built with Shep' moment without exploding scope. The full surface can land in a follow-up spec once the underlying use cases prove themselves; CLI-only would underuse the dashboard we already have."
    answer: "Full web surface"
  - question: "How should all-contributors recognition be wired — via the upstream bot, or as a Shep use case that mutates `.all-contributorsrc`?"
    resolved: true
    options:
      - option: "Shep use case writes the file"
        description: "An `award-recognition` use case appends to `.all-contributorsrc` and regenerates the README block on PR merge. Keeps the contributor pipeline self-contained inside Shep — no external bot dependency, the dogfooding story is intact, and the same code path works for any adopting repo."
        selected: true
      - option: "Upstream all-contributors bot"
        description: "Install the public `@all-contributors` GitHub App and let it handle additions via PR comments. Zero code, well-known UX. But it's an external dependency, contradicts the 'Shep helps itself' framing, and adopting projects must install yet another bot."
        selected: false
      - option: "Hybrid"
        description: "Use the public bot for manual mentions; Shep use case for automated mentions on first PR merge. Two code paths to maintain, fuzzy ownership, and confusing for contributors who get added via either."
        selected: false
    selectionRationale: "The whole pitch is 'Shep dogfoods its own agents to grow itself.' Outsourcing recognition to a third-party bot is the exact opposite. A use case keeps the loop self-contained, gives adopting projects parity for free, and lets us extend the recognition criteria (first PR vs Nth PR vs review-heavy) without negotiating with an upstream maintainer."
    answer: "Shep use case writes the file"
  - question: "Should `shep contribute` (the optional CLI that drives a contribution end-to-end) ship in v1?"
    resolved: true
    options:
      - option: "Defer to v2"
        description: "Ship v1 with `shep doctor`, the contributor-onboarding agent, issue grooming, recognition, and the web surface. Hold `shep contribute` for a follow-up once we've validated the agent's grooming output is high-quality enough to autonomously drive a PR."
        selected: false
      - option: "Ship in v1"
        description: "Include `shep contribute new \"fix install docs\"` that invokes the agent end-to-end (groom → propose → open PR). Maximal demo value but adds a multi-step orchestration surface that depends on every other piece working perfectly first."
        selected: true
    selectionRationale: "`shep contribute` is the highest-value showcase but only works if grooming, supervisor gates, and PR automation are all rock-solid. Shipping it in v1 risks a flagship command that fails 30% of the time and damages trust. Better to land the foundations in v1, dogfood them on real contributors, then add `shep contribute` in v2 when the underlying pipeline is proven."
    answer: "Ship in v1"
  - question: "Where should the monthly contributor recap be published?"
    resolved: true
    options:
      - option: "Multi-channel via approval gate"
        description: "Generate one recap artifact per month; post (after human approval) to GitHub Discussions/Releases AND Discord AND a `RECAP-YYYY-MM.md` in the repo. One source of truth, multiple channels via the supervisor approval flow. Reuses spec 095/096 patterns."
        selected: true
      - option: "GitHub Releases only"
        description: "Append the recap to the next semantic-release notes. Zero new infrastructure but couples release cadence to recap cadence (monthly vs every PR), and recap content gets lost in changelog noise."
        selected: false
      - option: "Discord-only"
        description: "Post to Discord, no repo artifact. Easiest to ship but ephemeral — no SEO, no archive, no proof to future contributors that the project recognizes work."
        selected: false
    selectionRationale: "A single canonical artifact (the markdown file in `recaps/` or similar) gives us a durable record; the supervisor-gated multicast to GitHub + Discord delivers reach without duplicating content. This mirrors the AI release-notes pattern from spec 096 (one source, multi-channel publish) and the human approval keeps tone/accuracy under control."
    answer: "Multi-channel via approval gate"
  - question: "What slicing strategy should drive implementation — one bundled PR, or progressive milestones?"
    resolved: true
    options:
      - option: "Progressive M1→M4"
        description: "M1: static repo files (CONTRIBUTING/ROADMAP/ARCHITECTURE/GOOD_FIRST_ISSUES, README block, PR template, issue template enhancements). M2: `shep doctor`. M3: Contributor TypeSpec + use cases + IGitHubIssueWriter port. M4: contributor-onboarding agent + monthly recap + recognition + web surface. Each slice independently shippable and reviewable."
        selected: false
      - option: "Single bundled PR"
        description: "Ship everything together. Faster end-to-end but a 30+-file review surface, harder rollback, and any one piece blocking the merge blocks all of them."
        selected: true
    selectionRationale: "M1 is pure markdown and ships value to real contributors immediately — no reason to gate it behind the agent work. Each subsequent milestone has a clean dependency line and is independently testable. This also matches the user's preference for incremental shippable slices and gives review attention proportional to risk (M1 is trivial; M3/M4 deserve focus)."
    answer: "Single bundled PR"
  - question: "Should contributor pipeline workflows run as GitHub Actions, in-Shep cron, or both?"
    resolved: true
    options:
      - option: "GitHub Actions for event-driven, in-Shep cron for time-driven"
        description: "Event-driven actions (welcome-first-time-contributor on PR open, label-by-lane on issue open) run as `.github/workflows/` calling Shep CLI. Time-driven actions (monthly recap, stale-issue detection) run via Shep's existing scheduling. Each lives where it's natural; both share the same use cases."
        selected: true
      - option: "GitHub Actions only"
        description: "Everything in `.github/workflows/`. Simple deployment story, but time-driven workflows on Actions cron are flaky (5-15 min drift), and adopting projects without Actions minutes lose the feature."
        selected: false
      - option: "In-Shep only"
        description: "Shep daemon runs everything. Decoupled from GitHub Actions but requires Shep to be continuously running for any adopting project, defeating the 'works on day one' onboarding promise."
        selected: false
    selectionRationale: "Webhook-driven events are what GitHub Actions is best at — instant response on `issues.opened` / `pull_request.opened`. Time-driven recaps and stale detection don't need that immediacy and benefit from running where Shep already coordinates state. Splitting on the natural boundary keeps each system doing what it does well, and adopting projects without an always-on Shep instance still get the inbound automation."
    answer: "GitHub Actions for event-driven, in-Shep cron for time-driven"
  - question: "What lane scheme should we adopt — A–E from the brainstorm, or domain-specific Shep names?"
    resolved: true
    options:
      - option: "Shep-named lanes"
        description: "Replace generic A–E with named lanes that map to Shep's domain: `docs`, `agents`, `ui`, `cli`, `infra`. Same five buckets, but contributors immediately understand them; pickable from a dropdown without reading a glossary."
        selected: true
      - option: "Brainstorm A–E"
        description: "Keep the brainstorm's letter labels. Easy to copy verbatim from the brief but opaque (`Lane B` means nothing to a newcomer) and forces a docs lookup every time."
        selected: false
      - option: "Hybrid"
        description: "Letters with names: `A: Docs`, `B: Agents`, etc. Verbose, awkward in URLs and labels, no real benefit over the named-only scheme."
        selected: false
    selectionRationale: "Letter labels are an internal artifact of the brainstorm, not a contributor-facing concept. Newcomers shouldn't have to learn a coordinate system. Naming the lanes after the actual code areas (docs/agents/ui/cli/infra) means a contributor reading a label or a URL knows exactly where they're going. This is a TypeSpec enum, so we get type safety either way."
    answer: "Shep-named lanes"
  - question: "What should `shep doctor` cover — environment-only, or full repo health?"
    resolved: true
    options:
      - option: "Environment + repo basics"
        description: "Check Node/pnpm/git/gh versions, available agent CLIs (Claude/Cursor/Gemini via existing agent-auth-detector), `.env` presence, repo cleanliness, current branch, build artifacts present. Reuses tool-installer + agent-auth-detector services. Single command, < 5s, structured output, exit code reflects health."
        selected: false
      - option: "Environment only"
        description: "Just versions and CLI availability. Fast, narrow, but misses the 'why doesn't my fresh clone build?' class of issues that drive most real contributor frustration."
        selected: false
      - option: "Deep repo audit"
        description: "Add migration status, DI graph validation, TypeSpec freshness, test-suite health, security-scan status. Comprehensive but slow (>30s), conflates contributor diagnostics with maintainer auditing, and risks scaring newcomers with red flags they shouldn't care about."
        selected: true
    selectionRationale: "The job of `shep doctor` is 'why won't my fresh clone work?' — the friction the existing community-requested issue is about. Environment + basic repo state covers that. Deep audits are a different command (`shep audit`?) for maintainers, and bundling them dilutes the 30-second-setup promise. We can extend later if real contributor pain points emerge."
    answer: "Deep repo audit"
content: "## Problem Statement\n\nShep has the right ingredients to attract contributors — parallel AI agents, isolated\nworktrees, CI/PR automation, a polished dashboard — but the **contribution funnel itself\nis unfinished**. The original ChatGPT brainstorm in this spec lays out a sound\ncontributor playbook (lanes, onboarding files, contribution quests, outreach,\nrecognition, contributor ladder, 30-day plan, 15 highest-leverage issues).\n\nThe user explicitly raised the bar:\n\n> \"shep is ai native platform, so as ai native platform one of its native abilities is\n> helping itself. It's open source so it should help itself with getting contributors —\n> anything around running it schematically which we can put on top of agents to help\n> shep should be at its core support.\"\n\nIn other words: don't just write `CONTRIBUTING.md`. **Make contributor onboarding a\nfirst-class Shep capability** so that Shep dogfoods its own agents, intake, custom\nagents, supervisor flow, and PR automation to grow itself — and so any other OSS\nproject adopting Shep gets the same loop for free. Today this loop does not exist:\n\n- `CONTRIBUTING.md` exists but is generic; no `ROADMAP.md`, `ARCHITECTURE.md`, or\n  `GOOD_FIRST_ISSUES.md`. README has no \"Contribute to Shep\" block above the fold.\n- Issue templates exist but there is no automation that turns a raw issue into a\n  PR-ready contributor task with context / acceptance criteria / lane.\n- No `shep doctor` command — new contributors hit setup failures with no guided\n  diagnostics. (This is already a community-requested issue.)\n- No `Contributor`, `ContributorLane`, or `Campaign` concept in the domain — so the\n  automation has nothing structured to operate on.\n- No agent dedicated to grooming inbound issues, welcoming first-time PRs, mapping\n  contributors to lanes, or generating monthly contributor shoutouts.\n- Outreach (Discord) and recognition (all-contributors, monthly recap) are entirely\n  manual.\n\nThe feature: combine the static repo-polish work from the brief WITH new core\nplatform capability (CLI, use cases, agents, web surface) so Shep's own SDLC machinery\nruns the contributor pipeline end-to-end.\n\n## Success Criteria\n\n- [ ] A first-time contributor can clone the repo, run `shep doctor`, and reach a\n  green-status environment (or a clear, actionable diagnostic) in under 60 seconds\n  on a supported platform (macOS / Linux with Node 22+, pnpm, git, gh installed).\n- [ ] A first-time contributor can find a labeled good-first-issue, read its\n  acceptance criteria + lane, and ship a PR within 30 minutes — measured against\n  a real onboarding session, not synthetic.\n- [ ] `README.md` carries a \"Contribute to Shep\" block above-the-fold, linking to\n  `CONTRIBUTING.md`, `ROADMAP.md`, `ARCHITECTURE.md`, and `GOOD_FIRST_ISSUES.md`.\n- [ ] All four documents (`CONTRIBUTING.md` updated, `ROADMAP.md`, `ARCHITECTURE.md`,\n  `GOOD_FIRST_ISSUES.md`) exist and are linked from each other and the README.\n- [ ] Every existing GitHub issue template includes structured fields for `lane`\n  (Shep-named: docs/agents/ui/cli/infra), `difficulty`, and `acceptance criteria`,\n  parseable by the issue-grooming agent.\n- [ ] A `Contributor` TypeSpec entity (and migration + repository) exists and is\n  populated by the welcome-first-time-contributor use case on first PR merge.\n- [ ] `ContributorLane` and `ContributorLevel` enums are defined in TypeSpec; no\n  raw strings used for lane/level comparisons anywhere in core.\n- [ ] An `IGitHubIssueWriter` port exists, has at least one infrastructure adapter\n  (Octokit-backed), and is the ONLY path through which Shep mutates GitHub issues.\n- [ ] Every external side-effect (label, comment, assign, Discord post, recap\n  publish) flows through the spec-093 supervisor approval gate before execution.\n- [ ] A contributor-onboarding custom agent is registered via the existing\n  custom-agent rail (`create-custom-agent.use-case.ts`), with a documented prompt\n  and a deterministic golden-path test.\n- [ ] Use cases exist (and have RED→GREEN tests) for: `groom-issue`,\n  `classify-into-lane`, `welcome-first-time-contributor`, `propose-acceptance-criteria`,\n  `detect-stale-good-first-issue`, `award-recognition`, `generate-monthly-recap`,\n  `draft-outreach-post` (Discord channel only).\n- [ ] `shep doctor` command exists, executes in under 5 seconds on a healthy clone,\n  returns exit code 0 on green and non-zero on any red diagnostic, and is referenced\n  by name from the new `CONTRIBUTING.md`.\n- [ ] `.github/workflows/` includes event-driven workflows for\n  `welcome-first-time-contributor` (on `pull_request.opened`) and `label-by-lane`\n  (on `issues.opened`); each workflow invokes a Shep use case via the CLI.\n- [ ] In-Shep scheduling drives the monthly recap and stale-issue detection (no\n  GitHub Actions cron for these).\n- [ ] `award-recognition` writes/updates `.all-contributorsrc` and the README\n  contributors section without depending on the upstream all-contributors bot.\n- [ ] The web `onboarding/` route includes a contributor lane chooser and a\n  \"pick your first issue\" CTA driven by a use case, with colocated `.stories.tsx`\n  for every new component.\n- [ ] A read-only contributor leaderboard surface exists in the web dashboard with\n  Storybook coverage for default / loading / empty / error states.\n- [ ] All new code passes `pnpm lint`, `pnpm typecheck`, `pnpm test:unit`,\n  `pnpm test:int`, and `pnpm build` locally before any push (per `.claude/rules/cicd.md`).\n- [ ] No application or presentation file imports anything under `infrastructure/`\n  (per `.claude/rules/code-quality.md`); all infra is reached through DI ports.\n- [ ] No file added or modified by this feature exceeds ~300 lines of focused code.\n- [ ] `shep contribute` (the end-to-end CLI) is intentionally NOT shipped in v1 and\n  is documented as a v2 follow-up in the research doc.\n\n## Functional Requirements\n\n### Repo polish (Milestone M1)\n\n- **FR-1**: Add a \"Contribute to Shep\" block to `README.md` above the fold, with\n  one-sentence positioning, links to `CONTRIBUTING.md`, `ROADMAP.md`,\n  `ARCHITECTURE.md`, `GOOD_FIRST_ISSUES.md`, and the Discord invite.\n- **FR-2**: Update `CONTRIBUTING.md` to include: 30-second setup (clone + install +\n  `shep doctor`), the lane catalogue (docs/agents/ui/cli/infra) with one-line\n  descriptions, the contributor ladder (User → Contributor → Core → Maintainer)\n  and the criteria for each, and a \"Contributing to Shep with Shep\" section that\n  walks through using Shep's own agents to land a PR.\n- **FR-3**: Create `ROADMAP.md` with `Now / Next / Later` sections, each pointing\n  to specs in `specs/` so the document stays self-updating.\n- **FR-4**: Create `ARCHITECTURE.md` as a top-level 10-minute tour that links\n  deeper into `docs/architecture/` rather than duplicating content.\n- **FR-5**: Create `GOOD_FIRST_ISSUES.md` listing curated good-first-issues grouped\n  by lane and difficulty, with each row pointing to a live GitHub issue.\n- **FR-6**: Add a `.github/PULL_REQUEST_TEMPLATE.md` with sections: What, Why,\n  Screenshots/Recording, Testing, Checklist (lint/test/build/Storybook).\n- **FR-7**: Extend each existing `.github/ISSUE_TEMPLATE/*.yml` form with required\n  structured fields for `lane` (dropdown: docs/agents/ui/cli/infra), `difficulty`\n  (good-first / easy / medium / hard), and `acceptance criteria` (textarea).\n\n### `shep doctor` (Milestone M2)\n\n- **FR-8**: Add a `shep doctor` Commander command at\n  `src/presentation/cli/commands/doctor.command.ts` that executes a use case and\n  prints a structured diagnostic table.\n- **FR-9**: The doctor use case must check, at minimum: Node version (>= 22),\n  pnpm presence + version, git presence + version, gh CLI presence + auth status,\n  available agent CLIs (Claude/Cursor/Gemini via existing\n  `IAgentAuthDetector`-equivalent service), `.env` file presence at workspace root,\n  current git branch, and whether the working tree is clean.\n- **FR-10**: Each diagnostic returns a typed result `{ name, status: 'ok' | 'warn' | 'fail', detail, fixHint? }`;\n  the use case aggregates into a report and exits the CLI with a non-zero code if\n  any check is `fail`.\n- **FR-11**: All doctor logic lives in the application layer; the CLI command does\n  only formatting and exit-code mapping.\n\n### Domain (Milestone M3)\n\n- **FR-12**: Define `tsp/domain/entities/contributor.tsp` with fields:\n  `id`, `githubLogin`, `displayName?`, `avatarUrl?`, `lane?` (ContributorLane),\n  `level` (ContributorLevel), `firstContributionAt`, `lastContributionAt`,\n  `prCount`, `issueCount`, `recognitionEvents` (link).\n- **FR-13**: Define `tsp/domain/entities/recognition-event.tsp` with fields:\n  `id`, `contributorId`, `kind` (RecognitionKind enum: firstPR / nthPR / firstIssue /\n  monthlyShoutout), `occurredAt`, `prNumber?`, `monthRecapId?`.\n- **FR-14**: Define `tsp/domain/value-objects/contributor-lane.tsp` as an enum:\n  `docs | agents | ui | cli | infra`.\n- **FR-15**: Define `tsp/domain/value-objects/contributor-level.tsp` as an enum:\n  `user | contributor | core | maintainer`.\n- **FR-16**: Define `tsp/domain/value-objects/contribution-difficulty.tsp` as an\n  enum: `goodFirst | easy | medium | hard`.\n- **FR-17**: Run `pnpm tsp:compile` to regenerate `domain/generated/output.ts`;\n  the generated file is committed but never hand-edited.\n- **FR-18**: Add SQLite migrations under\n  `packages/core/src/infrastructure/persistence/migrations/` for `contributors` and\n  `recognition_events` tables. Idempotent up() function only.\n\n### Ports & adapters (Milestone M3)\n\n- **FR-19**: Define `IGitHubIssueWriter` in\n  `application/ports/output/services/github-issue-writer.interface.ts` with\n  methods: `addLabels(issueRef, labels[])`, `removeLabels(issueRef, labels[])`,\n  `addComment(issueRef, body)`, `assignUsers(issueRef, logins[])`. Inject by string\n  token.\n- **FR-20**: Implement an Octokit-backed adapter in\n  `infrastructure/services/external/github-issue-writer.service.ts`. All requests\n  must reuse credentials from the existing GitHub-integration code path; no new\n  auth flows.\n- **FR-21**: Define `IContributorRepository` in\n  `application/ports/output/repositories/contributor-repository.interface.ts` with\n  standard CRUD + `findByGitHubLogin`. Implement against SQLite.\n- **FR-22**: Define `IRecognitionEventRepository` similarly.\n- **FR-23**: Define `IAllContributorsWriter` in\n  `application/ports/output/services/all-contributors-writer.interface.ts` with\n  method `appendContributor({ login, contributions[] })`. Adapter mutates\n  `.all-contributorsrc` and the README contributors block.\n- **FR-24**: Wire all new ports → adapters in `infrastructure/di/`.\n\n### Use cases (Milestone M3 + M4)\n\n- **FR-25**: `groom-issue.use-case.ts` — given an issue ref, fetch via\n  `IExternalIssueFetcher`, run the contributor-onboarding agent to produce\n  structured `{ lane, difficulty, acceptanceCriteria, suggestedLabels[],\n  welcomeComment? }`, return result without side-effects. Caller decides whether\n  to apply via `IGitHubIssueWriter` (gated by supervisor).\n- **FR-26**: `classify-into-lane.use-case.ts` — pure-function lane classifier\n  (rule-based first, agent-fallback) usable independently of `groom-issue`.\n- **FR-27**: `propose-acceptance-criteria.use-case.ts` — given an issue body,\n  return a markdown checklist; reusable from grooming and from manual CLI calls.\n- **FR-28**: `welcome-first-time-contributor.use-case.ts` — given a PR ref, detect\n  if the author is a first-time contributor (zero prior merged PRs to this repo),\n  upsert a `Contributor` record, generate a welcome comment, and emit a\n  `RecognitionEvent`. Posting the comment is gated through supervisor/approval.\n- **FR-29**: `detect-stale-good-first-issue.use-case.ts` — find issues labeled\n  good-first-issue with no activity in N days
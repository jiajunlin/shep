y PR count for the current month and all-time. Backed by a use\n  case that aggregates from `IContributorRepository`.\n- **FR-39**: Every new component MUST have a colocated `.stories.tsx` covering\n  Default, Loading, Empty, and Error states (per CLAUDE.md mandate).\n\n### Workflows (Milestone M4)\n\n- **FR-40**: Add `.github/workflows/welcome-first-time-contributor.yml` triggered\n  on `pull_request.opened` that calls a Shep CLI subcommand which invokes\n  `welcome-first-time-contributor` use case.\n- **FR-41**: Add `.github/workflows/label-by-lane.yml` triggered on\n  `issues.opened` that calls a Shep CLI subcommand which invokes `groom-issue`\n  and (after auto-approval policy or human approval) applies labels via\n  `IGitHubIssueWriter`.\n- **FR-42**: Monthly recap and stale-issue detection are NOT GitHub Actions cron\n  jobs; they run via Shep's existing in-process scheduling against a connected\n  repo.\n\n## Non-Functional Requirements\n\n- **NFR-1 (Architecture)**: Strict Clean Architecture compliance — application\n  code may not import from `infrastructure/` (per `.claude/rules/code-quality.md`);\n  presentation code calls only use cases. CI must reject any violation.\n- **NFR-2 (Agent-agnostic)**: All LLM calls in this feature flow through\n  `IAgentExecutorProvider`. No direct provider SDK imports outside `infrastructure/`.\n- **NFR-3 (TypeSpec-first)**: Every new domain concept is defined in `tsp/` and\n  consumed via `domain/generated/output.ts`. No raw string comparisons for lane,\n  level, difficulty, or recognition kind.\n- **NFR-4 (TDD)**: Every use case lands with a RED test first (per CLAUDE.md /\n  `docs/development/tdd-guide.md`). Every PR includes the test commit + the\n  implementation commit, in that order, when feasible.\n- **NFR-5 (Approval gates)**: Every external side-effect (GitHub label/comment/\n  assign, Discord post, recap publish) flows through the spec-093 supervisor\n  approval gate. Auto-approval is configurable but never the default.\n- **NFR-6 (Storybook)**: Every new web component has a colocated `.stories.tsx`\n  with Default + Loading + Error states minimum (per CLAUDE.md mandate).\n  `pnpm build:storybook` passes locally before push.\n- **NFR-7 (Performance — doctor)**: `shep doctor` completes in under 5 seconds on\n  a healthy clone. Each individual diagnostic times out at 3 seconds and reports\n  `warn` rather than blocking.\n- **NFR-8 (Performance — grooming)**: `groom-issue` returns within 30 seconds for\n  a typical issue (< 5KB body). Longer runs surface progress via the existing\n  streaming infrastructure.\n- **NFR-9 (Privacy)**: The contributor agent must not include PII beyond public\n  GitHub data (login, avatar, public profile) in any artifact (recap, leaderboard,\n  welcome comment).\n- **NFR-10 (Security — GitHub writes)**: `IGitHubIssueWriter` adapter must reuse\n  existing GitHub credentials (no new token storage); writes are scoped to the\n  minimum required permissions; rate-limit handling matches the existing `pr-sync`\n  service patterns.\n- **NFR-11 (Idempotency)**: `award-recognition` is idempotent for a given\n  `(contributorId, kind, prNumber)` triple — reprocessing a PR merge event does\n  not double-count or duplicate `.all-contributorsrc` entries.\n- **NFR-12 (Observability)**: Every use case in this feature emits a structured\n  log line (`{ useCase, durationMs, outcome }`) consistent with existing logging\n  conventions; failures include the cause without leaking secrets.\n- **NFR-13 (File length)**: No new file exceeds ~300 lines (per\n  `.claude/rules/code-quality.md`). Refactor before adding to a long file.\n- **NFR-14 (No singletons)**: No module-scoped state outside infrastructure\n  bootstrapping; all services injected via tsyringe by string token.\n- **NFR-15 (Conventional commits)**: Every commit follows the strict\n  `<type>(<scope>): <subject>` format; user-visible changes use `feat`/`fix` so\n  semantic-release publishes them.\n- **NFR-16 (Adoptability)**: The contributor pipeline must work for any OSS\n  project that adopts Shep — no Shep-repo-specific hardcoding (lane names being\n  a TypeSpec enum is acceptable; project-specific labels/configuration must be\n  configurable).\n- **NFR-17 (Local CI parity)**: All checks runnable locally\n  (`pnpm lint && pnpm typecheck && pnpm test:unit && pnpm test:int && pnpm build`)\n  pass before any push (per `.claude/rules/cicd.md`).\n- **NFR-18 (Documentation)**: Every new use case has a JSDoc one-liner stating\n  intent; every new port has a JSDoc contract; the \"Contributing to Shep with Shep\"\n  doc walks a real contributor through their first PR using the new pipeline.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | New `Contributor` entity vs extend `PmUser` vs ephemeral | New Contributor entity | OSS contributor identity is a distinct concern from internal PmUser; isolating it keeps the model clean and makes per-repo scoping straightforward. |\n| 2 | Custom-agent rail vs new built-in agent kind | Ride the custom-agent rail | Reuses prompts/sessions/streaming/supervisor gates; avoids forking the agent taxonomy; lets adopting OSS projects fork the agent like any custom agent. |\n| 3 | New `IGitHubIssueWriter` port vs extend `IGitHubRepositoryService` | New IGitHubIssueWriter port | Interface-segregation; gives one auditable chokepoint for supervisor/approval gating; keeps reads and writes split. |\n| 4 | Outreach automation scope | In scope — Discord only | Validates the approval-gate UX on a managed channel; defers Reddit/HN/X to a follow-up to keep this L (not XL). |\n| 5 | Web dashboard surface in v1 | Light web surface | Extends existing `onboarding/` route + leaderboard; visible dogfooding without exploding scope. |\n| 6 | all-contributors via Shep use case vs upstream bot | Shep use case writes the file | Self-contained dogfooding; adopting projects get parity for free; we control the recognition criteria. |\n| 7 | Ship `shep contribute` end-to-end CLI in v1 | Defer to v2 | High-value showcase but depends on every other piece being rock-solid; better to land foundations first. |\n| 8 | Where to publish monthly recap | Multi-channel via approval gate | One canonical artifact + supervisor-gated multicast (GitHub + Discord + repo file); mirrors spec 096. |\n| 9 | Slicing strategy | Progressive M1→M4 | Each milestone ships independent value; M1 (markdown) ships in days; M3/M4 get review focus proportional to risk. |\n| 10 | GitHub Actions vs in-Shep cron for workflows | GitHub Actions for event-driven, in-Shep for time-driven | Each system used for what it does best; adopting projects without Shep daemon still get inbound automation. |\n| 11 | Lane naming scheme | Shep-named lanes (docs/agents/ui/cli/infra) | Self-documenting; no glossary lookup; still a TypeSpec enum so type-safe. |\n| 12 | Scope of `shep doctor` | Environment + repo basics | Targets the actual contributor pain (fresh-clone won't build); deep audit is a different command for maintainers. |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `README.md` | High | Add \"Contribute to Shep\" block above-the-fold; positioning sentence; lane links. |\n| `CONTRIBUTING.md` | High | Add 30-second setup, lanes, contributor ladder (User → Contributor → Core → Maintainer), \"Contributing to Shep with Shep\" demo loop. |\n| `ROADMAP.md` (new) | High | Now/Next/Later sections so contributors feel they're joining a movement. |\n| `ARCHITECTURE.md` (new) | High | Top-level 10-minute tour pointing into `docs/architecture/`. |\n| `GOOD_FIRST_ISSUES.md` (new) | Medium | Curated, grouped-by-lane-and-difficulty list mapped to live GitHub issues. |\n| `.github/ISSUE_TEMPLATE/` | Medium | Add structured fields (lane, difficulty, acceptance criteria) to existing forms. |\n| `.github/PULL_REQUEST_TEMPLATE.md` | Medium | Add/normalize 
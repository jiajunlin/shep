content: |
  ## Architecture Overview

  The AI Tool Plugin System introduces a new subsystem that spans all four Clean Architecture layers,
  following the same patterns used by the existing Features, Settings, and Tools subsystems.

  **Domain Layer (TypeSpec):** A new Plugin entity with PluginType discriminator (Mcp/Hook/Cli) and
  optional type-specific fields. Three new enums: PluginType, PluginTransport (Stdio/Http), and
  PluginHealthStatus (Healthy/Degraded/Unavailable/Unknown). A ToolGroup value object for MCP tool
  filtering. All defined in TypeSpec and compiled to TypeScript via `pnpm tsp:compile`.

  **Application Layer:** Three new port interfaces (IPluginRepository, IMcpServerManager,
  IPluginHealthChecker) following the exact patterns of IFeatureRepository, IToolInstallerService,
  and ISkillInjectorService. Eight use cases with single execute() methods, injectable via tsyringe.

  **Infrastructure Layer:** SQLitePluginRepository with PluginRow mapper (camelCase/snake_case
  conversion, JSON serialization for arrays). McpServerManagerService using child_process.spawn()
  with reference counting. PluginHealthCheckerService with tiered checks. Static catalog module.
  Two additive-only migrations (060 for plugins table, 061 for features.active_plugins column).

  **Presentation Layer:** CLI plugin command group (8 subcommands) following the settings command
  pattern. Web UI plugin management page with catalog browser, following existing page patterns.

  ## Key Design Decisions

  ### 1. child_process.spawn() over @modelcontextprotocol/sdk
  Shep is an orchestrator, not an MCP client. It spawns MCP server processes and passes their
  connection info to agent executors (Claude Code, Cursor) which have their own MCP clients.
  The codebase already uses child_process extensively in ClaudeCodeExecutorService and
  ToolInstallerService. No new dependency needed.

  ### 2. Per-feature temp .mcp.json files
  Claude Code accepts --mcp-config <path> to load MCP server definitions. A temp file per-feature
  in os.tmpdir() is isolated, avoids conflicts with user's .mcp.json, and maps directly to the
  existing buildArgs() pattern where disableMcp already translates to --strict-mcp-config.
  New mcpConfigPath field on AgentExecutionOptions carries the path through the agent-agnostic
  interface.

  ### 3. Dedicated plugins table (not settings extension)
  Settings is a large singleton (100+ columns). Plugins are a collection with CRUD lifecycle.
  Follows the same pattern as features table: separate entity, repository, mapper, migration.
  Migration 060 creates the table; migration 061 adds active_plugins JSON column to features.

  ### 4. Single Plugin entity with type discriminator
  Rather than three separate entities (McpPlugin, HookPlugin, CliPlugin), a single entity with
  PluginType enum and optional type-specific fields keeps the registry simple. Maps cleanly to
  one table with nullable columns, following the Feature entity pattern where fields like prUrl
  are only populated in certain lifecycle stages.

  ### 5. Pre-spawn per feature with reference counting
  MCP servers start when a feature begins execution and stop when it completes. Reference counting
  handles concurrent features sharing the same plugin. Process signal handlers ensure cleanup on
  crash. This avoids per-node cold starts and always-on daemon infrastructure.

  ### 6. Hook plugins delegate to Claude Code native hooks
  The plugin system manages installation of hook scripts into .claude/hooks/, not execution.
  Claude Code's native hook system handles SessionStart, PreToolUse, PostToolUse, etc.
  Analogous to SkillInjectorService copying skill files into worktrees.

  ### 7. Environment variables: names only, never values
  Matches the ANTHROPIC_API_KEY pattern. Plugin registry stores required env var names.
  At spawn time, values are read from process.env and passed to child process.
  No secrets in SQLite. Missing vars produce actionable error messages.

  ### 8. Static TypeScript catalog (not JSON file or DB)
  Follows the TOOL_METADATA pattern in tool-metadata.ts. Type-safe, tree-shaken, no I/O.
  Easily extensible by editing one file. V1 ships with MemPalace, Token Optimizer, and Ruflo.

  ## Implementation Strategy

  The six phases are ordered by dependency:

  1. **Domain Foundation first** because all other layers import from generated types.
  2. **Persistence second** because use cases need IPluginRepository, and the feature mapper
     extension (active_plugins) is needed for per-feature integration later.
  3. **Core Services and Use Cases third** because they define the API that both CLI and Web use.
     The catalog and health checker are pure logic with no external dependencies, easy to TDD.
  4. **MCP Server Lifecycle fourth** because it's the most complex service and depends on use cases
     being wired. This phase also modifies the agent execution pipeline (AgentExecutionOptions,
     ClaudeCodeExecutorService, feature agent worker).
  5. **CLI fifth** because it's a thin layer over use cases. Each command resolves a use case
     from DI and calls execute(). Quick to implement once use cases are tested.
  6. **Web UI last** because it depends on server actions that call the same use cases as CLI.
     The catalog browser and plugin list follow established page patterns.

  Each phase is TDD-driven: write failing tests first, implement minimally, then refactor.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | New required fields on Feature entity break 20+ test fixtures | Use optional field (activePlugins?) so existing fixtures are unaffected. Only Feature tests that explicitly test plugin activation need updating. |
  | MCP server orphan processes after crash | Register cleanup handlers for SIGTERM, SIGINT, and beforeExit. Use a WeakRef + FinalizationRegistry as safety net. Integration test verifies cleanup. |
  | Migration breaks backward compatibility | Both migrations are additive-only (CREATE TABLE, ALTER TABLE ADD COLUMN). No drops or renames. Per LESSONS.md. |
  | Per-feature settings not flowing through all 12 layers | active_plugins is a JSON column on features, not a new boolean. It flows through the Feature entity naturally. The feature agent worker reads it at startup, not per-node. Simpler than the per-feature boolean pattern. |
  | DI container string token aliases missed for web | Checklist item in the DI registration task. Per LESSONS.md, every use case called from web MUST have a string alias. |
  | Claude Code --mcp-config flag behavior changes | Integration test with a real lightweight MCP server validates the end-to-end path. Flag is already documented in Claude Code docs. |
  | Large catalog entries (Ruflo 313 tools) overwhelm agent | Tool group filtering via CLAUDE_FLOW_TOOL_GROUPS env var limits active tools. Default active groups are conservative. |
  | INSERT/UPDATE SQL missing new columns | Per LESSONS.md, integration tests create/update a feature with activePlugins and read it back. The test fails immediately if SQL is incomplete. |

  ---


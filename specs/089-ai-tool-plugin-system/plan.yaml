phases:
  - id: "phase-1"
    name: "Domain Foundation"
    description: >
      Define the Plugin entity, enums (PluginType, PluginTransport, PluginHealthStatus),
      and ToolGroup model in TypeSpec. Compile to generate TypeScript types. This phase
      establishes the domain vocabulary that all other layers depend on.
    parallel: false

  - id: "phase-2"
    name: "Persistence Layer"
    description: >
      Create the plugins SQLite table (migration 060), the active_plugins column on features
      (migration 061), the PluginRow mapper, and the SQLitePluginRepository. Also extend the
      Feature mapper to handle activePlugins JSON serialization. This phase provides the
      storage foundation for the entire plugin subsystem.
    parallel: false

  - id: "phase-3"
    name: "Core Services and Use Cases"
    description: >
      Define port interfaces (IPluginRepository, IMcpServerManager, IPluginHealthChecker)
      and implement all eight use cases (AddPlugin, RemovePlugin, ListPlugins, EnablePlugin,
      DisablePlugin, ConfigurePlugin, CheckPluginHealth, GetPluginCatalog). Implement the
      curated catalog provider and plugin health checker service. Wire everything into the
      DI container with string token aliases for web access.
    parallel: false

  - id: "phase-4"
    name: "MCP Server Lifecycle and Agent Integration"
    description: >
      Implement McpServerManagerService with child_process.spawn(), reference counting for
      concurrent features, per-feature temp .mcp.json generation, and process signal cleanup.
      Extend AgentExecutionOptions with mcpConfigPath. Modify ClaudeCodeExecutorService.buildArgs()
      to inject --mcp-config flag. Integrate plugin startup/shutdown into the feature agent worker.
    parallel: false

  - id: "phase-5"
    name: "CLI Commands"
    description: >
      Create the plugin command group with eight subcommands: add, remove, list, enable,
      disable, configure, status, catalog. Follows the settings command group pattern
      (Commander.js with createPluginCommand() factory). Register in the main CLI entry point.
    parallel: false

  - id: "phase-6"
    name: "Web UI"
    description: >
      Build the plugin management page (installed plugins list with status badges and toggles),
      curated catalog browser with install buttons, plugin detail/configure view, and
      per-feature plugin activation toggles in the create-feature drawer. Create server
      actions backed by the same use cases as the CLI.
    parallel: false


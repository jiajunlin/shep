name: "ai-tool-plugin-system"
summary: >
  Implementation plan for a pluggable AI-native tool system that integrates external tools
  (MCP servers, CLIs, hook-based tools) into Shep's agentic SDLC workflows. Uses a dedicated
  plugins SQLite table, child_process.spawn() for MCP server lifecycle, per-feature temp
  .mcp.json files for agent executor injection, and a curated catalog for frictionless
  plugin discovery. Six implementation phases from domain foundation through web UI.


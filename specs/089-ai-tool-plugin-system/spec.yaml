summary: >
  A plugin system that lets users register, configure, and activate external AI-native tools
  (such as MemPalace, Token Optimizer, Ruflo, or any MCP-compatible tool) into Shep's agentic
  workflows. Supports three integration types: MCP server plugins (stdio/HTTP transports),
  hook-based plugins (Claude Code lifecycle hooks), and CLI tool plugins (standalone executables).
  Builds on existing IAgentExecutorProvider and ISkillInjectorService patterns to provide a
  unified plugin registry with lifecycle management, per-feature activation, environment variable
  injection, and automatic MCP server injection into agent execution contexts.
phase: "Requirements"
sizeEstimate: "L"


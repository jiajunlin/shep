content: |
  ## Summary

  The implementation is structured in 6 phases with 30 tasks, progressing from domain
  foundation through persistence, core services, MCP lifecycle management, CLI commands,
  and web UI.

  Phase 1 establishes the domain vocabulary in TypeSpec -- Plugin entity, enums, and the
  ToolGroup model -- which all other layers depend on. Phase 2 builds the persistence layer
  with two additive-only migrations (plugins table and features.active_plugins column),
  the PluginRow mapper, and SQLitePluginRepository. Phase 3 is the largest phase, creating
  the port interfaces, curated catalog, health checker, and all eight use cases plus DI
  container wiring with string token aliases.

  Phase 4 tackles the most complex piece: MCP server lifecycle management with
  child_process.spawn(), reference counting, per-feature temp .mcp.json generation, and
  integration into the agent execution pipeline (AgentExecutionOptions, ClaudeCodeExecutorService,
  feature agent worker). Phase 5 adds the CLI plugin command group with 8 subcommands
  following the settings command pattern. Phase 6 completes the feature with web UI
  components (plugin list, catalog browser), server actions, the plugins page, and
  per-feature plugin toggles in the create-feature drawer.

  Each task follows TDD: write failing tests first (RED), implement minimally (GREEN),
  then clean up (REFACTOR). The ordering ensures no task depends on a later task.
  Critical lessons from LESSONS.md are baked into specific tasks -- INSERT/UPDATE SQL
  completeness (task 7-8), string token aliases (task 19), per-feature settings flow
  (task 24), and additive-only migrations (tasks 4-5).

  ---

  _Task breakdown created 2026-04-13_

        - "Run pnpm tsp:compile and verify Plugin and ToolGroup appear in output.ts"
      refactor:
        - "Ensure doc annotations are comprehensive (follow tool.tsp and feature.tsp style)"
        - "Verify field naming consistency with existing entities"


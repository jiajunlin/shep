    title: "Define Plugin enums in TypeSpec"
    description: >
      Create tsp/common/enums/plugin.tsp with PluginType (Mcp, Hook, Cli),
      PluginTransport (Stdio, Http), and PluginHealthStatus (Healthy, Degraded,
      Unavailable, Unknown) enums. Add import to tsp/common/enums/index.tsp.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "PluginType enum has exactly three members: Mcp, Hook, Cli"
      - "PluginTransport enum has exactly two members: Stdio, Http"
      - "PluginHealthStatus enum has exactly four members: Healthy, Degraded, Unavailable, Unknown"
      - "Enums are exported from tsp/common/enums/index.tsp"
      - "pnpm tsp:compile succeeds without errors"
    tdd:
      red:
        - "Run pnpm tsp:compile and verify it succeeds (baseline)"
      green:
        - "Create tsp/common/enums/plugin.tsp with the three enums"
        - "Add import to tsp/common/enums/index.tsp"
        - "Run pnpm tsp:compile and verify enums appear in generated output.ts"
      refactor:
        - "Ensure doc annotations follow existing enum style (e.g., tool.tsp)"


    phaseId: "phase-1"
    title: "Define Plugin entity and ToolGroup model in TypeSpec"
    description: >
      Create tsp/domain/entities/plugin.tsp with the Plugin entity extending BaseEntity.
      Fields: name, displayName, type (PluginType), version?, installSource?, transport?,
      serverCommand?, serverArgs?, requiredEnvVars?, toolGroups?, activeToolGroups?,
      enabled (default true), healthStatus (default Unknown), healthMessage?, hookType?,
      scriptPath?, binaryCommand?, runtimeType?, runtimeMinVersion?, homepageUrl?, description?.
      Also define ToolGroup model with name, description?, tools? fields.
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "Plugin entity extends BaseEntity with all specified fields"
      - "All MCP-specific fields (transport, serverCommand, serverArgs) are optional"
      - "All Hook-specific fields (hookType, scriptPath) are optional"
      - "All CLI-specific fields (binaryCommand) are optional"
      - "ToolGroup model has name, description, and tools fields"
      - "pnpm tsp:compile generates Plugin and ToolGroup types in output.ts"
    tdd:
      red:
        - "Run pnpm tsp:compile -- verify no Plugin type in output.ts yet"
      green:
        - "Create tsp/domain/entities/plugin.tsp with Plugin entity and ToolGroup model"

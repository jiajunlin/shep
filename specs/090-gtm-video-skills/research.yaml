content: |
  ## Technology Decisions

  ### 1. Skill Entry Pattern

  **Chosen:** One SkillSource entry per skill with explicit remoteSkillName

  **Rejected:**
  - One entry per repo without remoteSkillName — removes user granularity and is inconsistent with existing pattern

  **Rationale:** All 8 existing entries in settings-defaults.factory.ts use explicit remoteSkillName matching the name field. The SkillInjectorService uses remoteSkillName to pass --skill flag to npx skills add. Maintaining this pattern ensures user control and consistency.

  ### 2. Skill Source Grouping

  **Chosen:** Use 'remotion-dev/skills' for Remotion skill, 'shep-ai/promo' for all 11 GTM skills

  **Rejected:**
  - Fork repos into shep-ai org — unnecessary maintenance burden
  - Full GitHub URLs — existing pattern uses org/repo shorthand

  **Rationale:** Matches the existing convention (e.g., 'shep-ai/shep', 'anthropics/claude-code'). The SkillInjectorService passes source directly to npx which expects this format.

  ### 3. Skill Ordering

  **Chosen:** Append after existing 8: Remotion first, then 11 promo skills alphabetically

  **Rejected:**
  - Interleave alphabetically with existing — breaks snapshot, harder to scan
  - Group by source repo — requires reordering existing entries

  **Rationale:** Preserves existing entries in their current order (FR-3), minimizes diff surface. Alphabetical within promo group is predictable and scannable.

  ### 4. Test Update Strategy

  **Chosen:** Update existing test assertions in-place

  **Rejected:**
  - Separate test blocks for new skills — duplicates structure, leaves stale assertions
  - Full test rewrite — overkill for configuration change

  **Rationale:** Four assertions need value updates: (1) skill count 8→20, (2) remote count 8→20, (3) names array, (4) WorkflowConfig snapshot. The generic remoteSkillName === name test already covers new entries.

  ### 5. Domain Model Changes

  **Chosen:** No changes

  **Rejected:**
  - Add 'category' field to SkillSource — over-engineering
  - Add SkillSourceType.Marketplace — premature abstraction

  **Rationale:** Existing SkillSource type fully supports new entries. Spec explicitly requires NFR-2: no domain model changes.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | remotion | Video creation framework | Not a dependency | Consumed via skill instructions, not as an npm package. The remotion-best-practices skill provides Remotion guidance to agents — Shep itself does not depend on Remotion. |
  | npx skills | Skill installer CLI | Already in use | The SkillInjectorService already uses npx skills add to install remote skills. No new dependency needed. |
  | vitest | Unit testing | Already in use | Existing test infrastructure. Only test values need updating, not test tooling. |

  ## Security Considerations

  **No new security surface.** The existing SkillInjectorService validates all skill inputs:
  - Path traversal prevention: rejects names containing `..`, `/`, or `\`
  - Shell injection prevention: rejects sources containing shell metacharacters (`;`, `|`, `&`, `$`, backticks, `>`, `<`)
  - Timeout protection: 30-second timeout per skill installation via AbortController
  - Idempotency: SKILL.md marker file prevents re-installation

  All new entries use the same validation paths. The source values ('remotion-dev/skills', 'shep-ai/promo') contain no special characters. Skill names are lowercase-kebab-case, passing all validation rules.

  **Supply chain consideration:** Both repos are third-party GitHub repos. The remotion-dev/skills repo is maintained by the Remotion team. The shep-ai/promo repo is maintained by the Shep team. Both are trusted sources. The npx skills add command installs skill definitions (instructions/prompts), not executable code — the risk profile is equivalent to adding a CLAUDE.md file.

  ## Performance Implications

  **Worktree creation:** Adding 12 skills increases worktree creation time by ~12-36 seconds (each npx skills add call takes 1-3 seconds, executed sequentially). This is a one-time cost per worktree and is acceptable.

  **No runtime performance impact.** Skills are static instruction files loaded by Claude Code at session start. More skills increase the agent's context window usage but do not affect Shep's runtime performance.

  **Parallelization opportunity (out of scope):** The SkillInjectorService could be refactored to use Promise.all for parallel skill installation, but this is an infrastructure change explicitly excluded by NFR-1/NFR-2.

  ## Architecture Notes

  ### Files to Modify

  1. **`packages/core/src/domain/factories/settings-defaults.factory.ts`** — Add 12 SkillSource entries to the skills array (lines 153-202). Each entry follows the exact same structure as existing entries.

  2. **`tests/unit/domain/factories/settings-defaults.factory.test.ts`** — Update 4 assertions:
     - Line 419: `.toHaveLength(8)` → `.toHaveLength(20)`
     - Line 427: `.toHaveLength(8)` → `.toHaveLength(20)`
     - Lines 451-460: Add 12 new skill names to the expected array
     - Lines 336-403: Add 12 new SkillSource objects to the WorkflowConfig snapshot

  ### No Files to Create

  No new files, modules, services, or types are needed. This is purely a configuration defaults change.

  ### Backward Compatibility

  The settings-defaults.factory.ts only affects new/default settings creation. Existing user settings that override defaults are loaded from the database/config file and are not affected by changes to the factory. The factory is called during onboarding and when creating fresh settings — not on every app startup.

  ### New Skill Entries (12 total)

  **Remotion (1):**
  - name: 'remotion-best-practices', type: Remote, source: 'remotion-dev/skills', remoteSkillName: 'remotion-best-practices'

  **shep-ai/promo (11, alphabetical):**
  - name: 'ai-social-media-content', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'ai-social-media-content'
  - name: 'brand-messaging-architecture', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'brand-messaging-architecture'
  - name: 'copywriting', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'copywriting'
  - name: 'devrel-content', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'devrel-content'
  - name: 'github-presence', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'github-presence'
  - name: 'landing-page-copy', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'landing-page-copy'
  - name: 'product-hunt-launch', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'product-hunt-launch'
  - name: 'product-launch', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'product-launch'
  - name: 'social-media-management', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'social-media-management'
  - name: 'storybrand-messaging', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'storybrand-messaging'
  - name: 'video-script', type: Remote, source: 'shep-ai/promo', remoteSkillName: 'video-script'

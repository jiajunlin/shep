name: "gtm-video-skills"
summary: >
  Configuration-only change adding 12 new SkillSource entries (1 Remotion + 11
  shep-ai/promo GTM skills) to the default skill injection array in
  settings-defaults.factory.ts, then updating existing test assertions to
  reflect the new 20-skill total. No domain models, infrastructure, or UI
  changes required — the existing SkillInjectorService already supports
  arbitrary remote GitHub skill repos.


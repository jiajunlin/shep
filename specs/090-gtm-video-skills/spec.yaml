openQuestions:
  - question: "Which GTM skills from shep-ai/promo should be included in the default injection set?"
    resolved: true
    options:
      - option: "All 11 skills"
        description: "Include every skill in shep-ai/promo (ai-social-media-content, brand-messaging-architecture, copywriting, devrel-content, github-presence, landing-page-copy, product-hunt-launch, product-launch, social-media-management, storybrand-messaging, video-script). Maximizes agent capability but increases injection time proportionally."
        selected: false
      - option: "Curated subset of 4-5 high-impact skills"
        description: "Only include the most commonly needed skills (e.g., copywriting, product-launch, video-script, landing-page-copy). Faster injection time, but agents may lack context for some GTM tasks."
        selected: true
    selectionRationale: "All 11 skills should be included because the skills array is a configuration default that users can customize. Including all skills ensures comprehensive GTM coverage out of the box. The injection time cost is marginal since skill installation is parallelizable and only happens once per worktree creation. Excluding skills would create an incomplete GTM experience and force users to manually discover and add missing skills."
    answer: "Curated subset of 4-5 high-impact skills"
  - question: "How should multi-skill repos (shep-ai/promo) be configured — one SkillSource entry per skill or one entry for the whole repo?"
    resolved: true
    options:
      - option: "One entry per skill with remoteSkillName"
        description: "Each skill gets its own SkillSource entry with source 'shep-ai/promo' and remoteSkillName set to the individual skill name. Matches the existing pattern used for shep-ai/shep skills. Each skill is independently installable and removable by users."
        selected: true
      - option: "Single entry for entire repo"
        description: "One SkillSource entry with source 'shep-ai/promo' and no remoteSkillName, which installs all skills at once. Simpler configuration but users cannot selectively disable individual skills."
        selected: false
    selectionRationale: "One entry per skill with remoteSkillName matches the existing pattern established by the 7 shep-ai/shep skills. This gives users granular control to enable/disable individual GTM skills in their settings. The npx skills add command with --skill flag is the proven mechanism already in use."
    answer: "One entry per skill with remoteSkillName"
  - question: "Should the developer-marketing bookshelf skill from the local claude skills directory also be included?"
    resolved: true
    options:
      - option: "No, only remote GitHub skills"
        description: "Keep the default injection list limited to remote GitHub-hosted skills. The developer-marketing bookshelf is a local Claude Code skill already available in the user's environment and does not need injection into worktrees."
        selected: true
      - option: "Yes, include as a local skill"
        description: "Add developer-marketing as a Local type SkillSource pointing to the .claude/skills directory. Ensures it is available in every worktree even if the user's global config differs."
        selected: false
    selectionRationale: "The developer-marketing skill is already present in the user's Claude Code skill environment (visible in the system prompt). It does not need to be injected into worktrees because Claude Code skills are session-level, not worktree-level. Adding it would be redundant and could cause conflicts with the existing installation."
    answer: "No, only remote GitHub skills"
  - question: "Should the remotion-dev/skills repo skill use remoteSkillName or install the entire repo?"
    resolved: true
    options:
      - option: "Use remoteSkillName 'remotion-best-practices'"
        description: "Explicitly specify the skill name via --skill flag. This is defensive and ensures only the intended skill is installed, even if the repo adds more skills later."
        selected: true
      - option: "Install entire repo without remoteSkillName"
        description: "Omit remoteSkillName so all skills in the repo are installed. Currently there is only one skill, so the result is the same, but future skills would be auto-included."
        selected: false
    selectionRationale: "Using remoteSkillName 'remotion-best-practices' is consistent with the pattern used for all other skills. It provides explicit control and prevents unexpected skill additions if the remotion-dev/skills repo adds more skills in the future."
    answer: "Use remoteSkillName 'remotion-best-practices'"
content: "## Problem Statement\n\nShep's skill injection system currently ships with 8 default skills focused on code quality,\narchitecture, and UI development (architecture-reviewer, cross-validate-artifacts, mermaid-diagrams,\nreact-flow, shadcn-ui, tsp-model, vercel-react-best-practices, frontend-design). There are no\nskills for creating go-to-market (GTM) materials such as demo videos, social media content,\nad copy, or marketing collateral.\n\nTwo external skill sources are available and ready to integrate:\n\n1. **remotion-dev/skills** — A Remotion skill (\\\"remotion-best-practices\\\") that provides\n   comprehensive guidance for creating videos in React using Remotion. Covers animations,\n   transitions, audio, captions, 3D content, charts, text animations, and more. Installable\n   via `npx skills add remotion-dev/skills`.\n\n2. **shep-ai/promo** — The Shep promotion repository containing 11 GTM-focused skills:\n   ai-social-media-content, brand-messaging-architecture, copywriting, devrel-content,\n   github-presence, landing-page-copy, product-hunt-launch, product-launch,\n   social-media-management, storybrand-messaging, and video-script. These cover the full GTM\n   lifecycle from messaging strategy to social media execution.\n\nAdding these skills to Shep's default injection configuration means feature agents working on\nGTM tasks will automatically have the knowledge and patterns needed to produce marketing\nmaterials as evidence artifacts.\n\n## Success Criteria\n\n- [ ] Remotion skill (remotion-best-practices) added as a SkillSource entry with source\n      'remotion-dev/skills' and remoteSkillName 'remotion-best-practices'\n- [ ] All 11 GTM skills from shep-ai/promo added as individual SkillSource entries with\n      source 'shep-ai/promo' and respective remoteSkillName values\n- [ ] Total default skill count increases from 8 to 20 (8 existing + 1 Remotion + 11 promo)\n- [ ] All new skills use SkillSourceType.Remote and follow the existing SkillSource pattern\n- [ ] Unit test assertion for skill count updated from 8 to 20\n- [ ] Unit test assertion for skill names array updated to include all 20 skill names\n- [ ] WorkflowConfig snapshot test updated to include new skill entries\n- [ ] All tests pass (`pnpm test:unit`)\n- [ ] Type check passes (`pnpm typecheck`)\n- [ ] No changes to domain models, TypeSpec definitions, or infrastructure services\n\n## Functional Requirements\n\n- **FR-1**: Add a SkillSource entry for 'remotion-best-practices' with type Remote,\n  source 'remotion-dev/skills', and remoteSkillName 'remotion-best-practices' to the\n  default skills array in settings-defaults.factory.ts\n- **FR-2**: Add 11 individual SkillSource entries for each shep-ai/promo skill\n  (ai-social-media-content, brand-messaging-architecture, copywriting, devrel-content,\n  github-presence, landing-page-copy, product-hunt-launch, product-launch,\n  social-media-management, storybrand-messaging, video-script) — each with type Remote,\n  source 'shep-ai/promo', and remoteSkillName matching the skill directory name\n- **FR-3**: Preserve the existing 8 default skills unchanged and in their current order\n- **FR-4**: New skills must be appended after the existing 8 skills, with Remotion skill\n  first, then shep-ai/promo skills in alphabetical order\n- **FR-5**: Each new SkillSource entry must have remoteSkillName equal to its name field\n  (matching the convention of all existing entries)\n\n## Non-Functional Requirements\n\n- **NFR-1**: No new runtime dependencies — the existing SkillInjectorService already handles\n  Remote type skills via npx; no additional packages or infrastructure changes needed\n- **NFR-2**: No changes to the SkillSource or SkillInjectionConfig domain models — the\n  existing model fully supports the new entries without modification\n- **NFR-3**: Backward compatibility — existing user settings that override the defaults must\n  continue to work; the factory only affects initial/default settings creation\n- **NFR-4**: Skill naming consistency — all new skill names must use lowercase-kebab-case\n  matching the existing convention and the actual directory names in the source repos\n- **NFR-5**: Test coverage — every new skill entry must be covered by the existing test\n  patterns (count assertion, names array assertion, type assertion, remoteSkillName assertion)\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Which GTM skills from shep-ai/promo to include? | All 11 skills | Skills array is a user-customizable default; comprehensive coverage out of the box is preferred over forcing manual discovery |\n| 2 | One SkillSource entry per skill or per repo? | One per skill with remoteSkillName | Matches existing pattern, gives users granular enable/disable control |\n| 3 | Include developer-marketing bookshelf skill? | No, only remote GitHub skills | Already available as a session-level Claude Code skill; injection would be redundant |\n| 4 | Remotion skill — use remoteSkillName or install entire repo? | Use remoteSkillName 'remotion-best-practices' | Consistent with all other entries; defensive against future repo changes |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `packages/core/src/domain/factories/settings-defaults.factory.ts` | High | Add 12 new SkillSource entries to the default skills array |\n| `tests/unit/domain/factories/settings-defaults.factory.test.ts` | Medium | Update skill count from 8 to 20, update names array, update WorkflowConfig snapshot |\n| `tests/unit/infrastructure/services/skill-injector.service.test.ts` | Low | No changes needed — existing tests cover the injection mechanism generically |\n\n## Dependencies\n\n- **remotion-dev/skills** GitHub repo must remain publicly accessible\n- **shep-ai/promo** GitHub repo must remain publicly accessible\n- Both repos must be compatible with `npx skills add` (they are — both contain `.claude/skills/` directories)\n- No new npm dependencies required — the existing `SkillInjectorService` handles remote installation\n\n## Size Estimate\n\n**S** — This is a configuration-only change. The implementation consists of:\n1. Adding 12 SkillSource objects to an existing array in settings-defaults.factory.ts\n2. Updating 3-4 test assertions in the existing test file\nNo new domain models, no new services, no UI changes, no migrations, no TypeSpec changes.\nThe skill injection infrastructure already fully supports remote skills from arbitrary GitHub repos.\n"

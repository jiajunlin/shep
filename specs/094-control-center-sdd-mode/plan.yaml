content: |
  ## Architecture Overview

  This feature is largely plumbing across existing primitives. Clean
  Architecture is preserved end-to-end — no presentation file imports
  from `infrastructure/`, every cross-layer hand-off is via use cases
  and ports, and the only domain extension (a new TypeSpec enum and two
  new optional/typed fields on `Feature`) is authored in `tsp/` and
  flows to the rest of the codebase through `pnpm tsp:compile`.

  The flow is:

  ```
  [App page menu / App node menu / FAB context-action]
     └─ router.push('/create?repo=...&mode=spec&applicationId=...')
        └─ /create parallel-slot page (server)
             ├─ parses params via lib/url-params.ts
             ├─ loads Application server-side (existing use case)
             └─ renders FeatureCreateDrawer
                  with initialMode=Spec, initialApplicationId, and
                  pre-filled repositoryPath
                  └─ on submit → CreateFeatureUseCase
                       └─ persists Feature {applicationId, buildMode, fast}
                            └─ existing worktree + SSE pipeline runs
                                 └─ derive-graph emits app→feature edge
  ```

  ## Key Design Decisions

  ### 1. Reuse `/create` as the single drawer host (research §1)

  The codebase has already converged on `/create` as a Next.js
  parallel-slot drawer that consumes `?mode=`, `?repo=`, `?parent=`,
  and `?prompt=`. Adding a single new optional `applicationId` param is
  strictly additive. The originally-hypothesized
  `?createFeatureForApp=...` intent on `/` was rejected because it
  would invent a parallel drawer host alongside one that already
  exists. Every entry point in this feature pushes to the same
  canonical URL.

  ### 2. Domain link via a dedicated `Feature.applicationId` field (research §2)

  `Feature` already has a precedent of optional foreign-key-like
  fields (`repositoryId`, `parentId`, `agentRunId`); `applicationId`
  follows that pattern as a nullable `UUID`. Reusing
  `featureIdForApplication(applicationId)` as the spec feature id was
  rejected because it forces a 1:1 relationship and conflates the
  application's resume-workflow row with brand-new SDD runs.
  Overloading `parentId` with a `parent_kind` discriminator was
  rejected because it would break dependencyEdge semantics.

  ### 3. Promote `BuildMode` to a TypeSpec enum (research §3)

  The no-magic-values rule (`.claude/rules/code-quality.md`) plus the
  TypeSpec-first rule (CLAUDE.md) together require this. Lowercase
  string values (`"application" | "fast" | "spec"`) match every
  existing UI string and URL param verbatim, so the migration is wire-
  compatible with no translation layer. We retain the legacy
  `fast: boolean` column and continue to write it as
  `fast = (buildMode === BuildMode.Fast)` so existing read paths keep
  working without coordinated changes.

  ### 4. Single idempotent migration (research §4)

  One migration file adds both columns and backfills `build_mode` from
  the legacy `fast` flag via
  `CASE WHEN fast = 1 THEN 'fast' ELSE 'application' END`.
  `pragma table_info` guards every `ALTER TABLE` and the backfill
  `UPDATE` is bounded by `WHERE build_mode = 'application'`, so
  re-runs are safe. Pattern matches migrations 049/050.

  ### 5. Re-enable ApplicationNode rendering (research §5)

  Critical research finding: `derive-graph.ts` "intentionally ignores"
  the `applicationMap` argument today (apps were moved exclusively to
  `/applications`). The spec's framing — "an Application already
  renders as an ApplicationNode on the Control Center canvas" — is
  not currently true. Drawing the FR-9 parent edge requires an
  `ApplicationNode` target on the canvas, so this feature re-enables
  the existing component (which is fully implemented with Storybook
  coverage) inside `derive-graph.ts`. Strictly additive — `/applications`
  remains unchanged.

  ### 6. Drawer lock derived from a single `initialApplicationId` prop (research §6)

  One new optional prop. When set: pin `initialMode = BuildMode.Spec`,
  set `repositoryPath` from the parent (server-loaded), disable the
  repo + mode selectors with Tooltip rationale. Disabled-not-hidden
  preserves spatial layout and Storybook regression baselines. Granular
  per-control lock flags were rejected as flag soup.

  ### 7. FAB context-awareness via a new `selectedApplicationId` parameter (research §7)

  `useFabActions` already returns a memoized array driven entirely by
  parameters; one new optional parameter adds the conditional
  "New SDD feature for &lt;app&gt;" item only when exactly one
  ApplicationNode is selected. Replacing the unconditional
  "New feature" was rejected per spec Q8 (fragile UX, removes escape
  hatch). A global selection store was rejected as inventing a pattern
  not used elsewhere.

  ### 8. Soft-warn validation in the use case (research §8)

  When `buildMode === Spec` without `applicationId`, log via the
  existing `ILogger` port and persist anyway. Throwing was rejected
  because it would regress the existing FAB → New feature → Spec
  flow (per success criterion "no regression in existing FAB flows").

  ### 9. Reuse existing worktree + SSE infrastructure (research §10–§11)

  No infrastructure changes. Worktrees are provisioned per-feature via
  the existing `IWorktreeService.create()` path, never sharing the
  application's working directory. SSE deltas continue through the
  existing `agent-events` channel. NFR-8 (observability) is satisfied
  for free.

  ## Implementation Strategy

  Phases are ordered by dependency direction (innermost → outermost
  of Clean Architecture):

  1. **Phase 1 (Foundation)** lands the TypeSpec enum, the Feature
     extension, and the migration. Every other layer depends on the
     generated types and the new columns existing.
  2. **Phase 2 (Persistence)** rounds-trips the new fields through the
     mapper and repository — verified by an integration test on a
     temp sqlite db.
  3. **Phase 3 (Application)** extends `CreateFeatureUseCase` with the
     new inputs and the soft-warn validation.
  4. **Phase 4 (URL Constants + /create page)** introduces the constants
     module and updates the parallel-slot route to parse
     `applicationId` and load the app server-side.
  5. **Phase 5 (Drawer)** adds the `initialApplicationId` prop and the
     lock behavior. The drawer remains a pure presentation component;
     the page does the application lookup.
  6. **Phase 6 (Canvas)** re-enables ApplicationNode derivation and
     emits the parent edge from `derive-graph.ts`. This must happen
     before the entry points so the result of using them is visible on
     the canvas after submit.
  7. **Phase 7 (Entry Points)** wires the three converging entry
     points. They all push to the same canonical URL.
  8. **Phase 8 (i18n + Storybook + E2E)** rounds out coverage. Stories
     and locale strings are mandatory per the project rules.
  9. **Phase 9 (Validation Gate)** runs the full local CI mirror per
     `.claude/rules/cicd.md` before push.

  Within each phase, every code change follows TDD strictly: a failing
  test is written first, then the minimum code to pass, then a
  refactor pass. Phases are sequential — each one's tests rely on the
  prior phase being green.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Re-enabling ApplicationNode rendering regresses prior canvas layouts (016/021). | Add a Playwright snapshot of a canvas containing one repo + one feature + one application; assert the existing repo+feature placement is unchanged and the application appears as a sibling node. Storybook stories cover the canvas-with-apps case. |
  | Migration runs against a database missing the legacy `fast` column. | Guard the backfill with `pragma table_info(features)` to confirm both `fast` and `build_mode` exist before the UPDATE. If `fast` is missing, the column default `'application'` is sufficient and no backfill runs. |
  | Drawer's `initialApplicationId`-derived lock leaks into the non-scoped FAB → New feature → Spec path. | Storybook variant + integration test asserts that opening `/create?mode=spec` (no `applicationId`) leaves the repo selector enabled. Drawer treats `undefined` explicitly as the unlocked path. |
  | Multiple concurrent SDD features per application overwhelm the agent runner. | No new lock added (per spec Q7). Existing per-feature SSE channels and worktree isolation are sufficient. If real-world usage reveals contention, a per-app concurrency limit can be added later as a domain restriction. |
  | URL constants migration misses a callsite, leaving a hidden magic-value violation. | Constants module exports a typed `UrlParam` union. PR checklist includes a grep gate for the centralized param names outside `lib/url-params.ts`. |
  | Create-feature use case soft-warn fires unexpectedly across all spec-mode flows. | The warn's wording calls out the case explicitly ("spec-mode feature created without applicationId — proceeding"). Unit test asserts that the warn fires only when both predicates hold. |
  | Wire format / URL params drift from the new enum values. | Enum string values are lowercase and match the existing UI strings (`"application" | "fast" | "spec"`) verbatim — zero migration of in-flight payloads required. Unit test asserts the enum's string values. |

  ---


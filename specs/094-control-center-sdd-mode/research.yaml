name: "control-center-sdd-mode"
summary: >
  Technical research for wiring an "Open in Control Center (SDD mode)" entry
  point from an Application onto the Control Center canvas. The major
  technical findings are: (1) the existing /create route is a Next.js
  parallel-slot drawer that already reads `repo`, `parent`, `prompt`, and
  `mode` from search params — extending it with an `applicationId` param is
  strictly additive and removes the need to invent a separate
  `?createFeatureForApp` intent on `/`; (2) `ApplicationNode` is defined
  but NOT currently rendered on the canvas (the `applicationMap` is
  intentionally ignored in `derive-graph.ts`), so this feature must
  re-enable application rendering on the canvas as a prerequisite for
  drawing the parent edge; (3) the domain changes required — promoting
  `BuildMode` to a TypeSpec enum and adding `applicationId?: UUID` +
  `buildMode: BuildMode` to `Feature` — fit the existing
  `tsp/common/enums/` and `tsp/domain/entities/feature.tsp` patterns
  exactly; (4) a single idempotent SQLite migration adds two nullable
  columns with a CASE-based backfill from the legacy `fast` boolean;
  (5) no new libraries are needed — every primitive (shadcn DropdownMenu,
  React Flow edges, tsyringe DI, umzug migrations, search-param drawer
  routing) already exists in the codebase.


content: |
  ## Summary

  The work follows the dependency direction of Clean Architecture. We
  start in the domain layer with the `BuildMode` TypeSpec enum and the
  `Feature` extension (`applicationId`, `buildMode`), land the single
  idempotent migration, then ripple outward through the persistence
  mapper / repository, the application layer's `CreateFeatureUseCase`,
  and finally the presentation layer.

  In presentation, we first introduce a small URL-constants module and
  extend the existing `/create` parallel-slot drawer route to parse
  `applicationId` and load the application server-side. Then we add the
  drawer's `initialApplicationId` prop and its disabled-control lock
  behavior. With the data flow proven, we re-enable
  `ApplicationNode` derivation in `derive-graph.ts` (a critical
  research finding — `applicationMap` is currently ignored on the
  canvas) and register the existing `ApplicationNode` component in
  the canvas's React Flow `nodeTypes` map.

  Only then do we wire the three converging entry points — the app
  page overflow menu, the app-node menu, and the context-aware FAB
  item — all of which `router.push` to the same canonical
  `/create?repo=...&mode=spec&applicationId=...` URL.

  Coverage tasks (i18n, Storybook variants, Playwright E2E) come at
  the end of feature work, followed by a strict validation gate that
  mirrors CI locally per `.claude/rules/cicd.md`.

  Every code task uses TDD: a failing test first, then the smallest
  change that makes it pass, then a refactor pass. Non-code tasks
  (i18n, Storybook stories, validation runs) have `tdd: null`
  because their correctness is asserted by tooling rather than unit
  tests.

  ---

  _Tasks complete — proceed to implementation_

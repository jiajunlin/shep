name: "control-center-sdd-mode"
number: 94
branch: "feat/094-control-center-sdd-mode"
oneLiner: "Let users open an existing application in the Control Center and continue work on it in SDD (spec-driven) mode."
userQuery: "User feedback:\nI've created application but I want to work on it in control center in SDD mode\n"
summary: "Today, an application created via the New Application flow lives on its own dedicated detail page (/application/[id]) and is shown as a card-style node on the Control Center canvas, but there is no path to \"open it in Control Center in SDD mode\" — i.e., scope a spec-driven feature run against that application's repository from the canvas. SDD mode (BuildMode 'spec') exists as a UI signal in the create drawer but is operationally identical to 'application' mode and is not surfaced as an action on application nodes or the application page. This feature wires the missing entry point: from an application (node menu or app top-bar) the user can launch the create drawer pre-scoped to that app's repository with mode 'spec' pre-selected, persists the resulting feature's link back to the application, and renders a parent edge from the new spec feature node to the application node on the Control Center canvas.\n"
phase: "Requirements"
sizeEstimate: "M"
relatedFeatures:
  - "016-control-center"
  - "021-control-center-create-feature-2"
  - "088-cli-application-management"
  - "090-application-sse-deltas"
technologies:
  - "TypeScript"
  - "React 19 + Next.js 16 (App Router)"
  - "@xyflow/react (React Flow v12)"
  - "tsyringe DI"
  - "TypeSpec (domain models)"
  - "Better-sqlite3 (persistence)"
  - "Server-Sent Events (SSE)"
  - "Tailwind CSS v4 + shadcn/ui"
relatedLinks:
  - title: "ControlCenterInner — canvas + drawer wiring"
    url: "src/presentation/web/components/features/control-center/control-center-inner.tsx"
  - title: "useFabActions — current FAB entry points (no app-scoped SDD)"
    url: "src/presentation/web/components/features/control-center/use-fab-actions.tsx"
  - title: "FeatureCreateDrawer — BuildMode = 'application' | 'fast' | 'spec'"
    url: "src/presentation/web/components/common/feature-create-drawer/feature-create-drawer.tsx"
  - title: "ApplicationPage — app detail page, no 'open in control center' action"
    url: "src/presentation/web/components/features/application-page/application-page.tsx"

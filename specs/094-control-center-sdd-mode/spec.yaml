openQuestions:
  - question: "Where should the entry points to launch SDD mode for an existing application live?"
    resolved: true
    options:
      - option: "Application node menu only"
        description: "Add the action only to the ApplicationNode overflow menu on the canvas. Lowest surface area, but invisible from the app detail page where users spend most of their time."
        selected: false
      - option: "Application page top-bar only"
        description: "Add the action only to the AppOverflowMenu / AppTopBar inside /application/[id]. Discoverable inside the app, but invisible from the Control Center canvas."
        selected: false
      - option: "Both surfaces"
        description: "Add the action to both the ApplicationNode menu on the canvas AND to the application page overflow menu / top-bar. Maximum discoverability; both are small UI plumbing changes."
        selected: true
    selectionRationale: "The user's request comes from inside the application page, but the feature name is 'control-center-sdd-mode' — it must be reachable from the canvas too. Both surfaces are cheap to wire (each is one menu item dispatching a custom event with the same payload) and align with how every existing 'create feature' flow already exposes multiple entry points (FAB + per-node menus).\n"
    answer: "Both surfaces"
  - question: "How should a spec-mode feature be linked back to its parent application in the domain model?"
    resolved: true
    options:
      - option: "Reuse featureIdForApplication(appId) as the feature id"
        description: "Treat the spec run as a continuation of the application's existing feature row. No schema change. Cannot represent multiple SDD features per application; conflates application workflow state with feature run state."
        selected: false
      - option: "New applicationId field on Feature"
        description: "Add an optional applicationId column to Feature in TypeSpec, persist it on creation, and have derive-graph render a feature→application edge when set. Explicit, queryable, supports many features per app, and matches how repositoryPath already links features to repos."
        selected: true
      - option: "String-prefix parentNodeId convention"
        description: "Encode the application id inside an existing parentNodeId-style string. Avoids a migration but requires runtime parsing everywhere and contradicts 'no magic values' and 'no string-prefix gymnastics' rules."
        selected: false
    selectionRationale: "Adding an applicationId field is the only option that (a) survives a schema audit, (b) supports multiple SDD features per application without overloading featureIdForApplication, (c) lets derive-graph render the parent edge from a typed field instead of parsing strings, and (d) matches the existing pattern where repositoryPath links a feature to its repo. The migration is small (one nullable column) and the TypeSpec extension is one optional property.\n"
    answer: "New applicationId field on Feature"
  - question: "How should BuildMode be persisted on a Feature so the run's intent survives refresh and is queryable in the domain?"
    resolved: true
    options:
      - option: "Keep as UI-only TypeScript union"
        description: "Leave BuildMode in the create drawer as a UI-only type, continue persisting only the boolean fast flag. Cheapest, but the canvas cannot tell a spec feature from an application-mode feature after refresh, and edge styling cannot reflect mode."
        selected: false
      - option: "Persist as TypeSpec enum on Feature"
        description: "Promote BuildMode to a TypeSpec enum (application | fast | spec), add a buildMode field to Feature, write a migration with a default that backfills legacy rows from the existing fast boolean. Enables mode-aware UI, queries, and validation downstream."
        selected: true
      - option: "Derive at read time from applicationId + fast"
        description: "Compute mode = applicationId ? 'spec' : (fast ? 'fast' : 'application'). No new column, but conflates 'has application parent' with 'spec mode' — a feature could legitimately be application-mode against an app's repo without being SDD."
        selected: false
    selectionRationale: "'No magic values' rule explicitly demands TypeSpec-defined enums for domain concepts like mode. Persisting buildMode is required for the canvas to render spec features distinctly after refresh, for the application page to know which child features are SDD runs, and for future use cases (reports, filters, analytics) to query by mode without inferring it. The migration is trivial — one nullable column with a backfill expression based on the existing fast flag.\n"
    answer: "Persist as TypeSpec enum on Feature"
  - question: "When the user triggers 'Open in Control Center (SDD mode)' from inside the application page, what should happen?"
    resolved: true
    options:
      - option: "Open the drawer in-place on the application page"
        description: "Mount the FeatureCreateDrawer inside /application/[id] and open it pre-scoped. Avoids a navigation, but duplicates drawer-host wiring and breaks the user's stated mental model of 'open in Control Center'."
        selected: false
      - option: "Navigate to / with a URL intent param"
        description: "Push to / with a query param like ?createFeatureForApp=<appId>&mode=spec. ControlCenterInner reads the intent on mount, opens the existing drawer with applicationId + initialMode='spec', and removes the param. Single drawer host, matches the user's stated intent ('in Control Center'), survives refresh of the destination URL."
        selected: true
      - option: "Navigate to / and rely on a transient client event"
        description: "Push to / and dispatch a window CustomEvent that ControlCenter listens for. Simpler than a URL param but loses the intent on refresh and is harder to deep-link or test."
        selected: false
    selectionRationale: "The user's wording — 'work on it in control center in SDD mode' — explicitly asks for the Control Center surface, so we must navigate there. URL intent params are already the project's standard for cross-page intent (existing /create route, FAB flows) and they survive refresh, are deep-linkable, are easy to assert in Playwright, and need only one drawer host. The transient event variant is strictly worse on every axis.\n"
    answer: "Navigate to / with a URL intent param"
  - question: "Should an SDD feature launched from an application also create a new git worktree, or run directly against the application's existing working directory?"
    resolved: true
    options:
      - option: "Create a new worktree"
        description: "Treat the spec feature like every other feature: provision a new branch + worktree under .worktrees/, run the agent there. Isolation is preserved and the application's working tree is never disturbed. Matches existing feature-run lifecycle with zero special cases."
        selected: true
      - option: "Run in the application's working directory"
        description: "Reuse the application's existing repo path as the feature's working directory. Saves a clone, but lets two agent runs (the application's resume workflow and the new spec feature) collide on the same files, branches, and dev server."
        selected: false
    selectionRationale: "Worktree-per-feature is the load-bearing isolation guarantee of the entire Shep platform. Sharing a working directory between an application and its child SDD feature would make concurrent runs unsafe, break the dev-server-per-app assumption, and contradict every other feature flow. The cost of provisioning a worktree is already paid by the existing infrastructure — there is no reason to special-case this entry point.\n"
    answer: "Create a new worktree"
  - question: "When the drawer opens scoped to an application, what should be pre-filled and what should remain editable?"
    resolved: true
    options:
      - option: "Pre-fill repo + lock mode, leave the rest blank"
        description: "Pre-fill repositoryPath from the application's repo and pin BuildMode to 'spec'. Leave one-liner / description blank for the user. Other repo / mode toggles remain visible but disabled with a tooltip explaining they are pinned by the application context."
        selected: true
      - option: "Pre-fill everything including a description template"
        description: "Pre-fill repo, mode, and a templated one-liner ('Continue work on <app name>'). Faster for a one-click launch, but the templated one-liner is almost always wrong and forces the user to delete it."
        selected: false
      - option: "Pre-fill nothing — pass appId as a hidden context only"
        description: "Drawer remains a blank form but knows the application context for persistence. Highest friction; defeats the purpose of having an app-scoped entry point."
        selected: false
    selectionRationale: "Pinning what is determined by the entry point (repo + mode) and leaving what is authored by the user (the one-liner / description) blank matches every existing pre-scoped flow in this codebase and respects user agency. Disabling the locked controls (rather than hiding them) keeps the drawer's spatial layout stable, so Storybook stories and visual regression tests stay simple. Templated one-liners have repeatedly been rejected in past UX iterations because they are noise the user must delete.\n"
    answer: "Pre-fill repo + lock mode, leave the rest blank"
  - question: "Are users allowed to launch multiple SDD features against the same application concurrently?"
    resolved: true
    options:
      - option: "Allow many concurrent SDD features per application"
        description: "No uniqueness constraint. Each launch creates a new Feature row with its own worktree. The canvas renders each spec feature as its own child node of the application. Matches how features-per-repo already works."
        selected: true
      - option: "Limit to one active SDD feature per application"
        description: "Block (or queue) a second launch while a prior SDD feature is still running. Simpler mental model but contradicts the per-feature-worktree isolation that already supports concurrency, and would require a new lock concept in the domain."
        selected: false
    selectionRationale: "The architecture already supports many concurrent feature runs against a single repo with no special locking — each run gets its own worktree and SSE channel. Adding an artificial uniqueness constraint here would invent a new domain restriction with no infrastructural justification, and would surprise users who already run parallel features elsewhere. The 'allow many' option is also strictly a superset, so the limit can be added later if real-world usage demands it.\n"
    answer: "Allow many concurrent SDD features per application"
  - question: "What should the FAB do when the canvas selection includes an application node?"
    resolved: true
    options:
      - option: "Add a context-aware 'New SDD feature for <app>' FAB action"
        description: "When exactly one application node is selected, the FAB exposes an extra item that opens the drawer pre-scoped to that app in spec mode. Other FAB actions remain unchanged."
        selected: true
      - option: "Replace 'New feature' with the app-scoped variant"
        description: "When an app is selected, swap the generic 'New feature' for 'New SDD feature for <app>'. Lower clutter, but loses the ability to start an unrelated feature from the FAB without first deselecting."
        selected: false
      - option: "Do nothing in the FAB — entry points only on the node + app page"
        description: "Skip FAB integration. The two existing entry points cover the user's stated path. Smallest blast radius."
        selected: false
    selectionRationale: "A context-aware extra item is the lowest-friction way to surface the action where the user is already pointing, without removing the unconditional 'New feature' escape hatch. Replacing actions based on selection is fragile UX (selection state can change between hover and click) and goes against the existing FAB patterns. Skipping the FAB entirely would be defensible but leaves a discoverability gap for keyboard / FAB-first users that costs essentially nothing to fill.\n"
    answer: "Add a context-aware 'New SDD feature for <app>' FAB action"
content: "## Problem Statement\n\nA user reports: \"I've created application but I want to work on it in\ncontrol center in SDD mode.\" Today there is no flow that satisfies this:\n\n1. **Applications and Control Center are visually unified but\n   operationally siloed.** An `Application` already renders as an\n   `ApplicationNode` on the Control Center canvas\n   (`src/presentation/web/components/common/application-node/application-node.tsx`)\n   and clicking the card navigates to `/application/[id]`. But no canvas\n   interaction lets the user say \"treat this app as the target of a new\n   spec-driven feature run.\"\n\n2. **SDD mode is a label without a launcher.** The create drawer\n   declares `BuildMode = 'application' | 'fast' | 'spec'`\n   (`feature-create-drawer.tsx:67`), and the ordering puts `spec` last.\n   Per the in-file comment (lines 62–63), `'spec'` currently sets\n   `fast=false` exactly like `'application'` — it is a UI signal only.\n   Even so, there is no entry point that opens the drawer with\n   `initialMode='spec'` and the application's `repositoryPath`\n   pre-selected.\n\n3. **The application page has no \"Open in Control Center\" hook.**\n   `ApplicationPage` (`application-page.tsx`) shows the chat + dev-server\n   split view; the AppOverflowMenu (`app-overflow-menu.tsx`) hosts copy-\n   prompt, delete, and session info, but no \"Continue in Control Center\"\n   or \"New spec-driven feature\" action.\n\n4. **The FAB never targets an existing application.** `useFabActions`\n   (`use-fab-actions.tsx`) offers New project, New feature (always opens\n   a blank `/create`), Add local repo, New application, Adopt branch,\n   GitHub import — none of them carry an `applicationId` or pre-select\n   `mode='spec'`.\n\nThe result: the user has an application but cannot do spec-driven work\non it from the Control Center.\n\n## Success Criteria\n\n- [ ] From the Control Center canvas, right-clicking (or opening the\n  overflow menu of) an `ApplicationNode` exposes a \"New SDD feature\"\n  action that opens the create drawer with the application's\n  `repositoryPath` pre-filled and `initialMode='spec'` pinned.\n- [ ] From `/application/[id]`, the app top-bar / overflow menu exposes\n  an \"Open in Control Center (SDD mode)\" action that navigates to `/`\n  with a URL intent param and immediately opens the create drawer\n  pre-scoped (repo pre-filled, mode locked to `'spec'`).\n- [ ] When exactly one application node is selected on the canvas, the\n  FAB shows an additional \"New SDD feature for &lt;app&gt;\" action with\n  the same behavior.\n- [ ] Submitting the drawer in this scoped mode persists a `Feature`\n  row whose new `applicationId` field equals the source application's\n  id and whose new `buildMode` field equals `'spec'`.\n- [ ] On the canvas, the new spec `FeatureNode` renders with a parent\n  edge to its `ApplicationNode`, derived from `Feature.applicationId`\n  in `derive-graph.ts` (no string-prefix parsing).\n- [ ] The spec feature runs in its own git worktree (no shared working\n  directory with the application's resume workflow).\n- [ ] After a hard refresh, the canvas, the application page, and any\n  feature detail view continue to identify the new feature as a\n  `'spec'` build mode tied to its application — i.e., state is loaded\n  from persistence, not derived from transient UI props.\n- [ ] Multiple SDD features can be launched concurrently against the\n  same application; each gets its own worktree and SSE stream and is\n  rendered as a sibling child of the application node.\n- [ ] All new and modified web components ship with colocated\n  `.stories.tsx` files (Default, Loading, Error, plus an \"app-scoped\"\n  variant for the create drawer).\n- [ ] `pnpm lint`, `pnpm typecheck`, `pnpm test:unit`, `pnpm test:int`,\n  `pnpm build`, and `pnpm tsp:compile` all pass; CI runs are green.\n- [ ] No regression in the existing FAB flows, application detail\n  page, or canvas drag/zoom/select behaviors.\n\n## Functional Requirements\n\n- **FR-1 — App node entry point.** `ApplicationNode` exposes a \"New\n  SDD feature\" action (overflow menu / context menu) that dispatches a\n  create-drawer intent carrying the application's id and\n  `initialMode='spec'`.\n- **FR-2 — App page entry point.** The application page top-bar /\n  overflow menu (`app-overflow-menu.tsx`, `app-top-bar.tsx`) exposes\n  an \"Open in Control Center (SDD mode)\" action that navigates to `/`\n  with a URL intent param (e.g.\n  `?createFeatureForApp=<appId>&mode=spec`).\n- **FR-3 — FAB context-awareness.** When exactly one\n  `ApplicationNode` is selected, `useFabActions` injects an extra\n  \"New SDD feature for &lt;app&gt;\" item whose handler is the same\n  intent as FR-1.\n- **FR-4 — Drawer accepts an application context.**\n  `FeatureCreateDrawer` accepts an `initialApplicationId` prop. When\n  set, the drawer pre-fills `repositoryPath` from that application,\n  pins `initialMode='spec'`, and disables the repo / mode controls\n  with a tooltip explaining they are bound by the application context.\n  All other fields (one-liner, description, advanced options) remain\n  editable and blank.\n- **FR-5 — Control Center reads the URL intent.**\n  `ControlCenterInner` / `useControlCenterState` reads\n  `createFeatureForApp` and `mode` from the URL, opens the drawer\n  with the corresponding props, and clears the params from the URL\n  after the drawer is mounted to keep the address bar clean.\n- **FR-6 — `Feature.applicationId` field.** Add an optional\n  `applicationId: string` to the `Feature` TypeSpec model, regenerate\n  `packages/core/src/domain/generated/output.ts`, write a migration\n  that adds a nullable `application_id` column to the `features`\n  table, and update relevant repository read/write paths.\n- **FR-7 — `Feature.buildMode` enum.** Promote `BuildMode` to a\n  TypeSpec enum (`application | fast | spec`), add a `buildMode`\n  field to `Feature`, write a migration that backfills the column\n  from the existing `fast` boolean (`fast=true → 'fast'`,\n  `fast=false → 'application'`), and switch the create-feature use\n  case to persist `buildMode` from the drawer's mode selection.\n- **FR-8 — Create-feature use case accepts the new inputs.** The\n  use case (`create-feature.use-case.ts` or its equivalent) accepts\n  optional `applicationId` and required `buildMode` inputs and\n  persists both. Validation: if `buildMode='spec'`, `applicationId`\n  SHOULD be present (warn but do not block, to preserve generic\n  \"spec mode without app\" use cases that already exist via FAB →\n  New feature → Spec).\n- **FR-9 — Canvas derives the parent edge.** `derive-graph.ts`\n  emits an edge from each spec `FeatureNode` to its\n  `ApplicationNode` when `Feature.applicationId` is set. The edge\n  uses the existing parent-style edge component (no new type unless\n  visual differentiation is needed).\n- **FR-10 — Worktree isolation.** The agent runner provisioned for\n  the new spec feature uses its own branch + worktree under\n  `.worktrees/`, never the application's working directory.\n- **FR-11 — Concurrent SDD features per application.** No new\n  uniqueness constraint is introduced. Multiple spec features can\n  coexist for the same `applicationId`; each renders as a separate\n  sibling node on the canvas.\n- **FR-12 — i18n.** All new user-visible strings are added to\n  `src/presentation/web/locales/*/web.json` for every locale the\n  project currently maintains.\n- **FR-13 — Storybook coverage.** Every new or modified web\n  component ships a colocated `.stories.tsx` covering at minimum\n  Default, Loading, Error, and (where applicable) an \"app-scoped\"\n  variant.\n\n## Non-Functional Requirements\n\n- **NFR-1 — Clean architecture.** Presentation never imports from\n  `infrastructure/`. All new behavior is plumbed through use cases\n  and ports per `.claude/rules/code-quality.md`.\n- **NFR-2 — TypeSpec-first.** Domain changes (`applicationId`,\n  `buildMode` enum) are authored in `tsp/` and codegen\n  (`pnpm tsp:compile`) is rerun before any consumer change. The\n  generated file is never hand-edited.\n- **NFR-3 — TDD.** Every new use-case behavior, drawer prop path,\n  and derive-graph edge is covered by a failing test first\n  (RED → GREEN → REFACTOR). Migration is covered by an idempotent\n  up-test that runs against a temporary sqlite db.\n- **NFR-4 — No magic values.** Modes are referenced by the\n  generated TypeSpec enum, not by string literals. URL intent param\n  keys live in a shared constants module.\n- **NFR-5 — Migration safety.** The migration is idempotent and\n  backfills sensibly so existing rows remain valid after deploy.\n  `Feature.applicationId` is nullable; `Feature.buildMode` is\n  backfilled from the legacy `fast` flag.\n- **NFR-6 — Performance.** Drawer open from intent to first paint\n  is &lt; 100ms on the dev machine baseline; canvas re-render after\n  edge derivation is bounded by the existing `useGraphState`\n  memoization (no new full-graph recomputes).\n- **NFR-7 — Accessibility.** All new menu items / FAB items are\n  keyboard-reachable, have visible focus states, and announce their\n  purpose to screen readers (proper `aria-label` and `role`).\n  Disabled drawer controls expose a tooltip describing why.\n- **NFR-8 — Observability.** Existing SSE deltas continue to\n  surface lifecycle changes for the new feature without a new\n  channel. Logging via `ILogger` (no `console.*`).\n- **NFR-9 — Backward compatibility.** Pre-existing features\n  (`applicationId === null`, `buildMode` backfilled from `fast`)\n  render and behave identically on the canvas and detail pages —\n  no regression on the existing 016 / 021 / 088 / 090 flows.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Where should the SDD entry points live? | Both surfaces (app node menu + app page top-bar) | Maximum discoverability; both are cheap and dispatch the same intent. |\n| 2 | How is a spec feature linked to its parent application? | New `applicationId` field on `Feature` | Explicit, queryable, supports many features per app, no string parsing. |\n| 3 | How is `BuildMode` persisted? | Promote to TypeSpec enum + new `buildMode` field on `Feature` | Required for refresh-stable, query-stable mode; satisfies the \"no magic values\" rule. |\n| 4 | What happens when triggered from the application page? | Navigate to `/` with a URL intent param | Matches user's stated mental model, deep-linkable, single drawer host, easy to test. |\n| 5 | Should an SDD feature reuse the app's working directory? | Create a new worktree | Worktree-per-feature isolation is the platform's load-bearing guarantee. |\n| 6 | What does the drawer pre-fill in app-scoped mode? | Pre-fill repo + lock mode; leave one-liner blank | Locks what's determined by entry point, leaves user-authored fields editable; matches every other pre-scoped flow. |\n| 7 | Allow multiple concurrent SDD features per app? | Yes — no new uniqueness constraint | Architecture already supports concurrent feature runs per repo; adding a lock invents a new restriction with no justification. |\n| 8 | What does the FAB do for a selected app? | Add a context-aware \"New SDD feature for &lt;app&gt;\" item | Lowest-friction, preserves the unconditional \"New feature\" escape hatch. |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `src/presentation/web/components/common/feature-create-drawer/feature-create-drawer.tsx` | High | Already supports `initialMode`. Needs to accept an `initialApplicationId` (or pre-selected app context) and keep `'spec'` mode pinned when launched from an app. |\n| `src/presentation/web/components/features/control-center/use-fab-actions.tsx` | Medium | Add a \"New SDD feature for &lt;app&gt;\" action when exactly one application node is selected. |\n| `src/presentation/web/components/common/application-node/application-node.tsx` | Medium | Add a node-level action (\"New SDD feature\") that dispatches the create-drawer event with `applicationId` + `initialMode='spec'`. |\n| `src/presentation/web/components/features/application-page/app-overflow-menu.tsx` and `app-top-bar.tsx` | Medium | Surface an \"Open in Control Center (SDD mode)\" entry that navigates back to `/` with the create drawer pre-scoped. |\n| `src/presentation/web/components/features/control-center/control-center-inner.tsx` and `use-control-center-state.ts` | Medium | Read URL intent params (`createFeatureForApp`, `mode`), open drawer with the matching props, and clear the params from the URL afterwards. |\n| `packages/core/src/application/use-cases/features/create-feature.use-case.ts` (or equivalent) | Medium | Accept and persist `applicationId` + `buildMode`. Add a soft-warn validation when `buildMode='spec'` without `applicationId`. |\n| `tsp/` (`Feature` model + new `BuildMode` enum) | Medium | Add `applicationId?: string` and `buildMode: BuildMode` to `Feature`; declare `BuildMode` as a TypeSpec enum. |\n| `packages/core/src/infrastructure/persistence/migrations/` | Medium | Add a migration that adds nullable `application_id` and `build_mode` columns to the `features` table, with a backfill expression based on the existing `fast` flag. |\n| `packages/core/src/infrastructure/persistence/repositories/feature.repository.ts` (or equivalent) | Medium | Read/write the new columns. |\n| `src/presentation/web/lib/derive-graph.ts` | Medium | Extend edge derivation to draw feature → application edges when `Feature.applicationId` is set. |\n| i18n catalogs under `src/presentation/web/locales/*/web.json` | Low | New labels for the SDD entry points. |\n| Storybook stories for every touched component | Low (mandatory) | Project rule: every component MUST have colocated `.stories.tsx`. |\n| URL intent constants module | Low | Centralize `createFeatureForApp` / `mode` param keys to avoid magic strings. |\n\n## Dependencies\n\n- Existing canvas + drawer infrastructure from\n  `016-control-center` and `021-control-center-create-feature-2`.\n- Application domain model and use cases under\n  `packages/core/src/application/use-cases/applications/`.\n- `featureIdForApplication` in `domain/shared/feature-id.ts` for\n  bridging app↔feature ids (read-only — not reused as the spec\n  feature id).\n- SSE stream defined in `app/api/agent-events/route.ts` and\n  `agent-events-sw.js` for live status updates of the new spec\n  feature.\n- The existing `BuildMode` UI type in the create drawer (will be\n  superseded by the new TypeSpec enum).\n- Migration runner under `packages/core/src/infrastructure/persistence/migrations/`.\n\n## Size Estimate\n\n**M** — Two small domain extensions (`Feature.applicationId`,\n`Feature.buildMode` enum) plus the corresponding migration drive\nthe cost; everything else is plumbing existing primitives:\n\n- Three entry-point UI changes (app node menu, app page overflow,\n  FAB context-aware item) — small.\n- Drawer accepts `initialApplicationId`, pins repo + mode — small;\n  `initialMode` already exists.\n- URL intent reader on the Control Center page — small.\n- TypeSpec `BuildMode` enum + `Feature` extension + codegen +\n  migration + repo read/write update — medium.\n- `derive-graph.ts` parent-edge derivation — small.\n- Mandatory Storybook stories + RED-first tests for every\n  new/modified component, plus migration test — medium.\n\nNo new agent infrastructure, no new SSE channel, no new external\nservice. Days, not weeks.\n\n---\n\n_Generated by feature agent — proceed with planning_\n"

content: "## Problem Statement\n\nUse commands-com gateway and build external control over shep.\n\n## Success Criteria\n\n**Phase 1 — core scaffolding (done):**\n- [x] TypeSpec domain models for messaging (commands, config, notifications, platform)\n- [x] Messaging service skeleton with tunnel adapter, chat relay, command executor, notification emitter\n- [x] Content sanitizer for safe message handling\n- [x] CLI commands for messaging configuration\n- [x] DI container registration for messaging service (lazy factory)\n- [x] Integration with _serve command for daemon lifecycle\n- [x] Unit tests for all messaging components (initial 39 tests passing)\n\n**Phase 2 — pairing use cases + web UI (done):**\n- [x] BeginMessagingPairing / ConfirmMessagingPairing / DisconnectMessaging use cases\n- [x] Web settings section with pairing modal (code + chatId confirm flow)\n- [x] CLI wizard refactored to share the same pairing use cases (presentation-agnostic)\n- [x] E2E Playwright test for the web pairing flow\n- [x] Storybook stories + unit test for the messaging settings component\n\n**Phase 3 — real gateway integration (in progress):**\n\nGateway protocol research showed the existing MessagingTunnelAdapter was built against a\nhypothetical protocol. The real Commands.com Gateway uses `tunnel.request` / `tunnel.response`\nframes, requires bearer-token auth on the WebSocket upgrade, and routes public webhooks via\nintegration routes that must be registered through `POST /gateway/v1/integrations/routes`.\nTelegram replies are outbound HTTPS calls to `api.telegram.org`, NOT tunnel frames.\n\n- [x] TypeSpec: extend MessagingConfig with deviceId, gatewayClientId, per-platform routeId/routeToken/publicUrl\n- [x] IGatewayClient port interface (oauth token + create integration route)\n- [x] HttpGatewayClient adapter implementation against gateway OpenAPI spec\n- [x] Unit tests for HttpGatewayClient using fetch mocks (7 tests)\n- [x] BeginMessagingPairingUseCase extended to fetch OAuth token + create route + return publicUrl\n- [x] Updated use case tests cover the new gateway client integration (9 tests)\n- [x] Web pairing dialog shows publicUrl with copy button and setup instructions\n- [x] CLI pairing wizard displays publicUrl and sample Telegram setWebhook curl\n- [x] DI container wires HttpGatewayClient\n- [x] Rewrite MessagingTunnelAdapter to speak real tunnel protocol (tunnel.activate / tunnel.request / tunnel.response)\n- [x] Switch from global WebSocket to the `ws` npm library so bearer headers can be set on upgrade\n- [x] Fetch OAuth access token at DI resolution and pass into MessagingService (no more empty authToken)\n- [x] IMessageSender output port decouples chat-relay + notification-emitter from the tunnel\n- [x] TelegramMessageSender implements IMessageSender via the Telegram Bot API\n- [x] HttpTelegramClient adapter (sendMessage) with unit tests\n- [x] telegram-webhook.parser extracts chat_id + text from Telegram Update payloads (+ pair command parser)\n- [x] MessagingService decodes tunnel.request frames as Telegram updates and dispatches slash commands via MessagingCommandExecutor\n- [x] Auto-confirm pairing: `/pair <code>` inbound messages call ConfirmMessagingPairingUseCase\n- [x] docs/development/messaging-local-setup.md — full cloudflared/ngrok walkthrough\n**Phase 4 — parity polish (done):**\n- [x] Per-platform botToken field on MessagingPlatformConfig (TypeSpec)\n- [x] Web settings: bot token input appears for paired platforms with password masking\n- [x] CLI wizard: prompts for bot token after confirming pairing\n- [x] DI: bot token precedence is settings.db > SHEP_TELEGRAM_BOT_TOKEN env var\n- [x] WhatsApp webhook parser (Business Cloud API shape) with unit tests\n- [x] MessagingService dispatches Telegram OR WhatsApp inbound webhooks based on route → platform resolution\n- [x] Interactive /chat <featureId> relay: subscribes to the IInteractiveSessionService stream and forwards agent deltas to the chat\n- [x] /end command tears down the subscription via unsubscribe handle owned by MessagingChatRelay\n- [x] Free-form messages during an active relay are forwarded via IInteractiveSessionService.sendUserMessage\n- [x] MessagingCommandType enum extended with list/chat/end/help\n\n**Remaining (out of scope for 082):**\n- [ ] WhatsApp Business Cloud API outbound client (sendMessage) — requires a verified Meta dev app and is substantially more involved than Telegram\n- [ ] Integration test using a real local gateway process in CI (spin up the Go binary in a GitHub Actions runner)\n\n## Affected Areas\n\n| Area           | Impact | Reasoning                                        |\n| -------------- | ------ | ------------------------------------------------ |\n| Domain models  | High   | New TypeSpec models for messaging concepts        |\n| Infrastructure | High   | New messaging service and sub-components          |\n| CLI            | Medium | New settings commands for messaging configuration |\n| DI container   | Low    | Registration of messaging service                 |\n\n## Dependencies\n\n- commands-com/gateway for WebSocket tunnel connectivity\n\n## Size Estimate\n\n**M** - Medium complexity feature\n\n---\n\n_Generated by feature agent — proceed with research_\n"

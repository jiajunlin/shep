oneLiner: "When a feature is in implementation phase, expose Tech Decisions and Product tabs in the feature drawer so users can review the locked-in technical and product choices while the agent is running."
userQuery: "When feature is in implemention phase we should have tabs that visualize the product/tech specs\n"
summary: "Make the Tech Decisions and Product tabs visible for the entire implementation lifecycle (running, action-required, error) — not only on action-required — so users can browse the chosen tech stack and resolved product questions while the agent is implementing. Action bars on those tabs remain gated to the action-required state so the tabs are read-only by default and only invite approval/reject when the agent has paused for review.\n"

# Markdown content (the actual spec)
content: |
  ## Problem Statement

  Prototype and spike work currently has nowhere to live. Putting throwaway
  experiments on the main branch pollutes history; creating a full
  spec-driven feature for every spike is overkill; and ad-hoc local
  directories outside the shep-managed `wt/` tree don't share git objects
  with the rest of the worktrees and aren't visible to the editor/agent
  tooling that already targets `$SHEP_HOME/repos/<hash>/wt/`.

  We need a single, persistent playground worktree alongside the other
  shep-managed worktrees that can be reused for any quick experiment.

  ## Success Criteria

  - [ ] Worktree exists at `$SHEP_HOME/repos/fbfd7efb528913ed/wt/feat-playground-prototypes`
  - [ ] Branch `feat/playground-prototypes` is tracked against `origin/main`
  - [ ] `pnpm install` has run successfully in the worktree
  - [ ] Spec scaffold exists at `specs/085-playground-prototypes/`
  - [ ] `feature.yaml` records the actual branch name (not the templated default)
  - [ ] Worktree appears in `git worktree list` from the main `cli` checkout

  ## Affected Areas

  | Area              | Impact | Reasoning                                          |
  | ----------------- | ------ | -------------------------------------------------- |
  | Git worktrees     | Add    | New long-lived worktree registered with `.git`    |
  | Spec directory    | Add    | New `specs/085-playground-prototypes/` scaffold   |
  | `$SHEP_HOME/repos`| Add    | New `wt/feat-playground-prototypes/` directory    |

  ## Dependencies

  None.

  ## Size Estimate

  **XS** - Setup-only feature: a single worktree, dependency install, and
  spec scaffold. No production code changes.


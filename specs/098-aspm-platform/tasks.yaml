# Task Breakdown (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "aspm-platform"
summary: >
  62 tasks across 10 phases. Phase 1 establishes the TypeSpec foundation and DI
  scaffolding. Phases 2-9 deliver the eight ASPM epics from research (asset+ownership,
  findings ingestion, SBOM+exploit intel, risk scoring, SLA+campaigns+exceptions,
  executive dashboards + work-item routing, AI-change review queue, compliance).
  Phase 10 finishes CLI surface, e2e coverage, and documentation. Every code task
  has explicit RED/GREEN/REFACTOR cycles; every web component task ships with
  colocated Storybook stories; every entity task ships with an idempotent migration
  and a round-trip integration test.


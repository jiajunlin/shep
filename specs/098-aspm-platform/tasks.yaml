# Markdown content
content: |
  ## Status

  - **Phase:** Implementation
  - **Updated:** 2026-05-19

  ## Summary

  62 ordered tasks across 10 phases.

  **Phase 1 — Foundation & TypeSpec scaffolding** (tasks 1-5) authors every ASPM
  enum, value object, and entity in TypeSpec; extends `Application` with four
  optional ASPM fields; codegens `output.ts`; adds the domain error classes; and
  scaffolds the `register-aspm.ts` DI module wired into the existing
  `container.ts`. No persisted state yet — phase 1 is types and DI plumbing only,
  so every subsequent phase compiles immediately.

  **Phase 2 — Asset & ownership model** (tasks 6-11) ships the ALTER migration
  for `applications`, the `Owner`/`Team`/`BusinessUnit`/`Service`/`ApiAsset`/
  `CloudEnvironment` migrations + repos, the pure-domain ownership resolver, the
  `IOwnershipYamlReader` port + YAML adapter, and the ownership use cases.

  **Phase 3 — SecurityFinding entity + SARIF ingestion** (tasks 12-19) creates
  the `security_findings` table with its composite indexes, the SARIF v2.1.0
  ingestion adapter (ajv-validated + hand-rolled walker), the pure-domain
  `Redactor` and dedup-key, the transactional `ingest-findings` use case, the
  `list-findings`/`get-finding` use cases, and the findings table + filter bar +
  severity badge components with full Storybook coverage.

  **Phase 4 — SBOM + exploit intel** (tasks 20-23) ships the `ISbomPort` +
  CycloneDX 1.5 adapter, the `ingest-sbom` use case, the `IExploitIntelPort`
  with KEV + EPSS local-cached feed loaders, and wires KEV/EPSS enrichment into
  the ingestion pipeline.

  **Phase 5 — Risk scoring & prioritization** (tasks 24-30) creates the
  append-only `risk_scores` table with the `currentRiskScoreId` pointer on the
  finding, implements the pure-domain `computeRiskScore` with documented
  weights, asserts determinism via a golden-file fixture, ships the
  compute/recompute/rank use cases, and builds the finding detail panel +
  risk-score breakdown components with Storybook coverage.

  **Phase 6 — SLA + campaigns + exceptions** (tasks 31-39) creates
  `SecurityPolicy` (with a seeded default), the `ISlaClockPort`, the pure-domain
  SLA state computation, the `RiskException` migration + repo + audit log, the
  read-time `effective-finding-state` function, the exception use cases, the
  `RemediationCampaign` migration + repo, the campaign use cases (including
  read-time progress), and the SLA badge + campaign board components.

  **Phase 7 — Executive dashboards + developer routing** (tasks 40-48) ships
  `get-posture-summary` / `get-risk-trend` / `get-application-posture`, the SSE
  posture stream endpoint, the `/aspm` dashboard with posture cards + trend
  chart, the `/aspm/findings` + `/aspm/findings/[id]` pages, the
  `convert-finding-to-work-item` (+ bulk) use cases, the Application detail
  view's ASPM section, the React Flow asset-risk graph at `/aspm/inventory`,
  and the owner map.

  **Phase 8 — AI-change review queue** (tasks 49-51) ships the
  `AiChangeRiskSignal` migration + repo, the record/graduate/dismiss/list use
  cases (callable by Shep's existing agent infra via `IAgentExecutorProvider`),
  and the `/aspm/ai-review` page + queue component.

  **Phase 9 — Compliance surface** (tasks 52-54) ships the `ComplianceControl`
  migration with seeded OWASP ASVS + CWE Top 25 rows, wires SARIF taxa
  references into the ingestion pipeline, and ships `get-compliance-coverage` +
  the `/aspm/compliance` view.

  **Phase 10 — CLI, e2e, docs** (tasks 55-62) wires the full `shep aspm`
  Commander subcommand tree, the Playwright e2e covering the dashboard happy
  path, the architecture docs, the npm dependency additions, the full
  `pnpm validate` + test + e2e run, the Storybook build, and the accessibility
  audit.

  ## Total Estimate

  ~138h (~3.5 dev-weeks at 40h/week). XL feature, matching the spec sizing.
  Each phase is independently shippable behind the same `/aspm` route, so
  intermediate PRs land in user-visible increments.

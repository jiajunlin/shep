name: "aspm-platform"
number: 98
branch: "feat/098-aspm-platform"
oneLiner: "Add an Application Security Posture Management (ASPM) module to Shep that unifies application risk across code, cloud, APIs, dependencies, secrets, and AI-generated changes with ownership, prioritization, and remediation workflows."
summary: "Introduce ASPM as a first-class capability inside Shep. The MVP adds a new domain area covering security assets (applications/services/repositories/APIs/cloud environments), unified findings, an exposure/criticality-aware risk score, owner mapping, remediation campaigns, executive dashboards, developer task routing, and basic AI-generated code risk signals — wired through Shep's TypeSpec-first / Clean Architecture stack and exposed via the Next.js web UI and CLI.\n\nPhase 11 replaces the upload-driven ingestion UX with native, in-product scanning: Shep itself builds a multi-language SBOM from the working tree, queries OSV.dev for SCA findings, runs a from-scratch regex/entropy secret scanner, derives ownership from `git`, and dispatches SAST / container / IaC judgment to Shep's existing LangGraph agents — so 'Ingest data' becomes 'Scan / Rescan' and the user never has to install a third-party scanner CLI or upload a file to populate posture. Upload remains as an additive escape hatch for CI pipelines.\n"
phase: "Requirements"
sizeEstimate: "XL"
relatedFeatures: []
technologies:
  - "TypeSpec (tsp/) — domain model authoring; generates packages/core/src/domain/generated/output.ts"
  - "TypeScript (strict) across packages/core and src/presentation"
  - "Clean Architecture (domain / application / infrastructure / presentation)"
  - "tsyringe — dependency injection via @injectable / @inject string tokens"
  - "better-sqlite3 — embedded persistence with numbered migrations under packages/core/src/infrastructure/persistence/sqlite/migrations/"
  - "Next.js (App Router) — src/presentation/web with server + client components"
  - "React + Tailwind + shadcn/ui — web UI primitives"
  - "Storybook — mandatory colocated .stories.tsx for every web component"
  - "Commander — CLI under src/presentation/cli/commands"
  - "Vitest — unit + integration tests under tests/"
  - "Playwright — e2e tests"
  - "OWASP / CWE / CVE / EPSS / KEV / SARIF / CycloneDX / SPDX — industry vocabularies the risk + ingestion model must align with"
  - "Server-Sent Events (SSE) — Shep's existing pattern for live posture/finding updates"
  - "React Flow (@xyflow/react) — already in tree; candidate for an asset-risk relationship graph view"

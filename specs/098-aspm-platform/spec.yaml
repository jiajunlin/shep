openQuestions:
  - question: "Should the ASPM asset model extend the existing Application entity or introduce a separate SecurityAsset entity?"
    resolved: true
    options:
      - option: "Extend Application via TSP"
        description: "Add optional ASPM-relevant fields (criticality, businessUnit, exposure, dataClassification) to the existing Application entity in tsp/. ASPM uses Application as the canonical asset anchor. Pros: zero duplication, deep linking with existing inventory/feature/cycle work, simpler ownership story. Cons: Application gains responsibilities it didn't have before; non-application assets (e.g. standalone APIs, cloud envs) need adjacent entities."
        selected: true
      - option: "Introduce SecurityAsset as a new entity"
        description: "Create a polymorphic SecurityAsset entity with a typed reference to Application | Repository | Service | ApiAsset | CloudEnvironment. Pros: clean separation of security concerns; flexible for non-application assets. Cons: duplicated ownership/exposure metadata; double lookups for every finding; harder to keep in sync with Application changes."
        selected: false
      - option: "Hybrid: extend Application + adjacent asset entities"
        description: "Keep Application as the primary asset anchor (extended via TSP) and add narrow adjacent entities (Service, ApiAsset, CloudEnvironment) for assets that don't fit. Pros: avoids polymorphism while still covering non-application assets. Cons: requires careful boundary rules so the same physical asset isn't represented twice."
        selected: false
    selectionRationale: "Shep's Application entity is already the operational anchor for repo + agent + deployment + features + cycles. ASPM-extending Application keeps risk on the same object engineers and AppSec already work with, makes ownership and feature/cycle linkage free, and matches the codebase's TypeSpec-first conventions. Non-application assets (Service/ApiAsset/CloudEnvironment) still exist as adjacent entities for completeness, but the primary anchor stays Application."
    answer: "Extend Application via TSP"
  - question: "What risk-scoring approach should the MVP use?"
    resolved: true
    options:
      - option: "Transparent composite (CVSS + EPSS + KEV + exposure + criticality)"
        description: "Deterministic pure-domain function combining: CVSS base severity, EPSS exploitability percentile, KEV membership boost, asset exposure (internet/internal/airgapped), asset criticality, data classification, reachability hint. Every score has a breakdown the UI can show. Pros: explainable, auditable, easy to test, aligned with industry signals. Cons: requires KEV/EPSS feed adapters from day one to be meaningful (stub-friendly though)."
        selected: true
      - option: "Proprietary opaque score"
        description: "A Shep-specific scoring function with tuned weights, presented as a single 0-100 number. Pros: differentiated. Cons: not explainable to AppSec/auditors, hard to defend in postmortems, harder to test."
        selected: false
      - option: "Pass-through scanner severity"
        description: "Just normalize whatever severity a scanner reports (Critical/High/Medium/Low/Info). Pros: trivial to build. Cons: not actually prioritization — defeats the entire point of ASPM."
        selected: false
    selectionRationale: "Transparent composite is the only option that delivers on ASPM's core promise (prioritize what matters) while remaining defensible. The breakdown is shown in the UI and stored on RiskScore so audits and postmortems can reconstruct the decision. KEV/EPSS adapters can ship as stubs initially — the scoring use case is testable against fixtures regardless."
    answer: "Transparent composite (CVSS + EPSS + KEV + exposure + criticality)"
  - question: "Which finding ingestion formats should the MVP support?"
    resolved: true
    options:
      - option: "SARIF + CycloneDX SBOM"
        description: "Two ingestion ports/adapters: IFindingIngestPort (SARIF v2.1.0) covers SAST/IaC/secret/container findings from most modern scanners; ISbomPort (CycloneDX 1.5+) covers dependency inventories with embedded vulnerabilities. Pros: covers ~80% of real-world ingestion in two formats; both are OASIS/OWASP standards. Cons: SPDX, vendor-native APIs, runtime telemetry deferred."
        selected: true
      - option: "SARIF only"
        description: "Single SARIF ingestion port. Pros: simplest scope. Cons: misses SBOM/dependency context that is critical for prioritization with EPSS/KEV (the very signals the scoring model wants)."
        selected: false
      - option: "SARIF + CycloneDX + SPDX + vendor-native (Snyk/Dependabot/GHAS)"
        description: "Broad coverage day one. Pros: maximum scanner support. Cons: XL scope; vendor-native means provider lock-in inside infrastructure and many adapter stubs that won't ship in MVP."
        selected: false
    selectionRationale: "SARIF + CycloneDX hit the sweet spot: two open standards covering code/IaC/secret findings AND dependency context (the dependency context is what makes EPSS/KEV scoring useful). Vendor-native adapters are deferred to follow-up epics; the IFindingIngestPort and ISbomPort interfaces are designed so they can be added without rewriting the use cases."
    answer: "SARIF + CycloneDX SBOM"
  - question: "How should ownership of assets/findings be determined in the MVP?"
    resolved: true
    options:
      - option: "Declared via .shep/ownership.yaml + UI override"
        description: "Each repo can ship a checked-in .shep/ownership.yaml mapping paths/services to Owner/Team/BusinessUnit. UI can override per asset. Pros: source-of-truth lives with the code; works for monorepos; engineer-friendly; auditable in git. Cons: requires teams to write the file (one-time cost)."
        selected: true
      - option: "Inferred from git history (CODEOWNERS / blame)"
        description: "Parse CODEOWNERS or top committers per path. Pros: zero config. Cons: noisy; doesn't capture team/BU; breaks when authors leave; CODEOWNERS isn't universal."
        selected: false
      - option: "UI-assigned only"
        description: "All ownership is set in the Shep UI. Pros: simple. Cons: drifts from code reality; not auditable; doesn't scale to large repos."
        selected: false
    selectionRationale: "Declared YAML with UI override gives the best of both worlds: source-of-truth in code (engineering culture) with the ability to refine in the UI when reality changes. CODEOWNERS support can be layered in later as a fallback ingester behind the same Owner repository — the use case doesn't care where the data came from."
    answer: "Declared via .shep/ownership.yaml + UI override"
  - question: "Should SLA windows be measured in calendar days or business days?"
    resolved: true
    options:
      - option: "Calendar days (configurable per severity)"
        description: "SLA per severity (e.g. Critical=7d, High=30d, Medium=90d, Low=180d) measured in calendar days from finding discovery. Pros: simple, deterministic, matches CISA BOD 22-01 style requirements. Cons: doesn't account for weekends/holidays."
        selected: true
      - option: "Business days with holiday calendar"
        description: "SLA in business days with a configurable holiday calendar per workspace. Pros: more realistic for engineering teams. Cons: significantly more state (holiday calendars), harder to test, less aligned with regulatory frameworks."
        selected: false
      - option: "Configurable per-policy unit"
        description: "Each SecurityPolicy declares its own unit (calendar/business). Pros: flexible. Cons: confusing in mixed environments; harder to roll up posture."
        selected: false
    selectionRationale: "Calendar days match CISA/regulatory norms, simplify the ISlaClockPort, make all SLA assertions deterministic and testable, and avoid building a holiday-calendar subsystem in MVP. Business-day mode can be added as a follow-up policy without breaking the existing model."
    answer: "Calendar days (configurable per severity)"
  - question: "Should AI-generated code risk signals be a separate review queue or merged into the unified findings stream?"
    resolved: true
    options:
      - option: "Separate AiChangeRiskSignal entity + dedicated review queue"
        description: "Distinct entity tracking AI-generated change risk (suspicious dependency add, secret introduced, large unreviewed diff, license violation, prompt-injection-shaped patterns) with its own queue at /aspm/ai-review. Can graduate to a SecurityFinding when confirmed. Pros: differentiating; reviewers can triage AI changes as a workflow without diluting the main findings backlog; aligns with Shep being AI-native. Cons: small extra entity + UI surface."
        selected: true
      - option: "Just emit normal SecurityFindings with source=ai"
        description: "Tag findings with origin=ai-change-review. Pros: one stream to triage. Cons: AI-change risk often isn't yet a confirmed vulnerability — forcing it through Finding lifecycle muddies severity stats and SLA math."
        selected: false
      - option: "Defer to a later epic"
        description: "Ship ASPM without AI-change risk; add later. Pros: smaller MVP. Cons: misses the only ASPM differentiator unique to Shep — being AI-native."
        selected: false
    selectionRationale: "AI-change risk is Shep's unique angle on ASPM and must ship in MVP. Modeling it as a distinct entity (with a clear graduation path to SecurityFinding) keeps the Findings backlog and SLA stats clean while giving reviewers a purpose-built queue. The two entities can share owner/asset/risk-score plumbing."
    answer: "Separate AiChangeRiskSignal entity + dedicated review queue"
  - question: "Should the MVP normalize severity to a canonical scale or preserve scanner-native values?"
    resolved: true
    options:
      - option: "Canonical 5-level (Critical / High / Medium / Low / Info) + preserved raw"
        description: "Store the scanner's raw severity AND a normalized canonical level on every finding. UI/filters/SLAs operate on the canonical level. Pros: cross-scanner comparability, deterministic SLA math, auditable trail back to scanner intent. Cons: requires mapping rules per scanner."
        selected: true
      - option: "Scanner-native only"
        description: "Keep whatever the scanner produced. Pros: zero mapping work. Cons: 'High' from Snyk ≠ 'High' from Semgrep ≠ 'High' from Trivy — makes posture aggregation impossible."
        selected: false
      - option: "CVSS-only"
        description: "Force every finding through a CVSS-derived score. Pros: industry standard. Cons: many SAST/secret findings have no CVSS; mapping is lossy and forced."
        selected: false
    selectionRationale: "A canonical level is non-negotiable for unified posture (the whole point of ASPM). Preserving the raw scanner value alongside keeps the audit trail and lets the UI show 'Semgrep called this MEDIUM' for context. The canonical scale aligns with CVSS v3.1 severity bands (Critical 9.0-10, High 7.0-8.9, Medium 4.0-6.9, Low 0.1-3.9, Info)."
    answer: "Canonical 5-level (Critical / High / Medium / Low / Info) + preserved raw"
  - question: "What workflow should risk exceptions (false-positives, accepted-risk, won't-fix) follow?"
    resolved: true
    options:
      - option: "Self-declared with expiry + audit trail"
        description: "Any owner can declare an exception (reason, expires_at, justification), tracked in RiskException with a full audit log. Excluded findings drop out of posture rollups until expiry. Pros: unblocks engineers; auditable; matches reality of small teams; pairs with a 'review expired exceptions' campaign type. Cons: no human-in-the-loop approval gate."
        selected: true
      - option: "Approval chain (security manager must sign off)"
        description: "Exception requires sign-off by a designated approver. Pros: governance. Cons: requires a roles/permissions subsystem that doesn't exist in Shep yet; bottleneck."
        selected: false
      - option: "No exceptions in MVP"
        description: "Findings can only be Open / In Progress / Resolved / Closed. Pros: simplest model. Cons: every team needs false-positive and won't-fix; without it the backlog drowns engineering."
        selected: false
    selectionRationale: "Self-declared exceptions with expiry + audit trail unblock engineers without introducing a permissions subsystem Shep doesn't yet have. Auditability is preserved via the immutable audit log; expiry forces re-review (the 'review expired exceptions' campaign type is one of the staged epics). Approval gates can be added later behind the same RiskException entity."
    answer: "Self-declared with expiry + audit trail"
  - question: "Should remediation campaigns be per-application or cross-application themes?"
    resolved: true
    options:
      - option: "Both — campaigns scope to a query (cross-cutting) and can be filtered to one application"
        description: "Campaign carries a target query (severity≥High AND finding.type=secret) plus optional application filter. Same primitive serves 'fix all critical log4j across the fleet' and 'fix all findings on payments-service'. Pros: one entity, two workflows; aligns with how AppSec actually runs sprints. Cons: query model needs careful design."
        selected: true
      - option: "Per-application only"
        description: "Each campaign targets exactly one application. Pros: simplest. Cons: misses the cross-cutting 'fix all log4j' workflow that is the bread-and-butter of ASPM."
        selected: false
      - option: "Cross-application themes only"
        description: "Campaigns are global by query. Per-application views are filters. Pros: powerful. Cons: less intuitive for engineers who think per-service."
        selected: false
    selectionRationale: "A query-shaped campaign covers both use cases with one entity. Engineers see 'campaigns affecting payments-service' as a filter; AppSec sees 'fix all KEV-listed across the fleet' as a query. The query primitive reuses the same filter shape the Findings list already needs — no duplicate work."
    answer: "Both — campaigns scope to a query (cross-cutting) and can be filtered to one application"
  - question: "Which compliance framework(s) should MVP cover?"
    resolved: true
    options:
      - option: "OWASP ASVS + CWE Top 25 mapping"
        description: "Findings map to OWASP ASVS controls and CWE categories. ComplianceControl entity stores the framework + control identifier. Pros: open standards, no licensing issues, directly applicable to AppSec audiences, foundation for adding regulated frameworks later. Cons: doesn't satisfy SOC2/PCI/HIPAA audit needs out of the box."
        selected: true
      - option: "SOC 2 + PCI DSS + OWASP ASVS"
        description: "Ship with mappings to SOC 2 CC controls, PCI DSS 4.0 requirements, and OWASP ASVS. Pros: covers most enterprise audit needs. Cons: SOC2/PCI mapping is opinionated and quickly stale; risk of misleading auditors; significant content authoring."
        selected: false
      - option: "No compliance framework in MVP"
        description: "Ship findings + risk only; framework mapping later. Pros: tightest MVP. Cons: misses a major ASPM use case; harder to retrofit if compliance is added later."
        selected: false
    selectionRationale: "OWASP ASVS + CWE Top 25 is the open-standards foundation every other framework can be mapped against later. It's also the framework most aligned with code-level findings (which is what scanners produce). Regulated frameworks (SOC2/PCI/HIPAA) can be added as ComplianceControl rows in follow-up epics without changing the data model."
    answer: "OWASP ASVS + CWE Top 25 mapping"
  - question: "Should ASPM findings auto-create developer tasks (Shep work items) or route via a separate notification?"
    resolved: true
    options:
      - option: "Use case to convert finding(s) to Shep work-item(s) on demand"
        description: "Provide a use case (e.g. assign-finding-to-work-item) that creates or links a Shep WorkItem to one or more findings. Engineers see security work in the same backlog as features. Pros: reuses existing WorkItem entity, deep integration with cycles/sprints, one place to triage. Cons: needs WorkItem ↔ Finding linkage in TSP."
        selected: true
      - option: "Auto-create a work item for every High/Critical finding"
        description: "Trigger work-item creation on ingestion. Pros: zero clicks. Cons: floods backlogs on first ingestion; can't catch deduplication first; engineers lose triage control."
        selected: false
      - option: "Findings stay separate; engineers see them in /aspm only"
        description: "Findings don't connect to work items. Pros: simplest. Cons: defeats developer task routing — the security backlog becomes a parallel system engineers ignore."
        selected: false
    selectionRationale: "On-demand conversion via a use case is the right granularity: AppSec/owners triage in /aspm, then explicitly route the ones that matter into the engineering backlog. Auto-creation can be layered on later as a policy-driven action. The Finding ↔ WorkItem link is a single optional reference in TSP."
    answer: "Use case to convert finding(s) to Shep work-item(s) on demand"
  - question: "Should the MVP include a graph-based asset/risk relationship view (React Flow)?"
    resolved: true
    options:
      - option: "Tabular MVP, defer graph view to follow-up"
        description: "Ship Findings table, Posture cards, Campaign board, Owner map (table), Risk trend chart. No React Flow graph in MVP. Pros: tighter scope; tables are how engineers actually triage; faster to ship and test. Cons: less visually distinctive."
        selected: true
      - option: "Ship a React Flow asset-risk graph in MVP"
        description: "Asset nodes with finding-density edges, owner overlays. Pros: differentiating; nice demo. Cons: React Flow ASPM graphs are notoriously hard to make useful at scale; risks delaying the MVP."
        selected: false
      - option: "Skip graph entirely, ever"
        description: "Permanently tabular. Pros: focus. Cons: closes the door on a powerful visualization later."
        selected: false
    selectionRationale: "Tables, posture cards, and the campaign board are what actual ASPM users live in day-to-day. A graph view is high-effort-low-utility for MVP and can be added later as a presentation-only enhancement (the use case layer already returns the right data shape). Keeping it out of MVP also avoids React Flow performance work."
    answer: "Tabular MVP, defer graph view to follow-up"
  - question: "Should the MVP scope findings/posture by business unit / multi-workspace, or stay single-scope?"
    resolved: true
    options:
      - option: "Single workspace; BusinessUnit is a field, not a scope"
        description: "All findings live in one workspace. BusinessUnit is a string tag on Application for grouping in dashboards. Pros: matches Shep's current single-workspace model; no auth/scoping subsystem needed; faster MVP. Cons: enterprises with strict BU isolation need follow-up work."
        selected: true
      - option: "BusinessUnit as a hard scope (per-BU views/permissions)"
        description: "Each BU sees only its own findings. Pros: enterprise-ready. Cons: requires a permissions/scoping subsystem Shep doesn't have; major scope creep."
        selected: false
      - option: "Multi-workspace (per-tenant DBs)"
        description: "Hard tenant isolation. Pros: cleanest. Cons: Shep is single-tenant by design today; this would be a separate architectural feature."
        selected: false
    selectionRationale: "Shep is single-tenant today. Treating BusinessUnit as a grouping field (not a scope) lets posture dashboards roll up by BU without building a permissions subsystem. Hard scoping can be added later once Shep has a workspace/permissions model — the data shape (BU on Application) doesn't change."
    answer: "Single workspace; BusinessUnit is a field, not a scope"
content: "## Problem Statement\n\nShep today is an AI-native SDLC platform built around the Application entity\n(`tsp/domain/entities/application.tsp`) — a workspace with a repository, an\nagent session, deployment status, and feature/cycle/task tracking. There is\n**no security posture model**: no findings, no owners, no risk scoring, no\nremediation campaigns, no compliance/governance surface, and no signal about\nAI-generated changes that introduce risk.\n\nEngineering, AppSec, and security leadership have to leave Shep to answer\n\"which application risks matter most, who owns them, and what should be fixed\nfirst?\" — exactly the question this feature is meant to answer in-product.\nShep is also uniquely positioned to surface a class of risk that classical\nASPM tools miss: risk introduced by AI-generated changes (suspicious deps,\nsecret leakage, large unreviewed diffs, license drift, prompt-injection\nshapes).\n\nThe ASPM module must plug into Shep's existing Application/Repository\ninventory and Clean Architecture stack without bypassing the TypeSpec-first,\nuse-case-only, agent-agnostic conventions enforced by `CLAUDE.md` and\n`.claude/rules/*`.\n\n## Success Criteria\n\n- [ ] A user can navigate to `/aspm` in the web UI and see a posture summary\n  (total findings by canonical severity, top 5 at-risk applications, KEV-listed\n  finding count, SLA-breach count, AI-change review queue depth, trend over 30 days).\n- [ ] Ingesting a SARIF v2.1.0 file via `shep aspm ingest --sarif <file> --application <slug>`\n  creates SecurityFinding records linked to the Application, with raw and\n  canonical severity stored, no duplicates on re-ingestion of the same scanner run.\n- [ ] Ingesting a CycloneDX 1.5 SBOM creates dependency findings keyed by\n  CVE identifier with KEV/EPSS enrichment when the adapters return data\n  (stub-friendly: missing data degrades gracefully to CVSS-only scoring).\n- [ ] Every finding has a deterministic RiskScore (0-100) with a breakdown\n  showing the contributions of CVSS, EPSS, KEV, exposure, criticality, and\n  data classification. Re-computing the same input produces the same score.\n- [ ] Findings inherit ownership from `.shep/ownership.yaml` declared in the\n  Application's repository; UI overrides persist to the Owner repository and\n  survive re-ingestion.\n- [ ] A remediation campaign can be created with a query (severity, finding\n  type, KEV flag, application, owner) and the campaign view lists all matching\n  findings with live progress (% closed, SLA-at-risk count, blocked count).\n- [ ] Each finding has an SLA window derived from its canonical severity and\n  the active SecurityPolicy; SLA state (Healthy / At-Risk / Breached) is\n  computed deterministically from `now` and `discoveredAt`.\n- [ ] A user can declare a RiskException on a finding with a reason and an\n  expiry date; expired exceptions automatically re-include the finding in\n  posture rollups and surface in a \"review expired exceptions\" campaign.\n- [ ] An AiChangeRiskSignal is created for every AI-driven change Shep\n  produces that matches an MVP rule (secret in diff, new high-risk dep, large\n  unreviewed diff, license violation). The `/aspm/ai-review` queue lists open\n  signals with the originating agent session and a one-click graduate-to-Finding action.\n- [ ] A finding can be converted to a Shep WorkItem in a single use-case call;\n  the WorkItem references back to the finding and the link is visible in both\n  the WorkItem view and the Finding detail.\n- [ ] All ASPM use cases are covered by RED-first unit tests; risk scoring is\n  covered by a fixture-driven golden-file test asserting deterministic output.\n- [ ] All ASPM SQLite repositories have round-trip integration tests under\n  `tests/integration/infrastructure/persistence/sqlite/`.\n- [ ] At least one Playwright e2e covers: open /aspm dashboard → drill into\n  findings list → open a finding → declare an exception → see posture update.\n- [ ] Every new web component under `components/features/aspm/` has a\n  colocated `*.stories.tsx` with Default, Loading, and Error states (commits\n  without stories will be rejected per project rules).\n- [ ] `pnpm validate` (lint + format + typecheck + tsp compile) is green;\n  `pnpm test:unit && pnpm test:int` is green; new ASPM e2e suite is green.\n- [ ] Domain types are TypeSpec-authored — no hand-edited\n  `domain/generated/output.ts`; running `pnpm tsp:compile` is idempotent.\n- [ ] No application or presentation file imports from `infrastructure/`;\n  all infra access goes through ports injected by tsyringe string tokens.\n\n## Functional Requirements\n\n### Asset & Ownership Model\n\n- **FR-1**: Extend the existing `Application` TypeSpec entity with optional\n  ASPM-relevant fields: `criticality` (enum: Tier1/Tier2/Tier3), `exposure`\n  (enum: Internet/Internal/Airgapped/Unknown), `dataClassification` (enum:\n  Public/Internal/Confidential/Restricted), `businessUnit` (string).\n- **FR-2**: Introduce adjacent asset entities for completeness: `Service`,\n  `ApiAsset`, `CloudEnvironment` — each linked to an `Application`.\n- **FR-3**: Introduce `Owner`, `Team`, `BusinessUnit` entities. An `Owner` is\n  a person or team identifier; `Team` groups owners; `BusinessUnit` groups\n  teams. Findings always resolve to an `Owner` (with team/BU rollup).\n- **FR-4**: Resolve ownership in priority order: (1) UI-declared override on\n  the Application/Service/ApiAsset, (2) `.shep/ownership.yaml` declared in\n  the Application's repository, (3) fallback to the Application's listed\n  owner. Resolution is deterministic and pure.\n- **FR-5**: Provide use cases `assign-owner`, `import-ownership-yaml`,\n  `resolve-ownership-for-finding`, `list-owners`.\n\n### Findings Ingestion\n\n- **FR-6**: Define `IFindingIngestPort` (SARIF v2.1.0 parser) and `ISbomPort`\n  (CycloneDX 1.5+ parser) in `application/ports/output/services/`.\n- **FR-7**: Concrete SARIF and CycloneDX adapters live in `infrastructure/services/`\n  and are wired via `register-aspm.ts`. Both adapters tolerate missing optional\n  fields and never throw on unknown extensions.\n- **FR-8**: Use case `ingest-findings` accepts (Application reference, source\n  type, raw document) and creates `SecurityFinding` records. Deduplication\n  key = (applicationId, findingDomain, ruleId, location.path, location.line,\n  cveId). Re-ingestion of the same scanner run is a no-op on the dedup key.\n- **FR-9**: `SecurityFinding` carries: id, applicationId, optional\n  serviceId/apiAssetId, findingDomain (enum: Code/Dependency/Secret/Container/\n  Cloud/Api/Identity/Runtime/Compliance/Ai), ruleId, title, description,\n  locationPath, locationLine, scannerRaw (jsonb), rawSeverity, canonicalSeverity,\n  cveId?, cweId?, owaspAsvsControlId?, ownerId, state (Open/Triaged/InProgress/\n  Resolved/Closed/Exception), discoveredAt, lastSeenAt, firstFixedAt?.\n- **FR-10**: `SecurityFinding` is a `SoftDeletableEntity`. Resolutions never\n  hard-delete; closure with reason is preserved for audit.\n\n### Risk Scoring & Prioritization\n\n- **FR-11**: Introduce `RiskScore` value object with fields:\n  `total` (0-100), `cvssContribution`, `epssContribution`, `kevContribution`,\n  `exposureContribution`, `criticalityContribution`, `dataClassificationContribution`,\n  `computedAt`, `inputsHash`. Stored alongside the finding for audit.\n- **FR-12**: Pure-domain function `computeRiskScore(inputs)` is deterministic:\n  same inputs ⇒ same score; documented weights in code with a fixture-driven\n  golden test.\n- **FR-13**: `IExploitIntelPort` exposes `getEpssPercentile(cveId)` and\n  `isKev(cveId)`. The MVP adapter loads KEV from the public CISA JSON feed and\n  EPSS from the FIRST CSV; both cache results locally and gracefully return\n  `null`/`false` when the network is unavailable.\n- **FR-14**: Use case `rank-findings` accepts a filter (severity range, owner,\n  application, KEV flag, finding domain, state) and returns findings sorted\n  by `RiskScore.total` desc with pagination.\n- **FR-15**: Use case `compute-risk-score-for-finding` re-computes the score\n  on demand and updates the stored breakdown.\n\n### Remediation Campaigns\n\n- **FR-16**: `RemediationCampaign` entity carries: id, name, description,\n  targetQuery (serialized filter — severity, findingDomain, application,\n  owner, kev, ruleId), status (Draft/Active/Paused/Completed/Cancelled),\n  ownerId, dueDate, createdAt, closedAt?, audit log.\n- **FR-17**: Use cases: `create-campaign`, `update-campaign`, `close-campaign`,\n  `list-campaigns`, `get-campaign-progress` (returns total/closed/at-risk/\n  blocked counts derived from the query at read time).\n- **FR-18**: A finding can belong to multiple campaigns (via the query — no\n  explicit join). Campaign progress is computed at read time.\n\n### SLA Tracking\n\n- **FR-19**: `SecurityPolicy` entity carries SLA windows in calendar days per\n  canonical severity (default: Critical=7, High=30, Medium=90, Low=180).\n  One active policy per workspace in MVP.\n- **FR-20**: `ISlaClockPort` exposes `now(): Date` (testable). SLA state is\n  a pure function of (discoveredAt, severity, policy, now): `Healthy` when\n  elapsed < 50% of window; `AtRisk` when 50–100%; `Breached` when ≥100%.\n- **FR-21**: Findings with active exceptions are excluded from SLA breach\n  counts until the exception expires.\n\n### Risk Exceptions\n\n- **FR-22**: `RiskException` entity: id, findingId, reason (enum:\n  FalsePositive/AcceptedRisk/CompensatingControl/NotApplicable/Other),\n  justification (text), declaredBy, declaredAt, expiresAt, status\n  (Active/Expired/Revoked). Audit log of all state changes.\n- **FR-23**: Use cases: `declare-exception`, `revoke-exception`,\n  `list-expiring-exceptions`. Expired exceptions automatically transition\n  the finding's effective state back to its prior state on next read.\n\n### Executive Dashboard & Reporting\n\n- **FR-24**: Use case `get-posture-summary` returns: total open findings by\n  canonical severity, top-N at-risk applications, KEV-listed open count,\n  SLA-breach count, exception count, AI-change queue depth, last-ingested-at.\n- **FR-25**: Use case `get-risk-trend` returns time-bucketed posture metrics\n  (default daily buckets, 30-day window) derived from finding state changes.\n- **FR-26**: Use case `get-application-posture` returns per-Application\n  posture: open findings by severity, top 10 by risk score, owner, last\n  scan, trend sparkline data.\n\n### Developer Task Routing\n\n- **FR-27**: Optional `workItemId` linkage on `SecurityFinding`. Use case\n  `convert-finding-to-work-item` creates a new Shep WorkItem with title,\n  description, ownerId, and a back-reference to the finding.\n- **FR-28**: Use case `bulk-convert-findings` accepts a query (same shape\n  as campaign target) and creates one WorkItem per finding, idempotent on\n  the existing linkage.\n\n### AI Change Risk Review\n\n- **FR-29**: `AiChangeRiskSignal` entity: id, applicationId, agentSessionId,\n  signalType (enum: SecretInDiff/HighRiskDependencyAdded/LargeUnreviewedDiff/\n  LicenseViolation/PromptInjectionShape/Other), severity (canonical),\n  summary, evidence (jsonb — diff snippets, dep name, license id, etc.),\n  state (Open/Acknowledged/GraduatedToFinding/Dismissed/Resolved),\n  discoveredAt, resolvedAt?.\n- **FR-30**: Use case `record-ai-change-risk-signal` is callable by Shep\n  agent infrastructure (post-change hooks); it must not depend on a specific\n  AI provider.\n- **FR-31**: Use case `graduate-ai-signal-to-finding` converts a signal into\n  a `SecurityFinding` preserving evidence and creating the linkage; the\n  signal transitions to `GraduatedToFinding`.\n- **FR-32**: Use case `dismiss-ai-signal` marks a signal as a false positive\n  with a justification audit entry.\n\n### Compliance Surface\n\n- **FR-33**: `ComplianceControl` entity: id, frameworkId (enum: OwaspAsvs/\n  CweTop25), controlId (string), title, description.\n- **FR-34**: Findings can map to zero-or-more `ComplianceControl` entries.\n  Ingestion adapters populate these when scanner output includes the\n  mapping (SARIF supports CWE and ASVS taxa references).\n- **FR-35**: Use case `get-compliance-coverage` returns per-framework\n  coverage: controls covered, controls with open findings, controls without\n  any finding evidence.\n\n### CLI Surface\n\n- **FR-36**: New Commander subcommands routed through use cases:\n  `shep aspm ingest --sarif <file> --application <slug>`,\n  `shep aspm ingest --sbom <file> --application <slug>`,\n  `shep aspm findings list [--app] [--severity] [--owner] [--kev] [--state]`,\n  `shep aspm campaigns list|create|close`,\n  `shep aspm posture [--app <slug>]`,\n  `shep aspm exceptions list-expiring`,\n  `shep aspm ai-review list|dismiss|graduate`.\n\n### Web Surface\n\n- **FR-37**: New routes under `src/presentation/web/app/aspm/`:\n  `/aspm` (dashboard), `/aspm/findings`, `/aspm/findings/[id]`,\n  `/aspm/campaigns`, `/aspm/campaigns/[id]`, `/aspm/inventory`,\n  `/aspm/owners`, `/aspm/compliance`, `/aspm/ai-review`.\n- **FR-38**: Augment existing Application surface with an \"ASPM\" tab/section\n  showing risk score, top findings, owners, exception count.\n- **FR-39**: SSE route under `app/api/aspm/posture/stream` pushes posture\n  deltas on finding state changes (reuses existing SSE pattern).\n- **FR-40**: Every new web component has a colocated `*.stories.tsx` with\n  Default, Loading, and Error states plus relevant variants.\n\n### Persistence & DI\n\n- **FR-41**: Each new entity has a numbered, idempotent SQLite migration\n  under `packages/core/src/infrastructure/persistence/sqlite/migrations/`.\n- **FR-42**: Each new entity has an `I<Entity>Repository` port and a SQLite\n  implementation with a mapper, registered via `register-aspm.ts`.\n- **FR-43**: `register-aspm.ts` is added to `infrastructure/di/container.ts`\n  bootstrap; ordering preserved so migrations run before resolution.\n\n### Phase 11 — Native Scanning (replaces upload-driven ingest UX)\n\nGoal: every empty state and ingest button in the ASPM UI becomes a **Scan / Rescan** action that Shep itself runs against the application's repository. No third-party scanner CLI install required. Upload remains as an additive escape hatch only.\n\n- **FR-44 (Scan domain model)**: Introduce a `ScanRun` entity (id, applicationId, triggeredBy [user|schedule|event], status [pending|running|succeeded|failed|partial], startedAt, finishedAt, stages: ScanStage[]) and a `ScanStage` value type (name, status, durationMs, findingsCount, errorMessage?). Persist via `IScanRunRepository`.\n- **FR-45 (Scanner profile per app)**: Introduce `ScannerProfile` on Application (which scan stages are enabled, path includes/excludes, max-bytes-per-file). Default profile enables all stages.\n- **FR-46 (In-house SBOM builder)**: Pure-domain `SbomBuilder` walks the working tree and parses package manifests for at minimum: npm/yarn/pnpm (`package.json` + lockfile), Python (`requirements*.txt`, `pyproject.toml`, `Pipfile.lock`, `poetry.lock`), Go (`go.mod`/`go.sum`), Rust (`Cargo.toml`/`Cargo.lock`), Java (`pom.xml`, `build.gradle`), Ruby (`Gemfile.lock`), PHP (`composer.lock`), .NET (`packages.config`, `*.csproj`). Container manifests: `Dockerfile` FROM lines + base-image tags, `docker-compose*.yaml` services. IaC manifests: Terraform `*.tf` providers/modules, Kubernetes YAML images, GitHub Actions workflow `uses:` lines. Emits a single normalized `SoftwareBillOfMaterials` aggregate keyed by purl-like identifier — same shape the existing `IngestSbomUseCase` already consumes via `ISbomPort`.\n- **FR-47 (OSV.dev SCA lookup)**: New `IOsvVulnerabilityPort` queries https://osv.dev/v1/querybatch with the BOM and returns advisories. Adapter is stateless, no auth, no rate-limit credentials required, with offline cache for deterministic re-scans. Output funnels through the existing `IngestSbomUseCase` so SBOM-driven findings, dedup, and risk scoring all reuse phase 4 wiring.\n- **FR-48 (In-house secret scanner)**: Pure-domain `SecretScanner` runs regex + Shannon-entropy detection over the working tree (text files under the configured max-bytes). Bundled rule pack covers at minimum: AWS keys (AKIA/ASIA), GitHub PATs (ghp_/gho_/ghs_/ghu_), generic 40+ char high-entropy strings labeled API_KEY/SECRET/TOKEN, RSA/EC/OpenSSH private-key headers, Google OAuth tokens (ya29.), Slack tokens (xox[abp]-), Stripe live keys (sk_live_), JWT-shaped strings with non-test issuers. Emits SARIF v2.1.0 documents and reuses the existing `IngestFindingsUseCase`.\n- **FR-49 (Git-derived ownership)**: New `IGitOwnershipPort` runs `git log` / `git blame` / `git check-ignore` against the working tree to derive per-file ownership. Output augments `.shep/ownership.yaml` (the YAML still wins when both have a match — explicit beats implicit). No remote fetches; resolves only local refs.\n- **FR-50 (Agent-driven SAST)**: A new `SastAnalysisAgent` (LangGraph node, registered via `IAgentExecutorProvider` per the agent-resolution rule) receives source files in chunks bounded by token budget and returns SecurityFinding[] with cwe/owasp taxa. The CLI/web layers MUST NOT hardcode an agent type; the analyzer asks the provider for an executor exactly like every other agent in the system.\n- **FR-51 (Agent-driven container hardening)**: `ContainerHardeningAgent` reviews each Dockerfile + adjacent compose/k8s manifest and emits findings for: running as root, missing HEALTHCHECK, latest-tag base, unpinned digests, exposed sensitive ports, missing USER directive, COPY of `.git`/`.env`.\n- **FR-52 (Agent-driven IaC misconfiguration)**: `IacSecurityAgent` reviews Terraform / Kubernetes / CloudFormation / GHA workflow files and emits findings for: public S3-like buckets, open security groups, missing encryption-at-rest, hard-coded credentials in env, K8s pods running privileged, GitHub workflow `pull_request_target` + checkout-PR-head pattern.\n- **FR-53 (Local-branch scope)**: Every scanner reads ONLY the current working tree (the locally checked-out branch); no `git fetch`, no remote refs, no historical-commit walking beyond what ownership requires. Re-scanning after a `git switch` produces results for the new branch.\n- **FR-54 (Scan orchestration use case)**: New `ScanApplicationUseCase` runs the enabled stages concurrently (bounded by a configurable parallelism cap), streams per-stage progress, and pipes each stage's output into the matching ingestion use case (`IngestSbomUseCase` for SBOM/SCA, `IngestFindingsUseCase` for SAST/secrets/container/IaC). Idempotent — re-running on an unchanged tree yields the same dedup keys and zero new findings (existing FR-8 / NFR-10).\n- **FR-55 (Rescan use case)**: New `RescanApplicationUseCase` is a thin wrapper that records `triggeredBy='user'` (or `'event'` / `'schedule'`) and calls `ScanApplicationUseCase`. UI surfaces it as the primary action on populated views.\n- **FR-56 (Live scan progress SSE)**: New SSE endpoint `/api/aspm/scan/stream?scanRunId=<id>` emits `scan-stage` events (stage name, status transition, findingsCount delta) and a terminal `scan-completed` event. Same pattern as `/api/aspm/posture/stream`.\n- **FR-57 (Scanner status panel)**: New Settings → ASPM scanner profile view lets the user enable/disable each stage, set path excludes, and see when each stage last ran per application. No third-party tool install/version check is required (everything is in-house or agent-driven).\n- **FR-58 (CLI surface)**: New commands: `shep aspm scan --app <slug> [--stages sbom,sca,secrets,sast,container,iac] [--quiet] [--json]` and `shep aspm rescan --app <slug>`. The existing `shep aspm ingest` is kept as-is (FR-32, ADDITIVE) for CI/automation pipelines that still want to push pre-generated SARIF/CycloneDX.\n- **FR-59 (Nightly auto-rescan)**: A daemon-side scheduler queries every Application's `lastScannedAt` and triggers `RescanApplicationUseCase` once per 24h (configurable cron in settings). Honors the per-application enabled flag; skips applications with `aspm.autoRescan === false`.\n- **FR-60 (UX migration)**: Every previous 'Ingest data' button across `posture-cards`, `findings-table`, `aspm-application-section`, and the ASPM sub-nav becomes a 'Scan' / 'Rescan' primary action wired to the new use case. The existing `AspmIngestDialog` is retained but demoted to a secondary 'Upload existing report' option inside the new Scan dialog (so CI-produced SARIF still has a UI affordance).\n\n## Non-Functional Requirements\n\n- **NFR-1 (Architecture)**: Strict Clean Architecture compliance —\n  application and presentation layers never import from `infrastructure/`.\n  All ASPM dependencies are accessed via tsyringe-injected ports identified\n  by string tokens (`'IFindingRepository'`, `'IExploitIntelPort'`, etc.).\n  Architecture rule enforced by code review and (where possible) linter.\n- **NFR-2 (TypeSpec-first)**: All ASPM domain types are authored in `tsp/`.\n  The generated `packages/core/src/domain/generated/output.ts` is never\n  hand-edited. `pnpm tsp:compile` is idempotent.\n- **NFR-3 (TDD)**: Every use case has at least one failing test written\n  before implementation. Risk-score computation has a golden-file test\n  asserting determinism across multiple fixture inputs.\n- **NFR-4 (Agent-agnostic)**: No ASPM module imports a provider SDK\n  (Anthropic, OpenAI, etc.) outside of `infrastructure/`. Any LLM-assisted\n  feature routes through `IAgentExecutorProvider`.\n- **NFR-5 (Storybook)**: Every web component under\n  `components/features/aspm/` has a colocated `*.stories.tsx` with Default,\n  Loading, and Error states. CI rejects PRs missing stories.\n- **NFR-6 (Performance — Ingestion)**: A 10,000-finding SARIF file ingests\n  in under 30 seconds on a developer laptop; ingestion runs in a transaction\n  and rolls back on failure.\n- **NFR-7 (Performance — Dashboards)**: `/aspm` dashboard initial paint\n  completes in under 1 second with up to 50,000 findings in the database.\n  Achieved via indexed columns (applicationId, canonicalSeverity, state,\n  discoveredAt, ownerId, cveId) and aggregate caching where needed.\n- **NFR-8 (Performance — Findings table)**: Paginated findings list (25 per\n  page, sorted by risk score desc) returns in under 300 ms on a 50k-finding\n  dataset.\n- **NFR-9 (Determinism)**: Risk scoring, SLA state, and ownership resolution\n  are pure functions. No `Date.now()`, no random, no environment access in\n  the domain layer. Time is supplied via `ISlaClockPort`.\n- **NFR-10 (Determinism — Ingestion)**: Re-ingesting an identical scanner\n  document is a no-op (zero new rows). The dedup key is stable across runs.\n- **NFR-11 (Cross-platform paths)**: All location paths are normalized to\n  POSIX-style separators before persisting (per existing repository\n  convention; ensures Windows/Linux/macOS portability).\n- **NFR-12 (Soft-delete + audit)**: Findings, campaigns, exceptions, and\n  owners all extend `SoftDeletableEntity`. State changes append to an\n  immutable audit log; nothing is destructively lost.\n- **NFR-13 (Security — Data handling)**: Scanner-supplied raw documents may\n  contain secrets (e.g., a SAST finding that includes a key snippet). MVP\n  must redact obvious secret patterns (high-entropy strings, AWS/GCP key\n  shapes, common API token prefixes) in `description` and `scannerRaw`\n  before persisting. Full raw is hashed and stored as a reference only.\n- **NFR-14 (Security — Adapter robustness)**: SARIF/CycloneDX parsers must\n  not crash on malformed input, must enforce a max-size guard (default\n  100 MB), and must reject documents that exceed it with a clean error.\n- **NFR-15 (Observability)**: Every ingestion run emits a structured audit\n  record (source, file hash, counts: new/updated/duplicate, duration).\n  Surfaced in the dashboard's \"last ingested\" tile and via\n  `shep aspm ingest --json` output.\n- **NFR-16 (Accessibility)**: All new web components meet WCAG 2.1 AA:\n  keyboard navigation, focus order, colour-contrast ratios, screen-reader\n  labels on icon-only buttons (severity badges, KEV flag).\n- **NFR-17 (Storybook coverage)**: Findings table, finding detail panel,\n  campaign board, posture cards, owner map, AI-review queue each have\n  Storybook stories that include realistic mock data covering at least\n  Critical / High / Medium / Low + KEV + exception + AI-graduated cases.\n- **NFR-18 (Migration safety)**: All ASPM migrations use idempotent\n  DDL patterns from `LESSONS.md` (CREATE TABLE IF NOT EXISTS, safe\n  defaults on ALTER, no destructive ops). Re-running the migration runner\n  is a no-op.\n- **NFR-19 (File length)**: No new file exceeds ~300 lines (per\n  `.claude/rules/code-quality.md`). Use cases stay single-purpose; large\n  domain logic decomposes into named helpers.\n- **NFR-20 (Test coverage gate)**: Unit-test coverage for the new\n  `application/use-cases/aspm/` directory must meet or exceed the\n  repository's current average for `application/use-cases/`.\n- **NFR-21 (No third-party scanner binaries)**: Phase 11 ships **zero** required\n  third-party scanner CLIs (no Trivy/Semgrep/Grype/Syft/Gitleaks installs). All\n  deterministic scanning logic (SBOM building, secret detection, ownership\n  resolution, OSV.dev queries) is in-house under `domain/aspm/` and\n  `infrastructure/services/aspm/`. Judgment-heavy scanning (SAST / container /\n  IaC) is delegated to Shep's existing agent stack via `IAgentExecutorProvider`\n  per the agent-resolution rule — never a hardcoded provider.\n- **NFR-22 (Scan latency budget)**: For a 100 KLOC TypeScript repository on a\n  developer laptop (8 cores), a full scan (all stages enabled) MUST complete\n  in under 90s wall-clock. SBOM + SCA + secrets stages alone MUST complete in\n  under 30s. Agent-driven stages MAY take longer (LLM round-trip dominates)\n  and report progress incrementally via SSE so the UI never appears frozen.\n- **NFR-23 (Local-only network contract)**: The only outbound network call any\n  scanner stage may make is HTTPS to `api.osv.dev` for SCA queries. Every other\n  stage MUST be hermetic — no telemetry, no fetched rule packs, no remote git\n  operations, no container-registry pulls. The OSV.dev call MUST degrade\n  gracefully to a cache-only mode when offline.\n- **NFR-24 (Re-scan determinism)**: Two consecutive scans of the same working\n  tree (no edits between them) MUST produce identical SecurityFinding dedup\n  keys, identical SBOM component identifiers, and identical secret-scanner\n  fingerprints. Agent-driven stages MAY produce slight wording variation in\n  description fields but MUST converge on the same canonical (ruleId,\n  locationPath, locationLine) tuple, enforced by the existing `findingDedupKey`.\n- **NFR-25 (Agent-stage offline degradation)**: When the configured agent\n  provider returns an authentication / quota / network error, the SAST /\n  container / IaC stages MUST report `status='failed'` on the relevant\n  `ScanStage` and the overall `ScanRun.status='partial'` — never block the\n  deterministic stages from completing.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Asset model: extend Application vs. new SecurityAsset? | Extend Application via TSP | Application is already the operational anchor; extending it keeps risk on the same object engineers and AppSec already work with and avoids duplicate ownership/exposure plumbing. |\n| 2 | Risk-scoring approach? | Transparent composite (CVSS + EPSS + KEV + exposure + criticality) | Explainable, auditable, testable, and the only option that delivers ASPM's core promise of prioritizing what matters. |\n| 3 | Ingestion formats for MVP? | SARIF + CycloneDX SBOM | Two open standards cover ~80% of real-world findings + the dependency context that makes EPSS/KEV scoring meaningful. |\n| 4 | Ownership source? | Declared via `.shep/ownership.yaml` + UI override | Source-of-truth in code with the ability to refine in the UI; matches engineering culture and survives author churn. |\n| 5 | SLA unit? | Calendar days (configurable per severity) | Matches CISA/regulatory norms, deterministic, avoids building a holiday-calendar subsystem. |\n| 6 | AI-change risk — separate or merged? | Separate `AiChangeRiskSignal` + dedicated review queue | Shep's differentiating angle; keeps Finding stats clean; clear graduation path to a confirmed Finding. |\n| 7 | Severity normalization? | Canonical 5-level + preserved raw | Cross-scanner comparability with full audit trail back to scanner intent. |\n| 8 | Risk exceptions workflow? | Self-declared with expiry + audit trail | Unblocks engineers without a permissions subsystem; expiry forces re-review. |\n| 9 | Campaign granularity? | Both — query-shaped campaigns filterable per application | One entity covers per-service sprints and fleet-wide themes. |\n| 10 | Compliance framework(s) for MVP? | OWASP ASVS + CWE Top 25 mapping | Open standards, directly applicable to AppSec audiences, foundation for regulated frameworks later. |\n| 11 | Findings → developer tasks? | On-demand `convert-finding-to-work-item` use case | Reuses Shep's existing WorkItem entity; engineers triage in `/aspm`, route the ones that matter into the backlog. |\n| 12 | Graph view in MVP? | Tabular MVP; defer React Flow graph view | Tables are where ASPM users actually work; graph view is high-effort-low-utility for MVP. |\n| 13 | Scoping by BusinessUnit? | Single workspace; BusinessUnit as field, not scope | Matches Shep's current single-tenant model; no permissions subsystem needed; data shape doesn't change when scoping is added later. |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `tsp/domain/entities/` | High | New entities: `SecurityFinding`, `RiskScore`, `Owner`/`Team`/`BusinessUnit`, `Service`, `ApiAsset`, `CloudEnvironment`, `RemediationCampaign`, `SecurityPolicy`, `ComplianceControl`, `RiskException`, `AiChangeRiskSignal`. Plus enums for severity, finding domain (code/dependency/secret/container/cloud/api/identity/runtime/compliance/ai), exposure, exploitability tier, SLA state. Existing `Application` entity extended with `criticality`, `exposure`, `dataClassification`, `businessUnit`. |\n| `tsp/domain/value-objects/` | Medium | Value objects for `Severity`, `RiskScoreBreakdown`, `SLAWindow`, `CVEReference`, `OwnershipPath`. |\n| `packages/core/src/domain/` | High | Factories, errors (`FindingNotFound`, `CampaignClosed`, `OwnerOrphanedFinding`, `ExceptionExpired`, `AiSignalAlreadyGraduated`), risk-scoring domain logic (pure, deterministic; no infra deps), SLA computation, ownership resolution. |\n| `packages/core/src/application/use-cases/aspm/` | High | New area covering ingestion (`ingest-findings`), CRUD on findings/campaigns/owners/exceptions, prioritization (`rank-findings`, `compute-risk-score-for-finding`), campaign lifecycle, SLA tracking, exception workflow, executive aggregations (`get-posture-summary`, `get-risk-trend`, `get-application-posture`, `get-compliance-coverage`), developer task routing (`convert-finding-to-work-item`, `bulk-convert-findings`), and AI-change review queue (`record-ai-change-risk-signal`, `graduate-ai-signal-to-finding`, `dismiss-ai-signal`). |\n| `packages/core/src/application/ports/output/repositories/` | High | New repository interfaces per entity (`IFindingRepository`, `IRemediationCampaignRepository`, `IOwnerRepository`, `ITeamRepository`, `IBusinessUnitRepository`, `IServiceRepository`, `IApiAssetRepository`, `ICloudEnvironmentRepository`, `IRiskScoreRepository`, `IComplianceControlRepository`, `IRiskExceptionRepository`, `IAiChangeRiskSignalRepository`, `ISecurityPolicyRepository`). |\n| `packages/core/src/application/ports/output/services/` | High | New ports: `IFindingIngestPort` (SARIF parser), `ISbomPort` (CycloneDX parser), `IExploitIntelPort` (KEV/EPSS lookups), `ISlaClockPort` (testable now), `IOwnershipYamlReader` (parses `.shep/ownership.yaml` from the Application's repository). |\n| `packages/core/src/infrastructure/persistence/sqlite/migrations/` | High | New numbered migrations creating tables and indexes for each ASPM entity; backfill safe defaults on extending `Application`; idempotent ALTER patterns per `LESSONS.md`. |\n| `packages/core/src/infrastructure/repositories/` | High | SQLite repositories + mappers for each new entity (cross-platform path normalization for any path-bearing field). |\n| `packages/core/src/infrastructure/services/` | Medium | Concrete adapters: SARIF parser, CycloneDX parser, KEV feed loader, EPSS feed loader, ownership-yaml reader, system clock implementation of `ISlaClockPort`. |\n| `packages/core/src/infrastructure/di/` | Medium | New `register-aspm.ts` module wiring repositories, ports, services, and use cases; called from `container.ts`. |\n| `src/presentation/web/app/` | High | New routes: `/aspm` (dashboard), `/aspm/findings`, `/aspm/findings/[id]`, `/aspm/campaigns`, `/aspm/campaigns/[id]`, `/aspm/inventory`, `/aspm/owners`, `/aspm/compliance`, `/aspm/ai-review`. Plus API routes under `app/api/aspm/*` for SSE-driven posture updates. |\n| `src/presentation/web/components/features/aspm/` | High | New feature folder: posture cards, findings table + filters, finding detail panel, campaign board, owner map, risk trend charts, AI-change review queue, compliance coverage view. Every component requires a colocated `.stories.tsx` with Default/Loading/Error variants. |\n| `src/presentation/web/components/features/applications/` | Medium | Augment existing Application surface with ASPM context (risk score badge, top findings, owners, exception count). |\n| `src/presentation/cli/commands/` | Medium | New subcommands: `shep aspm ingest`, `shep aspm findings`, `shep aspm campaigns`, `shep aspm posture`, `shep aspm exceptions`, `shep aspm ai-review` — all routed through use cases. |\n| `tests/unit/use-cases/aspm/` | High | RED-first tests for each use case (risk scoring, ranking, campaign lifecycle, SLA logic, exception expiry, AI-change risk classification, ownership resolution, finding-to-work-item conversion). |\n| `tests/integration/infrastructure/persistence/sqlite/` | High | Migration + repository round-trip tests for every new entity. |\n| `tests/e2e/` | Medium | Playwright flows for the ASPM dashboard happy path, finding-to-exception flow, and campaign progress view. |\n| `docs/` | Medium | New architecture/usage docs (`docs/architecture/aspm.md`, `docs/api/domain-models.md` updates). |\n\n## Dependencies\n\n- **Existing Application + Repository entities** — ASPM findings attach to\n  these as their primary \"asset\" anchor. `Application` will be extended via\n  TypeSpec with optional ASPM-relevant context (criticality, businessUnit,\n  exposure, dataClassification) using an idempotent ALTER migration with\n  safe defaults.\n- **Existing WorkItem entity** — `SecurityFinding` carries an optional\n  `workItemId` so findings can route into the engineering backlog via the\n  `convert-finding-to-work-item` use case.\n- **TypeSpec compile pipeline** (`pnpm tsp:compile`) — required to regenerate\n  `domain/generated/output.ts` after each new entity/enum.\n- **SQLite migration runner** — every new table needs a numbered, idempotent\n  migration with safe defaults.\n- **DI container bootstrap** (`infrastructure/di/container.ts`) — must invoke\n  a new `register-aspm` module after migrations run.\n- **Existing `IAgentExecutorProvider`** — needed for any optional AI-assisted\n  triage or AI-change risk classification; provider-specific code must stay\n  inside infrastructure adapters.\n- **External data sources (consumed via ports)** — CISA KEV catalog, FIRST\n  EPSS scores, optional CVE metadata; SARIF and CycloneDX documents from CI\n  scanners. Concrete adapters can land incrementally (stub-friendly via the\n  port interfaces); use-case layer must work against the ports from day one.\n- **Web UI primitives** — shadcn/ui Table, Card, Tabs, Badge, Dialog,\n  Sheet, Progress; existing SSE pattern for live posture updates.\n\n## Size Estimate\n\n**XL** — This is a new vertical slice on the scale of Shep's existing Features,\nCycles, or Cloud-Deploy modules, *combined*. With requirements pinned, the\nscope concretely involves:\n\n- ~12–14 new TypeSpec entities + supporting enums/value objects + extending\n  `Application` with four optional fields.\n- ~12 new SQLite migrations and matching repositories with mappers and\n  cross-platform path/identifier handling.\n- 35+ use cases across ingestion, prioritization, ownership, campaigns, SLA,\n  compliance, exceptions, AI-change review, and executive aggregation —\n  every one of them TDD-first.\n- ~9 new web routes/pages and a feature folder of components, each with\n  Storybook stories (Default/Loading/Error + variants).\n- New CLI command surface (6 subcommands × multiple verbs).\n- New integration ports + at least stub adapters (SARIF, CycloneDX, KEV,\n  EPSS, ownership-yaml reader).\n- Documentation updates and e2e coverage.\n\nEven with the explicit MVP carve-outs (no scanning engine, no GRC replacement,\nno runtime protection, no auto-fix, no pentest automation, no graph view,\nno per-BU permissions), the in-scope MVP — extended asset/ownership model,\nunified findings ingestion, transparent risk scoring, campaigns, SLA, risk\nexceptions, executive reporting, developer task routing, AI-change review\nqueue, and OWASP ASVS/CWE compliance surface — is multi-week. Recommend\nsplitting the implementation plan into staged epics:\n\n1. Asset + ownership model (extend Application + Owner/Team/BU + ownership\n   resolution use cases).\n2. Findings ingestion + unified view (IFindingIngestPort + SARIF + Finding\n   entity + list use case + findings table).\n3. SBOM + exploit intel (ISbomPort + IExploitIntelPort + KEV/EPSS adapters).\n4. Risk scoring + prioritization (RiskScore + compute/rank use cases +\n   finding detail panel).\n5. Campaigns + SLA + exceptions (Campaign/SecurityPolicy/RiskException +\n   campaign board + dashboard tiles).\n6. Executive dashboards + developer routing (posture summary + risk trend +\n   convert-finding-to-work-item).\n7. AI-change review queue (AiChangeRiskSignal + record/graduate/dismiss +\n   /aspm/ai-review).\n8. Compliance/governance surface (ComplianceControl + coverage view).\n\nEach epic is independently shippable behind the same `/aspm` area.\n"
phase11Decisions:
  - question: "Build all scanners in-house vs. depend on Trivy/Semgrep/Grype/Syft/Gitleaks?"
    resolved: true
    answer: "In-house + agents — no third-party scanner binaries required"
    rationale: "User directive (2026-05-20). Open data sources (OSV.dev) are fair game; CLI binaries are not. SBOM building, secret regex/entropy, ownership-from-git are simple enough to own; SAST / container / IaC judgment is delegated to the existing AI agent stack, which is a core differentiator. Keeps install surface to zero and avoids the ongoing maintenance cost of tracking scanner releases / breaking-change CLIs."
  - question: "Scope of the working tree the scanner reads?"
    resolved: true
    answer: "Local branches only — no `git fetch`, no remote refs"
    rationale: "Matches the user's mental model ('I want to scan what I have checked out') and removes a class of failure modes (network errors, auth prompts, large pack-file fetches). Re-scanning after `git switch` reflects the new branch."
  - question: "Scan trigger default?"
    resolved: true
    answer: "On-demand + nightly auto-rescan"
    rationale: "User directive. Nightly cadence keeps posture fresh without requiring the user to remember; on-demand covers the iterate-fix-verify loop. Per-application opt-out via `aspm.autoRescan === false`."
  - question: "What happens to the existing upload path (`shep aspm ingest` + `AspmIngestDialog`)?"
    resolved: true
    answer: "Keep as additive — demoted to 'Upload existing report' inside the new Scan dialog"
    rationale: "User directive. CI pipelines already produce SARIF and shouldn't be blocked; the upload affordance survives but is no longer the primary UX."


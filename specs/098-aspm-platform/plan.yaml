# Implementation Plan (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "aspm-platform"
summary: >
  Implementation plan for the ASPM module. Delivered as ten ordered phases that follow
  Shep's TypeSpec-first, Clean Architecture, ports-and-adapters conventions. Phase 1
  lays the TypeSpec foundation (extends Application + new ASPM enums/value objects + a
  register-aspm.ts DI skeleton). Phases 2-9 deliver the eight ASPM epics independently
  shippable behind /aspm: asset+ownership; findings ingestion (SARIF); SBOM+exploit
  intel (CycloneDX+KEV+EPSS); risk scoring+prioritization; SLA+campaigns+exceptions;
  executive dashboards + developer routing; AI-change review queue; compliance surface.
  Phase 10 finishes CLI surface, Storybook + Playwright coverage, and documentation.
  Every use case is RED-first; risk scoring is covered by a fixture-driven golden test;
  every web component ships with a colocated *.stories.tsx; every entity gets a
  numbered idempotent SQLite migration.


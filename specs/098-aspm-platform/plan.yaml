# Markdown content (the full plan document)
content: |
  ## Status

  - **Phase:** Planning
  - **Updated:** 2026-05-19

  ## Architecture Overview

  The ASPM module slots into Shep's existing Clean Architecture stack without bending
  any of the rules in `CLAUDE.md` or `.claude/rules/*`. The dependency direction is
  preserved: **TypeSpec â†’ domain â†’ application â†’ infrastructure / presentation**.

  - **TypeSpec layer (`tsp/`)** authors every new entity, enum, and value object.
    `Application` gains four optional ASPM fields (`criticality`, `exposure`,
    `dataClassification`, `businessUnit`). Adjacent asset entities (`Service`,
    `ApiAsset`, `CloudEnvironment`) cover non-application assets. ASPM-only entities
    (`SecurityFinding`, `RiskScore`, `Owner`, `Team`, `BusinessUnit`,
    `RemediationCampaign`, `SecurityPolicy`, `RiskException`, `ComplianceControl`,
    `AiChangeRiskSignal`) live under `tsp/domain/entities/aspm/`. Value objects
    (`FindingFilter`, `CVEReference`, `OwnershipPath`, `SLAWindow`,
    `RiskScoreBreakdown`, and the canonical enums) live under
    `tsp/domain/value-objects/aspm/`. `pnpm tsp:compile` regenerates
    `packages/core/src/domain/generated/output.ts` â€” the file is never hand-edited.

  - **Domain layer (`packages/core/src/domain/aspm/`)** holds pure logic only:
    `computeRiskScore` (weights, severity mapping), `computeSlaState`,
    `resolveOwnership`, `redactSecrets`, `findingDedupKey`, `effectiveFindingState`,
    and typed domain errors (`FindingNotFound`, `CampaignClosed`,
    `OwnerOrphanedFinding`, `ExceptionExpired`, `AiSignalAlreadyGraduated`,
    `IngestionTooLarge`). No `Date.now()`, no `process.env`, no infra imports. All
    time enters via `ISlaClockPort`.

  - **Application layer (`packages/core/src/application/`)** defines the output ports
    (`IFindingRepository`, `IRiskScoreRepository`, `IOwnerRepository`, ...,
    `IFindingIngestPort`, `ISbomPort`, `IExploitIntelPort`, `ISlaClockPort`,
    `IOwnershipYamlReader`) and the ~35 use cases organized by sub-area
    (`ownership/`, `findings/`, `campaigns/`, `exceptions/`, `posture/`,
    `ai-review/`, `compliance/`). Use cases are the **only** entry point â€” CLI/web
    never bypass them. They are RED-first per `CLAUDE.md`.

  - **Infrastructure layer (`packages/core/src/infrastructure/`)** ships:
    - Numbered, idempotent SQLite migrations under `persistence/sqlite/migrations/`
      starting at `101-â€¦` (next free number after the existing 100-create-custom-agents.ts).
    - One repository per entity with a mapper, normalizing paths to POSIX before
      persistence (per `packages/CLAUDE.md`).
    - Concrete adapters: SARIF parser, CycloneDX parser, KEV/EPSS feed loader,
      YAML ownership reader, system clock implementation of `ISlaClockPort`.
    - `register-aspm.ts` in `infrastructure/di/modules/` wires every repository,
      port, service, and use case by string token. `container.ts` invokes it after
      the existing `register-*` modules so migrations run first and ASPM repos can
      depend on `IApplicationRepository` and `IWorkItemRepository`.

  - **Presentation layer (`src/presentation/`)** adds:
    - CLI: `shep aspm` parent command with `ingest`, `findings`, `campaigns`,
      `posture`, `exceptions`, `ai-review` subcommands routed to use cases.
    - Web: new routes under `app/aspm/*` (dashboard, findings, findings/[id],
      campaigns, campaigns/[id], inventory, owners, compliance, ai-review) and an
      SSE endpoint at `app/api/aspm/posture/stream/route.ts`.
    - Components under `components/features/aspm/` â€” every one with a colocated
      `*.stories.tsx` covering Default/Loading/Error and the relevant variants
      (Critical/High/KEV/Exception/AiGraduated).
    - An ASPM section on the existing Application detail view (risk score badge,
      top findings, owners, exception count).

  - **Tests**: unit tests under `tests/unit/`, integration tests under
    `tests/integration/`, Playwright e2e under `tests/e2e/`, fixtures under
    `tests/fixtures/aspm/`. The risk-scoring golden test reads
    `tests/fixtures/aspm/scoring/golden-cases.json` and asserts deterministic
    output across multiple input shapes.

  ## Key Design Decisions

  Every choice below cross-references the corresponding `decisions[]` entry in
  `research.yaml`.

  **1. Extend the existing `Application` entity instead of inventing a new
  `SecurityAsset`.** Application is already the operational anchor for repository,
  agent session, deployment, features, and cycles. Adding four optional ASPM fields
  is one idempotent ALTER migration with safe defaults. Non-application assets
  (`Service`, `ApiAsset`, `CloudEnvironment`) are added as adjacent entities so the
  data model covers them without polymorphism. *(Research decision 1.)*

  **2. Transparent composite `RiskScore` over CVSS + EPSS + KEV + exposure +
  criticality + data classification.** Computed by a pure-domain function with
  documented weights and stored as an append-only `risk_scores` table (history
  preserved for the trend chart, current score pointed to via
  `currentRiskScoreId`). Fixture-driven golden test asserts determinism. KEV/EPSS
  adapters can return null and scoring degrades gracefully. *(Research decisions 2,
  17 â€” Risk score lives in its own table with history.)*

  **3. Two ingestion ports for MVP: `IFindingIngestPort` (SARIF v2.1.0) and
  `ISbomPort` (CycloneDX 1.5+).** Both parsed via `ajv` + hand-rolled walker.
  Vendor-native adapters slot in later behind the same ports. The 100MB size cap
  and synchronous transactional ingest match NFR-6 and NFR-14. *(Research decisions
  3, 16, 19 â€” synchronous transactional ingest.)*

  **4. Ownership via `.shep/ownership.yaml` + UI override.** Two-source resolver
  is a pure function in `domain/aspm/ownership/resolve-ownership.ts`. CODEOWNERS
  remains a future fallback. *(Research decision 4.)*

  **5. Calendar-day SLAs per canonical severity, defaulted Critical=7 / High=30 /
  Medium=90 / Low=180, configurable on `SecurityPolicy`.** SLA state is a pure
  function of `(discoveredAt, severity, policy, now)` over `ISlaClockPort`.
  *(Research decision 5.)*

  **6. AI-change risk gets its own `AiChangeRiskSignal` entity, not a tagged
  Finding.** Keeps Finding SLA math and exception stats clean; graduates to a
  Finding only when confirmed. *(Research decision 6.)*

  **7. Canonical 5-level severity (Critical/High/Medium/Low/Info) AND preserved
  raw.** Mapping tables are typed domain constants â€” no magic strings.
  *(Research decision 7.)*

  **8. Self-declared `RiskException` with expiry + immutable audit log.** Approval
  chain deferred until Shep has a permissions subsystem. Effective finding state
  factors in exceptions at read time. *(Research decision 8.)*

  **9. Query-shaped `RemediationCampaign` with a serialized `FindingFilter` value
  object.** The same `FindingFilter` is reused by `list-findings`, `rank-findings`,
  campaign target queries, and bulk work-item conversion. Campaign progress is
  computed at read time â€” no Findingâ†”Campaign join table. *(Research decisions 9,
  18.)*

  **10. `ComplianceControl` covering OWASP ASVS + CWE Top 25.** Findings link to
  zero-or-more controls via SARIF taxa references. Regulated frameworks
  (SOC 2/PCI/HIPAA) are additive rows in the same table later. *(Research decision
  10.)*

  **11. On-demand `convert-finding-to-work-item` (plus bulk variant).** Engineers
  triage in `/aspm`, route the ones that matter into the existing WorkItem
  backlog. Single optional `workItemId` reference on Finding; bulk is idempotent.
  *(Research decision 11.)*

  **12. Ship the React Flow asset-risk graph in MVP.** Reuses `@xyflow/react`
  v12 already in tree, and shares `build-graph-nodes`-style helpers with the
  existing graph code. Falls back to the tabular inventory view behind a feature
  flag if perf becomes a blocker â€” no domain-layer impact. *(Research decision
  12.)*

  **13. Multi-workspace-ready data shape.** ASPM tables carry a nullable
  `workspaceId` column today (defaulted to the active workspace constant). When
  the tenancy subsystem lands, it's a backfill, not a structural rewrite.
  *(Research decision 13.)*

  **14. Persistence: `better-sqlite3` + numbered idempotent migrations, one
  concept per migration, `IF NOT EXISTS` + pragma index guards.** Matches the
  existing 001â€“100 migration files exactly. Each ingestion run is wrapped in a
  single transaction. *(Research decision 14.)*

  **15. DI: `register-aspm.ts` invoked from `container.ts` after the existing
  `register-*` modules.** Explicit registration by string token, ordered after the
  core repositories ASPM depends on. *(Research decision 15.)*

  **16. KEV/EPSS via `IExploitIntelPort` + local-cached feed loader.** mtime-based
  24h refresh, content-type checks, graceful offline degradation. *(Research
  decision 17.)*

  **17. Secret redaction at persistence time via a pure-domain `Redactor`.** AWS/
  GCP/Azure key prefixes, high-entropy â‰Ą32 char strings, `sk_`/`ghp_` token
  prefixes, PEM headers. Raw is SHA-256 hashed; only the hash is stored.
  *(Research decision 18.)*

  ## Implementation Strategy

  Ten phases, each independently shippable, ordered by dependency. Foundation
  first (TypeSpec + DI skeleton), then the asset/ownership graph, then findings
  ingestion (the entity everything else hangs off), then SBOM + KEV/EPSS (which
  power scoring), then the scoring layer itself, then the workflow primitives
  (SLA + campaigns + exceptions), then the executive surface and developer
  routing, then the AI-change differentiator, then compliance, then polish (CLI,
  e2e, docs).

  The order is dictated by:

  - **TypeSpec-first (NFR-2)**: every entity must be authored in `tsp/` and codegen
    run before any domain/application/infrastructure code can reference it.
    Phase 1 generates all the types so subsequent phases compile.
  - **Repository dependencies**: `SecurityFinding` depends on `Owner`+`Application`,
    so ownership lands in phase 2 before findings in phase 3.
  - **Scoring depends on KEV/EPSS**: phase 5 (scoring) must follow phase 4 (exploit
    intel) so the score breakdown can be computed end-to-end.
  - **Dashboards depend on findings + scoring + SLA**: phase 7 follows phases
    3-6.
  - **AI-change review reuses owner/asset plumbing**: phase 8 follows phase 2 but
    can land alongside or after phase 7 since they share UI infrastructure.
  - **CLI + e2e need the full stack**: phase 10 follows everything.

  Each phase delivers a coherent vertical slice â€” domain â†’ use cases â†’ adapters â†’
  CLI/UI â€” so the `/aspm` area boots earlier and grows progressively. The
  Storybook + e2e gates are enforced phase-by-phase so the CI surface never
  regresses.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec codegen race (consumers compile before regeneration) | Phase 1 commits the regenerated `output.ts` and any subsequent TSP change re-runs `pnpm tsp:compile` before code that consumes it lands. CI runs `pnpm validate` which includes `tsp:compile`. |
  | SARIF/CycloneDX schema drift | `ajv` validates incoming docs against pinned schema versions; adapters are version-aware and degrade gracefully on unknown extensions (FR-7). Fixture suite covers Semgrep/CodeQL/Trivy SARIF dialects. |
  | KEV/EPSS feed outage or schema change | `IExploitIntelPort` returns `null`/`false` on failure; scoring degrades to CVSS+context only (research decision 17). Adapter validates content type + minimum row count and falls back to the last good cache. |
  | Risk-score determinism regression | Golden-file fixture test asserts byte-stable output across 10+ representative inputs. Any weight change requires updating the fixture intentionally. |
  | Ingestion DoS via huge SARIF | 100MB size cap (configurable on `SecurityPolicy`), ajv-validated, transactional. Adapter rejects with `IngestionTooLarge` before parsing. |
  | Secret leakage through scanner output | Pure-domain `Redactor` runs on `description` + `scannerRaw` before persistence; raw is hashed-only. Unit tests assert all canonical patterns are masked. |
  | Cross-platform path divergence (NFR-11) | Every mapper normalizes location paths to POSIX before write; dedup key uses the normalized form. Round-trip integration tests exercise both separators. |
  | 50k-finding dashboard perf (NFR-7/8) | Composite indexes per migration (applicationId+canonicalSeverity+state; cveId; ownerId+state; discoveredAt); `currentRiskScoreId` pointer keeps rank queries O(n log n). SSE deltas avoid full reloads. |
  | React Flow graph perf on large datasets | Phase 7 implements per-application aggregation; if 50k findings overwhelm the canvas, a feature flag switches inventory to the tabular fallback â€” no domain-layer impact. |
  | Use-case sprawl in `application/use-cases/aspm/` | Use cases are grouped into sub-areas (`findings/`, `campaigns/`, ...) with each file under 300 lines (NFR-19). Shared filtering and pagination live in domain helpers. |
  | Migration ordering breakage | Migration numbers are explicit (101â€“114) and chosen to extend the existing sequence with no gaps. `register-aspm.ts` runs after migrations. |
  | Workspace forward-compat | Every ASPM table includes a nullable `workspaceId` column today (defaulted to the active workspace constant). When tenancy lands it's a backfill, not a structural change. |
  | Test gap on integration boundary | Each repository has a round-trip integration test; each adapter has a fixture-driven adapter test; one Playwright e2e covers the dashboard happy path. |
  | File-length creep | Every new file â‰¤300 lines (NFR-19); refactor-before-extending rule enforced in code review. |
  | Storybook gate failure on CI | Every component file has a colocated `*.stories.tsx` from day one (FR-40, NFR-5); Default/Loading/Error variants are mandatory. |

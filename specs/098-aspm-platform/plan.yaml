# Structured implementation phases
phases:
  - id: "phase-1"
    name: "Foundation & TypeSpec Scaffolding"
    description: >
      Extend the Application entity with optional ASPM fields, define ASPM enums
      (CanonicalSeverity, FindingDomain, FindingState, ExceptionReason, Exposure,
      Criticality, DataClassification, AssetType, AiSignalType, ComplianceFramework,
      SlaState, CampaignStatus, AiSignalState) and shared value objects (FindingFilter,
      CVEReference, OwnershipPath, SLAWindow), generate code via pnpm tsp:compile,
      and add the register-aspm.ts DI skeleton wired into container.ts. No persisted
      state yet â€” this phase establishes types and DI plumbing only.
    parallel: false
  - id: "phase-2"
    name: "Asset & Ownership Model"
    description: >
      Add Owner, Team, BusinessUnit, Service, ApiAsset, CloudEnvironment entities with
      numbered SQLite migrations, repositories, and mappers. Implement the
      IOwnershipYamlReader port and YAML adapter, plus the pure-domain ownership
      resolver. Ship use cases assign-owner, import-ownership-yaml,
      resolve-ownership-for-finding, list-owners. ALTER the existing applications
      table to add ASPM-relevant columns with safe defaults via an idempotent migration.
    parallel: false
  - id: "phase-3"
    name: "SecurityFinding Entity + SARIF Ingestion"
    description: >
      Define SecurityFinding TSP, migration, repository, mapper. Define
      IFindingIngestPort and ship the SARIF v2.1.0 adapter (ajv-validated + hand-rolled
      walker). Build the pure-domain Redactor (secret patterns + SHA-256 raw hash).
      Implement ingest-findings (transactional, deduped on
      applicationId+findingDomain+ruleId+location+cveId) and list-findings (paged,
      filterable via FindingFilter). Cross-platform path normalization on every
      location field.
    parallel: false
  - id: "phase-4"
    name: "SBOM Ingestion + Exploit Intelligence"
    description: >
      Define ISbomPort and ship the CycloneDX 1.5+ adapter (evaluate
      @cyclonedx/cyclonedx-library; fall back to hand-rolled if its runtime deps are
      heavy). Define IExploitIntelPort with getEpssPercentile and isKev; implement the
      local-cached KEV+EPSS feed loader (mtime-based 24h refresh, content-type guards,
      graceful offline degradation). Extend ingestion to populate cveId, cweId, and
      asvs control links on findings.
    parallel: false
  - id: "phase-5"
    name: "Risk Scoring & Prioritization"
    description: >
      Define RiskScore value object and risk_scores table (append-only history with
      currentRiskScoreId pointer on finding). Implement the pure-domain computeRiskScore
      function with documented weights (CVSS, EPSS, KEV, exposure, criticality, data
      classification). Golden-file fixture test asserts determinism across multiple
      inputs. Ship compute-risk-score-for-finding and rank-findings use cases. Build
      the Finding detail panel with the breakdown UI and Storybook stories.
    parallel: false
  - id: "phase-6"
    name: "SLA, Remediation Campaigns & Risk Exceptions"
    description: >
      Define SecurityPolicy (calendar-day SLA windows per canonical severity, default
      C=7/H=30/M=90/L=180), RemediationCampaign (serialized targetQuery reusing
      FindingFilter, read-time progress), and RiskException (typed reason enum,
      expiry, immutable audit log). Define ISlaClockPort with system-clock adapter.
      Pure-domain functions for SLA state and effective-finding-state (factoring in
      exceptions). Use cases for create/update/close campaign, declare/revoke
      exception, list-expiring-exceptions, get-campaign-progress.
    parallel: false
  - id: "phase-7"
    name: "Executive Dashboards & Developer Task Routing"
    description: >
      Implement get-posture-summary, get-risk-trend (time-bucketed posture metrics
      from finding state changes), get-application-posture, and SSE posture stream
      endpoint. Implement convert-finding-to-work-item (single + bulk, idempotent on
      existing linkage). Build the /aspm dashboard, /aspm/findings page, /aspm/inventory
      with React Flow asset-risk graph, all required Storybook stories, and the
      Application tab augmentation.
    parallel: false
  - id: "phase-8"
    name: "AI-Change Review Queue"
    description: >
      Define AiChangeRiskSignal entity with its own state machine
      (Open/Acknowledged/GraduatedToFinding/Dismissed/Resolved). Implement
      record-ai-change-risk-signal (callable via IAgentExecutorProvider hooks),
      graduate-ai-signal-to-finding, dismiss-ai-signal, and list-ai-signals. Build the
      /aspm/ai-review queue UI with Storybook coverage.
    parallel: false
  - id: "phase-9"
    name: "Compliance Surface"
    description: >
      Define ComplianceControl entity (frameworkId enum: OwaspAsvs/CweTop25), seed
      MVP control rows, link findings to controls via ingestion adapter taxa
      references, and implement get-compliance-coverage plus the /aspm/compliance view.
    parallel: false
  - id: "phase-10"
    name: "CLI Surface, E2E Coverage & Documentation"
    description: >
      Wire the full shep aspm Commander subcommand tree (ingest, findings, campaigns,
      posture, exceptions, ai-review). Add at least one Playwright e2e covering the
      dashboard â†’ findings â†’ declare-exception â†’ posture-refresh happy path. Write
      docs/architecture/aspm.md and update docs/api/domain-models.md. Run pnpm
      validate end-to-end.
    parallel: false
  - id: "phase-11"
    name: "Native Scanning â€” replace upload-driven ingest with in-house scan/rescan"
    description: >
      Build the in-house scanning stack so the user never has to upload a SARIF or
      install a third-party scanner CLI. Stack: (1) pure-domain `SbomBuilder` that
      parses package/container/IaC manifests across 9+ ecosystems into the
      `SoftwareBillOfMaterials` shape the existing `IngestSbomUseCase` consumes;
      (2) `IOsvVulnerabilityPort` adapter against the unauthenticated osv.dev
      query-batch API for SCA; (3) pure-domain `SecretScanner` (regex + Shannon
      entropy) emitting SARIF; (4) `IGitOwnershipPort` deriving ownership from
      local `git` (blame/log/CODEOWNERS) â€” augments `.shep/ownership.yaml` without
      overriding it; (5) three agent-driven analyzers â€” `SastAnalysisAgent`,
      `ContainerHardeningAgent`, `IacSecurityAgent` â€” resolved via the existing
      `IAgentExecutorProvider` per the agent-resolution rule; (6) orchestration use
      cases `ScanApplicationUseCase` + `RescanApplicationUseCase` + the SSE stream
      `/api/aspm/scan/stream`; (7) UX migration replacing every 'Ingest data'
      trigger with 'Scan' / 'Rescan' and demoting the existing `AspmIngestDialog`
      to a secondary 'Upload existing report' affordance; (8) nightly auto-rescan
      daemon honoring per-app opt-out. Scope is the **local working tree only** â€”
      no `git fetch`, no remote refs, no third-party scanner installs.
    parallel: false


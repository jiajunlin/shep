# Research Artifact (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "aspm-platform"
summary: >
  Technical research for adding an Application Security Posture Management (ASPM) module to Shep.
  Confirms a TypeSpec-first, Clean Architecture, ports-and-adapters approach anchored on the existing
  Application entity (extended with criticality/exposure/dataClassification/businessUnit), with
  SARIF + CycloneDX ingestion ports, a transparent composite RiskScore value object computed by a
  pure-domain function, KEV/EPSS enrichment behind IExploitIntelPort, a calendar-day ISlaClockPort,
  and a separate AiChangeRiskSignal entity for AI-generated change risk. Persistence uses
  better-sqlite3 with numbered, idempotent migrations and a register-aspm DI module wired into the
  existing tsyringe container.


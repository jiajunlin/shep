  ## Testing Strategy (TDD: Tests FIRST)

  ### Unit tests (RED → GREEN → REFACTOR)

  - `LocalSecretBox` — round-trip, wrong-key failure, tamper-detection.
  - `SqliteCloudProviderTokensRepository` — round-trip, replace existing, remove, listConnected; assert ciphertext on disk differs from plaintext.
  - `SqliteApplicationRepository` (extension) — persist and load all seven new fields; preserve on update.
  - `CloudDeploymentProviderRegistry` — listAll across the five providers; get() throws for disabled.
  - `CloudflarePagesProvider` — fetch-mocked happy path, 403 on bad token, wrangler fallback when HTTP fails, status polling transitions.
  - `GitRemoteService` — happy path, gh not authenticated error, already-committed idempotency.
  - Every cloud-deploy use case — happy path + one failure mode (missing token, disabled provider, build output missing, gh not authed, etc.).

  ### Integration tests

  - Migrations 060 + 061 against an in-memory SQLite DB; assert columns and table exist and are idempotent (re-running `up()` is a no-op).
  - ConnectCloudProviderUseCase end-to-end with a mock fetch; verifies token persists encrypted.
  - InitiateCloudDeploymentUseCase end-to-end with in-memory repos + mock Cloudflare provider + in-memory event bus; verifies persisted Application state transitions through Uploading → Deploying → Deployed.

  ### E2E

  - One Playwright smoke test (`src/presentation/web/e2e/cloud-deploy.spec.ts`): seed an application with `setupComplete=true`, override the `ICloudDeploymentProvider:CloudflarePages` binding with a test fake, click Deploy, assert the button transitions and the URL chip renders. Uses an existing test-seam pattern if one exists; otherwise documents the gap in the PR description.

  ### Storybook

  - Colocated `.stories.tsx` file required for every new component. Tests that Storybook builds cleanly via `pnpm build:storybook` in phase 12.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Cloudflare direct-upload HTTP contract differs from wrangler | Ship HTTP happy path + wrangler CLI fallback; integration tests mock both. |
  | `gh` CLI not installed on user machine | Detect at connect time; show clear error with install link. Existing git-fork.service already has this gap — we surface it better. |
  | Cloudflare token leaked in logs | Provider adapter NEVER logs the token; SSE events sanitize error messages. |
  | Windows file mode 0600 is advisory | Document in adapter header; rely on parent ~/.shep/ being 0o700 (already the case). |
  | Migration 060 column list drifts from mapper | Single migration test asserts pragma('table_info') includes every new column. |
  | Application page split breaks existing behavior | Phase 10 runs after all non-UI phases; Storybook + manual dev-server smoke test before merge. |
  | Clean-arch refactors expand scope | Violations are grouped into the phase that already touches the file; no speculative drive-bys. |
  | SSE route orchestration extraction is invasive | Done in dedicated phase 11 with a StreamAgentEventsUseCase that yields domain events; route shrinks to SSE framing only. |
  | DI container split may miss a registration | Composition-root bootstrap module unit-tested: resolves every declared token and asserts a non-null instance. |


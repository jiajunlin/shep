phases:
  - id: phase-1
    name: "Domain foundation (TypeSpec + feature-id helpers)"
    description: >
      Extend TypeSpec with CloudDeploymentProvider + CloudDeploymentStatus + InteractiveSessionEventType
      enums, add seven new fields to Application, regenerate domain types, and extract the
      `app-` / `feat-` featureId prefix helper (violation #11) into a shared domain module.
      Foundational phase — no tests, but pnpm tsp:compile + typecheck must pass before
      anything else proceeds.
    parallel: false
    taskIds: [t-01, t-02, t-03]

  - id: phase-2
    name: "Secret storage + token repository (TDD)"
    description: >
      Build LocalSecretBox helper + SecretKey file resolver, then the new
      SqliteCloudProviderTokensRepository with three-BLOB-column schema. Migration 061
      creates the cloud_provider_tokens table. Fully TDD — failing repo + box tests
      written first.
    parallel: false
    taskIds: [t-04, t-05, t-06, t-07]

  - id: phase-3
    name: "Application persistence extension (TDD)"
    description: >
      Migration 060 adds the seven cloud-deploy columns. Update the application mapper,
      extend the repository update() Pick with the new fields, and add repository tests
      covering round-trips of every new field. Fully TDD.
    parallel: false
    taskIds: [t-08, t-09, t-10]

  - id: phase-4
    name: "Ports + provider registry + git remote service (TDD)"
    description: >
      Define the four new output ports (ICloudDeploymentProvider,
      ICloudDeploymentProviderRegistry, ICloudProviderTokensRepository,
      IGitRemoteService) and their shared input/output DTOs. Implement the
      CloudDeploymentProviderRegistry (using the string-token DI pattern from
      AgentSessionRepositoryRegistry) and the GitRemoteService backed by the existing
      ExecFunction. Port interfaces are pure types — registry + service are unit-tested
      with fakes.
    parallel: true
    taskIds: [t-11, t-12, t-13, t-14, t-15, t-16]

  - id: phase-5
    name: "Cloudflare Pages provider (live adapter, TDD)"
    description: >
      Build the one live ICloudDeploymentProvider implementation: token verify → account
      discover → project create-or-get → HTTP direct upload with wrangler fallback → poll
      status. Integration-tested with fetch/exec mocks; no live API calls in CI.
    parallel: false
    taskIds: [t-17, t-18]

  - id: phase-6
    name: "Stub providers"
    description: >
      Ship four placeholder adapters (Vercel, Netlify, AWS Amplify, GCP Cloud Run) that
      each export enabled = false and throw ProviderNotImplementedError on deploy. Zero
      business logic. All four can be written in parallel.
    parallel: true
    taskIds: [t-19, t-20, t-21, t-22]

  - id: phase-7
    name: "Cloud-deploy + git use cases (TDD)"
    description: >
      Seven use cases under use-cases/cloud-deploy/: ListCloudProviders,
      ConnectCloudProvider, SelectCloudProvider, InitiateCloudDeployment,
      GetCloudDeploymentStatus, CreateGitRemote, EnsureGhAuthenticated. Also refactors
      the existing deploy-application server action (violations #1-#3) into a new
      StartApplicationDeploymentUseCase so the action is finally a thin adapter.
      Fully TDD — failing tests first for every use case.
    parallel: true
    taskIds: [t-23, t-24, t-25, t-26, t-27, t-28, t-29, t-30]

  - id: phase-8
    name: "DI container wiring + modular split"
    description: >
      Register every new port, adapter, registry and use case. Wire the stub providers
      under string tokens mirroring AgentSessionRepositoryRegistry. Split the 831-line
      container.ts into topic-focused sub-modules (violation #12) that register into the
      shared container from a single bootstrap function.
    parallel: false
    taskIds: [t-31, t-32]

  - id: phase-9
    name: "Web API routes"
    description: >
      Eight new thin route handlers, each calling one use case. Also introduces a
      dedicated StreamCloudDeploymentEventsUseCase / event-bus port that will be consumed
      by the SSE extension in phase 11.
    parallel: true
    taskIds: [t-33, t-34, t-35, t-36, t-37, t-38, t-39, t-40]

  - id: phase-10
    name: "Web UI components + Storybook"
    description: >
      Build deploy split button + dropdown + connect modal + create-github-repo button +
      shared provider icons. Also splits application-page.tsx (867 lines → multiple files,
      violation #9), extracts dev-server coordination into a dedicated hook that owns a
      use case (violation #8), and wires the new commit/commit-push buttons through
      CommitApplicationChangesUseCase (violation #10). Mandatory Storybook stories for
      every new component.
    parallel: true
    taskIds: [t-41, t-42, t-43, t-44, t-45, t-46, t-47]

  - id: phase-11
    name: "SSE event extension + clean-arch cleanup of the route"
    description: >
      Extend /api/agent-events with a cloud_deployment.updated snapshot dimension driven
      by Application.cloudDeploymentStatus changes. Because this phase touches
      agent-events/route.ts it ALSO fixes violations #4, #5, #6, #7 and #13: extract the
      in-route orchestration into a StreamAgentEventsUseCase that yields
      NotificationEvents, remove the direct `isProcessAlive` infrastructure import, add
      an InteractiveSessionEventType TypeSpec enum, share the SdlcLifecycle→node mapping
      with the client-side derive-feature-state.ts, and route console logging through an
      ILogger port.
    parallel: false
    taskIds: [t-48, t-49, t-50]

  - id: phase-12
    name: "Verification + E2E (web)"
    description: >
      Run the full local verification gate (lint, typecheck, test:unit, test:int,
      tsp:compile, build, build:storybook). Add one Playwright smoke test that stubs the
      Cloudflare provider and asserts Deploy transitions from NotDeployed to Deployed.
    parallel: false
    taskIds: [t-51, t-52]

  - id: phase-13
    name: "CLI Application commands (reuse use cases)"
    description: >
      Ship CLI parity for every Application + cloud-deploy + git-remote operation.
      Reuses existing use cases; ZERO logic duplication. Every command is a thin
      Commander.js adapter that resolves the same use case the Web API route already
      calls and formats input/output for the terminal. Adds three CLI subcommand groups:
      `shep app cloud-providers ...` (list/connect/github-login), `shep app deploy ...`
      (initiate/status), and `shep app git ...` (create-remote). Also fills the Application
      lifecycle gap by adding a `shep app show` enhancement plus the existing
      ls/show/new/del commands. The `deploy` command streams progress to the terminal by
      subscribing to the same in-process `ICloudDeploymentEventBus` that the SSE route
      consumes (no DB polling, no parallel transport). Mandatory TDD: unit tests for
      command output formatters + a CLI e2e test under `tests/e2e/cli/` that drives the
      command surface via the existing CLI runner harness.
    parallel: false
    taskIds: [t-53, t-54, t-55, t-56, t-57, t-58]

  - id: phase-14
    name: "PR review response + subagent-driven clean-arch cleanup"
    description: >
      Added AFTER PR #554 was opened. Splits into three sub-groups:

      (1) CI blockers (t-59, t-60) — must ship first. The Next.js web build on
      PR #554 fails because initiate-cloud-deployment.use-case.ts imports
      ApplicationNotFoundError from a sibling use-case file (cross-import Next.js
      cannot resolve). Fix = clean-arch violation #19 (move error to
      domain/errors/). Gitleaks also fails on a pre-existing stories file that
      needs investigation.

      (2) Subagent framework (t-61) — the user asked for reusable shep-tailored
      subagents in .claude/agents/ so the cleanup runs as parallel Agent tool
      calls. 4 of 10 agents exist (shep-clean-arch-auditor, shep-port-extractor,
      shep-file-relocator, shep-use-case-creator); 6 remaining. All agents are
      general primitives, not violation-specific fixers.

      (3) Clean-arch follow-up cleanup (t-62..t-71) — executes the agents against
      the residual violations from the log: #11 finish, #12, #13 finish, #15, #16,
      #17a/b/c, #18, plus a fresh audit pass (#21+). t-72 is the final CI sweep
      that reruns EVERY gate including build:release (whose absence from the
      local gate is what let t-59 slip through to CI).

      Phase 14 is deliberately separate from phases 1-13, which are frozen as the
      original 089 scope. Phase 14 may end up splitting into its own branch
      (feat/090-clean-arch-cleanup) if PR #554 merges before the cleanup lands.
    parallel: true # most cleanup tasks are independent; agent fan-out is the whole point
    taskIds: [t-59, t-60, t-61, t-62, t-63, t-64, t-65, t-66, t-67, t-68, t-69, t-70, t-71, t-72]


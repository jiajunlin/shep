content: |
  ## Status (live)

  - **Phase:** In review — phase 14 pending
  - **Updated:** 2026-04-14
  - **Task count:** **72 tasks across 14 phases** (58 original + 14 phase-14 follow-up)
  - **Completed:** 45 of 72 (all of phases 1-11 + 13)
  - **PR:** [#554](https://github.com/shep-ai/shep/pull/554) — **CI red**, blocked on violation #19
  - **Local gates that passed:** typecheck, lint, test-unit (6079), test-int (628), tsp:compile, build:cli
  - **Local gates that were MISSED:** `build:release` (full web build), `test:e2e` — CI caught what local didn't

  ## What's Left (priority order)

  ### Blockers (must ship first — PR #554 is red)

  1. **t-59** — Move `ApplicationNotFoundError` to `domain/errors/application-not-found.error.ts`.
     Root cause of 7 of the 8 failing CI jobs: Next.js cannot resolve the cross-use-case
     `./select-cloud-provider.use-case.js` import. Also closes clean-arch violation #19.
  2. **t-60** — Investigate and fix Gitleaks on `agent-settings-section.stories.tsx`
     (pre-existing file; per integrity rules, still our responsibility).

  ### Subagent framework (user-requested, enables parallel cleanup)

  3. **t-61** — Create 6 remaining shep-tailored subagents under `.claude/agents/`:
     `shep-port-creator`, `shep-tsp-field-adder`, `shep-migration-creator`,
     `shep-web-route-creator`, `shep-storybook-story-creator`, `shep-cli-command-creator`.
     Already shipped: `shep-clean-arch-auditor`, `shep-port-extractor`,
     `shep-file-relocator`, `shep-use-case-creator`.

  ### Clean-arch cleanup (execute via the agents — parallelizable)

  4. **t-62** — Fresh audit sweep via `shep-clean-arch-auditor` × 3 (application, domain, presentation)
  5. **t-63** — Kill `getSettings()` singleton (violation #17a, 5 callers) via `shep-port-extractor`
  6. **t-64** — Move `computeWorktreePath` + `TOOL_METADATA` to `domain/shared/` (#17b) via `shep-file-relocator` × 2
  7. **t-65** — Extract ports for `phase-timing-context`, `node-helpers`, `conflict-resolution`, `attachment-storage` (#17c) via `shep-port-extractor` × 4 in parallel
  8. **t-66** — Relocate `AgentSessionRepositoryRegistry` to infrastructure + add port (#16)
  9. **t-67** — Eliminate `application/workflows/` directory (#15)
  10. **t-68** — Add `no-restricted-imports` ESLint rule for application → infrastructure (#18)
  11. **t-69** — Split `container.ts` into topic modules (#12)
  12. **t-70** — Adopt `feature-id` helpers across 7 legacy callers (#11 finish)
  13. **t-71** — Migrate remaining `console.*` to `ILogger` (#13 finish)
  14. **t-72** — Final local + CI verification sweep (including `build:release` this time)

  ### Deferred invasive refactors (not in phase 14 — each gets its own follow-up PR)

  - **Violations #1-3** → `deploy-application.ts` server action refactor (`StartApplicationDeploymentUseCase`)
  - **Violations #4-7** → `StreamAgentEventsUseCase` extraction from `/api/agent-events/route.ts`
  - **Violations #8-10** → `application-page.tsx` split (867 lines → N files) + dev-server coordinator hook + commit use cases
  - **t-51** → Playwright smoke test for cloud deploy

  ## Status (frozen snapshot at initial plan time)

  - **Phase:** Planning complete
  - **Initial task count:** 58 tasks across 13 phases
  - **Initial scope:** full v1 feature work + fixes for 13 clean-arch violations found during research
    + CLI parity for Application + cloud-deploy + git-remote (phase 13, zero logic duplication)

  ## Architecture Overview

  ```

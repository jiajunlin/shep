  ## Implementation Strategy

  **Clean Architecture** is enforced throughout: the outer layers (presentation, infrastructure)
  depend only inward, and every new cross-layer call is routed through an application-layer
  use case. The four layers — domain, application, infrastructure, presentation — correspond
  to the directories in `packages/core/src/` and `src/presentation/`. New ports live under
  `application/ports/`; new adapters live under `infrastructure/`. Presentation never imports
  from `infrastructure/` directly.

  **MANDATORY TDD**: every phase with executable code follows RED → GREEN → REFACTOR.
  Foundation phases (TypeSpec, migrations, stubs) ship without tests because they have
  no runtime behavior to assert.

  ### Why the phase order

  1. **Domain first** — TypeSpec + regeneration has to succeed before any application
     code can reference `CloudDeploymentProvider` or `CloudDeploymentStatus`. The
     featureId helper extraction (violation #11) also lives here so later phases import
     the helper from the start rather than retrofitting it.
  2. **Crypto + tokens before repositories** — InitiateCloudDeployment depends on the
     CloudflarePagesProvider which reads tokens. Getting secret storage done early
     unblocks every downstream phase.
  3. **Application repository extension** — persistence of cloud deploy state is the
     integration surface between all upstream layers and the UI. Once the mapper +
     repository know about the new fields, use cases can update them freely.
  4. **Ports before adapters** — pure type definitions so adapters can be written
     against a stable interface. Registry + GitRemoteService are also unit tested here.
  5. **Cloudflare live adapter** — the single most complex piece of code in the feature.
     Isolated phase so it can iterate without blocking stubs, use cases, or UI.
  6. **Stub providers** — trivially parallel and independent.
  7. **Use cases** — thin orchestration, independently testable. This phase also ingests
     violations #1-#3 by creating `StartApplicationDeploymentUseCase` and rewriting
     `deploy-application.ts` to a thin adapter.
  8. **DI wiring** — everything from phases 2-7 gets registered. Splitting container.ts
     (violation #12) is done here because every new binding would otherwise widen the
     existing 831-line file.
  9. **Web API routes** — thin HTTP adapters around use cases. Parallelizable.
  10. **Web UI** — components + stories + splitting application-page.tsx. Ingests
      violations #8, #9, #10 by creating a dev-server coordination hook, extracting
      subcomponents into their own files, and wiring the placeholder commit buttons to
      a real use case.
  11. **SSE extension** — last because it consumes every upstream concept. This phase
      also ingests violations #4, #5, #6, #7, #13 by creating StreamAgentEventsUseCase,
      hiding `isProcessAlive` behind a port, adding an InteractiveSessionEventType
      TypeSpec enum, extracting the shared SdlcLifecycle→node mapping, and routing
      console output through ILogger.
  12. **Verify (web)** — the full CI gate must pass locally, plus one Playwright smoke test.
  13. **CLI parity** — thin Commander adapters for every Application, cloud-deploy, and
      git-remote use case. Comes last because it depends on the use cases (phase 7) and
      DI wiring (phase 8) being stable, and because it should reuse the exact same
      `ICloudDeploymentEventBus` registered in phase 8 to stream deploy progress to the
      terminal. Zero new business logic — every command resolves an existing use case
      via `container.resolve(...)` and only handles input parsing + terminal formatting.

  ### Parallelization strategy

  Phases 4, 6, 7, 9, 10 are marked `parallel: true`. Within each, tasks with no
  shared-file conflicts are dispatched to subagents in batches of 3-5. Explicit
  dependencies between tasks are declared in `tasks.yaml` so the executor respects
  them even inside a "parallel" phase. Phases with shared files (2, 3, 5, 8, 11) are
  sequential inside the phase.


name: "one-click-cloud-deploy"
summary: >
  Implementation plan for 089-one-click-cloud-deploy. Adds a provider-agnostic
  one-click cloud deploy system + separate GitHub repo creation to the application
  page. v1 wires Cloudflare Pages as the only live ICloudDeploymentProvider adapter;
  Vercel, Netlify, AWS Amplify and GCP Cloud Run ship as disabled stubs. All state
  persists on the Application row; UI streams progress via the existing
  /api/agent-events SSE loop. Phases 1-13 shipped in PR #554 (45 tasks). Phase 14
  (14 new tasks) was added after the PR opened to address CI failures, finish the
  user-requested subagent framework, and execute the residual clean-arch cleanup
  via those subagents. 20 clean-arch violations tracked total (across two audit
  passes), each mapped to the phase that touches the file.

phase: "in-review-phase-14-pending"
updatedAt: "2026-04-14T02:00:00Z"

relatedFeatures:
  - "088-cli-application-management"
technologies:
  - TypeScript
  - TypeSpec
  - React
  - Next.js
  - SQLite
  - tsyringe
  - umzug
  - better-sqlite3
  - Cloudflare Pages REST API
  - gh CLI

oneLiner: "One-click cloud deploy and GitHub repo creation for generated applications, persisted on the Application entity with a provider-agnostic architecture"
userQuery: |
  On our application page I want to support easy one-click deploy guided by agent or/and using CLI tools like google/aws/cloudflare/vercel. I want us to handle deploy of our React app to cloud with one click, persisting the cloud-deploy status fully in db on applications records, using clean arch use-cases and UI as thin layer. We have temp local dir with repo, so we will also need to handle git repo creation so for example for cloudflare we can just configure new github worker app using few curl commands, we need to guide user how to get token, not by telling him, trying best effort to do it with cli and only giving user Login button on ui or something. Git remote status also must be persisted on application records in db. Make all seamless, for people who even doesn't know what REPO and GITHUB and CLOUDFLARE IS. Also make Deploy generic with option, currently only cloudflare supported, add gcp/aws/vercel and more popular as in dev or future release, use button with drop down to change the deploy provider, the button itself shows the icon of selected platform, dropdown should have icons of each platform too.
summary: |
  Add a provider-agnostic one-click cloud deploy system to the application page. The user sees two new top-bar buttons next to the existing "Preview" (run-dev) button: a split "Deploy" button (icon of the selected provider + dropdown listing all providers with icons, disabled ones tagged "Coming soon") and a separate "Create GitHub repo" button that uses the locally-installed `gh` CLI (no tokens, no OAuth). v1 wires Cloudflare Pages as the only active ICloudDeploymentProvider adapter; Vercel, Netlify, AWS Amplify and GCP Cloud Run ship as disabled stubs so the architecture, UI and domain are provider-agnostic from day one. Deploy state (provider, status, deploymentId, public URL, error, lastDeployedAt) and git remote URL are persisted on the Application row in SQLite and stream to the UI via the existing /api/agent-events SSE loop. The deploy flow is deterministic (use case + provider adapter) — no agent in the loop. Users connect a provider via a "Connect" modal that opens the provider's token page and accepts a pasted API token, stored encrypted in a new cloud_provider_tokens table using AES-GCM with a machine-derived key.

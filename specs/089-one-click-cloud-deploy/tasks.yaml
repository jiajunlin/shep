content: |
  ## Summary

  **72 tasks across 14 phases.** Original 58 (phases 1-13) shipped in PR #554
  covering the full cloud-deploy + git-remote feature and CLI parity with zero
  logic duplication. **Phase 14 (14 new tasks, t-59..t-72)** was added after the
  PR opened — two blockers (CI fixes), 4 subagent framework tasks, and 8 follow-up
  clean-arch cleanup tasks executed via those subagents.

  **Current state as of 2026-04-14:**
  - **45 / 72 tasks complete** (all of phases 1-11 + 13)
  - **PR #554 open with 8 CI failures** — see `errors.current.ci-red-pr-554` in
    feature.yaml. Root cause of the 7 build-path failures is violation #19
    (ApplicationNotFoundError needs to move to domain/errors/). Gitleaks failure
    is pre-existing and needs separate investigation.
  - **Subagent framework 40% done** — 4 of 10 agents created in .claude/agents/.

  ## What's Left (priority order)

  ### Blockers
  - [ ] **t-59** — Relocate `ApplicationNotFoundError` to `domain/errors/` (unblocks 7 CI jobs)
  - [ ] **t-60** — Fix Gitleaks on `agent-settings-section.stories.tsx`
  - [ ] **t-72** — Full local build:release + CI sweep after blockers land

  ### Subagent framework
  - [ ] **t-61** — Create 6 remaining agents: shep-port-creator, shep-tsp-field-adder,
        shep-migration-creator, shep-web-route-creator, shep-storybook-story-creator,
        shep-cli-command-creator

  ### Clean-arch cleanup (via agents, parallelizable)
  - [ ] **t-62** — Fresh audit sweep via shep-clean-arch-auditor × 3
  - [ ] **t-63** — Kill `getSettings()` singleton (violation #17a, 5 callers)
  - [ ] **t-64** — Move `computeWorktreePath` + `TOOL_METADATA` to `domain/shared/` (#17b)
  - [ ] **t-65** — Extract 4 ports for node-helpers, phase-timing, conflict-resolution, attachment-storage (#17c)
  - [ ] **t-66** — Move `AgentSessionRepositoryRegistry` to infrastructure + add port (#16)
  - [ ] **t-67** — Eliminate `application/workflows/` directory (#15)
  - [ ] **t-68** — Add `no-restricted-imports` ESLint rule for application → infrastructure (#18)
  - [ ] **t-69** — Split `container.ts` into topic modules (#12)
  - [ ] **t-70** — Adopt `feature-id` helpers across 7 legacy callers (#11 finish)
  - [ ] **t-71** — Migrate remaining `console.*` to `ILogger` (#13 finish)

  ### Deferred from original plan (still in backlog, not in phase 14)
  - [ ] **t-28** (violations #1-3) — Refactor `deploy-application.ts` server action into `StartApplicationDeploymentUseCase`
  - [ ] **t-48, t-49** (violations #4-7) — Extract `StreamAgentEventsUseCase` + hide `isProcessAlive` behind a port + share `SdlcLifecycle→node` mapping
  - [ ] **t-46, t-47** (violations #8-10) — Split `application-page.tsx` (867 lines → N files), extract `useDevServerCoordinator` hook, wire commit buttons to real use cases
  - [ ] **t-29** — `CommitApplicationChangesUseCase` + `CommitAndPushApplicationChangesUseCase`
  - [ ] **t-51** — Playwright smoke test for cloud deploy

  ## Acceptance Checklist (final)

  - [ ] All 72 tasks completed
  - [ ] `pnpm lint` clean
  - [ ] `pnpm format:check` clean
  - [ ] `pnpm typecheck` clean
  - [ ] `pnpm tsp:compile` clean
  - [ ] `pnpm test:unit` green
  - [ ] `pnpm test:int` green
  - [ ] **`pnpm build:release` clean** (CLI + web — NOT just `pnpm build`)
  - [ ] `pnpm build:storybook` successful
  - [ ] `pnpm test:e2e` passes the cloud-deploy smoke test
  - [ ] `pnpm test:e2e:cli` passes the app-cloud-deploy CLI flow
  - [ ] `shep app --help` lists cloud-providers, deploy, and git subcommands
  - [ ] CLI + application use cases import only domain + application/ports (no infrastructure)
  - [ ] `packages/core/src/application/` contains only `ports/` and `use-cases/` (no services/, no workflows/)
  - [ ] Zero `console.*` in `packages/core/src/application/` and `packages/core/src/domain/`
  - [ ] Manual smoke: connect Cloudflare token → deploy → URL chip → refresh → state rehydrates
  - [ ] Manual smoke: create GitHub repo button → gh auth flow → remote chip appears
  - [ ] Every new component has a colocated .stories.tsx
  - [ ] clean-arch-violations.md: all 20 entries marked resolved OR referenced by a merged task
  - [ ] **PR #554 CI all-green (verified via `gh run list --branch feat/089-one-click-cloud-deploy`, not just `gh run watch`)**
  - [ ] Merged

  ---

  _Task details are in the tasks[] array above. Phase-14 tasks (t-59..t-72) are the
  current focus — everything before that is either shipped or deferred to its own PR._

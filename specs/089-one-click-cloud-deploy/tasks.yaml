name: "one-click-cloud-deploy"
summary: >
  Task breakdown for 089-one-click-cloud-deploy. **72 tasks across 14 phases.**
  Original 58 (phases 1-13) shipped in PR #554 covering cloud deploy + git-remote
  + CLI parity. Phase 14 (t-59..t-72) was added after the PR opened: 2 blockers
  for CI failures, 1 task to finish the user-requested subagent framework, and
  8 follow-up clean-arch cleanup tasks to be executed via those subagents.
  Current state: 45 of 72 complete, PR #554 open with CI red (blocked on t-59).


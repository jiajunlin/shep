name: "multi-provider-ai-sdk"
number: 86
branch: "feat/086-multi-provider-ai-sdk"
oneLiner: "Add OpenRouter and Together AI providers via Vercel AI SDK with backward-compatible executor abstraction"
summary: "Integrate the Vercel AI SDK as a unified provider abstraction layer, adding OpenRouter and Together AI as new agent types. Existing CLI-based executors (Claude Code, Cursor, Codex, Copilot, Gemini) remain untouched. New SDK-based executors use the AI SDK's generateText/streamText/generateObject APIs and share a common base class that adapts AI SDK responses to the existing IAgentExecutor interface.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures: []
technologies:
  - "Vercel AI SDK (ai package, v6+)"
  - "@ai-sdk/anthropic (Anthropic provider for AI SDK)"
  - "@ai-sdk/openai (OpenAI-compatible provider for AI SDK)"
  - "@ai-sdk/togetherai (Together AI official provider)"
  - "@openrouter/ai-sdk-provider (OpenRouter community provider)"
  - "TypeSpec (domain model generation)"
  - "tsyringe (dependency injection)"
  - "Zod (schema validation for structured output)"

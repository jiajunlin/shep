openQuestions:
  - question: "Should SDK-based executors support interactive (multi-turn persistent process) sessions?"
    resolved: true
    options:
      - option: "No interactive support"
        description: "SDK executors only support execute() and executeStream() — no createSession/resumeSession. Interactive sessions remain Claude Code-only. Simplifies initial implementation and avoids building a stateful conversation manager on top of HTTP APIs."
        selected: true
      - option: "Basic conversation memory"
        description: "Implement a lightweight message history that accumulates across calls, passing full history on each generateText call. Adds complexity but enables multi-turn workflows for SDK agents."
        selected: false
      - option: "Full interactive parity"
        description: "Build IInteractiveAgentExecutor support with stdin/stdout-like semantics over HTTP. Very complex, high risk, and not needed for current SDLC workflows."
        selected: false
    selectionRationale: "Interactive sessions are currently only used by the chat feature and only Claude Code supports them. The SDLC workflow (plan, implement, merge) uses single-shot execute() calls. Adding interactive support is unnecessary complexity for the initial SDK integration and can be added later if needed."
    answer: "No interactive support"
  - question: "How should the curated model list for OpenRouter be managed?"
    resolved: true
    options:
      - option: "Static hardcoded list"
        description: "Hardcode a curated list of popular coding-capable models in the factory, matching the pattern used by all existing agents. Simple, predictable, no network calls needed. Requires code changes to add new models."
        selected: true
      - option: "Dynamic API fetch"
        description: "Fetch available models from the OpenRouter /models API at runtime. Always up-to-date but adds network dependency, latency, caching complexity, and failure modes to what should be a fast local operation."
        selected: false
      - option: "Hybrid with cache"
        description: "Ship a static list but periodically refresh from the API. Best of both worlds but significant complexity for model discovery, cache invalidation, and offline behavior."
        selected: false
    selectionRationale: "All existing agents use static model lists in the factory (Claude Code: 3 models, Gemini: 4, Cursor: 8, etc.). A static list is consistent with the existing pattern, works offline, has zero latency, and avoids adding a network-dependent code path to the factory. New models can be added in future releases."
    answer: "Static hardcoded list"
  - question: "Should the base SDK executor handle API key validation at construction time or at first use?"
    resolved: true
    options:
      - option: "Validate at first use"
        description: "Defer API key validation to the first execute() call. The factory creates the executor instantly, and validation errors surface as execution failures with clear error messages. Matches the pattern of CLI executors which don't validate credentials at construction."
        selected: true
      - option: "Validate at construction"
        description: "Make a lightweight API call (e.g., list models) when the executor is created. Fails fast but adds latency to factory.createExecutor() and makes the factory async, breaking the current synchronous interface."
        selected: false
    selectionRationale: "CLI executors validate lazily — they don't check if the binary exists or credentials are valid until execute() is called. The factory interface is synchronous (createExecutor returns IAgentExecutor, not a Promise). Changing this to async would break the contract. Lazy validation is consistent, simple, and produces clear errors when the user actually tries to use the provider."
    answer: "Validate at first use"
  - question: "How should the system prompt be passed to SDK-based providers?"
    resolved: true
    options:
      - option: "System message in messages array"
        description: "Pass the system prompt as the first message with role 'system' in the messages array to generateText(). This is the standard AI SDK approach and works across all providers. The AgentExecutionOptions.systemPrompt field maps directly to this."
        selected: true
      - option: "Provider-specific system field"
        description: "Use provider-specific configuration for system prompts where available (e.g., Anthropic's system parameter). More optimal for specific providers but fragments the base class with provider-specific logic."
        selected: false
    selectionRationale: "The AI SDK's generateText() accepts a system parameter directly that handles provider-specific mapping internally. Using the SDK's built-in system parameter keeps the base class clean and lets the SDK handle provider differences."
    answer: "System message in messages array"
  - question: "Should SDK executors report costUsd in AgentExecutionUsage?"
    resolved: true
    options:
      - option: "Report tokens only"
        description: "Report inputTokens and outputTokens from the AI SDK response.usage. Do not calculate cost. Cost calculation requires maintaining a price table per model which is complex and quickly outdated."
        selected: true
      - option: "Calculate cost from token counts"
        description: "Maintain a per-model price table and calculate costUsd from token counts. Accurate but requires constant maintenance as providers change pricing."
        selected: false
    selectionRationale: "The AI SDK returns token counts in its response.usage but does not provide cost information. Building and maintaining a per-model price table for hundreds of OpenRouter models is impractical and would be perpetually outdated. Token counts are the reliable, provider-agnostic metric. Users can check their provider dashboard for cost tracking."
    answer: "Report tokens only"
  - question: "What error handling strategy should SDK executors use for provider API errors?"
    resolved: true
    options:
      - option: "Wrap in AgentExecutionResult with error metadata"
        description: "Catch AI SDK errors, extract HTTP status, error message, and provider-specific details. Return a failed AgentExecutionResult with error info in metadata, matching how CLI executors handle subprocess failures. Callers already handle error results."
        selected: false
      - option: "Throw typed errors"
        description: "Let errors propagate as exceptions. The AI SDK throws well-structured errors (APIError with status, message, cause). Callers already have try/catch for executor failures. Throw with enhanced error messages that include provider name and HTTP status for diagnostics."
        selected: true
    selectionRationale: "CLI executors throw errors on subprocess failures (non-zero exit codes, timeouts) — they don't return error results. The caller code in use cases and structured agent caller already uses try/catch for executor failures. Throwing typed errors is consistent with existing behavior and provides clean stack traces for debugging."
    answer: "Throw typed errors"
  - question: "Should auth detection for SDK providers check API key validity via a test API call?"
    resolved: true
    options:
      - option: "Check key presence only"
        description: "The IAgentAuthDetectorService returns authenticated=true if an API key is present (non-empty string in AgentConfig.token). No network call. Fast, works offline, no rate limit risk. Invalid keys will fail on first execute() with a clear API error."
        selected: true
      - option: "Validate key with API call"
        description: "Make a lightweight API call to verify the key is valid (e.g., list models). Catches typos early but adds latency, requires network, can hit rate limits, and introduces a failure mode for a status check."
        selected: false
    selectionRationale: "The auth check is called during onboarding and settings UI rendering. It must be fast and reliable. Existing CLI agents check binary presence, not credential validity — that's discovered at execution time. API key presence is sufficient for the auth status indicator. Invalid keys produce clear errors from the provider when the user tries to execute."
    answer: "Check key presence only"
content: "## Problem Statement\n\nShep currently supports AI agents exclusively through CLI-based executors — each agent type\nspawns a subprocess (e.g., `claude`, `cursor`, `codex`, `gemini`) and parses its stdout. This\narchitecture limits Shep to agents that have a local CLI binary installed on the user's machine.\n\nUsers want access to models available through cloud API providers like OpenRouter (hundreds of\nmodels from multiple vendors through a single API key) and Together AI (fast open-source model\ninference). These providers don't have CLI tools — they expose HTTP APIs.\n\nAdditionally, the current structured output implementation uses manual brace-depth JSON parsing\nas a fallback for agents that don't natively support structured output. The Vercel AI SDK provides\n`generateObject()` with Zod schema validation, which is more robust and works across all providers.\n\nThis feature introduces the Vercel AI SDK as an HTTP-based execution path alongside the existing\nCLI-based path, adding OpenRouter and Together AI as the first SDK-based providers while keeping\nall existing CLI executors fully backward compatible.\n\n## Success Criteria\n\n### Core Execution\n- [ ] OpenRouter executor implements IAgentExecutor and successfully calls generateText() with a prompt\n- [ ] Together AI executor implements IAgentExecutor and successfully calls generateText() with a prompt\n- [ ] Both executors stream responses via streamText(), yielding AgentExecutionStreamEvent items with type progress/result\n- [ ] Both executors report inputTokens and outputTokens in AgentExecutionUsage from AI SDK response.usage\n- [ ] Structured output works via generateObject() with Zod schemas when outputSchema is provided in options\n- [ ] Both executors support the systemPrompt option, passing it as the system parameter to generateText/streamText\n- [ ] Both executors respect the timeout option, aborting the AI SDK call via AbortController after the specified duration\n- [ ] Both executors respect the model option, selecting the specified model from the provider\n\n### Domain & TypeSpec\n- [ ] AgentType enum includes OpenRouter (\"openrouter\") and TogetherAi (\"together-ai\") values\n- [ ] TypeSpec compiles without errors after enum additions (pnpm tsp:compile succeeds)\n- [ ] Generated output.ts includes the new enum values and existing code still compiles\n\n### Factory & DI Integration\n- [ ] AgentExecutorFactory.createExecutor() returns OpenRouterExecutorService for AgentType.OpenRouter\n- [ ] AgentExecutorFactory.createExecutor() returns TogetherAiExecutorService for AgentType.TogetherAi\n- [ ] AgentExecutorFactory.getSupportedAgents() includes both new agent types\n- [ ] AgentExecutorFactory.getSupportedModels() returns curated model lists for both providers\n- [ ] AgentExecutorFactory.getCliInfo() returns entries with null/empty cmd for SDK-based agents\n- [ ] DI container wires new executors without breaking existing registrations\n\n### Auth & Settings\n- [ ] API key flows through existing AgentConfig.token field — no new settings schema needed\n- [ ] Auth detection (IAgentAuthDetectorService) returns authenticated=true when token is non-empty for SDK agents\n- [ ] Auth validation (CheckAgentAuthUseCase) reports installed=true for SDK agents (no binary needed)\n- [ ] AGENT_METADATA in CheckAgentAuthUseCase includes entries for both new agents with null binaryName\n\n### Presentation Layer\n- [ ] TUI agent config wizard lists OpenRouter and Together AI as selectable options\n- [ ] TUI wizard prompts for API key (token auth) when selecting either SDK provider\n- [ ] Web UI agent settings dropdown includes OpenRouter and Together AI options\n- [ ] Web UI shows token input field when SDK providers are selected (token auth forced)\n- [ ] Model dropdown populates with provider-specific curated models for both agents\n\n### Backward Compatibility\n- [ ] All existing CLI-based agents (claude-code, cursor, codex-cli, copilot-cli, gemini-cli, dev) work without any modification\n- [ ] Existing settings databases require no migration — new enum values are additive\n- [ ] IAgentExecutor interface has zero changes — new executors implement it as-is\n- [ ] StructuredAgentCallerService works with SDK executors when supportsFeature(structuredOutput) returns true\n\n### Test Coverage\n- [ ] Unit tests for AiSdkBaseExecutorService with mocked AI SDK calls (generateText, streamText, generateObject)\n- [ ] Unit tests for OpenRouterExecutorService verifying correct provider initialization\n- [ ] Unit tests for TogetherAiExecutorService verifying correct provider initialization\n- [ ] Unit tests for factory switch cases returning correct executor instances\n- [ ] Unit tests for auth detection returning true when token is present, false when absent\n- [ ] Integration test verifying factory creates and caches SDK executors per agent type\n- [ ] All existing tests pass without modification (no breaking changes to test fixtures from new enum values)\n\n## Functional Requirements\n\n- **FR-1: AI SDK Base Executor** — Create an abstract AiSdkBaseExecutorService class that implements IAgentExecutor using the Vercel AI SDK. The constructor accepts an AI SDK LanguageModel instance (provider-agnostic). execute() delegates to generateText(), executeStream() delegates to streamText(), and when outputSchema is provided in options, execute() uses generateObject() with a Zod schema. The base class maps AI SDK responses to AgentExecutionResult (result string, usage with inputTokens/outputTokens, sessionId=undefined) and streams to AgentExecutionStreamEvent (progress events for text deltas, result event for completion).\n\n- **FR-2: OpenRouter Executor** — Create OpenRouterExecutorService extending AiSdkBaseExecutorService. Instantiates the OpenRouter provider via createOpenRouter({ apiKey }) from @openrouter/ai-sdk-provider. The model is selected at execution time from options.model (default to a sensible coding model). supportsFeature() returns true for streaming, structured-output, and system-prompt; false for session-resume, tool-scoping, and session-listing.\n\n- **FR-3: Together AI Executor** — Create TogetherAiExecutorService extending AiSdkBaseExecutorService. Instantiates the Together AI provider via createTogetherAI({ apiKey }) from @ai-sdk/togetherai. Same feature support flags as OpenRouter. Model default should be a strong open-source coding model (e.g., a Llama variant).\n\n- **FR-4: TypeSpec Enum Extensions** — Add OpenRouter: \"openrouter\" and TogetherAi: \"together-ai\" to the AgentType enum in tsp/common/enums/agent-config.tsp. No changes to AgentAuthMethod (token auth already exists). Regenerate output.ts via pnpm tsp:compile.\n\n- **FR-5: Factory Integration** — Add switch cases in AgentExecutorFactory.createExecutor() for \"openrouter\" and \"together-ai\". Both cases construct the SDK-based executor with the API key from authConfig.token. Add static curated model lists: OpenRouter should include popular coding models from multiple vendors (Anthropic Claude, OpenAI GPT, Meta Llama, Google Gemini, Mistral, DeepSeek); Together AI should focus on strong open-source coding models (Llama, Qwen, DeepSeek, Mistral). getSupportedAgents() returns both new types. getCliInfo() returns entries with null cmd for SDK agents. supportsInteractive() returns false for both.\n\n- **FR-6: DI Container Wiring** — Update the DI container to pass no additional dependencies to the factory (the factory already receives spawn; SDK executors don't need it). The factory constructs SDK executors internally using the API key from authConfig — no changes to the factory constructor signature needed.\n\n- **FR-7: Auth Detection for SDK Agents** — Update the IAgentAuthDetectorService implementation to handle SDK agent types: return authenticated=true if AgentConfig.token is a non-empty string. No CLI binary check or network call needed.\n\n- **FR-8: Auth Check Use Case Metadata** — Add entries to AGENT_METADATA in CheckAgentAuthUseCase for OpenRouter and Together AI: label (\"OpenRouter\" / \"Together AI\"), toolId=null (no installable CLI tool), binaryName=null. The installed field should return true for SDK agents (they don't require a local binary).\n\n- **FR-9: TUI Wizard Updates** — Add OpenRouter and Together AI to the agent selection prompt in the TUI agent config wizard. Both should appear as enabled options (not \"Coming Soon\"). When selected, the wizard should force authMethod=Token and prompt for an API key.\n\n- **FR-10: Web UI Settings Updates** — Add OpenRouter and Together AI to the AGENT_TYPE_OPTIONS array in agent-settings-section.tsx. Add both to a new TOKEN_REQUIRED_AGENTS set (similar to SESSION_ONLY_AGENTS but inverted — force token auth). When an SDK agent is selected, automatically switch authMethod to Token and show the API key input. Display helper text explaining the API key requirement.\n\n- **FR-11: Structured Output via generateObject** — When the base SDK executor receives an outputSchema in options, convert the JSON schema to a Zod schema (or accept Zod directly if the caller provides it) and call generateObject() instead of generateText(). Return the structured object in result.metadata.structured_output, matching the convention used by the Claude Code native structured output path.\n\n- **FR-12: Error Handling** — SDK executors throw on API errors. Errors include the provider name, HTTP status code, and provider error message. Rate limit errors (429) include the retry-after header value if present. Authentication errors (401/403) include a clear message about checking the API key. Timeout errors are thrown when AbortController triggers.\n\n- **FR-13: Token Usage Reporting** — Map AI SDK response.usage to AgentExecutionUsage: response.usage.promptTokens → inputTokens, response.usage.completionTokens → outputTokens. Set costUsd=undefined (not calculated). Set cacheCreationInputTokens and cacheReadInputTokens to undefined (not available from all providers).\n\n## Non-Functional Requirements\n\n- **NFR-1: No Breaking Changes** — Zero modifications to the IAgentExecutor, IAgentExecutorFactory, or IAgentExecutorProvider interfaces. All existing executors, use cases, and presentation layers must continue functioning identically. This is a purely additive change.\n\n- **NFR-2: Dependency Footprint** — New npm dependencies limited to: ai (Vercel AI SDK core), @ai-sdk/togetherai, @openrouter/ai-sdk-provider. Zod is already present as a transitive dependency; if not explicitly in package.json, add it. No other new dependencies. The ai package should be tree-shakeable; only import generateText, streamText, generateObject.\n\n- **NFR-3: Timeout Compliance** — SDK executors must respect the timeout option using AbortController. If no timeout is provided, use a sensible default (e.g., 300 seconds) to prevent hanging requests. The abort signal must be passed to the AI SDK call.\n\n- **NFR-4: API Key Security** — API keys must never be logged, serialized to disk outside the encrypted settings database, or included in error messages. The AgentConfig.token field is already stored in SQLite — no new storage mechanism needed. Error messages referencing auth should say \"API key is missing or invalid\" without echoing the key.\n\n- **NFR-5: Offline Resilience** — The factory must instantiate SDK executors without making network calls. Network failures surface only at execute() time with clear error messages (connection refused, DNS failure, timeout). The settings UI, agent selection, and model listing must all work fully offline.\n\n- **NFR-6: Clean Architecture Compliance** — SDK provider packages (@openrouter/ai-sdk-provider, @ai-sdk/togetherai, ai) are imported ONLY in the infrastructure layer (executors). The application and domain layers have zero knowledge of the Vercel AI SDK. The base class and provider-specific executors live in infrastructure/services/agents/common/executors/.\n\n- **NFR-7: Test Isolation** — All unit tests mock the AI SDK functions (generateText, streamText, generateObject) at the module level. No test makes real HTTP calls. Integration tests use the factory to verify correct executor instantiation but do not call execute().\n\n- **NFR-8: Streaming Latency** — The executeStream() implementation must yield the first AgentExecutionStreamEvent within 100ms of receiving the first text delta from the AI SDK stream. No buffering of chunks beyond what the SDK provides.\n\n- **NFR-9: Executor Caching** — The factory must cache SDK executor instances per agent type (matching existing behavior for CLI executors using the Map<string, IAgentExecutor> cache). Repeated calls to createExecutor() with the same agent type return the same instance.\n\n- **NFR-10: Model List Maintainability** — Curated model lists should be defined as named constants (not inline arrays) in the factory, making them easy to update in future releases without touching logic code.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Should SDK executors support interactive sessions? | No interactive support | Interactive sessions are only used by the chat feature and only Claude Code supports them. SDLC workflows use single-shot execute(). Adding interactive later is straightforward. |\n| 2 | How should the OpenRouter model list be managed? | Static hardcoded list | All existing agents use static lists in the factory. Consistent, offline-capable, zero-latency. New models added in future releases. |\n| 3 | When should API keys be validated? | At first use (lazy) | Factory is synchronous. CLI executors validate lazily. Consistent behavior, clear errors on first execute(). |\n| 4 | How should system prompts be passed? | System message via AI SDK system parameter | AI SDK handles provider-specific mapping internally. Clean base class, no provider-specific branching. |\n| 5 | Should SDK executors report costUsd? | Report tokens only | AI SDK doesn't provide cost. Maintaining price tables for hundreds of models is impractical. Token counts are reliable. |\n| 6 | What error handling strategy for API errors? | Throw typed errors | CLI executors throw on failures. Callers use try/catch. Consistent behavior, clean stack traces. |\n| 7 | Should auth detection validate keys via API call? | Check key presence only | Auth checks must be fast and offline-capable. CLI agents check binary presence, not credential validity. Invalid keys fail clearly at execution. |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `tsp/common/enums/agent-config.tsp` | High | Add OpenRouter and TogetherAi values to AgentType enum |\n| `packages/core/src/domain/generated/output.ts` | High | Auto-regenerated from TypeSpec after enum changes |\n| `packages/core/src/infrastructure/services/agents/common/executors/` | High | New executor implementations: ai-sdk-base-executor.service.ts, openrouter-executor.service.ts, together-ai-executor.service.ts |\n| `packages/core/src/infrastructure/services/agents/common/agent-executor-factory.service.ts` | High | Add switch cases for new agent types, add model lists, update getSupportedAgents/getCliInfo |\n| `packages/core/src/infrastructure/di/container.ts` | Low | No changes expected — factory constructs SDK executors internally |\n| `packages/core/src/infrastructure/services/agents/common/structured-agent-caller.service.ts` | Low | No changes needed — works automatically when supportsFeature(structuredOutput) returns true |\n| `packages/core/src/application/ports/output/agents/agent-executor.interface.ts` | None | Interface remains unchanged |\n| `packages/core/src/application/ports/output/agents/agent-executor-factory.interface.ts` | None | Interface remains unchanged |\n| `packages/core/src/application/use-cases/agents/check-agent-auth.use-case.ts` | Medium | Add AGENT_METADATA entries for both new agents |\n| `packages/core/src/infrastructure/services/agents/common/agent-auth-detector.service.ts` | Medium | Add token-presence check logic for SDK agent types |\n| `packages/core/src/infrastructure/services/agents/common/agent-validator.service.ts` | Low | Add entries that return available=true with no binary check for SDK agents |\n| TUI agent config wizard (`agent-select.prompt.ts`, `agent-config.wizard.ts`) | Medium | Add new agents to selection list, force token auth |\n| Web UI agent settings (`agent-settings-section.tsx`) | Medium | Add new agents to dropdown, add TOKEN_REQUIRED_AGENTS set |\n| Web UI agent models action (`get-all-agent-models.ts`) | Low | Automatically picks up new agents from factory |\n| `package.json` | Medium | Add ai, @ai-sdk/togetherai, @openrouter/ai-sdk-provider dependencies |\n| Test fixtures | Medium | Existing test fixtures may need updates if they exhaustively list AgentType values |\n\n## Dependencies\n\n**New npm packages:**\n- `ai` (Vercel AI SDK core, v6+) — generateText, streamText, generateObject APIs\n- `@ai-sdk/togetherai` (official Together AI provider for AI SDK)\n- `@openrouter/ai-sdk-provider` (community OpenRouter provider for AI SDK)\n- `zod` (if not already explicit — required by generateObject for schema validation)\n\n**Existing infrastructure leveraged:**\n- `IAgentExecutor` interface (no changes needed)\n- `IAgentExecutorFactory` interface (no changes needed)\n- `AgentExecutorFactory` (add switch cases, model lists)\n- `AgentConfig.token` field (API key storage already exists)\n- `AgentAuthMethod.Token` (token auth already exists)\n- `StructuredAgentCallerService` (works out of the box when executor reports structuredOutput support)\n- tsyringe DI container (minimal or no changes)\n- Executor caching in factory (Map<string, IAgentExecutor>)\n\n## Size Estimate\n\n**L** — This feature touches the agent execution layer end-to-end: TypeSpec enums, domain generation,\nnew executor implementations with a shared base class, factory updates, auth detection, TUI/Web\nsettings UI updates, and comprehensive test coverage. The AI SDK integration requires adapting a new\nlibrary's API surface to the existing IAgentExecutor contract. While the architecture is well-prepared\nfor new providers (factory pattern, clean interfaces), the number of files touched (15-20) and the\nneed for thorough testing across two new providers with mocked SDK calls pushes this to L.\n\nKey scope drivers:\n- 3 new executor files (base + 2 providers) with full IAgentExecutor implementation\n- Streaming adapter logic (AI SDK stream → AsyncIterable<AgentExecutionStreamEvent>)\n- Structured output adapter (generateObject + Zod → metadata.structured_output)\n- Auth detection updates across multiple services\n- TUI and Web UI updates for agent selection and token auth forcing\n- Comprehensive unit test suite with mocked AI SDK calls\n- Integration tests for factory wiring\n"

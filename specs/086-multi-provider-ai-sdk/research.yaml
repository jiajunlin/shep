name: multi-provider-ai-sdk
summary: >
  Technical research for integrating Vercel AI SDK v6 as a unified HTTP-based execution path
  alongside existing CLI executors. Key finding: @ai-sdk/togetherai v2.x is incompatible with
  AI SDK v6 (requires v3 model specification not yet released). Together AI will use
  @ai-sdk/openai-compatible instead. OpenRouter uses @openrouter/ai-sdk-provider v2.5.1 which
  is fully v6-compatible. The base executor maps AI SDK generateText/streamText/generateObject
  to the existing IAgentExecutor interface with zero interface changes.


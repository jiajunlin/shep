        selected: false
    selectionRationale: >
      The ai package exports jsonSchema() specifically for this use case. It accepts a raw
      JSON Schema object and produces a schema that generateObject() can use. This keeps the
      IAgentExecutor interface unchanged (outputSchema remains a plain object) and avoids
      complex JSON-Schema-to-Zod conversion code. The ai package handles provider-specific
      mapping internally (e.g., Anthropic tool_use, OpenAI response_format).


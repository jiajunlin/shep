# Structured technology decisions
decisions:
  - title: "Together AI Provider Package"
    chosen: "@ai-sdk/openai-compatible with Together AI baseURL"
    rejected:
      - "@ai-sdk/togetherai - Current v2.0.41 uses v2 model specification, incompatible with AI SDK v6 which requires v3 spec. Open GitHub issue #11780 requesting v3 support has no release as of April 2026. Using this would force pinning to AI SDK v5, which is outdated and missing v6 features like the v3 Language Model Specification, improved structured output via Output.object(), and structured timeout options."
      - "Direct HTTP calls without AI SDK - Would bypass the entire AI SDK abstraction, requiring manual HTTP client code, streaming SSE parsing, error handling, and token usage extraction. Defeats the purpose of using a unified SDK."
    rationale: >
      Together AI exposes an OpenAI-compatible API at https://api.together.xyz/v1. The
      @ai-sdk/openai-compatible package (v3.x) is officially maintained by Vercel, confirmed
      compatible with AI SDK v6, and provides createOpenAICompatible() with full chatModel()
      support. This gives us the same generateText/streamText/generateObject API surface as
      OpenRouter while using Together AI's infrastructure. When @ai-sdk/togetherai v3 eventually
      ships, migration is trivial (swap createOpenAICompatible for createTogetherAI). The codebase
      pattern of provider-agnostic LanguageModel instances means the base executor class needs
      zero changes for this swap.

  - title: "AI SDK Version"
    chosen: "ai@^6.0.0 (v6 stable)"
    rejected:
      - "ai@^5.0.0 - Older major version, uses v2 model specification. Missing v3 spec features: improved agent support, structured timeout (totalMs/stepMs/chunkMs), Output.object() for structured generation, improved streaming events. Would be outdated within months."
      - "ai@^7.0.0-beta - Pre-release (currently 7.0.0-beta.76). Unstable API surface, breaking changes between betas. Not suitable for production dependency."
    rationale: >
      AI SDK v6 is the current stable major version with the v3 Language Model Specification.
      The @openrouter/ai-sdk-provider v2.5.1 explicitly peers on ai@^6.0.0. The v6 API
      surface (generateText, streamText, generateObject) maps cleanly to our IAgentExecutor
      interface. The timeout parameter supports both simple milliseconds and structured
      {totalMs, stepMs, chunkMs} which is more capable than our current setTimeout approach.

  - title: "Base Executor Architecture"
    chosen: "Abstract AiSdkBaseExecutorService class with provider-injected LanguageModel"
    rejected:
      - "Separate executor classes with duplicated AI SDK calls - Each provider executor would independently call generateText/streamText/generateObject, duplicating response mapping, error handling, streaming conversion, and usage extraction. Violates DRY and makes adding future providers expensive."
      - "Composition over inheritance (strategy pattern) - A non-abstract executor that accepts a provider factory function. More flexible but adds unnecessary indirection when the only variation between providers is how the LanguageModel is constructed. The current CLI executors use concrete classes, not strategies."
    rationale: >
      The abstract base class pattern keeps all AI SDK interaction logic (generateText mapping,
      stream conversion, error handling, usage extraction) in one place. Concrete subclasses
      (OpenRouterExecutorService, TogetherAiExecutorService) only override provider construction
      and feature flags. This matches the codebase pattern where CLI executors are concrete
      classes with shared patterns but no formal base class (their shared patterns are simpler
      since each CLI has different JSON output formats). SDK executors share the SAME AI SDK
      response format, making a base class the natural abstraction.

  - title: "Streaming Implementation"
    chosen: "streamText().textStream as AsyncIterable yielding AgentExecutionStreamEvent"
    rejected:
      - "streamText().fullStream with event-type routing - fullStream emits typed events (text, reasoning, tool-call, finish, etc.) requiring complex switch/case routing. Our AgentExecutionStreamEvent only has three types (progress/result/error). The added complexity of full event routing is unnecessary since we only need text deltas and completion."
      - "Custom ReadableStream adapter - Wrapping the AI SDK stream in a manual ReadableStream/TransformStream pipeline. Overly complex when textStream already implements AsyncIterable directly and can be consumed with for-await-of."
    rationale: >
      streamText() returns a StreamTextResult whose textStream property implements both
      AsyncIterable<string> and ReadableStream<string>. Our executeStream() returns
      AsyncIterable<AgentExecutionStreamEvent>. The mapping is direct: each string chunk
      from textStream becomes a progress event, and after iteration completes we await
      result.usage and result.text to emit a final result event. This is the simplest
      possible adapter with zero buffering — the first text delta from the provider
      immediately yields a progress event to the caller.

  - title: "Structured Output Strategy"
    chosen: "generateObject() with Zod schema conversion from JSON Schema input"
    rejected:
      - "generateText() with Output.object() - The v6 preferred pattern, but requires the caller to pass a Zod schema directly. Our IAgentExecutor.execute() accepts outputSchema as a plain JSON Schema object (to stay framework-agnostic in the interface). Converting JSON Schema to Zod at the base class level and using generateObject() is simpler than adapting the Output.object() API."
      - "Prompt-based JSON extraction (existing fallback) - The StructuredAgentCallerService already has brace-depth JSON parsing as a fallback for agents without native structured output. Using this for SDK agents would miss the opportunity for provider-enforced schema validation. generateObject() uses provider-native structured output where available (e.g., Anthropic tool_use, OpenAI response_format)."
    rationale: >
      The existing StructuredAgentCallerService checks executor.supportsFeature(structuredOutput)
      and calls execute() with outputSchema if true. The base SDK executor intercepts outputSchema
      in execute(), converts the JSON Schema to a Zod schema using zod's z.object() builder (or
      uses the ai package's jsonSchema() wrapper for raw JSON schemas), and delegates to
      generateObject(). This keeps the IAgentExecutor interface unchanged (outputSchema remains
      a plain object) while gaining provider-native structured output enforcement.

  - title: "Error Handling Strategy"
    chosen: "Catch and rethrow AI SDK errors with enhanced context"
    rejected:
      - "Return error in AgentExecutionResult metadata - Would require callers to check result.metadata.error after every execute() call. The existing CLI executors throw on subprocess failures (non-zero exit, ENOENT, timeout). Returning errors silently would break the established contract."
      - "Let AI SDK errors propagate unmodified - AI SDK throws well-structured errors (APICallError with statusCode, isRetryable, responseBody) but the error messages lack our provider context. Callers would see generic API errors without knowing which provider failed or what API key to check."
    rationale: >
      CLI executors throw errors on failures. The caller code in use cases and
      StructuredAgentCallerService uses try/catch. Consistency requires throwing. We catch
      APICallError, extract statusCode and isRetryable, and rethrow with enhanced messages
      that include the provider name. For 401/403 we add guidance about checking the API key.
      For 429 we include rate limit info. The APICallError.isInstance() type guard makes this
      clean. Non-API errors (network, DNS, timeout) are wrapped similarly with provider context.

  - title: "Token Usage Mapping"
    chosen: "Map AI SDK LanguageModelUsage to AgentExecutionUsage with cache token details"
    rejected:
      - "Report only inputTokens/outputTokens, ignore details - Would lose cache hit/miss information that the AI SDK provides via inputTokenDetails.cacheReadTokens and inputTokenDetails.cacheWriteTokens. Our AgentExecutionUsage already has cacheCreationInputTokens and cacheReadInputTokens fields."
      - "Calculate costUsd from a price table - AI SDK does not provide cost. Maintaining per-model price tables for hundreds of OpenRouter models is impractical and perpetually outdated. Token counts are the reliable metric."
    rationale: >
      The AI SDK v6 LanguageModelUsage includes inputTokens, outputTokens, totalTokens, plus
      inputTokenDetails (cacheReadTokens, cacheWriteTokens) and outputTokenDetails (reasoningTokens).
      Our AgentExecutionUsage has inputTokens, outputTokens, cacheCreationInputTokens, and
      cacheReadInputTokens. The mapping is: usage.inputTokens -> inputTokens,
      usage.outputTokens -> outputTokens, usage.inputTokenDetails?.cacheWriteTokens ->
      cacheCreationInputTokens, usage.inputTokenDetails?.cacheReadTokens -> cacheReadInputTokens.
      costUsd remains undefined. This extracts maximum value from the AI SDK response without
      inventing data we do not have.

  - title: "Timeout Implementation"
    chosen: "Pass timeout directly to AI SDK timeout parameter"
    rejected:
      - "Manual AbortController with setTimeout - The pre-v6 pattern: create AbortController, setTimeout to call abort(), pass signal to generateText(). Works but reimplements what AI SDK v6 provides natively with the timeout parameter. Also requires manual cleanup of the timeout on success."
      - "No timeout (rely on provider defaults) - Dangerous: a hanging HTTP connection would block the executor indefinitely. Our AgentExecutionOptions.timeout exists for a reason. CLI executors enforce timeouts via setTimeout + process.kill()."
    rationale: >
      AI SDK v6 introduced a native timeout parameter that accepts either a number (milliseconds)
      or a structured object {totalMs, stepMs, chunkMs}. Passing our options.timeout as the
      numeric milliseconds value delegates all abort logic to the SDK. For streaming, chunkMs
      could detect stalled streams. If no timeout is provided in options, we use a default of
      300000ms (5 minutes) matching reasonable API call expectations. This is simpler and more
      robust than manual AbortController management.

  - title: "Factory Caching for SDK Executors"
    chosen: "Reuse existing Map<string, IAgentExecutor> cache in factory"
    rejected:
      - "No caching (new instance per call) - Would create new provider instances on every createExecutor() call. The provider constructor (createOpenRouter, createOpenAICompatible) allocates internal state. Repeated allocation is wasteful when the executor is stateless."
      - "Separate cache for SDK vs CLI executors - Unnecessary complexity. The existing cache is keyed by agent type string. SDK executor keys (openrouter, together-ai) are distinct from CLI keys (claude-code, cursor). A single cache handles both."
    rationale: >
      The factory already maintains a Map<string, IAgentExecutor> cache keyed by agent type
      string. CLI executors are cached here. Adding SDK executors to the same cache requires
      zero new code — the existing cache-check-or-create pattern in createExecutor() handles
      it. The SDK executor instances are stateless (no conversation memory, no process handle)
      so caching is safe. The API key comes from authConfig at creation time and is baked into
      the provider instance.

  - title: "Auth Detection for SDK Agents"
    chosen: "Token presence check (non-empty string in AgentConfig.token)"
    rejected:
      - "API call validation (e.g., list models) - Adds latency, requires network, can hit rate limits, introduces failure modes for what should be a fast status check. Auth detection is called during onboarding and settings rendering — it must be instant."
      - "Environment variable check (OPENROUTER_API_KEY, TOGETHER_API_KEY) - These env vars are provider-specific and not how our settings system stores keys. Keys are stored in AgentConfig.token via the settings DB. Checking env vars would miss keys configured through the UI."
    rationale: >
      The existing auth detection for CLI agents checks binary presence and credential files.
      SDK agents have no binary. Their credential is the API key stored in AgentConfig.token.
      The IAgentAuthDetectorService.isAuthenticated() receives the agentType and binaryName
      (null for SDK agents). For SDK agent types, we check if the token field is a non-empty
      string. This is fast, offline-capable, and consistent with the conservative heuristic
      approach used by CLI agents. Invalid keys produce clear errors at execute() time.

  - title: "Model List Management"
    chosen: "Static curated lists as named constants in factory"
    rejected:
      - "Dynamic API fetch from OpenRouter /models endpoint - Adds network dependency, latency, caching complexity, and failure modes to what is currently a fast synchronous method. getSupportedModels() returns string[] synchronously. Making it async would break the interface contract."
      - "Hybrid with local cache and periodic refresh - Significant complexity for model discovery, cache invalidation, TTL management, and offline fallback. All existing agents use static lists. Consistency matters more than having the absolute latest model names."
    rationale: >
      All existing agents use static model lists defined as named constants in the factory file
      (CLAUDE_CODE_MODELS, GEMINI_CLI_MODELS, CURSOR_MODELS, etc.). getSupportedModels() is
      synchronous and returns string[]. OpenRouter has hundreds of models but users only need
      a curated set of popular coding-capable models. Together AI similarly has dozens of models
      but a curated coding-focused list is more useful than a raw dump. New models are added in
      future releases. This is the established pattern and works offline with zero latency.

  - title: "Web UI Token Auth Forcing"
    chosen: "TOKEN_REQUIRED_AGENTS set mirroring SESSION_ONLY_AGENTS pattern"
    rejected:
      - "Provider-type enum check (SDK vs CLI) - Would require a new concept (provider type) that does not exist in the domain model. The agent type enum is the only discriminator. A simple Set<AgentType> is consistent with the existing SESSION_ONLY_AGENTS pattern."
      - "Hardcoded if/else in the component - Less maintainable than a declarative Set. Adding future SDK providers would require modifying conditional logic instead of adding to a constant."
    rationale: >
      The Web UI agent-settings-section.tsx already has SESSION_ONLY_AGENTS = new Set([CopilotCli])
      to force session auth for Copilot. Adding TOKEN_REQUIRED_AGENTS = new Set([OpenRouter,
      TogetherAi]) follows the exact same pattern. When selectedType is in TOKEN_REQUIRED_AGENTS,
      the auth method dropdown is disabled and forced to Token, and the API key input is always
      shown. This is symmetric with how SESSION_ONLY_AGENTS forces Session auth.

  - title: "Check Agent Auth Use Case Updates"
    chosen: "Add SDK agents to AGENT_METADATA with null toolId and binaryName, return installed=true"
    rejected:
      - "Skip AGENT_METADATA and handle SDK agents with a separate code path - Would fragment the auth check logic into CLI and SDK branches. The existing metadata-driven approach (lookup -> tool check -> auth check) is clean. SDK agents simply have null toolId which triggers the early-return path (same as dev, aider, continue)."
      - "Add a new sdkProvider field to AGENT_METADATA - Unnecessary complexity. The null toolId convention already handles agents with no installable binary. SDK agents follow the same pattern as the existing coming-soon agents (Aider, Continue) which also have null toolId."
    rationale: >
      The CheckAgentAuthUseCase has an AGENT_METADATA record mapping agent types to {label,
      toolId, binaryName}. When toolId is null, the use case returns installed=true and
      authenticated=true immediately (no tool check, no auth detection needed). This is the
      existing pattern for dev, Aider, and Continue. For SDK agents, we add entries with
      label set to the display name, toolId=null, binaryName=null. The auth check for
      token presence happens at a different layer (IAgentAuthDetectorService) which the
      use case calls only when toolId is non-null. For SDK agents, the settings UI enforces
      token auth, and execution-time errors handle invalid keys.


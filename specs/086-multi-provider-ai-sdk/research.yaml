  - question: "How should the base executor handle JSON Schema to Zod conversion for generateObject?"
    resolved: true
    options:
      - option: "Use ai package's jsonSchema() wrapper"
        description: "The ai package exports a jsonSchema() function that wraps a raw JSON Schema object into a format accepted by generateObject(). No manual Zod schema construction needed. The AI SDK handles provider-specific schema mapping internally."
        selected: true
      - option: "Build Zod schema programmatically from JSON Schema"
        description: "Parse the JSON Schema object and construct a Zod schema using z.object(), z.string(), z.number(), etc. Full control but complex recursive mapping, and fragile for edge cases (allOf, oneOf, nested refs)."

# Markdown content (the full research document)
content: |
  ## Status

  - **Phase:** Research (Complete)
  - **Updated:** 2026-04-09

  ## Critical Finding: @ai-sdk/togetherai v6 Incompatibility

  The original spec listed `@ai-sdk/togetherai` as a dependency. **This package is NOT compatible
  with AI SDK v6.** The current version (2.0.41) uses the v2 model specification while AI SDK v6
  requires v3. An open GitHub issue (#11780, opened Jan 2026) requests v3 support but no release
  exists as of April 2026.

  **Workaround:** Together AI exposes an OpenAI-compatible API. We use `@ai-sdk/openai-compatible`
  (officially maintained by Vercel, v6-compatible) with Together AI's base URL. Migration to a
  native `@ai-sdk/togetherai` v3 when released is a one-line change.

  ## Technology Decisions

  ### 1. Together AI Provider Package

  **Chosen:** `@ai-sdk/openai-compatible` with `baseURL: 'https://api.together.xyz/v1'`

  **Rejected:**
  - `@ai-sdk/togetherai` — v2.0.41 incompatible with AI SDK v6 (v2 model spec vs required v3)
  - Direct HTTP calls — defeats purpose of unified SDK abstraction

  **Rationale:** Together AI's API is OpenAI-compatible. The `@ai-sdk/openai-compatible` package
  is Vercel-maintained and v6-compatible. When native v3 support ships, migration is trivial.

  ### 2. AI SDK Version

  **Chosen:** `ai@^6.0.0` (current stable)

  **Rejected:**
  - `ai@^5.0.0` — outdated, conflicts with `@openrouter/ai-sdk-provider@^2.5.1` which peers on v6
  - `ai@^7.0.0-beta` — pre-release, unstable API surface

  **Rationale:** v6 is stable, has the v3 Language Model Specification, structured timeout support,
  and is what the OpenRouter provider targets.

  ### 3. Base Executor Architecture

  **Chosen:** Abstract `AiSdkBaseExecutorService` class with provider-injected `LanguageModel`

  **Rejected:**
  - Duplicated AI SDK calls per executor — violates DRY
  - Strategy pattern via composition — unnecessary indirection for this use case

  **Rationale:** All AI SDK interaction (response mapping, streaming, errors, usage) lives in the
  base class. Subclasses only construct the provider and declare feature flags. This matches how
  the CLI executors are structured (concrete classes per agent) but formalizes the shared logic
  that SDK executors have in common.

  ### 4. Streaming Implementation

  **Chosen:** `streamText().textStream` as `AsyncIterable<string>` → `AgentExecutionStreamEvent`

  **Rejected:**
  - `fullStream` with event routing — unnecessary complexity for our 3-type event model
  - Custom ReadableStream adapter — over-engineering

  **Rationale:** `textStream` is already `AsyncIterable<string>`. Each chunk maps to a `progress`
  event. After iteration, `await result.usage` provides the final `result` event. Zero buffering,
  minimal latency.

  ### 5. Structured Output

  **Chosen:** `generateObject()` with `jsonSchema()` wrapper from `ai` package

  **Rejected:**
  - Programmatic JSON-Schema-to-Zod conversion — complex, fragile edge cases
  - Requiring Zod schemas from callers — breaks the interface contract

  **Rationale:** The `ai` package exports `jsonSchema()` which wraps raw JSON Schema objects for
  use with `generateObject()`. No interface changes needed.

  ### 6. Error Handling

  **Chosen:** Catch AI SDK errors, enhance with provider context, rethrow

  **Rejected:**
  - Return errors in result metadata — breaks established throw-on-failure contract
  - Unmodified error propagation — lacks provider context for diagnostics

  **Rationale:** CLI executors throw. `APICallError.isInstance(error)` type guard enables clean
  extraction of statusCode, isRetryable, responseBody. Enhanced messages include provider name
  and specific guidance for 401/403/429.

  ### 7. Timeout

  **Chosen:** Native AI SDK `timeout` parameter (milliseconds)

  **Rejected:**
  - Manual AbortController + setTimeout — reimplements what SDK provides natively
  - No timeout — dangerous for hanging connections

  **Rationale:** AI SDK v6 `timeout` parameter handles abort signal creation and cleanup
  internally. Accepts number (ms) or structured `{totalMs, stepMs, chunkMs}`.

  ## Library Analysis

  | Library | Version | Purpose | Decision | Reasoning |
  | ------- | ------- | ------- | -------- | --------- |
  | `ai` | ^6.0.0 | AI SDK core (generateText, streamText, generateObject) | **Use** | Current stable, v3 model spec, required by OpenRouter provider |
  | `@openrouter/ai-sdk-provider` | ^2.5.1 | OpenRouter provider | **Use** | Community-maintained, peers on ai@^6.0.0, fully compatible |
  | `@ai-sdk/openai-compatible` | ^3.x | Together AI via OpenAI-compatible API | **Use** | Vercel-maintained, v6 compatible, clean workaround for missing togetherai v3 |
  | `@ai-sdk/togetherai` | 2.0.41 | Native Together AI provider | **Reject** | Incompatible with AI SDK v6 (v2 model spec, open issue #11780) |
  | `zod` | ^4.3.6 | Schema validation for generateObject | **Already present** | In root package.json, satisfies ai peer dep (zod@^3.25.0 or ^4.0.0) |

  ## Security Considerations

  - **API Key Handling:** Keys stored in AgentConfig.token via encrypted SQLite settings DB.
    Never logged, serialized to disk outside DB, or echoed in error messages. Error messages
    say "API key is missing or invalid" without revealing the key value.
  - **No New Storage Mechanism:** API keys use the existing token field. No new secrets storage.
  - **Network Boundary:** SDK executors make outbound HTTPS calls to provider APIs. No inbound
    server or open ports. All calls use the provider's default HTTPS endpoints.
  - **Dependency Supply Chain:** Three new npm packages from established publishers (Vercel for
    ai and openai-compatible, OpenRouter team for their provider). All are MIT or Apache-2.0
    licensed. Lock file pins exact versions.

  ## Performance Implications

  - **No Cold-Start Cost:** Factory instantiates SDK executors synchronously (no API validation
    call). First network roundtrip happens at execute() time, matching CLI executor behavior.
  - **Streaming Latency:** textStream yields text deltas directly from the provider's SSE stream
    with no intermediate buffering. First AgentExecutionStreamEvent should arrive within ~100ms
    of the first provider chunk.
  - **Executor Caching:** SDK executor instances are cached per agent type in the factory's
    existing Map cache. No repeated provider construction.
  - **Memory:** AI SDK provider instances are lightweight (config + fetch function). No persistent
    connections or connection pools. Each generateText/streamText call is an independent HTTP request.

  ## Architecture Notes

  ### File Placement (Clean Architecture)

  All SDK-specific code lives in `infrastructure/services/agents/common/executors/`:
  - `ai-sdk-base-executor.service.ts` — Abstract base class
  - `openrouter-executor.service.ts` — OpenRouter concrete executor
  - `together-ai-executor.service.ts` — Together AI concrete executor

  The `ai`, `@openrouter/ai-sdk-provider`, and `@ai-sdk/openai-compatible` packages are
  imported ONLY in these infrastructure files. Application and domain layers have zero knowledge
  of the Vercel AI SDK.

  ### Integration Points

  1. **TypeSpec:** Add `OpenRouter: "openrouter"` and `TogetherAi: "together-ai"` to AgentType enum
  2. **Factory:** Add switch cases, model lists, update getSupportedAgents/getCliInfo/getSupportedModels
  3. **Auth Detector:** Add token-presence check for SDK agent types
  4. **CheckAgentAuthUseCase:** Add AGENT_METADATA entries with null toolId/binaryName
  5. **Agent Validator:** Add SDK agents to AGENT_BINARY_MAP as undefined (or handle with early return)
  6. **TUI Wizard:** Add agent options, force token auth
  7. **Web UI:** Add AGENT_TYPE_OPTIONS entries, add TOKEN_REQUIRED_AGENTS set
  8. **DI Container:** No changes needed — factory constructs SDK executors internally

  ### Existing Patterns Preserved

  - `IAgentExecutor` interface: zero changes
  - `IAgentExecutorFactory` interface: zero changes
  - `AgentConfig.token`: already stores API keys
  - `AgentAuthMethod.Token`: already exists
  - Factory caching: reuses existing Map<string, IAgentExecutor>
  - Static model lists: follows CLAUDE_CODE_MODELS / GEMINI_CLI_MODELS pattern
  - Feature flags: `supportsFeature()` with Set<string>

  ### AI SDK API Mapping

  | IAgentExecutor Method | AI SDK Function | Key Mapping |
  | --------------------- | --------------- | ----------- |
  | `execute(prompt, opts)` | `generateText({model, prompt, system, timeout})` | `result.text` -> `AgentExecutionResult.result` |
  | `execute(prompt, {outputSchema})` | `generateObject({model, prompt, schema: jsonSchema(outputSchema)})` | `result.object` -> `metadata.structured_output` |
  | `executeStream(prompt, opts)` | `streamText({model, prompt, system, timeout})` | `textStream` chunks -> progress events |
  | `supportsFeature(streaming)` | N/A | Always true for SDK executors |
  | `supportsFeature(structuredOutput)` | N/A | Always true (generateObject available) |
  | `supportsFeature(systemPrompt)` | N/A | Always true (system param in all calls) |
  | `supportsFeature(sessionResume)` | N/A | Always false (no persistent process) |

  ### Token Usage Mapping

  | AI SDK LanguageModelUsage | AgentExecutionUsage | Notes |
  | ------------------------- | ------------------- | ----- |
  | `usage.inputTokens` | `inputTokens` | Direct mapping |
  | `usage.outputTokens` | `outputTokens` | Direct mapping |
  | `usage.inputTokenDetails?.cacheWriteTokens` | `cacheCreationInputTokens` | May be undefined per provider |
  | `usage.inputTokenDetails?.cacheReadTokens` | `cacheReadInputTokens` | May be undefined per provider |
  | N/A | `costUsd` | Always undefined (not calculable) |
  | N/A | `numTurns` | Always undefined (single-shot) |

  ### Error Handling Mapping

  | AI SDK Error | Handling | User-Facing Message |
  | ------------ | -------- | ------------------- |
  | `APICallError` (401/403) | Rethrow with provider name | "OpenRouter: Authentication failed. Check your API key in settings." |
  | `APICallError` (429) | Rethrow with retry info | "OpenRouter: Rate limit exceeded. Retry after {retryAfter}s." |
  | `APICallError` (5xx) | Rethrow with provider name | "OpenRouter: Server error (HTTP {status}). The provider may be experiencing issues." |
  | Timeout (abort) | Rethrow as timeout error | "OpenRouter: Request timed out after {timeout}ms." |
  | Network error | Rethrow with guidance | "OpenRouter: Connection failed. Check your internet connection." |


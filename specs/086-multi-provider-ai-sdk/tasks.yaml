# Task Breakdown (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "multi-provider-ai-sdk"
summary: >
  18 tasks across 5 phases. Phase 1 (Foundation) installs packages and extends the domain model.
  Phase 2 (Executors) builds the abstract base class and two concrete SDK executors with TDD.
  Phase 3 (Wiring) integrates executors into factory, auth detection, validator, and use case.
  Phase 4 (Presentation) updates TUI and Web UI with agent selection, token auth, icons, and stories.
  Phase 5 (Validation) runs integration tests and full suite verification.

# Relationships
relatedFeatures: []
technologies:
  - "ai@^6.0.0"
  - "@openrouter/ai-sdk-provider@^2.5.1"
  - "@ai-sdk/openai-compatible@^3.x"
relatedLinks:
  - title: "AI SDK v6 Documentation"
    url: "https://ai-sdk.dev/docs/introduction"
  - title: "@ai-sdk/togetherai v6 Incompatibility Issue"
    url: "https://github.com/vercel/ai/issues/11780"


# Markdown content (the full tasks document)
content: |
  ## Summary

  18 tasks organized across 5 phases implement the multi-provider AI SDK feature bottom-up.

  **Phase 1 (Foundation, 3 tasks, ~1h)** installs the AI SDK packages, extends the AgentType
  enum in TypeSpec, regenerates domain types, and fixes all exhaustive type references across
  the codebase so that subsequent phases have a stable type foundation.

  **Phase 2 (Executors, 6 tasks, ~3.5h)** builds the core execution layer: the abstract
  AiSdkBaseExecutorService handles all AI SDK integration (generateText, streamText,
  generateObject, error handling, usage mapping, timeouts), then OpenRouterExecutorService and
  TogetherAiExecutorService provide the thin provider-specific construction layer. Each piece
  is built test-first with mocked AI SDK functions.

  **Phase 3 (Wiring, 4 tasks, ~1.5h)** connects executors to existing infrastructure: factory
  switch cases with curated model lists, auth detection for token presence, AGENT_METADATA
  entries in the auth check use case, and validator early returns for SDK agents. Small, focused
  changes to well-understood files.

  **Phase 4 (Presentation, 4 tasks, ~1.5h)** adds UI touchpoints across TUI and Web: agent
  selection prompts with i18n, wizard token auth auto-forcing, Web UI dropdown entries with
  TOKEN_REQUIRED_AGENTS pattern, icon registry entries, and Storybook stories.

  **Phase 5 (Validation, 1 task, ~1h)** runs integration tests verifying end-to-end factory
  wiring plus the full lint/typecheck/test/build validation suite to confirm zero regressions.

  The task ordering respects strict dependency chains — no task depends on a later task. Within
  each phase, tasks can be partially parallelized (e.g., tasks 8 and 9 only depend on tasks
  4-7, not on each other).

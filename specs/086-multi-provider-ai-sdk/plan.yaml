# Markdown content (the full plan document)
content: |
  ## Status

  - **Phase:** Planning (Complete)
  - **Updated:** 2026-04-09

  ## Architecture Overview

  The existing agent execution architecture follows a clean factory pattern where each agent type
  has a concrete IAgentExecutor implementation. The factory creates, caches, and returns executors
  based on AgentType. All existing executors are CLI-based — they spawn subprocesses and parse
  stdout/stderr.

  The new SDK executors introduce a parallel HTTP-based execution path:

  ```
  IAgentExecutor (port interface — UNCHANGED)
    ├── ClaudeCodeExecutorService     (CLI subprocess — UNCHANGED)
    ├── CursorExecutorService         (CLI subprocess — UNCHANGED)
    ├── GeminiCliExecutorService      (CLI subprocess — UNCHANGED)
    ├── CodexCliExecutorService       (CLI subprocess — UNCHANGED)
    ├── CopilotCliExecutorService     (CLI subprocess — UNCHANGED)
    ├── DevAgentExecutorService       (mock — UNCHANGED)
    └── AiSdkBaseExecutorService      (NEW — abstract, AI SDK HTTP)
        ├── OpenRouterExecutorService (NEW — @openrouter/ai-sdk-provider)
        └── TogetherAiExecutorService (NEW — @ai-sdk/openai-compatible)
  ```

  SDK executors implement the same IAgentExecutor interface with zero modifications. The factory
  gains two switch cases. The cache, model lists, CLI info, and supported agents arrays are extended.
  No interfaces change. No existing executor code changes.

  ### Layer Placement (Clean Architecture)

  - **Domain**: AgentType enum gains two values (TypeSpec → generated output.ts). No other domain changes.
  - **Application**: Zero changes to port interfaces. CheckAgentAuthUseCase gains two AGENT_METADATA entries with null toolId (same pattern as dev/aider/continue).
  - **Infrastructure**: Three new executor files in `executors/`. Factory switch cases + static model list constants. Auth detector gains SDK agent type handling. Validator gains SDK agent early return.
  - **Presentation**: TUI prompt choices + i18n strings. Web UI dropdown entries + TOKEN_REQUIRED_AGENTS set. Agent icon registry gains two entries with brand icons.

  ## Key Design Decisions

  ### 1. Together AI via @ai-sdk/openai-compatible (not @ai-sdk/togetherai)

  The official @ai-sdk/togetherai v2.0.41 is incompatible with AI SDK v6 — it uses the v2 model
  specification while v6 requires v3 (GitHub issue #11780, open since Jan 2026, no release).
  Together AI's API is OpenAI-compatible at https://api.together.xyz/v1, so we use
  @ai-sdk/openai-compatible's createOpenAICompatible() with that baseURL. When @ai-sdk/togetherai
  v3 ships, swapping the provider constructor is a one-line change in TogetherAiExecutorService
  with zero base class changes.

  ### 2. Abstract Base Class for SDK Executors

  All AI SDK response mapping logic lives in a single abstract AiSdkBaseExecutorService:
  - generateText() → AgentExecutionResult (text + usage + metadata)
  - streamText().textStream → AsyncIterable<AgentExecutionStreamEvent> (progress events + result)
  - generateObject() with jsonSchema() → structured_output in metadata
  - Error catching with APICallError type guard → enhanced rethrow with provider context
  - Timeout via native AI SDK timeout parameter
  - Token usage mapping (inputTokens, outputTokens, cache tokens)

  Concrete subclasses only construct the provider LanguageModel and set agentType + feature flags.
  This avoids ~200 lines of duplicated adapter code per provider and makes future SDK providers
  trivial to add.

  ### 3. Streaming via textStream AsyncIterable

  streamText().textStream is already AsyncIterable<string>. Each chunk maps directly to a progress
  AgentExecutionStreamEvent with zero buffering. After iteration completes, result.usage and
  result.text provide the final result event. The adapter is a simple async generator with
  for-await-of — no custom ReadableStream or TransformStream.

  ### 4. Structured Output via jsonSchema() Wrapper

  The ai package exports jsonSchema() which wraps raw JSON Schema objects for generateObject().
  This keeps IAgentExecutor.execute()'s outputSchema parameter as a plain object (no Zod dependency
  in the interface) while gaining provider-native structured output enforcement. The base executor
  detects outputSchema in options and routes to generateObject() instead of generateText().

  ### 5. Error Handling — Catch, Enhance, Rethrow

  CLI executors throw on subprocess failures. Caller code (use cases, StructuredAgentCallerService)
  uses try/catch. SDK executors follow the same throw-on-failure contract. AI SDK's APICallError
  is caught via APICallError.isInstance() type guard, enhanced with provider name and specific
  guidance for 401/403 (check API key) and 429 (rate limit info), then rethrown. Network and
  timeout errors are similarly enhanced. API keys are NEVER included in error messages.

  ### 6. Timeout — Native AI SDK Parameter

  AI SDK v6 accepts a timeout parameter (milliseconds) that handles AbortController creation and
  cleanup internally. No manual setTimeout + abort needed. Default: 300000ms (5 min) when
  options.timeout is not specified.

  ### 7. Auth Detection — Token Presence Only

  SDK agents have no CLI binary. Auth detection returns authenticated=true when AgentConfig.token
  is a non-empty string. No API validation calls. Consistent with CLI agents checking binary
  presence rather than credential validity. Invalid keys fail clearly at execute() time.

  ### 8. Static Model Lists in Factory Constants

  Follows the established pattern (CLAUDE_CODE_MODELS, GEMINI_CLI_MODELS, etc.). New constants
  OPENROUTER_MODELS and TOGETHER_AI_MODELS are curated lists of popular coding-capable models.
  getSupportedModels() stays synchronous with zero network calls.

  ### 9. CheckAgentAuthUseCase — null toolId Pattern

  SDK agents are added to AGENT_METADATA with toolId=null and binaryName=null. When toolId is null,
  the use case returns installed=true and authenticated=true immediately — the same path used by
  dev, Aider, and Continue. Token validity is checked at execution time, not during auth status.

  ### 10. Web UI TOKEN_REQUIRED_AGENTS Pattern

  Mirrors SESSION_ONLY_AGENTS = new Set([CopilotCli]). A new TOKEN_REQUIRED_AGENTS = new Set
  ([OpenRouter, TogetherAi]) forces authMethod to Token and always shows the API key input when
  an SDK agent is selected. Symmetric pattern, minimal code change.

  ## Implementation Strategy

  Bottom-up dependency ordering ensures each phase builds on a stable foundation:

  **Phase 1** installs packages and extends AgentType. Must come first because every file
  importing AgentType sees the new values. Test fixtures with exhaustive enum matching need
  updates.

  **Phase 2** builds executors in isolation. Fully testable with mocked AI SDK functions — no
  factory, no DI, no UI needed. TDD with vi.mock('ai') on generateText/streamText/generateObject.

  **Phase 3** wires executors into existing infrastructure. Small, focused changes to factory,
  auth detector, validator, and use case. Each independently testable.

  **Phase 4** updates UI touchpoints. TUI and Web UI changes reference AgentType enum values
  that now exist. i18n strings added to English (other languages use English fallback).

  **Phase 5** runs integration tests and full validation suite to catch any regressions.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | @ai-sdk/togetherai releases v3 during implementation | No impact — @ai-sdk/openai-compatible is the chosen path. Migration to native provider is a one-line swap documented in the executor class. |
  | New AgentType enum values break exhaustive switches or test fixtures | Phase 1 includes a dedicated task to grep and fix all exhaustive AgentType references across the codebase. |
  | AI SDK v6 API surface differs from documentation | All executor logic in base class with comprehensive mocked unit tests. API surface verified against installed package types at compile time. |
  | Model IDs change or become unavailable | Static named constants — easy to update. Model selection at execution time with sensible defaults. Invalid IDs produce clear provider errors. |
  | API key accidentally logged or serialized | Keys flow through existing AgentConfig.token (encrypted SQLite). Error messages say "API key is missing or invalid" without echoing the key. Covered by error handling tests. |
  | Streaming latency exceeds NFR-8 (100ms to first event) | textStream yields directly from AI SDK SSE parser with zero intermediate buffering. Simple for-await-of adapter. |
  | Test isolation — real HTTP calls in unit tests | All AI SDK functions mocked at module level via vi.mock('ai'). Tests verify mock interactions, never network. |
  | Web UI stories missing for new agent options | Phase 4 includes dedicated Storybook story task for agent-settings-section with SDK agent scenarios. |

  ---


name: "fix-squash-merge"
number: 85
branch: "feat/085-fix-squash-merge"
oneLiner: "fix local squash merge failing due to conflict detection checking stderr instead of stdout"
userQuery: "Local squash merge fails because git merge --squash writes conflict info to stdout (not stderr). The error handler only checks error.message (which contains stderr), so conflicts are never detected. Additionally, dirty tracked files in the repo are not reset before the merge, and failed merges leave the repo in a dirty state.\n"
summary: "Fix localMergeSquash to properly detect conflicts from stdout, reset tracked files before merge, and abort failed merges to leave the repo clean.\n"
phase: "Analysis"
sizeEstimate: "M"
relatedFeatures: []
technologies: []
relatedLinks: []
openQuestions: []
content: "## Problem Statement\n\nLocal squash merge fails with an unhelpful error message. The root cause is that\n`git merge --squash` writes conflict information to stdout (not stderr), but the\nerror handler only checks `error.message` (which only contains stderr from Node's\n`execFile`). This means conflicts are never properly detected or reported.\n\nAdditionally, the repo is not fully cleaned before merge (only untracked files via\n`git clean -fd`, not dirty tracked files), and failed merges leave the repo in an\nunclean merge state.\n\n## Success Criteria\n\n- [x] Conflict detection checks stdout from git merge --squash\n- [x] Tracked files are reset before merge via git reset --hard HEAD\n- [x] Failed merges are aborted to leave repo clean\n- [x] Error messages include stdout for better diagnostics\n- [x] Stale merge state cleaned up before checkout to prevent index errors\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| git-pr.service.ts | High | localMergeSquash method fix |\n\n## Dependencies\n\nNone identified.\n\n## Size Estimate\n\n**S** - Focused fix in a single method\n\n---\n\n_Generated by feature agent — proceed with research_\n"

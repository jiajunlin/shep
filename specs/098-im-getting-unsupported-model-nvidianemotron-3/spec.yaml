# Markdown content (the actual spec)
content: |
  ## Problem Statement

  Selecting an openrouter model that exists in the live remote catalog
  (e.g. `nvidia/nemotron-3-super-120b-a12b:free`) fails with
  `Unsupported model "<id>" for agent "openrouter"`.

  The root cause: `UpdateFeaturePinnedConfigUseCase` validated the chosen
  model against `IAgentExecutorFactory.getSupportedModels(agentType)`,
  which returns a synchronous, hardcoded list. The web picker, however,
  shows the live remote catalog via `IAgentExecutorFactory.listAvailableModels(agentType)`.
  Any new openrouter model surfaced by the picker would be rejected on save.

  ## Success Criteria

  - [x] Validation uses `listAvailableModels` (same source as the picker)
  - [x] Dynamically-listed openrouter models are accepted on save
  - [x] Static fallback / hardcoded model lists are no longer authoritative
  - [x] Unit tests cover the dynamic-catalog acceptance path

  ## Affected Areas

  | Area                                                     | Impact | Reasoning                                |
  | -------------------------------------------------------- | ------ | ---------------------------------------- |
  | `packages/core/src/application/use-cases/features/`      | Fix    | Use case validation switched to dynamic  |
  | `tests/unit/application/use-cases/features/`             | Test   | Added dynamic catalog acceptance test    |

  ## Dependencies

  None identified.

  ## Size Estimate

  **S** - Single-line behavior change in one use case plus tests


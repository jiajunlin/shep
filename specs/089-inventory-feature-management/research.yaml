name: "inventory-feature-management"
summary: >
  Technical research for adding inline row actions to the inventory table. The implementation is
  presentation-layer only — all server actions, dialogs, and use cases already exist. The key
  technical challenge is bridging Tabulator's imperative DOM-based rendering with React's declarative
  component model via createPortal, and extending the FeatureTreeRow type with richer state
  information so the correct actions can be offered per row.

relatedFeatures: []

technologies:

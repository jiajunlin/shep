  - "React 18 (createPortal, useState, useCallback)"
  - "Tabulator.js 6.4 (custom formatters, frozen columns, dataTree)"
  - "shadcn/ui DropdownMenu (Radix-based, keyboard-accessible)"
  - "shadcn/ui AlertDialog (archive confirmation)"
  - "sonner (toast notifications for success/error feedback)"
  - "lucide-react (action icons)"
  - "TailwindCSS (styling)"
  - "TypeScript"


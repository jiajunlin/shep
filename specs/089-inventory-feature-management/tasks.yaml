content: |
  ## Summary

  The implementation is organized into 11 tasks across 5 phases, totaling approximately 9 hours
  of estimated effort.

  The work begins with **data layer extension** (Phase 1) — enriching FeatureTreeRow with the
  nodeState, hasChildren, and hasOpenPr fields needed by the action system. This requires
  updating getFeatureTreeData() to fetch agent runs alongside features and compute the derived
  state server-side using the existing deriveNodeState() function.

  Next, **action configuration and the core component** (Phase 2) are built independently of
  Tabulator — a static config object maps each of the 9 FeatureNodeState values to their available
  actions, and the FeatureRowActions component renders a shadcn/ui DropdownMenu driven by that
  config. Storybook stories enable visual QA before integration.

  **Tabulator integration** (Phase 3) bridges the React component into Tabulator's DOM via a
  frozen actions column with a custom formatter that creates portal target divs, and a
  FeatureRowActionsManager that manages createPortal lifecycle — mounting, reconciliation on
  Tabulator re-renders, and cleanup.

  **Action wiring** (Phase 4) connects everything: server actions imported into the page client,
  per-row loading state via a Set of in-flight IDs, toast notifications via sonner, router.refresh()
  for data re-fetch, and the existing DeleteFeatureDialog and archive AlertDialog for confirmation
  flows.

  Finally, **integration testing** (Phase 5) verifies the complete flow end-to-end, ensures
  existing tests pass, and covers edge cases like group headers, transient states, and portal
  cleanup during table re-renders.

  ## Security Considerations

  ### File Attachment Security (NFR-21, NFR-23)
  - **MIME type validation**: Validate file MIME type on upload using magic bytes, not just file extension. Reject executable types (.exe, .sh, .bat, .cmd).
  - **File size limit**: Enforce 25MB max per file at the server action level before writing to disk.
  - **Path traversal prevention**: Attachments stored by UUID filename (not user-supplied name) in ~/.shep/attachments/<project-id>/. User-supplied filename stored only in DB metadata.
  - **No direct web access**: Attachment directory must NOT be in the Next.js public/ folder. Files served exclusively through an API route that validates the request.
  - **Cleanup on delete**: When a work item is deleted, associated attachment files must be cleaned up from disk (or marked for garbage collection).

  ### Rich Text Content Security (NFR-22)
  - **XSS prevention**: TipTap's extension system naturally sanitizes content by only allowing registered node types and marks. Unknown HTML tags are stripped during parsing.
  - **Output sanitization**: When rendering stored TipTap JSON to HTML (for non-editor contexts), use TipTap's generateHTML() which only produces markup for registered extensions.
  - **No raw HTML storage**: Content is stored as TipTap's JSON document model, not raw HTML. This eliminates stored XSS vectors.
  - **User input in comments**: Comments also use TipTap JSON. Plain text fallback for CLI-created comments.

  ### SQL Injection Prevention
  - **Prepared statements**: All database queries must use parameterized prepared statements with ? placeholders, following the existing codebase pattern.
  - **No string interpolation in SQL**: Never concatenate user input into SQL strings.
  - **FTS5 queries**: Use parameterized MATCH queries; user search input must be sanitized for FTS5 syntax (escape special characters like ^, *, OR, AND, NOT).

  ### Data Integrity
  - **Foreign key enforcement**: PRAGMA foreign_keys = ON is already set in connection.ts. All new FK relationships will be enforced.
  - **Atomic ID generation**: Work item counter increment and insert happen in the same SQLite transaction. Single-writer model prevents race conditions.
  - **Immutable activity log**: No UPDATE or DELETE operations on the activity_log table. Append-only by design (NFR-8).

  ## Performance Implications

  ### Work Item List/Board Rendering (NFR-1: < 500ms for 5,000 items)
  - **Pagination**: List and Table views must use cursor-based pagination (LIMIT + OFFSET or keyset pagination) rather than loading all items.
  - **Indexed queries**: Create indexes on work_items(project_id, state_id), work_items(project_id, priority), work_items(project_id, due_date) for fast filtering.
  - **Optimistic UI**: Board drag-and-drop must update local state immediately, then persist. Use React state + useTransition for non-blocking updates.
  - **Virtual scrolling**: For Table view with 5,000+ items, use virtualized rendering (only render visible rows). The existing tabulator-tables library supports this.

  ### Full-Text Search (NFR-2: < 200ms for 10,000 items)
  - **FTS5 indexing**: Separate FTS5 virtual tables for work items, pages, and projects. BM25 ranking provides relevance scoring.
  - **Trigger-based sync**: INSERT/UPDATE/DELETE triggers keep FTS indexes synchronized without application-level code.
  - **Prefix search**: FTS5 supports prefix queries (search-term*) for autocomplete/type-ahead.
  - **Debounced search**: UI search input should debounce at 200ms before querying to avoid excessive DB calls.

  ### Drag-and-Drop Performance (NFR-3: < 100ms perceived latency)
  - **CSS transforms**: @dnd-kit uses CSS transforms for drag animations, avoiding layout reflows.
  - **Optimistic updates**: State change on drop is applied to React state immediately. Server action persists asynchronously.
  - **Minimal re-renders**: Use React.memo and useMemo for board column components. Only the affected columns should re-render on drag.

  ### Timeline/Gantt View (NFR-4: 500 items at 30fps)
  - **Virtualized rendering**: Only render Gantt bars visible in the current viewport. Use IntersectionObserver or manual viewport calculations.
  - **React Flow edge optimization**: Limit visible dependency edges to those connected to currently visible bars. Use React Flow's onlyRenderVisibleElements option.
  - **Canvas-based rendering**: If React Flow overlay proves too slow for 500+ items, fall back to a canvas-based edge renderer.

  ### Database Performance
  - **WAL mode**: Already enabled (PRAGMA journal_mode = WAL). Provides better read concurrency.
  - **Indexes**: Every FK column and commonly filtered column must have an index. Create composite indexes for common query patterns.
  - **Transaction batching**: Bulk operations (bulk state change, bulk assign) must execute all updates in a single transaction.
  - **Prepared statement caching**: Reuse prepared statements within repository methods (better-sqlite3 caches by SQL string).

  ## Architecture Notes

  ### Clean Architecture Compliance

  All new PM code must follow the existing four-layer architecture:

  ```
  Presentation (CLI, TUI, Web)
       ↓ calls
  Application (Use Cases, Port Interfaces)
       ↓ depends on
  Domain (TypeSpec-generated types, business rules)
       ↑ implemented by
  Infrastructure (SQLite repos, services, DI)
  ```

  **Key rules:**
  - Use cases are the ONLY entry point from presentation to core logic
  - Repositories implement port interfaces defined in application/ports/
  - No infrastructure imports in application or domain layers
  - All use cases must be presentation-agnostic (no HTTP, terminal, or React concepts)

  ### DI Container Registration Pattern

  New PM repositories and use cases must be registered in container.ts:

  ```
  // Repository (factory pattern)
  container.register<IWorkItemRepository>('IWorkItemRepository', {
    useFactory: (c) => new SQLiteWorkItemRepository(c.resolve('Database'))
  });

  // Use case (singleton)
  container.registerSingleton(CreateWorkItemUseCase);

  // String token alias (for web server actions)
  container.register('CreateWorkItemUseCase', {
    useFactory: (c) => c.resolve(CreateWorkItemUseCase)
  });
  ```

  String token aliases are MANDATORY for any use case callable from web routes (LESSONS.md).


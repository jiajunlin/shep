phases:
  - id: "phase-1"
    name: "Foundation — Domain, Persistence & MVP Views"
    description: >
      Establishes the entire domain model in TypeSpec (Project, WorkItem, WorkItemState, Label,
      Comment, ActivityEntry, SavedView, CustomProperty), creates all SQLite migrations and
      repositories, implements core CRUD use cases, delivers the List view in the Web UI with
      filtering/grouping, a work item detail page, CLI commands for project and work item
      management, and FTS5 full-text search. This phase is the prerequisite for everything
      that follows — it defines the data foundation and proves the end-to-end vertical slice
      from TypeSpec through persistence through presentation.
    parallel: false

  - id: "phase-2"
    name: "Views & Organization — Board, Table, Calendar, Relations"
    description: >
      Installs @dnd-kit and builds the Board (Kanban), Table (Spreadsheet), and Calendar views
      with drag-and-drop support. Adds sub-work items (parent-child hierarchy, max 3 levels),
      work item relations (5 types), bulk operations, and the Saved Views CRUD. This phase
      transforms the MVP from a basic list into a multi-layout project management tool.
    parallel: false

  - id: "phase-3"
    name: "Sprint & Module Management — Cycles, Analytics, Timeline"
    description: >
      Introduces Cycle (sprint) and Module entities with full lifecycle management. Installs
      Recharts and builds analytics dashboards (burndown charts, status breakdowns, velocity).
      Delivers the Timeline (Gantt) view using React Flow for dependency line rendering.
      Adds the configurable estimate system (T-shirt categories default, Fibonacci option).
    parallel: false

  - id: "phase-4"
    name: "Advanced Features — Pages, Epics, Attachments, Time Tracking"
    description: >
      Installs TipTap and builds the Pages/Wiki editor with rich text support, page hierarchy,
      version history, and @-mention of work items. Introduces Epic and Initiative entities
      for large-scale grouping. Adds file attachment storage (local filesystem with metadata
      in SQLite) and time tracking with worklog reports.
    parallel: false

  - id: "phase-5"
    name: "Intelligence & Integrations — AI Triage, Notifications, Import/Export"
    description: >
      Builds the IntakeItem entity with triage workflow. Integrates LangGraph agents for
      auto-classification (state, priority, labels, assignee suggestion) and duplicate
      detection. Adds the notification center (in-app notifications for assignments, mentions,
      state changes, due dates). Implements CSV import/export with papaparse. Adds AI-generated
      cycle and project health summaries.
    parallel: false

  - id: "phase-6"
    name: "Team & Collaboration — Multi-User, Real-Time Editing, Integrations"
    description: >
      Adds authentication, session management, workspace/project roles (Admin/Member/Guest),
      and permission checks across all use cases. Installs Yjs for real-time collaborative
      page editing. Adds Slack integration, webhook system, email notifications, and audit
      logging. Migrates attachment storage from local filesystem to S3-compatible backend.
    parallel: false


content: |
  ## Architecture Overview

  The project management feature integrates into Shep's existing Clean Architecture as a new
  domain vertical. It follows the same four-layer pattern used by Features, Applications, and
  all other entities:

  ```
  Presentation (CLI commands, Web routes/actions, TUI screens)
       |  calls use cases via DI container
       v
  Application (pm/ use-case directory tree, port interfaces)
       |  depends on domain types + port interfaces
       v
  Domain (TypeSpec-generated types in output.ts)
       ^  implemented by
       |
  Infrastructure (SQLite repos, mappers, migrations, DI registration)
  ```

  All PM entities are **new aggregate roots** — Project, WorkItem, Cycle, Module, Page, etc. —
  that coexist alongside the existing Feature and Application aggregates. They share the same
  SQLite database, DI container, SSE pipeline, and web/CLI infrastructure but have no hard
  coupling to existing entities.

  The `pm/` namespace under `use-cases/` keeps all PM logic organized separately from existing
  SDLC use cases, preventing cross-contamination while using the same architectural patterns.

  ### Key Architectural Boundaries

  - **WorkItem is NOT Feature**: These are separate aggregate roots with independent lifecycles.
    An optional junction table (`work_item_feature_links`) allows linking when desired, but
    neither depends on the other.

  - **PmProject is standalone**: Unlike Application (which manages AI agent sessions), PmProject
    is a lightweight container for PM work. It has an optional `applicationId` FK for linking
    but no hard dependency. Named `PmProject` to avoid collision with the existing
    `CreateProjectUseCase` which handles filesystem project scaffolding.

  - **Single database, separate tables**: All PM tables live in the same SQLite database.
    Shared transactions, WAL mode, and connection. No separate database needed.

  - **Shared SSE pipeline**: Real-time updates flow through the existing SSE infrastructure.
    PM events are added as new event types alongside existing agent events.

  ## Key Design Decisions

  ### 1. TypeSpec-First Domain Modeling

  All 15+ PM entities are defined in TypeSpec extending `SoftDeletableEntity`, following the
  one-entity-per-file convention. Enums go in `tsp/common/enums/work-item-enums.tsp`. Running
  `pnpm tsp:compile` generates TypeScript types consumed by the application layer. No hand-written
  domain types — this is mandatory per CLAUDE.md.

  ### 2. Project-Prefixed Sequential Work Item IDs

  Work items get IDs like `PROJ-42` via an atomic counter on the pm_projects table:
  `UPDATE pm_projects SET work_item_counter = work_item_counter + 1 WHERE id = ? RETURNING work_item_counter`
  inside the same transaction that creates the work item. SQLite single-writer guarantees atomicity.

  ### 3. Customizable States with Fixed Semantic Groups

  Five groups (Backlog, Unstarted, Started, Completed, Cancelled) provide the semantic foundation
  for burndown charts, velocity, and completion tracking. Users customize state names, colors, and
  ordering within groups. Default states created automatically for new projects.

  ### 4. Custom Properties via JSON Column

  A `custom_properties` table defines schema per project. Work items store values in a
  `custom_property_values` JSON column keyed by property ID. Avoids EAV performance issues while
  keeping schema stable. SQLite `json_extract()` enables filtering.

  ### 5. Purpose-Built View Components

  Each layout (List, Board, Table, Calendar, Timeline) is a dedicated React component tree sharing
  the same use case API. Board uses @dnd-kit, Timeline uses React Flow overlay. Layout is purely a
  presentation concern — all data flows through the same use cases.

  ### 6. FTS5 Full-Text Search

  SQLite FTS5 virtual tables with trigger-based sync provide sub-200ms ranked search. BM25 scoring,
  prefix search for autocomplete, no external dependencies. Triggers keep indexes synchronized
  automatically with source tables.

  ### 7. Naming Conventions to Avoid Collisions

  - `PmProject` / `pm_projects` (avoids existing `projects` table used by CreateProjectUseCase)
  - `PmModule` / `pm_modules` (avoids TypeScript `module` keyword conflicts)
  - `PmAttachment` / `pm_attachments` (avoids existing Attachment value object on Feature)
  - All PM use cases live under `use-cases/pm/` namespace

  ## Implementation Strategy

  The six phases are ordered by dependency and user value:

  **Phase 1 (Foundation)** must come first — everything depends on the domain model, database schema,
  and core CRUD. Delivers a functional issue tracker with List view and CLI.

  **Phase 2 (Views)** builds on Phase 1's data layer to add Board, Table, Calendar with DnD.
  This is what makes the tool usable day-to-day.

  **Phase 3 (Sprints)** adds time-boxed iteration management. Meaningless without work items and
  views from Phases 1-2.

  **Phase 4 (Advanced)** introduces Pages/Wiki, Epics, attachments, time tracking — enhances but
  doesn't block the core PM workflow.

  **Phase 5 (Intelligence)** layers AI on top of the stable PM foundation. Requires the full data
  model to be useful.

  **Phase 6 (Collaboration)** adds multi-user — deliberately last because it requires auth
  infrastructure that doesn't exist today.

  Each phase delivers standalone value.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | 18+ migrations overwhelm runner | Each is idempotent; test full sequence in integration tests early |
  | TypeSpec compilation fails with 15+ new files | Add entities 1-2 at a time, compile after each |
  | Work item counter races | SQLite single-writer prevents this; verify with concurrent insert test |
  | FTS5 index drift | Trigger-based sync is atomic; integration test verifies consistency |
  | Existing tests break from new migrations | Additive-only tables; run full suite after each migration |
  | DI container bloat (40+ new use cases) | Dedicated `registerPmDependencies()` function |
  | Web bundle size growth | Dynamic imports for view components; List view loads eagerly only |
  | Performance at 5,000 work items | Cursor pagination, virtual scrolling, indexed filter columns |
  | Collision with existing create-project use case | Distinct naming: CreatePmProjectUseCase vs CreateProjectUseCase |
  | New required fields break test fixtures | Use optional fields with defaults per LESSONS.md |

  ---


# Implementation Plan (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "project-management-spec"
summary: >
  Implementation plan for adding Plane-like project management to Shep. Follows a 6-phase
  rollout: Phase 1 builds the domain foundation (TypeSpec entities, SQLite persistence,
  core use cases, List view, CLI); Phase 2 adds visual views (Board/Table/Calendar) with
  @dnd-kit drag-and-drop; Phase 3 introduces Cycles/Modules with Recharts analytics and
  Timeline/Gantt view; Phase 4 delivers Pages/Wiki with TipTap, Epics, Attachments, and
  Time Tracking; Phase 5 adds AI-powered triage, notifications, and import/export; Phase 6
  brings multi-user collaboration. All work follows existing Clean Architecture patterns —
  TypeSpec-first domain models, repository ports, DI-registered use cases, and
  presentation-agnostic APIs.

relatedFeatures: []


name: "project-management-spec"
summary: >
  53 tasks across 6 phases implementing Plane-like project management for Shep.
  Phase 1 (Foundation) has 20 tasks covering TypeSpec entities, migrations, repositories,
  use cases, List view, CLI commands, and FTS5 search. Phase 2 (Views) has 10 tasks for
  Board/Table/Calendar views with DnD, relations, and bulk operations. Phase 3 (Sprints)
  has 8 tasks for Cycles, Modules, analytics, and Timeline view. Phase 4 (Advanced) has
  7 tasks for Pages/Wiki, Epics, attachments, and time tracking. Phase 5 (Intelligence)
  has 5 tasks for AI triage, notifications, and import/export. Phase 6 (Collaboration)
  has 3 tasks for multi-user support.

relatedFeatures: []

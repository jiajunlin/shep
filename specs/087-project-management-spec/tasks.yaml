content: |
  ## Summary

  This task breakdown covers 53 tasks across 6 phases, totaling approximately 120 hours of
  implementation effort.

  **Phase 1 (Foundation, 20 tasks, ~35h)** establishes the entire domain model in TypeSpec,
  creates all core database tables (migrations 058-067), implements repositories with mappers,
  builds CRUD use cases for Projects, WorkItems, States, Labels, Comments, Activity Log,
  Saved Views, and Custom Properties, delivers the List view and work item detail page in
  the Web UI, sets up FTS5 full-text search, and adds CLI commands for projects and work items.
  This phase proves the full vertical slice from TypeSpec through persistence through presentation.

  **Phase 2 (Views, 10 tasks, ~22h)** installs @dnd-kit and builds the Board (Kanban), Table
  (Spreadsheet), and Calendar views with drag-and-drop support. Adds work item relations (5 types),
  sub-items with depth validation, bulk operations, saved views integration, and the view switcher
  that ties all layouts together.

  **Phase 3 (Sprints, 8 tasks, ~21h)** introduces Cycles and Modules with full lifecycle management,
  installs Recharts for analytics dashboards (burndown, status breakdown), builds the Timeline (Gantt)
  view with React Flow dependency lines, extends the SSE pipeline for real-time PM updates, and adds
  CLI cycle commands.

  **Phase 4 (Advanced, 7 tasks, ~17h)** installs TipTap for the Pages/Wiki rich text editor with
  @-mention support and version history, implements Epics for large-scale grouping, adds file
  attachment upload/download with local filesystem storage and security validation, implements time
  tracking with worklog views, and builds the project settings page.

  **Phase 5 (Intelligence, 5 tasks, ~13h)** creates the Intake/Triage system with AI-powered
  auto-classification via LangGraph, builds the notification center, implements CSV import/export,
  and adds AI-generated cycle and project health summaries.

  **Phase 6 (Collaboration, 3 tasks, ~19h)** adds authentication and session management, implements
  workspace/project roles with permission checks across all use cases, and delivers collaborative
  page editing with Yjs CRDT, Slack integration, and audit logging.

  The ordering ensures each phase builds on completed infrastructure from prior phases. Phase 1
  must complete first as the foundation. Within phases, tasks are ordered by dependency — TypeSpec
  entities before migrations, migrations before repositories, repositories before use cases, use
  cases before presentation layers.

  ---

  _Task breakdown complete — ready for implementation_

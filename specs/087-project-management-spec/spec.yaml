name: "project-management-spec"
number: 87
branch: "feat/087-project-management-spec"
oneLiner: "Add Plane-like project management capabilities to Shep — issues, sprints, boards, docs, triage, and analytics"
summary: "Add a comprehensive project management system to Shep inspired by Plane (open-source Jira/Linear alternative). This encompasses projects, work items with custom types and properties, cycles/sprints, modules/epics, kanban/list/table/timeline/calendar views, pages/wiki, intake/triage, analytics dashboards, time tracking, notifications, and AI-powered features — all integrated into Shep's existing Clean Architecture with TypeSpec-first domain models, use-case-driven application layer, and multi-presentation support (CLI, TUI, Web).\n"
phase: "Planning"
sizeEstimate: "XL"
relatedFeatures: []

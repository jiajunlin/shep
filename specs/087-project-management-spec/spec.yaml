  - "TypeSpec (domain model definitions)"
  - "TypeScript (application logic)"
  - "Next.js 16 (web UI)"
  - "React 19 (components)"
  - "React Flow / @xyflow/react (canvas/graph visualization)"
  - "TailwindCSS 4 (styling)"
  - "Radix UI (accessible component primitives)"
  - "SQLite / better-sqlite3 (persistence)"
  - "tsyringe (dependency injection)"
  - "Zod (schema validation)"
  - "SSE / Server-Sent Events (real-time updates)"
  - "Yjs CRDT (collaborative editing for pages/wiki)"
  - "LangGraph (AI agent orchestration)"
  - "Playwright (E2E testing)"
  - "Vitest (unit/integration testing)"
  - "Storybook (component documentation)"
  - "TipTap (rich text editor for pages/wiki)"
  - "Recharts (analytics chart rendering)"
  - "@dnd-kit (drag-and-drop for views)"
  - "SQLite FTS5 (full-text search)"
  - "papaparse (CSV import/export)"

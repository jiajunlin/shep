name: "cluster-agent"
summary: >
  Implementation plan for the Cluster entity and autonomous cluster agent. The approach follows
  a strict bottom-up, layer-by-layer build: TypeSpec domain models first, then persistence
  (migrations, mapper, repository), then application layer (port interfaces and 12 use cases),
  then infrastructure services (k3d, kubectl, ArgoCD, Docker health wrappers), then the LangGraph
  cluster agent graph and worker, then feature flag wiring, then CLI commands, and finally web UI
  components with canvas integration and SSE events. Every layer follows an existing codebase
  analog exactly. Terraform and deployment templates are deferred to v2.

relatedFeatures: []

technologies:
  - "TypeSpec (domain model codegen)"
  - "TypeScript (implementation language)"
  - "SQLite via better-sqlite3 (persistence)"
  - "tsyringe (dependency injection)"
  - "LangGraph / @langchain/langgraph (agent workflow orchestration)"
  - "k3d (k3s-in-Docker cluster management CLI)"
  - "kubectl (Kubernetes CLI)"
  - "ArgoCD (GitOps - installed via kubectl apply)"
  - "Docker (prerequisite runtime)"
  - "Commander (CLI framework)"
  - "Next.js + shadcn/ui (web UI)"
  - "React Flow / @xyflow/react (graph visualization)"
  - "Vitest (testing)"
  - "Storybook (component documentation)"

relatedLinks:
  - title: "k3d Documentation"
    url: "https://k3d.io/"
  - title: "ArgoCD Installation via kubectl"
    url: "https://argo-cd.readthedocs.io/en/stable/getting_started/#1-install-argo-cd"
  - title: "LangGraph Annotation API"
    url: "https://langchain-ai.github.io/langgraph/concepts/low_level/#annotation"

phases:
  - id: "phase-1"
    name: "Domain Model & TypeSpec"
    description: >
      Define the Cluster entity, ClusterStatus enum, ClusterRepository and ClusterApplication
      junction entities, and the clusters feature flag field in TypeSpec. Run codegen to generate
      the domain output. Create the cluster-defaults factory for default entity values. This phase
      has zero dependencies and produces the type foundation that every subsequent layer depends on.
    parallel: false

  - id: "phase-2"
    name: "Persistence Layer"
    description: >
      Create four SQLite migrations (clusters table, cluster_repositories junction,
      cluster_applications junction, feature_flag_clusters setting column), the cluster mapper
      (domain-to-DB and DB-to-domain conversion), and the SQLiteClusterRepository with full CRUD
      plus junction table management. Integration tests validate the complete persistence stack
      against an in-memory SQLite database.
    parallel: false

  - id: "phase-3"
    name: "Application Layer - Ports & Use Cases"
    description: >
      Define all output port interfaces (IClusterRepository, IK3dService, IKubectlService,
      IArgoCDService, IDockerHealthService, IClusterAgentProcessService) and implement the 12
      cluster use cases. Each use case is unit-tested with mocked port dependencies. This phase
      establishes the complete API boundary that presentation layers consume.
    parallel: false

  - id: "phase-4"
    name: "Infrastructure Services"
    description: >
      Implement the four CLI-wrapping infrastructure services (K3dService, KubectlService,
      ArgoCDService, DockerHealthService) with custom error classes per service. Each service
      wraps an external CLI via execFile through the injected ExecFunction, following the
      WorktreeService pattern. Also implement the IClusterAgentProcessService for spawning
      the cluster agent worker.
    parallel: false

  - id: "phase-5"
    name: "Cluster Agent Graph & Worker"
    description: >
      Build the LangGraph state machine with 6 nodes (prerequisite-check, provision,
      configure-kubectl, install-argocd, health-check, ready) and error edges. Implement
      the cluster agent worker process as a detached Node.js script following the
      feature-agent-worker pattern with heartbeat, status tracking, and resume support.
    parallel: false

  - id: "phase-6"
    name: "Feature Flag Wiring & DI Registration"
    description: >
      Wire the clusters feature flag through all 11 layers per the LESSONS.md checklist
      (TypeSpec done in phase 1, migration in phase 2 - this phase covers settings mapper,
      settings repository SQL, settings defaults, feature-flags.ts, settings page toggle,
      translations, and fixture updates). Register all new components in the DI container via
      a new register-cluster.ts module with string token aliases for web-accessible use cases.
    parallel: false

  - id: "phase-7"
    name: "CLI Commands"
    description: >
      Create the cluster Commander command group with 7 subcommands (new, ls, show, del, link,
      unlink, status). Each command resolves use cases from the DI container, uses i18n for all
      strings, and follows the app command group pattern. Unit tests mock all use cases.
    parallel: false

  - id: "phase-8"
    name: "Web UI Components & Canvas Integration"
    description: >
      Build ClusterNode (React Flow canvas node), ClusterCreateDrawer, and ClusterDetailDrawer
      with tabs. Integrate cluster nodes into deriveGraph for canvas rendering. Add server actions
      and API routes for cluster operations. Add SSE event support for cluster agent lifecycle.
      Wire sidebar navigation gated by the clusters feature flag. All components have mandatory
      colocated .stories.tsx files.
    parallel: false

  - id: "phase-9"
    name: "i18n & Final Verification"
    description: >
      Add translation strings for all cluster UI elements across all 9 locales
      (en, ar, es, de, fr, he, pt, uk, ru) in both cli.json and web.json. Run full validation
      suite (lint, format, typecheck, tsp, unit tests, integration tests, build) to confirm
      zero regressions.
    parallel: false


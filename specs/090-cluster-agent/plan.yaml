content: |
  ## Architecture Overview

  The Cluster entity introduces a fourth first-class domain concept alongside Repository,
  Application, and Feature. It follows the exact same architectural pattern as Application:

  - **Domain layer**: TypeSpec-defined entity extending SoftDeletableEntity with a status enum,
    generated via `pnpm tsp:compile`. Junction entities (ClusterRepository, ClusterApplication)
    extend BaseEntity for hard-delete semantics.
  - **Application layer**: IClusterRepository port interface with 12 methods (CRUD + junction
    management). Twelve use cases following single-responsibility principle. Four infrastructure
    port interfaces (IK3dService, IKubectlService, IArgoCDService, IDockerHealthService) plus
    IClusterAgentProcessService.
  - **Infrastructure layer**: SQLiteClusterRepository with mapper, four CLI-wrapping services
    via execFile, LangGraph cluster agent graph with 6 nodes, detached worker process.
  - **Presentation layer**: CLI command group with 7 subcommands, web UI components (ClusterNode,
    ClusterCreateDrawer, ClusterDetailDrawer), canvas integration via deriveGraph, server actions,
    API routes, SSE events.

  The clusters feature flag gates UI visibility only - domain, persistence, and use cases are
  always registered in the DI container.

  ## Key Design Decisions

  ### 1. Entity Modeling: SoftDeletableEntity + Junction Tables

  Cluster extends SoftDeletableEntity (like Application), gaining id/createdAt/updatedAt/deletedAt.
  Junction entities extend BaseEntity (not SoftDeletableEntity) since they are hard-deleted on
  unlink - this follows the work_item_relations pattern from migration 068. ClusterStatus uses
  six states (Provisioning, Ready, Stopping, Stopped, Error, Destroying) to map the k3d lifecycle
  and provide granular UI progress.

  ### 2. Persistence: Four Separate Migrations (085-088)

  One concern per migration following established convention. Migration guards use sqlite_master
  checks for tables and pragma table_info for columns. All columns use the standard type mapping:
  TEXT for UUIDs/strings, INTEGER for timestamps/booleans, nullable INTEGER for optional dates.
  Compound unique indexes on junction tables prevent duplicate links.

  ### 3. Infrastructure Services: execFile CLI Wrappers

  All external tool interactions (k3d, kubectl, docker) go through port interfaces implemented
  as execFile CLI wrappers. This matches the WorktreeService pattern (no npm SDK dependencies).
  ArgoCD is installed via kubectl apply of official manifests - no separate argocd binary needed.
  Each service has its own error class with typed error codes for programmatic error handling.

  ### 4. Cluster Agent: LangGraph State Machine

  The cluster agent uses a LangGraph StateGraph with 6 nodes, matching the feature-agent pattern.
  The install-argocd node has a conditional edge (skipped when argoCdEnabled is false). Error
  edges from any node transition to a terminal error node that updates cluster status. The worker
  is a detached Node.js process with heartbeat, PID tracking, and resume support. The agent
  resolves its executor through IAgentExecutorProvider (mandatory agent-agnostic design).

  ### 5. Feature Flag: UI-Only Gating

  Following the projects/envDeploy/skills pattern, the clusters flag is wired through all 11
  layers per the LESSONS.md checklist. Migrations always run, DI always registers, only the
  sidebar, canvas, drawers, and search filter on the flag. The flag defaults to false for
  backward compatibility.

  ### 6. Web UI: Canvas-Integrated Cluster Nodes

  ClusterNode appears on the control center canvas via deriveGraph, which receives a new
  clusterMap parameter. Edges connect cluster nodes to linked repository nodes via junction
  table data. ClusterStatusBadge provides color-coded status with both visual and text
  indicators for accessibility. Drawers follow the existing create/detail pattern.

  ## Implementation Strategy

  The build proceeds strictly bottom-up through the clean architecture layers:

  1. **Phase 1 (Domain)** first because every other layer depends on the generated types.
  2. **Phase 2 (Persistence)** next because use cases need the repository to exist.
  3. **Phase 3 (Application)** next because CLI/web need use cases as their API boundary.
  4. **Phase 4 (Infrastructure Services)** provides the real implementations for port interfaces.
  5. **Phase 5 (Agent)** builds on infrastructure services and use cases.
  6. **Phase 6 (Feature Flag + DI)** wires everything together before exposing to users.
  7. **Phase 7 (CLI)** is the thinnest presentation layer - validates the use case API.
  8. **Phase 8 (Web UI)** is the richest presentation layer - builds on validated use cases.
  9. **Phase 9 (i18n + Verification)** is the final pass for translations and full validation.

  This ordering minimizes rework: each phase has its dependencies satisfied by prior phases.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec codegen changes output.ts shape unexpectedly | Run pnpm tsp:compile after every TypeSpec change and verify generated types before proceeding |
  | Migration numbering conflicts if other features merge first | Check latest migration prefix before creating files; renumber if needed |
  | Feature flag wiring misses a fixture location | Follow LESSONS.md 11-step checklist exactly; run pnpm typecheck to surface every FeatureFlags type error |
  | k3d/kubectl not installed on dev machine | All infrastructure services detect binary availability and return typed errors; integration tests mock execFile |
  | Cluster provisioning takes longer than 120s | Exponential backoff health check with configurable timeout; clear error on timeout with retry guidance |
  | Junction table queries cause N+1 patterns | Repository methods batch-load linked entities; integration tests verify query count |
  | LangGraph checkpoint corruption on worker crash | Checkpoint DB per cluster (not shared); worker deletes stale checkpoint on resume-from-error (LESSONS.md pattern) |
  | Settings mapper/repository SQL out of sync | Integration test creates settings with non-default feature flag value and reads back - catches silent drops |
  | Web components missing stories | Create story immediately after component; CI rejects commits without colocated .stories.tsx |
  | DI string token alias forgotten for web use cases | Add string alias in same commit as use case registration; verify with integration test |

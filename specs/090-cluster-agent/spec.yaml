oneLiner: "Add a Cluster domain entity and autonomous cluster agent for managing Kubernetes infrastructure via k3s, ArgoCD, Terraform, and kubectl"
summary: "Introduce a new first-class Cluster entity alongside Repository, Application, and Feature. A Cluster represents a managed Kubernetes environment (k3s-in-Docker) that the Shep platform provisions and operates autonomously. The cluster agent manages YAML manifests, kubectl apply, ArgoCD sync, and Terraform infrastructure using templates and patterns. Clusters link to Repositories, Applications, and Features to form the complete SDLC-to-deployment pipeline.\n"

eractions use `execFile` CLI wrappers. `dockerode` and `@kubernetes/client-node` are not needed for v1 since the CLI-based approach is simpler and follows the existing pattern for external tool integration (see LESSONS.md on execFile patterns).\n\n## Size Estimate\n\n**XL** — This is a multi-week effort, reduced from the original analysis by deferring Terraform and templates:\n\n1. **Domain model + TypeSpec** — Cluster entity, enums, junction entities, feature flag (1-2 days)\n2. **Database layer** — 4 migrations, mapper, repository (2-3 days)\n3. **Application layer** — 12 use cases, 4 port interfaces (3-4 days)\n4. **Infrastructure services** — k3d, kubectl, ArgoCD, Docker health (3-4 days)\n5. **Cluster agent** — LangGraph graph with 6 nodes, worker process (3-4 days)\n6. **CLI commands** — 7 subcommands in cluster group (1-2 days)\n7. **Web UI** — ClusterNode, drawers, canvas integration, SSE, stories (3-4 days)\n8. **Feature flag wiring** — All layers per checklist (1 day)\n9. **Testing** — Unit + integration tests (integrated throughout, adds ~40% overhead)\n10. **i18n** — 9 locales (0.5 days)\n\nTotal estimate: **2-4 weeks** (reduced from 3-5 by deferring Terraform and templates).\n\n---\n\n_Generated by requirements agent — proceed with research_\n"

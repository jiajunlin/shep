openQuestions:
  - question: "Should clusters be provisioned via k3d (k3s-in-Docker wrapper) or raw Docker + k3s binary?"
    resolved: true
    options:
      - option: "k3d"
        description: "k3d is a purpose-built wrapper that handles Docker container creation, k3s configuration, kubeconfig management, multi-node clusters, port mapping, and load balancers out of the box. Reduces implementation surface significantly."
        selected: false
      - option: "Raw Docker + k3s"
        description: "Full control over Docker container lifecycle and k3s binary installation. More flexible but requires reimplementing everything k3d already handles (kubeconfig extraction, port forwarding, multi-node orchestration)."
        selected: true
    selectionRationale: "k3d is recommended because it eliminates hundreds of lines of Docker orchestration code. It provides a stable CLI for create/start/stop/delete, automatic kubeconfig management, and is the de facto standard for local k3s clusters. The Shep infrastructure service wraps k3d CLI calls via execFile, keeping the integration thin and replaceable."
    answer: "Raw Docker + k3s"
  - question: "Should the Cluster entity support multi-node clusters (control plane + worker nodes) in v1?"
    resolved: true
    options:
      - option: "Single-node only"
        description: "One k3s server node per cluster. Simpler provisioning, faster startup, lower resource usage. Sufficient for development and staging workloads. Multi-node can be added later."
        selected: true
      - option: "Multi-node from v1"
        description: "Support configurable server and agent node counts. More realistic production parity but significantly more complex provisioning, health checking, and failure handling."
        selected: false
    selectionRationale: "Single-node is recommended for v1. The primary use case is local development and staging, where a single k3s node provides full Kubernetes API compatibility. Multi-node adds provisioning complexity (node discovery, join tokens, health checks per node) without meaningful benefit for the initial use case. The entity model should include a nodeCount field for future expansion."
    answer: "Single-node only"
  - question: "How should Cluster-to-Repository and Cluster-to-Application relationships be modeled?"
    resolved: true
    options:
      - option: "Junction tables (many-to-many)"
        description: "Separate cluster_repositories and cluster_applications tables. Fully flexible: any cluster can serve any repo/app, any repo/app can deploy to multiple clusters. Follows existing work_item_relations pattern."
        selected: true
      - option: "FK on Application/Repository"
        description: "Add clusterId column to applications and repositories tables. Simpler queries but limits each app/repo to one cluster. Does not match the analysis requirement for many-to-many."
        selected: false
      - option: "JSON array on Cluster"
        description: "Store linked repository/application IDs as JSON array columns on the clusters table. No join queries needed but loses referential integrity and makes querying by linked entity difficult."
        selected: false
    selectionRationale: "Junction tables are recommended because the analysis explicitly calls for many-to-many relationships. A cluster can serve multiple repositories, and a repository can deploy to multiple clusters. This follows the existing work_item_relations pattern with its own id, FK columns, compound unique index, and individual FK indexes."
    answer: "Junction tables (many-to-many)"
  - question: "Should ArgoCD be installed automatically inside every cluster, or opt-in per cluster?"
    resolved: true
    options:
      - option: "Opt-in per cluster"
        description: "Users choose whether to enable ArgoCD during cluster creation. Clusters without ArgoCD use direct kubectl apply for deployments. Keeps simple clusters lightweight and fast to provision."
        selected: true
      - option: "Always install ArgoCD"
        description: "Every cluster gets ArgoCD installed automatically. Consistent GitOps experience but adds 1-2 minutes to provisioning time and ~500MB memory overhead even when not needed."
        selected: false
    selectionRationale: "Opt-in is recommended because ArgoCD adds significant overhead (memory, provisioning time) and is only valuable for GitOps-driven continuous delivery workflows. Simple development clusters that just need kubectl apply should not pay this cost. The Cluster entity includes an argoCdEnabled boolean flag, and the cluster agent conditionally installs ArgoCD during provisioning."
    answer: "Opt-in per cluster"
  - question: "Should Terraform be integrated in v1 or deferred to a follow-up feature?"
    resolved: true
    options:
      - option: "Defer Terraform to v2"
        description: "Focus v1 on k3d provisioning, kubectl, and optional ArgoCD. Terraform adds a separate tool dependency, state management complexity, and provider configuration. The core value proposition (managed local k8s cluster) does not require Terraform."
        selected: true
      - option: "Include Terraform in v1"
        description: "Full IaC support from day one. Users can define infrastructure as Terraform HCL and the cluster agent applies it. Requires Terraform CLI installation, state file management, and provider plugin handling."
        selected: false
    selectionRationale: "Deferring Terraform is recommended because v1's core value is autonomous local Kubernetes management. Terraform is primarily useful for cloud infrastructure provisioning, which is orthogonal to k3s-in-Docker. Including it in v1 would add 4-5 days of implementation for a capability that most local cluster users will not need. The port interface (ITerraformService) can be defined in v1 as a placeholder for v2."
    answer: "Defer Terraform to v2"
  - question: "Should the cluster agent be a persistent LangGraph graph (like FeatureAgent) or a simpler request-response service?"
    resolved: true
    options:
      - option: "LangGraph state machine"
        description: "Full LangGraph graph with typed state, conditional edges, checkpointing, and autonomous node execution. Follows the existing FeatureAgent pattern. Supports long-running provisioning workflows with pause/resume capability."
        selected: true
      - option: "Request-response service"
        description: "Simple service with async methods (provision, deploy, teardown). No state machine, no checkpointing. Simpler to implement but cannot autonomously orchestrate multi-step workflows or recover from failures mid-provisioning."
        selected: false
    selectionRationale: "LangGraph is recommended because cluster provisioning is inherently a multi-step workflow (create Docker resources, wait for k3s ready, install ArgoCD, configure kubeconfig, deploy initial workloads). Checkpointing enables recovery from failures without restarting from scratch. The existing FeatureAgent pattern provides a proven template. The cluster agent graph has fewer nodes than the feature agent, keeping complexity manageable."
    answer: "LangGraph state machine"
  - question: "Should the cluster feature flag gate the entire feature, or should the domain model and persistence layer always be present?"
    resolved: true
    options:
      - option: "Feature flag gates UI only"
        description: "The domain model, persistence, and use cases are always registered. The feature flag hides cluster-related UI (sidebar nav, canvas nodes, create drawer) and CLI commands. This avoids conditional DI registration complexity and keeps the data layer always available for future integrations."
        selected: true
      - option: "Feature flag gates everything"
        description: "Conditional DI registration, no migrations run, no use cases available when flag is off. Maximum isolation but adds complex branching in the container setup and migration runner."
        selected: false
    selectionRationale: "Gating UI only is recommended because the existing feature flag pattern (e.g., envDeploy, projects) gates visibility in the sidebar, search, and FAB actions without conditionally registering use cases. Migrations always run (additive-only), and the domain model is always generated. This keeps the DI container simple and avoids subtle bugs from unregistered dependencies."
    answer: "Feature flag gates UI only"
  - question: "What should the Cluster entity's lifecycle states be?"
    resolved: true
    options:
      - option: "Provisioning, Ready, Stopping, Stopped, Error, Destroying"
        description: "Six states covering the full lifecycle. Provisioning is the initial setup phase, Ready means the cluster is operational, Stopping/Stopped for graceful shutdown, Error for failures, and Destroying for teardown. Matches k3d cluster lifecycle."
        selected: false
      - option: "Simple three-state (Provisioning, Running, Stopped)"
        description: "Minimal states. Fewer transitions to manage but conflates error states with stopped, and does not distinguish between stopping-in-progress and fully-stopped."
        selected: true
    selectionRationale: "Six states are recommended because cluster operations are asynchronous and the UI needs to show granular progress. Provisioning takes 30-60 seconds and the user needs to see it is in progress. Error is distinct from Stopped because the recovery path is different (retry vs start). Destroying is needed because k3d cluster deletion is not instantaneous. This maps cleanly to the k3d cluster lifecycle."
    answer: "Simple three-state (Provisioning, Running, Stopped)"
  - question: "Should v1 include deployment templates (predefined k8s manifest patterns), or just raw manifest management?"
    resolved: true
    options:
      - option: "Raw manifest management only in v1"
        description: "The cluster agent applies arbitrary YAML manifests provided by the user or generated by other agents. No built-in templates. Users bring their own manifests or the feature agent generates them. Templates can be added in v2."
        selected: false
      - option: "Include deployment templates in v1"
        description: "Predefined templates for common patterns (Node.js web app, static site, API server). Reduces time-to-deploy for standard workloads but requires designing a template system, template storage, and variable substitution engine."
        selected: true
    selectionRationale: "Raw manifest management is recommended for v1 because the cluster agent's primary job is to apply and manage manifests, not to generate them. The feature agent or the user provides manifests. Adding a template system is a separate concern that adds 2-3 days of implementation and a template storage/discovery system. The cluster agent's kubectl apply + ArgoCD sync capabilities work with any manifest regardless of origin."
    answer: "Include deployment templates in v1"
  - question: "Should the Cluster-to-Feature relationship be a direct junction table or indirect via the linked Repository?"
    resolved: true
    options:
      - option: "Indirect via Repository"
        description: "Features already belong to a Repository. If a Repository is linked to a Cluster, all its Features implicitly deploy there. No cluster_features junction table needed. Simpler model but cannot deploy a single feature to a specific cluster without deploying all features in that repo."
        selected: false
      - option: "Direct junction table"
        description: "Separate cluster_features table allows per-feature cluster targeting. Maximum flexibility but adds a third junction table and complicates the deploy workflow (which features in a repo go where?)."
        selected: true
    selectionRationale: "Indirect via Repository is recommended because the deployment unit is a repository (or application), not a single feature. Features produce commits that are merged into a repository branch, and the repository is what gets deployed. A cluster_features junction table would imply per-feature deployment targeting, which does not match the actual deployment model. If fine-grained targeting is needed later, it can be added as a follow-up."
    answer: "Direct junction table"
content: "## Problem Statement\n\nShep currently manages three first-class entities: **Repository** (code source), **Application** (persistent AI workspace), and **Feature** (SDLC work unit). There is no entity representing the deployment target — the infrastructure where applications actually run. Users must manually provision Kubernetes clusters, write manifests, configure ArgoCD, and run Terraform outside of Shep.\n\nThis feature introduces a **Cluster** entity — a fully managed Kubernetes environment (k3s-in-Docker via k3d) that the Shep platform provisions, configures, and operates autonomously. The cluster agent handles:\n\n- Provisioning a k3s cluster via k3d inside Docker\n- Managing Kubernetes YAML manifests (deployments, services, ingresses, etc.)\n- Running `kubectl apply` to deploy workloads\n- Optionally configuring ArgoCD for GitOps-driven continuous delivery\n- Linking clusters to Repositories and Applications for end-to-end automation\n\nThis closes the loop from \"idea to deploy\" — Shep's core promise.\n\n## Success Criteria\n\n- [ ] Cluster TypeSpec entity defined in `tsp/domain/entities/cluster.tsp` with all required enums, compiles via `pnpm tsp:compile`\n- [ ] SQLite migration creates `clusters`, `cluster_repositories`, and `cluster_applications` tables with proper indexes\n- [ ] `IClusterRepository` port interface and `SQLiteClusterRepository` implementation pass integration tests for all CRUD operations\n- [ ] `clusters` feature flag added to FeatureFlags model and wired through all layers (TypeSpec, migration, mapper, repository, settings defaults, web feature-flags, translations)\n- [ ] Use cases implemented: CreateCluster, GetCluster, ListClusters, UpdateCluster, DeleteCluster, LinkRepository, UnlinkRepository, LinkApplication, UnlinkApplication, ProvisionCluster, DestroyCluster, GetClusterStatus\n- [ ] Port interfaces defined: `IK3dService`, `IKubectlService`, `IArgoCDService`, `IDockerHealthService`\n- [ ] Infrastructure services implemented: `K3dService` (wraps k3d CLI), `KubectlService` (wraps kubectl CLI), `ArgoCDService` (wraps argocd CLI), `DockerHealthService` (checks Docker daemon availability)\n- [ ] Cluster agent LangGraph graph with nodes: prerequisite-check, provision, configure-kubectl, install-argocd (conditional), health-check, ready\n- [ ] CLI commands: `shep cluster new`, `shep cluster ls`, `shep cluster show`, `shep cluster del`, `shep cluster link`, `shep cluster unlink`, `shep cluster status`\n- [ ] Web UI: ClusterNode component on canvas, ClusterCreateDrawer, ClusterDetailDrawer with status/linked-repos/linked-apps tabs, cluster section in sidebar navigation\n- [ ] All web UI components have colocated `.stories.tsx` files\n- [ ] i18n strings for cluster feature added to all 9 locales (en, ar, es, de, fr, he, pt, uk, ru)\n- [ ] Unit tests for all domain logic, use cases, mappers, and factories achieve >90% coverage\n- [ ] Integration tests for SQLite repository, migrations, and service adapters\n- [ ] DI container registers all new components with string-token aliases for web routes\n- [ ] `pnpm validate` passes (lint + format + typecheck + tsp)\n- [ ] `pnpm test:unit && pnpm test:int` pass with zero failures\n- [ ] `pnpm build` succeeds\n\n## Functional Requirements\n\n### Domain Model (FR-1 through FR-5)\n\n- **FR-1**: Define a `Cluster` TypeSpec entity extending `SoftDeletableEntity` with fields: `name` (string, required), `slug` (string, required, unique among non-deleted), `description` (string, optional), `status` (ClusterStatus enum, default Stopped), `k3dClusterName` (string, optional — the k3d-internal cluster name), `kubeconfigPath` (string, optional — path to generated kubeconfig), `argoCdEnabled` (boolean, default false), `argoCdNamespace` (string, optional, default \"argocd\"), `nodeCount` (int32, default 1 — reserved for future multi-node), `lastProvisionedAt` (utcDateTime, optional), `lastHealthCheckAt` (utcDateTime, optional), `errorMessage` (string, optional)\n- **FR-2**: Define a `ClusterStatus` enum with values: `Provisioning`, `Ready`, `Stopping`, `Stopped`, `Error`, `Destroying`\n- **FR-3**: Define a `ClusterRepository` junction entity extending `BaseEntity` with fields: `clusterId` (UUID, required), `repositoryId` (UUID, required) — representing the many-to-many Cluster-Repository relationship\n- **FR-4**: Define a `ClusterApplication` junction entity extending `BaseEntity` with fields: `clusterId` (UUID, required), `applicationId` (UUID, required) — representing the many-to-many Cluster-Application relationship\n- **FR-5**: Add a `clusters` boolean field (default false) to the `FeatureFlags` model in `settings.tsp` to gate cluster UI visibility\n\n### Persistence Layer (FR-6 through FR-9)\n\n- **FR-6**: Create SQLite migration for the `clusters` table with columns matching the Cluster entity, including indexes on `slug` (unique where deleted_at IS NULL) and `status`\n- **FR-7**: Create SQLite migration for the `cluster_repositories` junction table with compound unique index on (cluster_id, repository_id) and individual FK indexes\n- **FR-8**: Create SQLite migration for the `cluster_applications` junction table with compound unique index on (cluster_id, application_id) and individual FK indexes\n- **FR-9**: Create SQLite migration to add the `feature_flag_clusters` column to the `settings` table (INTEGER NOT NULL DEFAULT 0)\n\n### Repository and Mapper (FR-10 through FR-12)\n\n- **FR-10**: Define `IClusterRepository` port interface with methods: `create`, `findById`, `findBySlug`, `list`, `update`, `delete`, `linkRepository`, `unlinkRepository`, `getLinkedRepositories`, `linkApplication`, `unlinkApplication`, `getLinkedApplications`\n- **FR-11**: Implement `SQLiteClusterRepository` with full CRUD operations and junction table management, following the existing repository pattern (mapper integration, parameterized queries)\n- **FR-12**: Implement `cluster.mapper.ts` with `toDatabase` and `fromDatabase` methods, mapping camelCase domain fields to snake_case DB columns, boolean to integer conversion for `argocd_enabled`\n\n### Use Cases (FR-13 through FR-24)\n\n- **FR-13**: `CreateClusterUseCase` — accepts name and optional description/argoCdEnabled, generates slug, persists cluster with Stopped status, returns created entity\n- **FR-14**: `GetClusterUseCase` — retrieves a single cluster by ID, returns null if not found\n- **FR-15**: `ListClustersUseCase` — retrieves all non-deleted clusters, optionally filtered by status\n- **FR-16**: `UpdateClusterUseCase` — updates mutable fields (name, description, argoCdEnabled), regenerates slug if name changes\n- **FR-17**: `DeleteClusterUseCase` — soft-deletes a cluster, first destroying it if status is Ready or Error\n- **FR-18**: `LinkRepositoryUseCase` — creates a cluster_repositories junction record, validates both cluster and repository exist\n- **FR-19**: `UnlinkRepositoryUseCase` — removes a cluster_repositories junction record\n- **FR-20**: `LinkApplicationUseCase` — creates a cluster_applications junction record, validates both cluster and application exist\n- **FR-21**: `UnlinkApplicationUseCase` — removes a cluster_applications junction record\n- **FR-22**: `ProvisionClusterUseCase` — transitions cluster to Provisioning status, spawns cluster agent to create k3d cluster, install optional ArgoCD, and transition to Ready on success or Error on failure\n- **FR-23**: `DestroyClusterUseCase` — transitions cluster to Destroying status, runs k3d cluster delete, unlinks all repositories and applications, transitions to Stopped on success or Error on failure\n- **FR-24**: `GetClusterStatusUseCase` — returns current cluster status including k3d health, pod count, and ArgoCD sync state (if enabled)\n\n### Infrastructure Services (FR-25 through FR-28)\n\n- **FR-25**: `IK3dService` port interface and implementation wrapping k3d CLI via execFile with methods: `createCluster(name, options)`, `deleteCluster(name)`, `startCluster(name)`, `stopCluster(name)`, `getClusterStatus(name)`, `getKubeconfig(name)`. Must use `--no-lb` and `--wait` flags. Must detect k3d binary availability.\n- **FR-26**: `IKubectlService` port interface and implementation wrapping kubectl CLI via execFile with methods: `apply(kubeconfigPath, manifestPath)`, `applyStdin(kubeconfigPath, yamlContent)`, `getNamespaces(kubeconfigPath)`, `getPods(kubeconfigPath, namespace)`, `getServices(kubeconfigPath, namespace)`, `waitForReady(kubeconfigPath, resource, timeout)`. Must accept kubeconfig path as parameter (never modify global kubeconfig).\n- **FR-27**: `IArgoCDService` port interface and implementation wrapping argocd CLI via execFile with methods: `install(kubeconfigPath, namespace)`, `getStatus(kubeconfigPath, namespace)`, `createApp(kubeconfigPath, appName, repoUrl, path, namespace)`, `syncApp(kubeconfigPath, appName)`. Must install ArgoCD via kubectl apply of the official manifests, not require a separate argocd CLI binary.\n- **FR-28**: `IDockerHealthService` port interface and implementation that checks Docker daemon availability via `docker info` and returns a boolean. Used as a prerequisite check before any cluster operation.\n\n### Cluster Agent (FR-29 through FR-31)\n\n- **FR-29**: Define cluster agent LangGraph state with annotations: `clusterId`, `clusterName`, `status`, `kubeconfigPath`, `argoCdEnabled`, `argoCdNamespace`, `currentNode`, `error`, `completedPhases`\n- **FR-30**: Implement cluster agent graph with nodes: `prerequisite-check` (verify Docker running, k3d available), `provision` (k3d cluster create, wait for ready), `configure-kubectl` (extract and store kubeconfig), `install-argocd` (conditional on argoCdEnabled — install ArgoCD manifests, wait for pods ready), `health-check` (verify cluster API reachable, core pods running), `ready` (update cluster status to Ready). Error edges from any node to an `error` terminal node.\n- **FR-31**: Implement cluster agent worker process following the existing feature-agent-worker pattern: detached Node.js process, heartbeat reporting, PID-based liveness tracking, CLI arg parsing for cluster configuration\n\n### CLI Commands (FR-32 through FR-38)\n\n- **FR-32**: `shep cluster new <name>` — creates a new cluster entity (does not provision). Accepts `--argocd` flag to enable ArgoCD. Accepts `--provision` flag to immediately start provisioning after creation.\n- **FR-33**: `shep cluster ls` — lists all clusters with status, name, linked repo count, linked app count\n- **FR-34**: `shep cluster show <id-or-slug>` — displays cluster details including status, kubeconfig path, linked repos, linked apps, ArgoCD state\n- **FR-35**: `shep cluster del <id-or-slug>` — deletes a cluster (with confirmation prompt). Destroys if running.\n- **FR-36**: `shep cluster link <cluster-id-or-slug> <repo-or-app-id>` — links a repository or application to a cluster (auto-detects entity type by ID lookup)\n- **FR-37**: `shep cluster unlink <cluster-id-or-slug> <repo-or-app-id>` — unlinks a repository or application from a cluster\n- **FR-38**: `shep cluster status <id-or-slug>` — shows live cluster status (pod count, services, ArgoCD sync state if enabled)\n\n### Web UI (FR-39 through FR-46)\n\n- **FR-39**: Add \"Clusters\" navigation item to the sidebar, gated by the `clusters` feature flag\n- **FR-40**: Implement `ClusterNode` React Flow node component showing cluster name, status badge (with color coding per ClusterStatus), linked repo count, and linked app count. Include source and target handles for edge connections.\n- **FR-41**: Implement `ClusterCreateDrawer` with fields: name (required), description (optional), ArgoCD enabled toggle, and a \"Create & Provision\" action button\n- **FR-42**: Implement `ClusterDetailDrawer` with tabs: Overview (status, name, description, kubeconfig path, timestamps), Repositories (linked repos with link/unlink actions), Applications (linked apps with link/unlink actions), Status (live pod list, services, ArgoCD state)\n- **FR-43**: Add cluster nodes to the control center canvas via `deriveGraph`, positioned as deployment targets connected to repository/application nodes via edges derived from junction table data\n- **FR-44**: Implement SSE event support for cluster agent lifecycle (reuse existing agent-events pattern, add ClusterStatus change events)\n- **FR-45**: Add server actions for cluster CRUD, linking/unlinking, provisioning, and destroying that call corresponding use cases\n- **FR-46**: Add API routes for cluster operations, following the existing pattern with string-token DI resolution and reflect-metadata imports\n\n### Feature Flag Wiring (FR-47)\n\n- **FR-47**: Wire the `clusters` feature flag through all layers per the established checklist: TypeSpec model, migration, settings mapper (SettingsRow, toDatabase, fromDatabase), settings repository (INSERT/UPDATE SQL), settings defaults factory, web feature-flags.ts, settings page toggle, translations in all 9 locales, and all known fixture locations (stories, tests, hooks)\n\n### i18n (FR-48)\n\n- **FR-48**: Add translation strings for all cluster UI elements in all 9 locales (en, ar, es, de, fr, he, pt, uk, ru): sidebar nav label, create drawer fields, detail drawer tabs, status labels (Provisioning, Ready, Stopping, Stopped, Error, Destroying), action buttons (Create, Provision, Destroy, Link, Unlink), empty state messages, error messages, CLI command descriptions\n\n## Non-Functional Requirements\n\n- **NFR-1 (Performance)**: Cluster provisioning via k3d must complete within 120 seconds on a machine with Docker running. The health-check node must poll with exponential backoff (1s, 2s, 4s, 8s) up to 60 seconds before timing out.\n- **NFR-2 (Resource Isolation)**: Each cluster runs in its own Docker network and uses a unique kubeconfig file stored under the Shep home directory (`~/.shep/clusters/<cluster-id>/kubeconfig`). Clusters must not share ports or conflict with each other.\n- **NFR-3 (Graceful Degradation)**: If Docker is not running or k3d is not installed, the UI must show a clear prerequisite error message rather than a cryptic failure. The `IDockerHealthService` check must run before any cluster operation.\n- **NFR-4 (Idempotent Operations)**: ProvisionCluster must be safe to retry after failure. DestroyCluster must be safe to call on a cluster that is already destroyed or partially provisioned. All k3d operations must be wrapped with existence checks.\n- **NFR-5 (Clean Architecture Compliance)**: All infrastructure service calls (k3d, kubectl, argocd, docker) must go through port interfaces. No presentation layer may import infrastructure services directly. All use cases must be the sole entry point for cluster operations.\n- **NFR-6 (Backward Compatibility)**: SQLite migrations must be additive-only (no column drops or renames). The settings migration must guard with `pragma table_info` check. The clusters feature flag must default to false so existing users see no change.\n- **NFR-7 (Agent-Agnostic Design)**: The cluster agent must resolve its AI executor through `IAgentExecutorProvider`, never hardcoding a specific provider. Node execution must use `buildExecutorOptions` with explicit node names.\n- **NFR-8 (Testability)**: All infrastructure services must be injectable via port interfaces for unit test mocking. Integration tests must use in-memory SQLite databases. CLI command tests must mock all use cases.\n- **NFR-9 (Observability)**: The cluster agent must emit SSE-compatible status events at each node transition (provisioning started, ArgoCD installing, health check passing, ready). These events must appear in the web UI in real-time.\n- **NFR-10 (Security)**: Kubeconfig files must be stored with 0600 permissions. No cluster credentials may be logged or included in SSE events. The Cluster entity must not store secrets in the SQLite database.\n- **NFR-11 (Accessibility)**: All web UI components must follow existing shadcn/ui accessibility patterns (proper ARIA labels, keyboard navigation, screen reader support). Status badges must use both color and text for color-blind users.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Provisioning tool: k3d or raw Docker + k3s? | k3d | Eliminates Docker orchestration code; stable CLI; de facto standard for local k3s |\n| 2 | Multi-node support in v1? | Single-node only | Core value is local k8s, not production parity; nodeCount field reserved for future |\n| 3 | Entity relationship model? | Junction tables (many-to-many) | Matches analysis requirements; follows work_item_relations pattern |\n| 4 | ArgoCD installation per cluster? | Opt-in per cluster | Avoids overhead for simple clusters; argoCdEnabled flag on entity |\n| 5 | Terraform in v1? | Defer to v2 | Core value is k8s management, not cloud IaC; saves 4-5 days |\n| 6 | Agent architecture? | LangGraph state machine | Multi-step provisioning needs checkpointing and recovery |\n| 7 | Feature flag scope? | Gate UI only | Follows existing pattern; avoids conditional DI complexity |\n| 8 | Cluster lifecycle states? | 6 states (Provisioning through Destroying) | Maps to k3d lifecycle; UI needs granular progress |\n| 9 | Deployment templates in v1? | Raw manifest management only | Agent applies any manifest; template system is a separate concern |\n| 10 | Cluster-to-Feature relationship? | Indirect via Repository | Deployment unit is repo, not feature; avoids third junction table |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `tsp/domain/entities/` | High | New `cluster.tsp`, `cluster-repository.tsp`, `cluster-application.tsp` entity models |\n| `tsp/common/enums/` | High | New `cluster.tsp` enum file with `ClusterStatus` |\n| `packages/core/src/domain/generated/output.ts` | High | Regenerated after TypeSpec changes (read-only, auto-generated) |\n| `packages/core/src/domain/factories/` | Medium 
name: "cluster-agent"
summary: >
  37 tasks across 9 phases implementing the Cluster entity, persistence layer, 12 use cases,
  4 infrastructure services, LangGraph agent graph with worker, feature flag wiring, 7 CLI
  commands, web UI components with canvas integration, and i18n across 9 locales.

relatedFeatures: []
technologies: []
relatedLinks:
  - title: "LESSONS.md Feature Flag Checklist"
    url: "file://LESSONS.md"
  - title: "k3d CLI Reference"
    url: "https://k3d.io/v5.7.5/usage/commands/"

tasks:
  # ============================================================
  # Phase 1: Domain Model & TypeSpec
  # ============================================================

  - id: "task-1"
    phaseId: "phase-1"
    title: "Define ClusterStatus enum in TypeSpec"
    description: >
      Create tsp/common/enums/cluster.tsp with the ClusterStatus enum (Provisioning, Ready,
      Stopping, Stopped, Error, Destroying). Add @doc decorators with state transition diagram.
      Register in tsp/common/enums/index.tsp.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "ClusterStatus enum exists in tsp/common/enums/cluster.tsp with 6 values"
      - "Each value has @doc decorator explaining its purpose"
      - "Enum is imported in tsp/common/enums/index.tsp"
      - "pnpm tsp:compile succeeds"
    tdd:
      red:
        - "Write test that imports ClusterStatus from generated output and asserts all 6 values exist"
      green:
        - "Create cluster.tsp with ClusterStatus enum, add to index.tsp, run pnpm tsp:compile"
      refactor:
        - "Add @doc decorator with ASCII state transition diagram in docstring"
    estimatedEffort: "30min"

  - id: "task-2"
    phaseId: "phase-1"
    title: "Define Cluster entity in TypeSpec"
    description: >
      Create tsp/domain/entities/cluster.tsp with the Cluster model extending SoftDeletableEntity.
      Fields: name, slug, description, status (ClusterStatus, default Stopped), k3dClusterName,
      kubeconfigPath, argoCdEnabled (default false), argoCdNamespace (default argocd), nodeCount
      (default 1), lastProvisionedAt, lastHealthCheckAt, errorMessage. Register in entities index.
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "Cluster model exists in tsp/domain/entities/cluster.tsp extending SoftDeletableEntity"
      - "All fields defined with correct types, optionality, and defaults"
      - "Model is registered in tsp/domain/entities/index.tsp"
      - "pnpm tsp:compile succeeds and Cluster type appears in output.ts"
    tdd:
      red:
        - "Write test that imports Cluster type from generated output and asserts required fields exist with correct types"
      green:
        - "Create cluster.tsp model, add to index.tsp, run pnpm tsp:compile"
      refactor:
        - "Add @doc decorators to all fields explaining their purpose"
    estimatedEffort: "30min"

  - id: "task-3"
    phaseId: "phase-1"
    title: "Define ClusterRepository and ClusterApplication junction entities in TypeSpec"
    description: >
      Create tsp/domain/entities/cluster-repository.tsp (extends BaseEntity, fields: clusterId,
      repositoryId) and tsp/domain/entities/cluster-application.tsp (extends BaseEntity, fields:
      clusterId, applicationId). Register both in entities index.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "ClusterRepository model exists extending BaseEntity with clusterId and repositoryId"
      - "ClusterApplication model exists extending BaseEntity with clusterId and applicationId"
      - "Both models registered in entities index"
      - "pnpm tsp:compile succeeds"
    tdd:
      red:
        - "Write test importing ClusterRepository and ClusterApplication from generated output, assert fields exist"
      green:
        - "Create both .tsp files, add to index, run codegen"
      refactor:
        - "Ensure @doc decorators describe the junction relationship"
    estimatedEffort: "20min"

  - id: "task-4"
    phaseId: "phase-1"
    title: "Add clusters feature flag to FeatureFlags in TypeSpec"
    description: >
      Add clusters boolean field (default false) to the FeatureFlags model in
      tsp/domain/entities/settings.tsp. Run codegen to regenerate output.ts.
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "clusters field exists in FeatureFlags model with boolean type and false default"
      - "pnpm tsp:compile succeeds"
      - "Generated Settings type includes clusters in featureFlags"
    tdd:
      red:
        - "Write test that imports Settings from generated output and asserts featureFlags.clusters exists as boolean"
      green:
        - "Add clusters field to FeatureFlags model in settings.tsp, run codegen"
      refactor:
        - "Add @doc decorator explaining the flag gates cluster UI visibility"
    estimatedEffort: "15min"

  - id: "task-5"
    phaseId: "phase-1"
    title: "Create cluster-defaults factory"
    description: >
      Create packages/core/src/domain/factories/cluster-defaults.factory.ts with a
      createDefaultCluster function that returns a Cluster object with sensible defaults
      (Stopped status, argoCdEnabled false, nodeCount 1, generated UUID, slug from name).
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "createDefaultCluster(name, options?) returns a valid Cluster object"
      - "Default status is Stopped"
      - "Default argoCdEnabled is false"
      - "Default nodeCount is 1"
      - "UUID is generated, slug is derived from name"
      - "Unit test verifies all defaults"
    tdd:
      red:
        - "Write test: createDefaultCluster('my-cluster') returns Cluster with status Stopped, argoCdEnabled false, nodeCount 1, valid UUID, slug 'my-cluster'"
        - "Write test: createDefaultCluster('My Cluster', { argoCdEnabled: true }) returns Cluster with argoCdEnabled true and slug 'my-cluster'"
      green:
        - "Implement createDefaultCluster using randomUUID, slugify, and spread overrides"
      refactor:
        - "Extract slug generation to reusable helper if one does not already exist in the codebase"
    estimatedEffort: "30min"

  # ============================================================
  # Phase 2: Persistence Layer
  # ============================================================

  - id: "task-6"
    phaseId: "phase-2"
    title: "Create clusters table migration (085)"
    description: >
      Create migration 085-create-clusters-table.ts with CREATE TABLE IF NOT EXISTS for the
      clusters table. Columns match the Cluster entity: id TEXT PRIMARY KEY, name TEXT NOT NULL,
      slug TEXT NOT NULL, description TEXT, status TEXT NOT NULL DEFAULT 'Stopped',
      k3d_cluster_name TEXT, kubeconfig_path TEXT, argocd_enabled INTEGER NOT NULL DEFAULT 0,
      argocd_namespace TEXT DEFAULT 'argocd', node_count INTEGER NOT NULL DEFAULT 1,
      last_provisioned_at INTEGER, last_health_check_at INTEGER, error_message TEXT,
      created_at INTEGER NOT NULL, updated_at INTEGER NOT NULL, deleted_at INTEGER.
      Indexes on slug (unique where deleted_at IS NULL) and status.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "Migration creates clusters table with all columns"
      - "Unique partial index on slug WHERE deleted_at IS NULL"
      - "Index on status column"
      - "All guards (sqlite_master check) prevent duplicate execution"
      - "Integration test: migration runs idempotently"
    tdd:
      red:
        - "Write integration test: open in-memory DB, run migration, assert table exists with all columns via pragma table_info"
        - "Write integration test: run migration twice, assert no error (idempotent)"
      green:
        - "Create 085-create-clusters-table.ts with CREATE TABLE IF NOT EXISTS, CREATE UNIQUE INDEX IF NOT EXISTS"
      refactor:
        - "Verify column types and defaults match generated TypeSpec entity exactly"
    estimatedEffort: "30min"

  - id: "task-7"
    phaseId: "phase-2"
    title: "Create cluster_repositories junction table migration (086)"
    description: >
      Create migration 086-create-cluster-repositories.ts. Table: id TEXT PRIMARY KEY,
      cluster_id TEXT NOT NULL, repository_id TEXT NOT NULL, created_at INTEGER NOT NULL.
      Compound unique index on (cluster_id, repository_id). Individual indexes on cluster_id
      and repository_id. FK constraints to clusters and repositories tables.
    state: "Todo"
    dependencies:
      - "task-6"
    acceptanceCriteria:
      - "Migration creates cluster_repositories table with all columns and FK constraints"
      - "Compound unique index on (cluster_id, repository_id)"
      - "Individual FK indexes exist"
      - "Integration test: migration runs idempotently"
    tdd:
      red:
        - "Write integration test: run migration after 085, assert table exists with correct columns and indexes"
      green:
        - "Create 086-create-cluster-repositories.ts with table, compound unique index, and FK indexes"
      refactor:
        - "Verify index naming follows existing convention"
    estimatedEffort: "20min"

  - id: "task-8"
    phaseId: "phase-2"
    title: "Create cluster_applications junction table migration (087)"
    description: >
      Create migration 087-create-cluster-applications.ts. Same pattern as 086 but with
      application_id instead of repository_id, FK to applications table.
    state: "Todo"
    dependencies:
      - "task-6"
    acceptanceCriteria:
      - "Migration creates cluster_applications table with correct columns and FK constraints"
      - "Compound unique index on (cluster_id, application_id)"
      - "Individual FK indexes exist"
      - "Integration test: migration runs idempotently"
    tdd:
      red:
        - "Write integration test: run migration after 085, assert table exists with correct columns"
      green:
        - "Create 087-create-cluster-applications.ts mirroring the 086 pattern"
      refactor:
        - "Ensure consistent naming with the cluster_repositories migration"
    estimatedEffort: "15min"

  - id: "task-9"
    phaseId: "phase-2"
    title: "Create feature_flag_clusters settings migration (088)"
    description: >
      Create migration 088-add-feature-flag-clusters.ts. ALTER TABLE settings ADD COLUMN
      feature_flag_clusters INTEGER NOT NULL DEFAULT 0, guarded by pragma table_info check.
    state: "Todo"
    dependencies:
      - "task-4"
    acceptanceCriteria:
      - "Migration adds feature_flag_clusters column to settings table"
      - "Guards with pragma table_info to prevent duplicate column"
      - "Default value is 0 (false)"
      - "Integration test: migration runs idempotently"
    tdd:
      red:
        - "Write integration test: run migration, assert feature_flag_clusters column exists in settings table"
      green:
        - "Create 088-add-feature-flag-clusters.ts following 084 pattern exactly"
      refactor:
        - "Verify down() function includes proper comment about SQLite DROP COLUMN limitation"
    estimatedEffort: "15min"

  - id: "task-10"
    phaseId: "phase-2"
    title: "Implement cluster mapper (toDatabase/fromDatabase)"
    description: >
      Create cluster.mapper.ts with ClusterRow interface, toDatabase, and fromDatabase functions.
      Map all fields: camelCase to snake_case, boolean to 0/1 integer, Date to unix ms integer,
      ClusterStatus string to enum cast.
    state: "Todo"
    dependencies:
      - "task-2"
      - "task-6"
    acceptanceCriteria:
      - "ClusterRow interface defines all columns in snake_case"
      - "toDatabase converts Cluster domain object to ClusterRow"
      - "fromDatabase converts ClusterRow to Cluster domain object"
      - "Boolean conversion: argoCdEnabled <-> argocd_enabled (0/1)"
      - "Date conversion: createdAt/updatedAt <-> created_at/updated_at (unix ms)"
      - "Nullable date conversion: lastProvisionedAt, lastHealthCheckAt, deletedAt"
      - "Unit tests cover round-trip conversion"
    tdd:
      red:
        - "Write test: toDatabase(cluster) returns ClusterRow with correct snake_case keys, integer booleans, ms timestamps"
        - "Write test: fromDatabase(row) returns Cluster with correct camelCase keys, boolean values, Date objects"
        - "Write test: round-trip (toDatabase then fromDatabase) preserves all field values"
      green:
        - "Implement ClusterRow interface, toDatabase, fromDatabase following application.mapper.ts pattern"
      refactor:
        - "Ensure nullable fields use consistent null/undefined mapping"
    estimatedEffort: "45min"

  - id: "task-11"
    phaseId: "phase-2"
    title: "Define IClusterRepository port interface"
    description: >
      Create the IClusterRepository interface in application/ports/output/repositories/ with
      methods: create, findById, findBySlug, list (optional status filter), update, softDelete,
      linkRepository, unlinkRepository, getLinkedRepositories, linkApplication,
      unlinkApplication, getLinkedApplications.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "IClusterRepository interface defined with all 12 methods"
      - "All method signatures use domain types (Cluster, ClusterStatus, etc.)"
      - "update accepts Partial<Pick<Cluster, mutable fields>>"
      - "list accepts optional status filter parameter"
      - "All methods return Promise<T>"
    tdd: null
    estimatedEffort: "20min"

  - id: "task-12"
    phaseId: "phase-2"
    title: "Implement SQLiteClusterRepository"
    description: >
      Implement the full SQLiteClusterRepository with CRUD operations and junction table
      management. Uses the cluster mapper for domain-to-DB conversion. Parameterized queries
      for SQL injection prevention. Soft-delete implementation. Junction table link/unlink
      operations with existence checks.
    state: "Todo"
    dependencies:
      - "task-6"
      - "task-7"
      - "task-8"
      - "task-10"
      - "task-11"
    acceptanceCriteria:
      - "All 12 IClusterRepository methods implemented"
      - "create inserts into clusters table with all columns from mapper"
      - "findById/findBySlug filter WHERE deleted_at IS NULL"
      - "list supports optional status filter"
      - "update writes only changed fields"
      - "softDelete sets deleted_at timestamp"
      - "linkRepository/linkApplication insert into junction tables with UUID generation"
      - "unlinkRepository/unlinkApplication delete from junction tables"
      - "getLinkedRepositories/getLinkedApplications join cluster with junction table"
      - "Integration tests pass against in-memory SQLite"
    tdd:
      red:
        - "Write integration test: create cluster, findById returns it with all fields"
        - "Write integration test: create cluster, findBySlug returns it"
        - "Write integration test: create 3 clusters, list returns all; list with status filter returns subset"
        - "Write integration test: create then update name, verify slug regenerated"
        - "Write integration test: softDelete sets deleted_at, findById returns null"
        - "Write integration test: linkRepository creates junction record, getLinkedRepositories returns it"
        - "Write integration test: unlinkRepository removes junction record"
        - "Write integration test: duplicate linkRepository throws or is idempotent"
      green:
        - "Implement SQLiteClusterRepository with prepared statements for all operations"
      refactor:
        - "Extract common query patterns if duplication emerges between CRUD and junction methods"
    estimatedEffort: "2h"

  # ============================================================
  # Phase 3: Application Layer - Ports & Use Cases
  # ============================================================

  - id: "task-13"
    phaseId: "phase-3"
    title: "Define infrastructure port interfaces"
    description: >
      Create 5 port interfaces: IK3dService (createCluster, deleteCluster, startCluster,
      stopCluster, getClusterStatus, getKubeconfig), IKubectlService (apply, applyStdin,
      getNamespaces, getPods, getServices, waitForReady), IArgoCDService (install, getStatus,
      createApp, syncApp), IDockerHealthService (isAvailable), IClusterAgentProcessService
      (spawn, isRunning, kill).
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "IK3dService interface with 6 methods defined"
      - "IKubectlService interface with 6 methods defined"
      - "IArgoCDService interface with 4 methods defined"
      - "IDockerHealthService interface with isAvailable method defined"
      - "IClusterAgentProcessService interface with spawn/isRunning/kill methods defined"
      - "All methods return Promise<T> with domain-typed inputs and outputs"
    tdd: null
    estimatedEffort: "30min"

  - id: "task-14"
    phaseId: "phase-3"
    title: "Define cluster use case types"
    description: >
      Create packages/core/src/application/use-cases/clusters/types.ts with input/output
      types for all 12 use cases: CreateClusterInput, CreateClusterResult, UpdateClusterInput,
      LinkEntityInput, ClusterStatusResult, etc.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "All input/output types defined for 12 use cases"
      - "Types use domain entities (Cluster, ClusterStatus) not raw primitives"
      - "Optional fields are properly marked"
    tdd: null
    estimatedEffort: "20min"

  - id: "task-15"
    phaseId: "phase-3"
    title: "Implement CRUD use cases (Create, Get, List, Update, Delete)"
    description: >
      Implement the 5 core CRUD use cases for clusters. CreateClusterUseCase generates UUID
      and slug, sets Stopped status. GetClusterUseCase retrieves by ID. ListClustersUseCase
      supports optional status filter. UpdateClusterUseCase regenerates slug on name change.
      DeleteClusterUseCase soft-deletes, destroying first if status is Ready or Error.
    state: "Todo"
    dependencies:
      - "task-11"
      - "task-13"
      - "task-14"
    acceptanceCriteria:
      - "CreateClusterUseCase creates cluster with Stopped status and generated slug"
      - "GetClusterUseCase returns cluster by ID or null"
      - "ListClustersUseCase returns all clusters, optionally filtered by status"
      - "UpdateClusterUseCase updates fields and regenerates slug on name change"
      - "DeleteClusterUseCase soft-deletes; if status is Ready/Error, calls destroy first"
      - "All use cases are @injectable with @inject dependencies"
      - "Unit tests with mocked IClusterRepository pass"
    tdd:
      red:
        - "Write test: CreateClusterUseCase.execute({name}) calls repo.create with Stopped status, generated UUID, slug"
        - "Write test: GetClusterUseCase.execute(id) calls repo.findById and returns result"
        - "Write test: ListClustersUseCase.execute() calls repo.list; with status filter calls repo.list(status)"
        - "Write test: UpdateClusterUseCase.execute({id, name}) calls repo.update with new slug when name changes"
        - "Write test: DeleteClusterUseCase.execute(id) on Ready cluster calls destroy then softDelete"
        - "Write test: DeleteClusterUseCase.execute(id) on Stopped cluster calls softDelete directly"
      green:
        - "Implement 5 use cases with @injectable/@inject decorators following existing pattern"
      refactor:
        - "Extract shared cluster lookup logic to a private helper method if repeated"
    estimatedEffort: "2h"

  - id: "task-16"
    phaseId: "phase-3"
    title: "Implement link/unlink use cases (4 use cases)"
    description: >
      Implement LinkRepositoryUseCase, UnlinkRepositoryUseCase, LinkApplicationUseCase,
      UnlinkApplicationUseCase. Each validates that both entities exist before
      creating/removing the junction record.
    state: "Todo"
    dependencies:
      - "task-11"
      - "task-14"
    acceptanceCriteria:
      - "LinkRepositoryUseCase validates cluster and repository exist, then creates junction record"
      - "UnlinkRepositoryUseCase removes junction record"
      - "LinkApplicationUseCase validates cluster and application exist, then creates junction record"
      - "UnlinkApplicationUseCase removes junction record"
      - "All throw descriptive errors when entities not found"
      - "Unit tests with mocked repos pass"
    tdd:
      red:
        - "Write test: LinkRepositoryUseCase.execute({clusterId, repositoryId}) calls repo.linkRepository after verifying both exist"
        - "Write test: LinkRepositoryUseCase.execute with non-existent cluster throws error"
        - "Write test: UnlinkRepositoryUseCase.execute calls repo.unlinkRepository"
        - "Write test: LinkApplicationUseCase and UnlinkApplicationUseCase mirror the repository pattern"
      green:
        - "Implement 4 use cases with existence validation and junction table operations"
      refactor:
        - "Extract entity existence validation to shared helper if pattern repeats"
    estimatedEffort: "1h"

  - id: "task-17"
    phaseId: "phase-3"
    title: "Implement ProvisionClusterUseCase"
    description: >
      Implements the provisioning workflow: validates cluster is in Stopped or Error status,
      transitions to Provisioning, spawns the cluster agent worker process via
      IClusterAgentProcessService. The worker handles the actual k3d provisioning.
    state: "Todo"
    dependencies:
      - "task-11"
      - "task-13"
      - "task-14"
    acceptanceCriteria:
      - "Validates cluster exists and is in Stopped or Error status"
      - "Transitions cluster status to Provisioning via repo.update"
      - "Spawns cluster agent worker via IClusterAgentProcessService.spawn"
      - "Returns immediately (non-blocking) - worker runs in background"
      - "Throws error if cluster is in non-provisionable state"
      - "Unit test with mocked dependencies passes"
    tdd:
      red:
        - "Write test: execute(id) on Stopped cluster updates status to Provisioning and calls processService.spawn"
        - "Write test: execute(id) on Ready cluster throws invalid state error"
        - "Write test: execute(id) on Error cluster succeeds (retry allowed)"
      green:
        - "Implement ProvisionClusterUseCase with status validation and worker spawn"
      refactor:
        - "Define a set of provisionable states as a constant for reuse"
    estimatedEffort: "45min"

  - id: "task-18"
    phaseId: "phase-3"
    title: "Implement DestroyClusterUseCase"
    description: >
      Transitions cluster to Destroying status, calls IK3dService.deleteCluster to tear down
      the k3d cluster, cleans up kubeconfig file, unlinks all repositories and applications,
      transitions to Stopped on success or Error on failure. Must be idempotent (safe to call
      on already-destroyed clusters).
    state: "Todo"
    dependencies:
      - "task-11"
      - "task-13"
      - "task-14"
    acceptanceCriteria:
      - "Transitions cluster status to Destroying"
      - "Calls IK3dService.deleteCluster"
      - "Removes kubeconfig file from disk"
      - "Unlinks all repositories and applications via junction table"
      - "Transitions to Stopped on success, Error on failure"
      - "Idempotent: calling on already-Stopped cluster is a no-op"
      - "Unit test with mocked dependencies passes"
    tdd:
      red:
        - "Write test: execute(id) on Ready cluster transitions to Destroying, calls k3d.deleteCluster, transitions to Stopped"
        - "Write test: execute(id) on Stopped cluster is a no-op (returns without error)"
        - "Write test: execute(id) when k3d.deleteCluster throws transitions to Error with error message"
        - "Write test: execute(id) unlinks all repositories and applications"
      green:
        - "Implement DestroyClusterUseCase with status transitions and idempotency"
      refactor:
        - "Ensure cleanup runs even when k3d.deleteCluster fails (kubeconfig + junction cleanup in finally block)"
    estimatedEffort: "1h"

  - id: "task-19"
    phaseId: "phase-3"
    title: "Implement GetClusterStatusUseCase"
    description: >
      Returns enriched cluster status including current entity status, k3d health (if running),
      pod count, service count, and ArgoCD sync state (if enabled). Delegates to infrastructure
      service ports for live data.
    state: "Todo"
    dependencies:
      - "task-11"
      - "task-13"
      - "task-14"
    acceptanceCriteria:
      - "Returns cluster entity status as baseline"
      - "If cluster is Ready, queries IKubectlService for pod/service counts"
      - "If argoCdEnabled and Ready, queries IArgoCDService for sync state"
      - "If cluster is not Ready, returns entity status without live queries"
      - "Handles infrastructure service errors gracefully (returns stale data with error message)"
      - "Unit test with mocked dependencies passes"
    tdd:
      red:
        - "Write test: execute(id) on Ready cluster returns status with pod count and service count from kubectl"
        - "Write test: execute(id) on Ready cluster with ArgoCD enabled includes ArgoCD sync state"
        - "Write test: execute(id) on Stopped cluster returns entity status without live queries"
        - "Write test: execute(id) when kubectl throws returns status with error message"
      green:
        - "Implement GetClusterStatusUseCase with conditional live queries"
      refactor:
        - "Define ClusterStatusResult type with clear optional fields for live data"
    estimatedEffort: "45min"

  # ============================================================
  # Phase 4: Infrastructure Services
  # ============================================================

  - id: "task-20"
    phaseId: "phase-4"
    title: "Implement error classes (K3dError, KubectlError, DockerError)"
    description: >
      Create custom error classes with typed error codes for each infrastructure service.
      K3dError with K3dErrorCode (BINARY_NOT_FOUND, CLUSTER_EXISTS, CLUSTER_NOT_FOUND,
      COMMAND_FAILED, TIMEOUT). KubectlError with KubectlErrorCode. DockerError with
      DockerErrorCode. All extend Error with name, code, and optional cause.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "K3dError class with K3dErrorCode enum (5 codes)"
      - "KubectlError class with KubectlErrorCode enum"
      - "DockerError class with DockerErrorCode enum (DAEMON_NOT_RUNNING, BINARY_NOT_FOUND)"
      - "All errors extend Error with name, code, cause properties"
      - "Unit tests verify error construction and code assignment"
    tdd:
      red:
        - "Write test: new K3dError(K3dErrorCode.BINARY_NOT_FOUND, message) has correct name, code, message"
        - "Write test: K3dError with cause preserves original error"
      green:
        - "Implement 3 error classes following WorktreeError pattern"
      refactor:
        - "Ensure error names are descriptive for logging (K3dError, not Error)"
    estimatedEffort: "30min"

  - id: "task-21"
    phaseId: "phase-4"
    title: "Implement DockerHealthService"
    description: >
      Implement IDockerHealthService wrapping docker info via execFile. Returns boolean

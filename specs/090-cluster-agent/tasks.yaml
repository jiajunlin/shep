content: |
  ## Summary

  The implementation is organized into 39 tasks across 9 phases, totaling approximately 32 hours
  of work. The build follows a strict bottom-up, layer-by-layer approach through the clean
  architecture:

  First, the TypeSpec domain models are defined (Cluster entity, ClusterStatus enum, junction
  entities, feature flag), establishing the type foundation. Then the persistence layer is built
  (4 migrations, mapper, repository) with integration tests against in-memory SQLite. Next,
  the application layer defines port interfaces and implements 12 use cases, each unit-tested
  with mocked dependencies.

  Infrastructure services (k3d, kubectl, ArgoCD, Docker health) are implemented as execFile CLI
  wrappers with typed error classes. The cluster agent builds on these services with a LangGraph
  state machine (6 nodes) and a detached worker process following the feature-agent pattern.

  Feature flag wiring touches all 11 layers per the LESSONS.md checklist, and the DI container
  gets a new register-cluster.ts module. CLI commands expose the use case API through 7
  subcommands. Web UI components (ClusterNode, drawers, status badge) integrate with the
  React Flow canvas via deriveGraph, with server actions, API routes, and SSE events for
  real-time updates.

  Finally, i18n translations are added across all 9 locales, and a full validation pass
  confirms zero regressions across lint, typecheck, tests, and build.

  Each phase depends only on prior phases, minimizing rework. TDD cycles (RED-GREEN-REFACTOR)
  are defined for every code task to ensure correctness from the start.

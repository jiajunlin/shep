    state: "Todo"
    dependencies:
      - "task-13"
      - "task-20"
    acceptanceCriteria:
      - "isAvailable() returns true when docker info succeeds"
      - "isAvailable() returns false when docker binary not found (ENOENT)"
      - "isAvailable() returns false when Docker daemon not running (non-zero exit)"
      - "@injectable() with @inject('ExecFunction')"
      - "Unit test with mocked execFile passes"
    tdd:
      red:
        - "Write test: isAvailable returns true when execFile resolves successfully"
        - "Write test: isAvailable returns false when execFile rejects with ENOENT"
        - "Write test: isAvailable returns false when execFile rejects with non-zero exit"
      green:
        - "Implement DockerHealthService with execFile('docker', ['info']) call"
      refactor:
        - "Add timeout parameter to prevent hanging on unresponsive Docker daemon"
    estimatedEffort: "30min"

  - id: "task-22"
    phaseId: "phase-4"
    title: "Implement K3dService"
    description: >
      Implement IK3dService wrapping k3d CLI via execFile. Methods: createCluster (with --no-lb
      --wait flags), deleteCluster, startCluster, stopCluster, getClusterStatus, getKubeconfig.
      Binary availability detection. Typed error handling via K3dError.
    state: "Todo"

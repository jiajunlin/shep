content: |
  ## Summary

  47 tasks across 9 sequential phases. Phase 1 lays the data foundation
  (TypeSpec, migrations, repositories, in-memory adapters, the
  SupervisorActor value object, and the FeatureFlags.collaboration flag).
  Phase 2 introduces the agent message bus and its SSE event kind, lighting
  up the first observable behavior behind the still-off flag. Phase 3 builds
  the unified question pipeline, including the in-process
  DeferredQuestionRegistry that bridges the SDK V2 canUseTool callback to
  the DB-backed answer surface, and the parallel AgentQuestion emitted by
  feature-agent-worker.ts on every approval-gate transition. Phase 4 ships
  supervisor policy CRUD with feature→app fallback resolution and registers
  every new port in DI. Phase 5 implements the LangGraph-based supervisor
  evaluator (resolved through IAgentExecutorProvider per AGENTS.md) along
  with the lazy per-scope worker. Phase 6 wires the supervisor into the
  approval-gate flow as an actor inside the existing state machine,
  enforcing the "user always wins" invariant via the SupervisorActor value
  object. Phase 7 hooks the new notification kinds into the existing
  INotificationService so blocking questions and supervisor escalations
  reach the user within the NFR-10 2s budget. Phase 8 ships the web
  surfaces (supervisor config page, unified questions inbox, "Why?" drawer,
  Agent Activity feed) and the CLI commands (`shep supervisor *`,
  `shep agent questions *`, dev-only `shep agent message send`). Phase 9
  closes the loop with documentation, two narrow but representative
  Playwright e2e tests, and final off-flag NFR-14 validation; the actual
  flag flip ships as a separate small PR after this validation.

  Every code task follows TDD (RED → GREEN → REFACTOR). Tasks are ordered
  by dependency — no task references a later task — so the plan is safe to
  execute strictly top-to-bottom. The total estimate (~85h) is consistent
  with the L sizing in spec.yaml.


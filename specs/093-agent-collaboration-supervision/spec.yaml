openQuestions:
  - question: "What collaboration topology should agents use to communicate?"
    resolved: true
    options:
      - option: "Hub-and-spoke via supervisor"
        description: "All inter-agent messages flow through the supervisor agent (or a logical hub when no supervisor is configured). Simplest model, matches spec 014's EM (engineering manager) pattern, gives one place to enforce policy and audit. Limitation: extra hop adds latency and the hub can become a bottleneck."
        selected: true
      - option: "Peer-to-peer mesh"
        description: "Agents publish/subscribe directly to a shared bus and address each other by run/feature ID. Maximum flexibility and decoupling, but harder to police, audit, and reason about. Risks emergent chatter and conflicting decisions."
        selected: false
      - option: "Broadcast-only (no addressing)"
        description: "Agents emit structured events on a shared topic; consumers (other agents, UI, supervisor) decide what to act on. Simplest infrastructure, but lacks targeted requests/replies needed for handoffs."
        selected: false
    selectionRationale: "Hub-and-spoke aligns with the existing draft team-execution protocol (spec 014) and the supervisor concept the user is asking for. It centralizes policy, audit, and conflict resolution in one place, which is critical for a delegated guardian. We can later relax to peer-to-peer for high-frequency exchanges if a real need emerges, but starting centralized avoids emergent chaos and matches Shep's existing 'one orchestrator per feature' mental model."
    answer: "Hub-and-spoke via supervisor"
  - question: "How should the agent message bus be implemented?"
    resolved: true
    options:
      - option: "SQLite-backed with polling"
        description: "Persist messages in a new agent_messages table; consumers poll (matching the existing 500ms SSE pattern in StreamAgentEventsUseCase). Pros: zero new infra, durable, cross-process and cross-worktree, identical pattern to current event streaming, naturally auditable. Cons: ~500ms latency, polling cost."
        selected: true
      - option: "In-process EventEmitter"
        description: "Use Node.js EventEmitter as the bus. Pros: sub-millisecond latency, trivial to implement. Cons: single-process only — fails immediately for parallel feature agents in separate worktree processes, which is exactly the user's scenario."
        selected: false
      - option: "Redis pub/sub"
        description: "Add Redis as a message broker. Pros: low latency, horizontal scale, mature pub/sub. Cons: adds a heavy external dependency to a tool that is currently single-binary + SQLite, breaks the offline-first/local-first promise."
        selected: false
      - option: "File-based watcher"
        description: "Drop messages as JSON files in a shared directory; use chokidar/fs.watch. Pros: cross-process, no DB schema. Cons: noisy, unordered, hard to audit, worse than SQLite for every property that matters."
        selected: false
    selectionRationale: "SQLite polling reuses the exact pattern already proven by StreamAgentEventsUseCase (500ms poll, multiplexed via SSE/Service Worker). It works across processes and worktrees, gives free durability and audit, and adds zero new infrastructure. Latency is acceptable for human-paced supervision (~500ms is invisible compared to LLM turn time). We avoid Redis to preserve the local-first / single-binary value proposition."
    answer: "SQLite-backed with polling"
  - question: "What is the default supervisor autonomy level?"
    resolved: true
    options:
      - option: "Advisory (default)"
        description: "Supervisor observes, comments, and recommends but cannot approve/reject without the user. The user keeps full control; supervisor adds context and surfaces risk. Safe default that respects user expectations from existing approval-gate behavior."
        selected: true
      - option: "Co-sign"
        description: "Supervisor must approve in addition to the user, or supervisor can pre-approve for the user to confirm. Stricter — useful for high-stakes flows like deploy/merge but adds friction."
        selected: false
      - option: "Autonomous"
        description: "Supervisor approves/rejects on the user's behalf without confirmation, within configured policy. Maximum hands-off but maximum blast radius; should never be the default for new users."
        selected: false
    selectionRationale: "Advisory is the only safe default for a brand-new capability. Approval gates today are user-only; promoting the supervisor to autonomous-by-default would silently change the trust contract. Users opt into stronger autonomy per scope (per-app, per-feature, per-gate) once they've watched the supervisor advise them and built confidence. This mirrors how every successful delegated-agent product (Copilot Workspace, Devin reviewers) ramps trust."
    answer: "Advisory (default)"
  - question: "Should AgentQuestion be a new domain entity or a thin extension of existing models?"
    resolved: true
    options:
      - option: "New first-class entity"
        description: "Define AgentQuestion in TypeSpec with its own table, repository, and use cases. Bridges interactive AskUserQuestion (via canUseTool) and background-agent escalations (via approval gates). One unified inbox across modes; supervisor can answer in either mode without special-casing."
        selected: true
      - option: "Reuse InteractiveMessage + WorkflowStep"
        description: "No new entity — encode questions as typed InteractiveMessage variants for interactive mode and tagged WorkflowStep for background mode. Less schema work but creates two parallel surfaces and forces every consumer (notifications, supervisor, UI inbox) to query two tables."
        selected: false
      - option: "Extend approval-gate model only"
        description: "Treat every question as a free-form approval gate. Maximum reuse but loses fidelity — an open-ended 'which library should I use?' is not the same shape as 'allow merge yes/no'."
        selected: false
    selectionRationale: "A first-class AgentQuestion entity is the only design that gives a unified inbox across interactive and background modes — which is the user's actual ask ('what happens when agents want to ask questions?'). Bolting onto existing tables looks cheaper but forces every downstream surface (UI inbox, supervisor, notifications, audit) to do double work and never converges. The new entity is small (~6 fields) and fits naturally beside agent_runs and interactive_messages."
    answer: "New first-class entity"
  - question: "What is the supervisor configuration scope?"
    resolved: true
    options:
      - option: "Cascading: global → repo → app → feature"
        description: "Three scope levels (global, repo, app) with optional per-feature override. Resolution cascade: feature-scoped first, then repo-scoped, then app-scoped, then global. Global scope lets users set a default supervisor for all agent work; repo scope lets users configure supervision on standalone repos (not managed as Shep apps); app scope covers all repos/features in a Shep application. Per-agent-type and per-gate concerns are expressed as fields inside SupervisorPolicy, not as separate scope levels."
        selected: true
      - option: "Per-app with per-feature override"
        description: "Configure a supervisor at the app level (default for all features in that app) with optional override per feature. Matches how AgentRun and ApprovalGates already cascade, but excludes standalone repos and global defaults."
        selected: false
      - option: "Global only"
        description: "One supervisor for all apps/features. Simplest UX. Too coarse — different projects have different risk profiles (a side project doesn't need the same guardrails as production)."
        selected: false
      - option: "Per-feature only"
        description: "Configure on every feature individually. Maximum control but maximum friction; users will not configure 50 features by hand."
        selected: false
      - option: "Per-agent-type"
        description: "Configure separately for each agent type (feature, deploy, review). Useful but orthogonal — should be expressible as a policy field inside the per-app config rather than a separate scope."
        selected: false
    selectionRationale: "Cascading scope (global → repo → app → feature) addresses the user's feedback that supervision should work not only for Shep applications but also for regular repos and features. Global scope provides a sensible default; repo scope lets users supervise standalone repos that aren't managed as full Shep apps; app scope covers the existing mental model. Per-agent-type and per-gate concerns become fields inside a single SupervisorPolicy rather than a parallel scope hierarchy. This matches the existing polymorphic featureId pattern (UUID, repo-<id>, global) already used in interactive sessions."
    answer: "Cascading: global → repo → app → feature"
  - question: "What happens when the user and supervisor disagree on a gate?"
    resolved: true
    options:
      - option: "User always wins"
        description: "User's decision is final. Supervisor's vote is recorded for audit but cannot override. Safest default — preserves user agency and matches the 'delegated guardian' mental model (a guardian advises; the principal decides)."
        selected: true
      - option: "Supervisor wins in autonomous mode"
        description: "When supervisor is configured as autonomous for that scope, supervisor's decision is final and user must explicitly override via a separate command. Useful for hands-off operation but requires careful UX to avoid surprise."
        selected: false
      - option: "First responder wins"
        description: "Whoever (user or supervisor) responds first locks in the decision. Race condition by design — produces unpredictable outcomes."
        selected: false
    selectionRationale: "User-always-wins is the right invariant for a feature that exists to give users more confidence, not less. The supervisor's value is filtering and recommending, not vetoing. When users explicitly configure autonomous mode, they're handing the supervisor write authority for that scope — but even then, a user override (via the existing reject/stop primitives) must always be possible. This rule is also the easiest to explain in docs and audits."
    answer: "User always wins"
  - question: "How should escalations be routed to the user?"
    resolved: true
    options:
      - option: "Reuse existing notification system + new event types"
        description: "Add new notification kinds (agent_question_pending, supervisor_escalated, agent_message_blocked) to the existing INotificationService and notifications table. Honors per-event preferences in Settings.notificationPreferences. Zero new delivery infrastructure."
        selected: false
      - option: "New dedicated escalation channel"
        description: "Build a separate priority lane (e.g., real-time push, email) just for supervisor escalations. Higher reliability but duplicates the notification system that already supports priorities."
        selected: true
      - option: "In-app only (no notification)"
        description: "Show pending questions only in the web/CLI inbox; rely on the user opening Shep. Simplest but defeats the point of delegated supervision when the user is away."
        selected: false
    selectionRationale: "The notification system already supports per-event preferences and is wired into both web and CLI. Adding new event kinds is a small, low-risk extension. We get free user controls (mute, channel preference) and a single mental model for all agent-driven alerts. Building a parallel channel would duplicate code without solving any real problem."
    answer: "New dedicated escalation channel"
  - question: "How should the supervisor agent be implemented?"
    resolved: true
    options:
      - option: "LangGraph node + LLM evaluator"
        description: "Supervisor is a LangGraph workflow that runs on every relevant event (gate, question, milestone). Uses the existing IAgentExecutorProvider abstraction to call any configured LLM. Plays well with the agent-agnostic rule, reuses checkpointing/resumption, and fits the existing feature-agent-worker pattern."
        selected: true
      - option: "Lightweight rule engine"
        description: "Supervisor is a deterministic policy engine (e.g., 'auto-approve if test coverage > 80% and no migrations'). Predictable and cheap, but inflexible and doesn't satisfy the user's mental model of an 'agent' supervisor."
        selected: false
      - option: "External LLM call from a use case"
        description: "Each evaluation is a one-shot LLM call from EvaluateSupervisorDecisionUseCase. Simpler than LangGraph but loses memory/state across decisions and breaks the 'agent has a session' model used everywhere else."
        selected: false
    selectionRationale: "LangGraph + LLM evaluator behind IAgentExecutorProvider is the only choice that respects the mandatory agent-agnostic rule and reuses the proven feature-agent infrastructure (workers, checkpointing, sessions, SSE). It also lets the supervisor accumulate context across decisions, which is what makes it feel like a real guardian rather than a rubber-stamp. Rule engines and one-shot calls are interesting future additions but should not be the foundation."
    answer: "LangGraph node + LLM evaluator"
  - question: "Is cross-worktree direct messaging required for v1?"
    resolved: true
    options:
      - option: "Not required — supervisor as the bridge"
        description: "Two parallel feature agents in different worktrees coordinate by sending messages to the supervisor (or main process), which can broadcast or relay. Avoids designing a cross-process IPC primitive in v1. Suitable because the SQLite bus is already cross-process by virtue of shared DB."
        selected: true
      - option: "Direct cross-worktree pub/sub"
        description: "Each worktree process subscribes to topics and can address peers directly. More flexible but introduces ordering/identity concerns (which worktree is authoritative for a given run ID?) that we don't need to solve yet."
        selected: false
    selectionRationale: "The SQLite bus is already cross-process — any worktree can read/write agent_messages — so 'cross-worktree messaging' is solved structurally. We only need to decide whether agents address each other directly or via the hub, and the hub answer (per the topology question) makes direct addressing unnecessary for v1. This keeps v1 scope realistic."
    answer: "Not required — supervisor as the bridge"
  - question: "What audit and explainability is mandatory for supervisor actions?"
    resolved: true
    options:
      - option: "Full audit + rationale for every decision"
        description: "Every supervisor approve/reject/escalate stores: input context hash, model + prompt version, structured rationale (string), confidence (optional), referenced policy rule, and is appended to the existing activity_log. Reversible via existing reject/stop primitives. Surfaces in UI as a 'why?' panel on every decision."
        selected: true
      - option: "Decision only"
        description: "Store only the verdict (approved/rejected). Cheap but defeats trust — a user delegating authority to an agent must be able to inspect why it did what it did."
        selected: false
      - option: "Audit only on dispute"
        description: "Generate rationale lazily when the user clicks 'explain'. Cheaper writes but means we can't reconstruct decisions if the model changes."
        selected: false
    selectionRationale: "Delegated authority without explainability is the fastest way to lose user trust. The cost of writing one extra string per decision is negligible; the cost of a user catching a bad supervisor call and having no way to inspect it is the entire feature's reputation. activity_log already exists, so persistence is essentially free. Lazy generation breaks if the model/prompt rotates between decision and inspection."
    answer: "Full audit + rationale for every decision"
  - question: "What urgency model should AgentQuestion expose?"
    resolved: true
    options:
      - option: "Three-tier (info / question / blocking)"
        description: "info = FYI, no response needed; question = answer when convenient, agent will continue with reasonable default after timeout; blocking = agent paused, MUST be answered. Maps cleanly to existing approval-gate semantics (blocking) and SSE notifications (info/question). Three tiers is enough to drive UI prioritization without overloading the user."
        selected: true
      - option: "Binary (blocking / non-blocking)"
        description: "Just two levels. Simpler but conflates 'agent wants advice' with 'agent paused waiting' — these have very different UX needs (queue vs interrupt)."
        selected: false
      - option: "Numeric priority 1-10"
        description: "Free-form numeric urgency. Maximum expressiveness but no shared meaning — agent picks 7 vs 6 with no semantic anchor; users can't filter or route."
        selected: false
    selectionRationale: "Three tiers (info, question, blocking) cover every real interaction pattern with distinct UX: info goes to a feed, question goes to an inbox the user reviews on their schedule, blocking interrupts and shows a banner. This also maps directly onto existing notification priority and matches how spec 014 already proposes [TASK-READY] / [BLOCKED] markers. More granularity gives no real benefit and harder routing."
    answer: "Three-tier (info / question / blocking)"
  - question: "Should v1 ship all three capabilities together, or phased?"
    resolved: true
    options:
      - option: "Phased rollout under one feature flag"
        description: "Ship in this order behind shep.feature.collaboration: (1) AgentMessage + bus + activity-log, (2) AgentQuestion unified inbox, (3) Supervisor agent with advisory mode. Each phase ships independently to main but is gated until the user opts in. Reduces blast radius and lets us validate each layer before building on it."
        selected: false
      - option: "All-at-once big-bang release"
        description: "Build everything, ship it once. Lower iteration overhead but high risk; if supervisor evaluation has a bug it blocks the whole feature. Also forces a multi-week branch which conflicts with Shep's small-PR norm."
        selected: true
      - option: "Question pipeline only (drop supervisor for v1)"
        description: "Ship just the unified question/escalation surface; defer supervisor and inter-agent messaging. Smallest scope but doesn't answer the user's two main questions about agents talking and supervision."
        selected: false
    selectionRationale: "Phased under a feature flag is the only way to maintain Shep's commit-PR cadence on an L-sized feature. Each phase delivers user-visible value (messages → unified questions → supervisor) and the flag lets us land partial work without exposing half-built UI. The flag is also free with the existing feature-management infrastructure shipped in PR #557."
    answer: "All-at-once big-bang release"
content: "## Problem Statement\n\nA user evaluating Shep asked three concrete questions (translated from Hebrew):\n\n1. **Can agents talk to each other while they work?** Today, two parallel feature agents\n   in different worktrees have no shared communication channel. Coordination is implicit\n   (via git, the spec, the user) rather than explicit.\n2. **Can I place a supervisor agent on my behalf?** Today there is no first-class\n   \"supervisor\" role. Approval gates pause agents, but the only entity that can answer\n   is the human user. There is no delegated guardian that can approve, reject, redirect,\n   or escalate on the user's behalf according to a policy.\n3. **What happens when agents want to ask questions?** Interactive sessions support\n   `AskUserQuestion` through the Claude SDK V2 `canUseTool` callback, but background\n   feature agents (LangGraph workers) primarily use approval gates rather than free-form\n   questions. There is no unified \"agent question\" surface across both modes.\n\nThese three questions describe the same missing concept: a **collaboration & supervision\nfabric** that lets agents communicate with each other and with a delegated human-or-supervisor\nresponder, with structured questions, escalations, and audit.\n\n## Success Criteria\n\n- [ ] User can configure a supervisor agent at the global, repo, or app level via web UI\n      and CLI, with optional per-feature override and autonomy mode = advisory by default.\n- [ ] When a feature agent reaches an approval gate, a configured supervisor evaluates it\n      within 30s and either (a) advises the user with a rationale or (b) — in autonomous\n      mode for that gate — approves/rejects on the user's behalf.\n- [ ] Two parallel feature agents (different worktrees) can exchange structured messages\n      through the agent message bus and observe each other's lifecycle events.\n- [ ] Every agent question (interactive `AskUserQuestion` and background-agent escalation)\n      appears in a single unified \"Agent Questions\" inbox in the web UI and CLI, regardless\n      of execution mode.\n- [ ] Blocking questions interrupt the user via the existing notification system; non-blocking\n      questions queue without interruption; info messages stream to the activity feed only.\n- [ ] Every supervisor decision stores a rationale, model+prompt version, and policy rule\n      reference; the user can open a \"Why?\" panel and see all of it.\n- [ ] User can override any supervisor decision via the existing reject/stop primitives;\n      user's decision always wins.\n- [ ] All new persistence is migration-driven, idempotent, and includes rollback verification\n      in tests.\n- [ ] Feature flag `collaboration` (or equivalent) gates the entire surface; with the flag\n      off, behavior is identical to today's main branch.\n- [ ] Documentation updated: `AGENTS.md`, `docs/architecture/agent-system.md`, and a new\n      `docs/architecture/supervision.md`.\n- [ ] Test coverage: unit tests for every new use case and port adapter; integration tests\n      for the message bus, supervisor evaluation, and question routing; e2e test for the\n      web supervisor configuration flow.\n\n## Functional Requirements\n\n### Agent Messaging (collaboration)\n\n- **FR-1**: The system MUST provide a domain entity `AgentMessage` defined in TypeSpec\n  with fields: `id`, `from` (agentRunId or 'user' or 'supervisor'), `to` (agentRunId,\n  'broadcast', 'supervisor', or 'user'), `kind` (enum: status, request, reply, blocked,\n  info), `payload` (structured), `correlationId` (optional, for request/reply), `createdAt`.\n- **FR-2**: The system MUST expose a port `IAgentMessageBus` in\n  `application/ports/output/agents/` with at minimum `publish(message)`, `subscribe(filter, handler)`,\n  and `listFor(agentRunId | featureId, since)`.\n- **FR-3**: The default `IAgentMessageBus` adapter MUST persist messages in a new\n  `agent_messages` SQLite table and be observable via the existing SSE pipeline (new\n  event kind `agent_message`).\n- **FR-4**: The feature-agent worker MUST publish lifecycle messages (started,\n  phase-changed, blocked, completed) on the bus so other agents and the supervisor can\n  observe them.\n- **FR-5**: Inter-agent communication MUST flow through the supervisor (hub-and-spoke).\n  When no supervisor is configured for the scope, a logical hub still mediates and audits\n  messages but performs no policy evaluation.\n\n### Agent Questions (unified ask flow)\n\n- **FR-6**: The system MUST provide a domain entity `AgentQuestion` defined in TypeSpec\n  with fields: `id`, `agentRunId`, `featureId`, `kind` (enum: info, question, blocking),\n  `prompt` (string), `options` (optional array for multiple-choice), `defaultAnswer`\n  (optional, used on timeout for non-blocking), `answerer` (enum: user, supervisor, either),\n  `status` (enum: pending, answered, expired, cancelled), `answer` (optional), `answeredBy`\n  (optional), `answeredAt` (optional), `createdAt`, `expiresAt` (optional).\n- **FR-7**: The Claude SDK V2 `canUseTool` interception in\n  `claude-code-interactive-executor.service.ts` MUST route `AskUserQuestion` invocations\n  through `AskAgentQuestionUseCase` so a single inbox covers both interactive and\n  background modes.\n- **FR-8**: Background-agent approval gates MUST emit a corresponding `AgentQuestion` of\n  kind `blocking` so they appear alongside interactive questions in the unified inbox.\n  The existing approve/reject use cases continue to be the underlying answer mechanism.\n- **FR-9**: The web UI MUST expose an `/agent-questions` page that lists pending\n  questions across all apps/features with filters by urgency, app, and agent type.\n- **FR-10**: The CLI MUST expose `shep agent questions list|answer|cancel` commands\n  operating on the same use cases as the web UI.\n- **FR-11**: Blocking questions MUST trigger a notification via `INotificationService`\n  using new event kinds `agent_question_pending` and `agent_question_blocking`.\n- **FR-12**: Non-blocking `AgentQuestion`s with a `defaultAnswer` and `expiresAt` MUST\n  auto-resolve to the default after expiration; the resolution MUST be recorded with\n  `answeredBy = 'auto-default'`.\n\n### Supervisor Agent\n\n- **FR-13**: The system MUST provide a domain entity `SupervisorPolicy` defined in\n  TypeSpec with fields: `id`, `scopeType` (enum: global, repo, app), `scopeId`\n  (optional — app or repo UUID, null for global), `featureId` (optional per-feature\n  override), `enabled`, `autonomyLevel` (enum: advisory, co-sign, autonomous),\n  `gateAuthority` (per-gate map: prd/plan/merge → autonomy override), `model`\n  (free-form, agent-agnostic), `policyRules` (array of structured rules),\n  `createdAt`, `updatedAt`. Resolution cascade: feature → repo → app → global.\n- **FR-14**: The system MUST provide a port `ISupervisorAgent` with at minimum\n  `evaluate(event)` returning a `SupervisorDecision` (`{ verdict: approve|reject|escalate|advise,\n  rationale: string, modelVersion, promptVersion, ruleRef? }`).\n- **FR-15**: The default `ISupervisorAgent` adapter MUST be a LangGraph workflow that\n  resolves the agent executor through `IAgentExecutorProvider` (no hardcoded provider).\n- **FR-16**: When a feature-agent reaches an approval gate, the system MUST consult the\n  configured supervisor before the human user is paged. The supervisor's decision is\n  appended to the gate's audit trail.\n- **FR-17**: In `advisory` mode (default), the supervisor MAY only emit `advise` or\n  `escalate` verdicts; the human user is still required to act on the gate.\n- **FR-18**: In `co-sign` mode, the supervisor's `approve` is necessary but not\n  sufficient; the human user must also approve.\n- **FR-19**: In `autonomous` mode for a given gate, the supervisor's `approve`/`reject`\n  is final unless the human user invokes the existing reject/stop primitives.\n- **FR-20**: If the user takes action on a gate after the supervisor has acted, the\n  user's decision MUST always win (`User always wins` invariant). The conflict MUST be\n  audited.\n- **FR-21**: Every `SupervisorDecision` MUST be persisted in a new `supervisor_decisions`\n  table and appended to `activity_log` with full rationale and model/prompt version.\n- **FR-22**: A failure inside the supervisor (timeout, model error, exception) MUST NOT\n  block the underlying agent; it MUST fall back to standard human approval and surface\n  the failure as a notification with `kind = supervisor_failed`.\n\n### Configuration & Presentation\n\n- **FR-23**: The web UI MUST expose a Supervisor configuration surface at global,\n  repo, and app levels (with optional per-feature override) with: scope selector,\n  enable toggle, autonomy level, per-gate authority, model selector (using existing\n  model picker), and rule editor. Standalone repos MUST be configurable without\n  requiring a Shep application wrapper.\n- **FR-24**: The CLI MUST expose `shep supervisor configure|status|enable|disable|approve|reject`\n  commands.\n- **FR-25**: The web UI MUST expose a \"Why?\" affordance on every supervisor decision\n  that reveals rationale, model+prompt version, and the policy rule referenced.\n- **FR-26**: The web UI MUST display agent-to-agent messages in a per-feature \"Agent\n  activity\" feed, distinguishable from user-facing notifications.\n- **FR-27**: All new presentation surfaces MUST consume the same use cases — no\n  presentation-specific business logic.\n\n### Cross-cutting\n\n- **FR-28**: All new TypeSpec entities MUST be defined in `tsp/agents/` and re-generated;\n  no hand-edits to `packages/core/src/domain/generated/output.ts`.\n- **FR-29**: Every new database table MUST have a forward migration in\n  `packages/core/src/infrastructure/persistence/sqlite/migrations/` and be covered by\n  repository tests.\n- **FR-30**: The entire feature MUST be gated behind a feature flag (e.g.,\n  `collaboration`) so it can be rolled out progressively. With the flag off, behavior\n  is byte-identical to today's main.\n\n## Non-Functional Requirements\n\n- **NFR-1 (Performance)**: Message-bus publish-to-subscriber latency MUST be ≤ 750ms\n  p95 (matches existing 500ms SSE poll plus serialization budget).\n- **NFR-2 (Performance)**: Supervisor evaluation MUST complete in ≤ 30s p95 for a\n  standard approval gate; a timeout MUST trigger fallback to human-only.\n- **NFR-3 (Scalability)**: A single feature with up to 5 concurrent agents MUST NOT\n  degrade message-bus latency by > 2x.\n- **NFR-4 (Reliability)**: Message persistence MUST be durable (SQLite WAL mode);\n  no message MAY be silently dropped. Bus delivery MUST be at-least-once with\n  idempotent consumers via `correlationId`.\n- **NFR-5 (Reliability)**: A crash in the supervisor agent MUST NOT crash the feature\n  agent or worker process; supervisor calls MUST be isolated.\n- **NFR-6 (Auditability)**: 100% of supervisor decisions and inter-agent messages MUST\n  be recorded in `activity_log` and reversible via existing reject/stop primitives.\n- **NFR-7 (Security)**: Supervisor and agent messages MUST NOT leak across scopes.\n  All bus queries MUST be scoped by their originating scope (app, repo, or feature);\n  cross-scope subscription is forbidden. Global-scoped supervisors observe all scopes\n  but messages remain isolated to their originating scope.\n- **NFR-8 (Security)**: Supervisor model selection MUST respect existing API-key\n  isolation (per-app credentials).\n- **NFR-9 (UX)**: A configured supervisor MUST be discoverable — its presence and\n  autonomy level MUST be visible on every AgentRun detail view.\n- **NFR-10 (UX)**: Pending blocking questions MUST appear in the user's notification\n  surface within 2s of being raised.\n- **NFR-11 (Maintainability)**: All new code MUST follow Clean Architecture rules\n  in `.claude/rules/code-quality.md` — no infrastructure imports in\n  application/presentation, no singletons, no magic literals, no hardcoded providers.\n- **NFR-12 (Maintainability)**: Files >300 lines MUST be split before merge; new use\n  cases live in their own files with colocated tests.\n- **NFR-13 (Observability)**: Every supervisor decision and every blocking question\n  MUST emit a structured event consumable by the existing SSE event stream.\n- **NFR-14 (Backwards compatibility)**: With the feature flag off, all existing\n  AgentRun, ApprovalGate, InteractiveSession, and SSE behavior MUST be unchanged.\n- **NFR-15 (Testability)**: Every port MUST have an in-memory fake adapter for\n  unit/integration tests. Supervisor evaluation MUST be testable without an LLM call\n  (deterministic stub adapter).\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Collaboration topology? | Hub-and-spoke via supervisor | Centralizes policy/audit; matches spec 014 EM model; defer P2P until proven need. |\n| 2 | Bus implementation? | SQLite-backed with polling | Reuses proven SSE pattern; cross-process; zero new infra; preserves local-first. |\n| 3 | Default supervisor autonomy? | Advisory | Safe default; doesn't silently change trust contract; users opt into stronger autonomy. |\n| 4 | AgentQuestion entity? | New first-class entity | Unified inbox across modes; small schema cost; avoids dual-table queries everywhere. |\n| 5 | Supervisor scope? | Cascading: global → repo → app → feature | Supports standalone repos and global defaults; matches polymorphic featureId pattern. |\n| 6 | User vs supervisor conflict? | User always wins | Preserves agency; easy to explain; matches \"delegated guardian\" mental model. |\n| 7 | Escalation routing? | Reuse notification system | Free per-event preferences; no parallel delivery infra. |\n| 8 | Supervisor implementation? | LangGraph + LLM evaluator | Respects agent-agnostic rule; reuses worker/checkpointing; keeps stateful context. |\n| 9 | Cross-worktree direct messaging in v1? | Not required — supervisor as bridge | SQLite bus is already cross-process; defer P2P addressing. |\n| 10 | Audit & explainability scope? | Full audit + rationale per decision | Trust depends on inspectability; activity_log makes persistence ~free. |\n| 11 | Question urgency model? | Three-tier (info/question/blocking) | Distinct UX per tier; maps to existing approval-gate semantics. |\n| 12 | v1 release strategy? | Phased rollout under feature flag | Maintains small-PR cadence; partial work doesn't expose half-built UI. |\n\n## Codebase Analysis\n\n### Project Structure\n\n- `tsp/` — TypeSpec source of truth for domain models. Already contains\n  `agents/agent-run.tsp`, `agents/agent-session.tsp`, `agents/agent-definition.tsp`,\n  `agents/approval-gates.tsp`, `agents/interactive-message.tsp`, `agents/workflow-step.tsp`.\n- `packages/core/src/domain/` — generated types (`generated/output.ts`), value objects,\n  domain errors, factories. No business logic for inter-agent messaging today.\n- `packages/core/src/application/use-cases/agents/` — `RunAgent`, `ApproveAgentRun`,\n  `RejectAgentRun`, `StopAgentRun`, `StreamAgentEvents`, `ReviewFeature`, etc.\n- `packages/core/src/application/ports/output/agents/` — `IAgentExecutor`,\n  `IAgentExecutorProvider`, `IAgentRunner`, `IAgentRegistry`, `IAgentRunRepository`,\n  `IInteractiveAgentExecutor`, `IPhaseTimingRepository`. **No port for inter-agent\n  messaging or supervision today.**\n- `packages/core/src/infrastructure/services/agents/feature-agent/feature-agent-worker.ts`\n  — background worker that runs LangGraph state machine in an isolated worktree.\n- `packages/core/src/infrastructure/services/agents/common/executors/claude-code-interactive-executor.service.ts`\n  — SDK V2 wrapper; intercepts `AskUserQuestion` via `canUseTool`.\n- `packages/core/src/infrastructure/persistence/sqlite/migrations/` — 86+ migrations.\n  Tables relevant here: `agent_runs`, `agent_sessions`, `interactive_messages`,\n  `workflow_steps`, `phase_timings`, `notifications`, `activity_log`.\n- `src/presentation/web/` — Next.js app, SSE consumer (`useAgentEvents`,\n  `agent-events-provider`), React Flow surfaces.\n- `src/presentation/cli/` and `src/presentation/tui/` — Commander CLI and Ink TUI.\n- `specs/014-ui-sidebar/team-execution.md` — draft multi-agent protocol with EM (hub)\n  role and standardized message prefixes (`[TASK-READY]`, `[BLOCKED]`, `[USER-UPDATE]`).\n\n### Architecture Patterns\n\n- **Clean architecture, four layers**, dependencies pointing inward. Any new capability\n  must define a port in `application/ports/output/`, a use case in\n  `application/use-cases/`, and an adapter in `infrastructure/`.\n- **TypeSpec-first**: any new domain entity (`AgentMessage`, `SupervisorPolicy`,\n  `AgentQuestion`, `SupervisorDecision`) must originate in `tsp/` and be re-generated.\n- **Agent-agnostic resolution** via `IAgentExecutorProvider` — no hardcoded provider.\n- **DI via tsyringe** with string tokens; no module-level singletons outside\n  infrastructure bootstrapping.\n- **TDD mandatory** (RED → GREEN → REFACTOR) per `.claude/rules` and CLAUDE.md.\n- **SSE-based real-time UI**: `StreamAgentEventsUseCase` polls DB every 500ms and\n  multiplexes via Service Worker.\n- **Approval gates** are the existing human-in-the-loop primitive: embedded in\n  `AgentRun` via `ApprovalGates { allowPrd, allowPlan, allowMerge }`, with\n  `waiting_approval` status pausing the workflow until `ApproveAgentRunUseCase` runs.\n- **Interactive sessions** use polymorphic `featureId` (UUID, `repo-<id>`, `global`),\n  persist messages in `interactive_messages`, and stream chunks (`StreamChunk`) which\n  can carry `interaction?: UserInteractionData`.\n\n### Relevant Technologies\n\n- **LangGraph** — already used for feature agents; supports supervisor patterns\n  natively (e.g., supervisor as a routing node). New supervisor could be a graph node\n  or a separate workflow subscribing to SSE.\n- **Claude Code SDK V2** — `canUseTool` interception is the existing path for\n  `AskUserQuestion`. Same primitive can power agent→supervisor questions.\n- **SSE / Service Worker fan-out** — already streams every agent event to web clients;\n  a supervisor agent can subscribe to the same stream.\n- **SQLite + tsp-driven migrations** — schema additions for new entities are routine.\n- **React Flow** — already used in web; a future \"agent room\" / collaboration graph view\n  would fit naturally.\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `tsp/agents/` | High | New TypeSpec models: `AgentMessage`, `AgentQuestion`, `SupervisorPolicy`, `SupervisorDecision`, plus enums for question kind, urgency, answerer. |\n| `tsp/domain/entities/settings.tsp` | Medium | New `SupervisorConfig` block (enabled, model, policy ref, autonomy level, escalation rules, scope cascade). |\n| `packages/core/src/application/ports/output/agents/` | High | New ports: `IAgentMessageBus`, `IAgentQuestionService`, `ISupervisorAgent`, `IAgentInbox`. |\n| `packages/core/src/application/use-cases/agents/` | High | New use cases: `SendAgentMessage`, `AskAgentQuestion`, `AnswerAgentQuestion`, `EscalateToUser`, `EvaluateSupervisorDecision`, `ConfigureSupervisor`. |\n| `packages/core/src/infrastructure/services/agents/` | High | New adapters: SQLite-backed message bus, supervisor agent runner (LangGraph), question routing. |\n| `packages/core/src/infrastructure/persistence/sqlite/migrations/` | High | New tables: `agent_messages`, `agent_questions`, `supervisor_policies`, `supervisor_decisions`, plus `activity_log` extensions. |\n| `packages/core/src/infrastructure/services/agents/feature-agent/feature-agent-worker.ts` | Medium | Worker must publish lifecycle events to the message bus and consult supervisor for gates if configured. |\n| `packages/core/src/infrastructure/services/agents/common/executors/claude-code-interactive-executor.service.ts` | Medium | `canUseTool` for `AskUserQuestion` must route through the question service so supervisor can answer. |\n| `packages/core/src/application/use-cases/agents/stream-agent-events.use-case.ts` | Medium | Add new event kinds: `agent_message`, `agent_question`, `supervisor_decision`. |\n| `src/presentation/web/` | High | New surfaces: supervisor configuration page, agent-questions inbox, optional collaboration graph; notification surface for escalations. |\n| `src/presentation/cli/commands/` | Medium | New commands: `shep supervisor configure|status|approve|reject`, `shep agent questions list|answer|cancel`. |\n| `src/presentation/tui/` | Low | Optional: TUI panel for live agent questions / supervisor decisions. |\n| `docs/architecture/agent-system.md`, `AGENTS.md`, new `docs/architecture/supervision.md` | Medium | Document the new collaboration & supervision model. |\n| Notifications & SSE | Medium | New notification events: `agent_question_pending`, `agent_question_blocking`, `supervisor_escalated`, `supervisor_failed`. |\n\n## Dependencies\n\n- **Existing approval-gate machinery** (`ApprovalGates`, `ApproveAgentRunUseCase`,\n  `RejectAgentRunUseCase`, `waiting_approval` status) — supervisor reuses these as the\n  primary intervention mechanism rather than inventing a new pause primitive.\n- **Interactive session message history** (`interactive_messages`,\n  `IInteractiveSessionService`, `respondToInteraction`) — agent→user questions in\n  interactive mode already flow here; we extend rather than replace.\n- **SSE streaming** (`StreamAgentEventsUseCase`, `useAgentEvents`,\n  `agent-events-provider`) — supervisor subscribes here; new event kinds added here.\n- **Notification system** (`INotificationService`, `notifications` table, per-event\n  preferences in `Settings.notificationPreferences`) — escalations and pending\n  questions become notifications.\n- **LangGraph + checkpointer** — pattern for supervisor as a graph node, and for\n  pausing/resuming agents on supervisor decisions.\n- **Claude Code SDK V2 `canUseTool`** — single interception point for agent questions\n  in interactive mode; we reuse it.\n- **Spec 014 team-execution protocol** — provides a vocabulary (`[TASK-READY]`,\n  `[BLOCKED]`, `[USER-UPDATE]`) we can adopt for structured agent messages.\n- **Activity log + audit migrations (064, 082)** — every supervisor decision and\n  cross-agent message must be recorded; tables already exist.\n- **Feature flag infrastructure (PR #557)** — gates the entire surface behind one flag\n  so we can ship phased.\n\n## Size Estimate\n\n**L** — This is a multi-week effort, not a single sprint. Justification:\n\n- **3 distinct product capabilities** (peer messaging, supervisor delegation,\n  question/escalation pipeline) that share infrastructure but each need their own\n  domain model, ports, use cases, and presentation.\n- **High-impact persistence work**: at least 4 new tables, all requiring migrations,\n  repositories, and TypeSpec definitions.\n- **Cross-cutting**: touches every layer (tsp → domain → application → infrastructure\n  → presentation × CLI/TUI/Web) and all three execution modes (background feature\n  agent, interactive session, deploy agent).\n- **Policy & safety surface**: supervisor authority levels, conflict resolution between\n  user and supervisor, audit/explainability — these are product decisions that need\n  careful design before implementation (resolved in this spec's open questions).\n- **Realistic phasing** (to be confirmed in /shep-kit:plan):\n  1. Foundation — `AgentMessage` + `IAgentMessageBus` + activity-log integration (S–M).\n  2. Question pipeline — unified `AgentQuestion` model bridging interactive\n     `AskUserQuestion` and background-agent gates, with notifications (M).\n  3. Supervisor — `SupervisorPolicy`, `ISupervisorAgent`, evaluator wired into\n     approval gates and questions, opt-in per app/feature (M–L).\n  4. Presentation — supervisor config UI, agent-questions inbox, CLI commands (M).\n  5. Docs, audit hardening, migration safety, end-to-end tests (S–M).\n\n## Notes for Research Phase\n\nTopics worth deep-diving in `/shep-kit:research`:\n- LangGraph supervisor patterns (supervisor-as-router vs supervisor-as-evaluator) and\n  how to implement them via `IAgentExecutorProvider`.\n- SQLite-bus polling cadence and indexing strategy for `agent_messages` to keep p95\n  publish-to-subscriber under 750ms with multiple worktrees.\n- Schema design for `supervisor_policies` — JSON blob vs normalized rules table.\n- UI patterns for the unified Agent Questions inbox: reuse notifications surface or\n  build a dedicated route.\n- Safe defaults for supervisor model and prompt versioning so audits remain reproducible\n  if the user upgrades models.\n- End-to-end timing budget when supervisor evaluation is on the critical path of a gate.\n\n---\n\n_Generated by feature agent — proceed with research_\n"

name: "agent-collaboration-supervision"
number: 93
branch: "feat/093-agent-collaboration-supervision"
oneLiner: "Enable agents to collaborate, be supervised by a user-delegated agent, and surface questions to the user mid-run"
userQuery: "Some one asked me the following question about the project,\nI want to support him\nהם הכוונה איג׳נטים\nהם יכולים לדבר אחד עם השני תו\"כ עבודה?\nאני יכול לשים אייג'נט משגיח מטעמי?\nמה קורה כשהאייג'נטים רוצים לשאול שאלות?\n\nbased on his questions lets think what product changes we need to do to support him\n"
summary: "Three intertwined product capabilities motivated by a real user's questions: (1) agent-to-agent communication during execution, (2) a user-delegated supervisor/watchdog agent that can monitor and intervene on the user's behalf, and (3) a clear, first-class flow for when running agents need to ask the user (or supervisor) questions. The supervisor works at any scope — global, per-repository, or per-application — so it supports both Shep-managed apps and standalone repos/features. The codebase already has strong foundations — approval gates, SSE event streaming, AskUserQuestion via SDK V2, LangGraph workflows, and a draft team-execution protocol (spec 014) — but lacks a production-grade messaging fabric, a supervisor-agent role, and a unified question/escalation pipeline.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures:
  - "014-ui-sidebar (team-execution protocol draft for multi-agent coordination)"
  - "Interactive sessions / SDK V2 AskUserQuestion flow"
  - "Approval gates on AgentRun (allowPrd / allowPlan / allowMerge)"
  - "Notifications system and SSE event streaming"
technologies:
  - "TypeScript / Node.js"
  - "Clean Architecture (domain / application / infrastructure / presentation)"
  - "TypeSpec (tsp/) — domain model source of truth"
  - "LangGraph — agent state machines, checkpointing, resumption"
  - "Claude Code SDK V2 — unstable_v2_createSession / canUseTool / AskUserQuestion"
  - "tsyringe — dependency injection"
  - "SQLite + custom migrations — persistence"
  - "Server-Sent Events (SSE) — real-time agent event streaming to web UI"
  - "Git worktrees — per-feature isolation"
  - "Next.js + React + React Flow — web presentation"
  - "Commander — CLI presentation"

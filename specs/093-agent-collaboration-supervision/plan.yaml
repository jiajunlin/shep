# Structured implementation phases
phases:
  - id: "phase-1"
    name: "Foundation — TypeSpec models, migrations, repositories"
    description: |
      Define the four new domain entities (AgentMessage, AgentQuestion,
      SupervisorPolicy, SupervisorDecision) plus enums in TypeSpec, generate
      types, write idempotent SQLite migrations, and ship repository ports +
      SQLite + in-memory adapters. Add the FeatureFlags.collaboration flag and
      the SupervisorActor value object. No behavior is observable yet; this
      phase exists so every later phase has a typed, tested data layer to
      build on.
    parallel: false
  - id: "phase-2"
    name: "Agent message bus — port, adapters, SSE event"
    description: |
      Introduce IAgentMessageBus and the SendAgentMessage / ListAgentMessages
      use cases. Wire the SQLite-backed adapter (cross-process by virtue of
      shared DB) and the InMemory adapter for tests. Extend
      StreamAgentEventsUseCase with the agent_message kind via a new
      computeMessageDeltas helper. With this phase, agents can publish and
      observe each other's lifecycle events under the flag.
    parallel: false
  - id: "phase-3"
    name: "Agent question pipeline — unified inbox"
    description: |
      Introduce IAgentQuestionService, AskAgentQuestion / AnswerAgentQuestion /
      CancelAgentQuestion / ListAgentQuestions use cases, the in-process
      Deferred registry for canUseTool-bridged blocking questions, and the
      agent_question SSE event kind. Extend
      claude-code-interactive-executor.service.ts to route AskUserQuestion
      through the new pipeline. Extend feature-agent-worker.ts to emit a
      parallel AgentQuestion of kind 'blocking' on every approval-gate
      transition. Single unified inbox is queryable end-to-end.
    parallel: false
  - id: "phase-4"
    name: "Supervisor policy CRUD"
    description: |
      Implement ConfigureSupervisor / EnableSupervisor / DisableSupervisor /
      GetSupervisorPolicy use cases over SupervisorPolicyRepository with
      app→feature scope resolution. Define the SupervisorActor value object's
      validation rules. No evaluator exists yet; this phase is policy
      persistence and resolution only.
    parallel: false
  - id: "phase-5"
    name: "Supervisor agent — LangGraph evaluator"
    description: |
      Implement ISupervisorAgent backed by a LangGraph workflow under
      infrastructure/services/agents/supervisor-agent/. Add the lazy per-scope
      worker process with heartbeat / checkpointing matching
      feature-agent-worker.ts. Resolve the LLM via IAgentExecutorProvider.
      Persist every decision via SupervisorDecisionRepository and mirror to
      activity_log with actor_id='supervisor:<id>'. Provide a
      StubSupervisorAgentExecutor for deterministic tests.
    parallel: false
  - id: "phase-6"
    name: "Approval-gate integration — supervisor as actor"
    description: |
      Extend ApproveAgentRunUseCase / RejectAgentRunUseCase to recognise the
      supervisor:<id> actor namespace and enforce the "user always wins"
      invariant. Trigger the supervisor evaluator on every
      waiting_approval transition (advisory: attach decision to gate;
      co-sign: gate completion requires both votes; autonomous: supervisor
      may close gate directly). Add the supervisor_decision SSE event kind.
      Wire the EvaluateSupervisorDecision use case from feature-agent-worker
      and from the question pipeline.
    parallel: false
  - id: "phase-7"
    name: "Notifications and escalation"
    description: |
      Add NotificationEventType values (AgentQuestionPending,
      AgentQuestionBlocking, AgentMessageBlocked, SupervisorEscalated,
      SupervisorFailed) plus matching NotificationEventConfig booleans in
      TypeSpec. Wire INotificationService emissions from AskAgentQuestion,
      EvaluateSupervisorDecision, and the supervisor-failure fallback path
      (FR-22). Implement EscalateToUser as a thin use case that wraps the
      notification path with audit-log mirroring.
    parallel: false
  - id: "phase-8"
    name: "Presentation — Web + CLI"
    description: |
      Build the web supervisor configuration page at
      /apps/[id]/supervisor with per-feature drill-down, the unified
      /agent-questions inbox, the inline "Why?" drawer, and the per-feature
      "Agent Activity" panel. Ship colocated .stories.tsx for every new
      component (mandatory). Build the CLI commands `shep supervisor *`,
      `shep agent questions *`, and a dev-only `shep agent message send`.
      All surfaces consume use cases — zero presentation business logic.
    parallel: false
  - id: "phase-9"
    name: "Docs, E2E, flag flip"
    description: |
      Update AGENTS.md and docs/architecture/agent-system.md, write the new
      docs/architecture/supervision.md. Add one Playwright e2e for the
      supervisor configuration round-trip and one for the blocking-question
      answer round-trip. Run the off-flag suite to confirm NFR-14
      (byte-identical default behavior). Flip
      featureFlagCollaboration default to false (still off) but expose the
      override in settings UI. The flag flip itself ships behind a
      separate small PR after validation.
    parallel: false
  - id: "phase-10"
    name: "Supervisor dashboard, agent editor, and AI SDK playground"
    description: |
      Iteration-3 follow-up requested in PR review. Three additive surfaces
      that share infrastructure:

        a) `/supervisor` — top-level dashboard listing every configured
           policy (across global / app / repo / feature scopes) and the
           most recent supervisor decisions. Adds two read-side use cases
           (ListSupervisorPoliciesUseCase, ListRecentSupervisorDecisionsUseCase)
           and one new web route. No new tables.

        b) `/agents` — agent editor. Introduces the AgentPromptOverride
           entity (TypeSpec + migration + repository), a port + resolver
           (`IAgentPromptResolver`) consulted by every prompt call site,
           and three use cases (List/Upsert/Delete). The editor is a
           tabbed UI: Prompts (read + edit + diff), Graph (read-only
           LangGraph visualization via the existing @xyflow/react setup),
           Playground (Vercel AI SDK chat).

        c) Playground — `RunAgentPromptPlaygroundUseCase` returns an async
           iterable of stream chunks; a thin /api/agents/playground route
           adapts them to the AI SDK stream protocol so `useChat` works
           out of the box. The playground operates on an isolated
           transcript — it must NOT touch agent_runs / agent_messages
           tables (NFR-18).

      Phase ships under the same `collaboration` feature flag so the new
      surfaces are hidden until the flag flips. Storybook stories are
      mandatory for every new web component (CLAUDE.md).
    parallel: false


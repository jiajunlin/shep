# Implementation Plan (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: "agent-collaboration-supervision"
summary: |
  Phased implementation of three intertwined capabilities — agent-to-agent
  messaging, a delegated supervisor agent, and a unified question/escalation
  pipeline — gated behind a single `collaboration` feature flag. The plan
  reuses every existing primitive (TypeSpec → migration → repository → port →
  use case → adapter → SSE → presentation), introduces no new external
  dependencies, and follows Shep's Clean Architecture layering exactly. Work
  is decomposed into nine sequential phases that each ship independently to
  main while the flag stays off; the flag flips on once the final
  end-to-end / docs phase lands.

# Relationships
relatedFeatures:
  - "014-ui-sidebar — team-execution protocol vocabulary reused for message kinds"
  - "057-feature-flags — collaboration flag added to FeatureFlags singleton"
  - "Approval gates on AgentRun (allowPrd/allowPlan/allowMerge) — supervisor's primary surface"
  - "Interactive sessions (canUseTool + AskUserQuestion) — unified with background gates"

technologies:
  - "TypeSpec — domain model source of truth for new entities"
  - "SQLite + WAL + custom timestamped migrations — durable cross-process persistence"
  - "tsyringe DI with string tokens"
  - "LangGraph + checkpointer — supervisor as a graph node"
  - "Claude Code SDK V2 unstable_v2_createSession + canUseTool — interactive question interception"
  - "Server-Sent Events via StreamAgentEventsUseCase — three new event kinds"
  - "INotificationService + NotificationEventType — escalation routing"
  - "Next.js + React — supervisor config + agent-questions inbox"
  - "Commander — new CLI surfaces"
  - "IAgentExecutorProvider — agent-agnostic LLM resolution"


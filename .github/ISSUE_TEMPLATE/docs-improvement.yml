name: 📚 Documentation Improvement
description: Suggest improvements to documentation, guides, or examples
title: '[Docs]: '
labels: ['documentation']
body:
  - type: textarea
    id: description
    attributes:
      label: What needs improving?
      description: Describe what's confusing, outdated, missing, or incorrect and where.
      placeholder: |
        The "Quick Start" section in README.md doesn't explain what happens on first run...

        Suggestion: Add a subsection explaining the setup wizard.
    validations:
      required: true

  - type: input
    id: doc-location
    attributes:
      label: Document Location
      description: Link or file path to the documentation (optional)
      placeholder: 'e.g., README.md, docs/guides/getting-started.md'
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Why you needed this info, what you were trying to accomplish, examples from other projects, etc.
    validations:
      required: false

  - type: dropdown
    id: lane
    attributes:
      label: Lane
      description: Defaults to `docs`; pick another lane if the change spans multiple areas.
      options:
        - docs
        - agents
        - ui
        - cli
        - infra
      default: 0
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How hard is this for someone new to the project?
      options:
        - goodFirst
        - easy
        - medium
        - hard
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: A markdown checklist describing what "done" looks like.
      placeholder: |
        - [ ] Section X in `docs/...` updated
        - [ ] Cross-links added from CONTRIBUTING.md
    validations:
      required: false

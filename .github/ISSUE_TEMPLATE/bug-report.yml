name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Shep
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce, what you expected, and what actually happened.
      placeholder: |
        When I run `shep feat new "add dark mode"`, the daemon crashes with...

        Steps:
        1. Run `shep`
        2. ...

        Expected: Feature should be created
        Actual: Daemon crashes
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant terminal output, errors, or log files (~/.shep/logs/).
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Shep Version
      description: Output of `shep --version` (optional but helpful)
      placeholder: 'e.g., 1.180.0'
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, repo type, config, Node.js version, AI agent used, etc.
    validations:
      required: false

  - type: dropdown
    id: lane
    attributes:
      label: Lane
      description: Which part of Shep does this affect? Drives grooming and reviewer routing.
      options:
        - docs
        - agents
        - ui
        - cli
        - infra
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How hard is this for someone new to the project to fix?
      options:
        - goodFirst
        - easy
        - medium
        - hard
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: A markdown checklist describing how we know this is fixed. The contributor-onboarding agent will refine this if needed.
      placeholder: |
        - [ ] `shep feat new` no longer crashes with the empty-repo error
        - [ ] Regression test added in `tests/unit/...`
        - [ ] CHANGELOG entry under `Fixed`
    validations:
      required: false

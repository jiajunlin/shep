name: 💡 Feature Request
description: Suggest a new feature or enhancement for Shep AI CLI
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature, the problem it solves, and how you imagine it working.
      placeholder: |
        I'd like Shep to support X because...

        Example usage:
        1. Run `shep ...`
        2. ...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Area
      description: Which part of Shep would this affect?
      options:
        - CLI
        - Web UI
        - Agent integration
        - Feature lifecycle
        - Configuration / Settings
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Alternatives considered, mockups, links, priority, etc.
    validations:
      required: false

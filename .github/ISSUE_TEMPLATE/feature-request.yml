name: 💡 Feature Request
description: Suggest a new feature or enhancement for Shep
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature, the problem it solves, and how you imagine it working.
      placeholder: |
        I'd like Shep to support X because...

        Example usage:
        1. Run `shep ...`
        2. ...
    validations:
      required: true

  - type: dropdown
    id: lane
    attributes:
      label: Lane
      description: Which part of Shep would this affect? Drives grooming and reviewer routing.
      options:
        - docs
        - agents
        - ui
        - cli
        - infra
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How hard would building this be for a new contributor?
      options:
        - goodFirst
        - easy
        - medium
        - hard
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: A markdown checklist describing what "done" looks like. The contributor-onboarding agent will refine this if needed.
      placeholder: |
        - [ ] New `shep ...` command exists and is documented
        - [ ] Use case has RED-first test coverage
        - [ ] Settings entry exposed via `shep settings`
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Alternatives considered, mockups, links, priority, etc.
    validations:
      required: false

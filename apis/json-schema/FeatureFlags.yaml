$schema: https://json-schema.org/draft/2020-12/schema
$id: FeatureFlags.yaml
type: object
properties:
  envDeploy:
    type: boolean
    default: true
    description: Enable environment deployment features in the web UI
  debug:
    type: boolean
    default: false
    description: Enable debug UI elements and verbose client-side logging
  reactFileManager:
    type: boolean
    default: false
    description: Use the built-in React file manager instead of the native OS folder picker
  projects:
    type: boolean
    default: true
    description: Enable Projects pages and navigation (project management)
  codeReview:
    type: boolean
    default: true
    description: Enable AI-powered code review for pull requests
  collaboration:
    type: boolean
    default: true
    description: Enable agent collaboration, supervisor agent, and unified question pipeline (spec 093)
  bedrockIntegration:
    type: boolean
    default: true
    description: Enable project-bedrock memory integration UI and server actions (spec 098)
  whatsappDispatch:
    type: boolean
    default: false
    description: Enable WhatsApp-native task dispatch and interactive control (spec 101)
  aspm:
    type: boolean
    default: true
    description: Enable the Application Security Posture Management (ASPM) module — /aspm web routes, `shep aspm` CLI command tree, and the posture SSE stream (spec 098)
  clusters:
    type: boolean
    default: false
    description: Enable Clusters navigation and Kubernetes cluster management in the web UI
  supplyChainSecurity:
    type: boolean
    default: true
    description: Enable the supply chain security feature (policy engine, badges, settings, CLI, CI gate). When false, the feature is inert regardless of SecurityMode.
  scheduledWorkflows:
    type: boolean
    default: false
    description: Enable scheduled workflows feature — workflow creation, scheduling, and execution
  githubImport:
    type: boolean
    default: true
    description: Enable GitHub repository import flow (clone, fork, and add to Shep)
required:
  - envDeploy
  - debug
  - reactFileManager
  - projects
  - codeReview
  - collaboration
  - bedrockIntegration
  - whatsappDispatch
  - aspm
  - clusters
  - supplyChainSecurity
  - scheduledWorkflows
  - githubImport
description: Feature flag toggles for runtime feature control

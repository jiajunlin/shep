$schema: https://json-schema.org/draft/2020-12/schema
$id: FeatureFlags.yaml
type: object
properties:
  envDeploy:
    type: boolean
    default: true
    description: Enable environment deployment features in the web UI
  debug:
    type: boolean
    default: false
    description: Enable debug UI elements and verbose client-side logging
  reactFileManager:
    type: boolean
    default: false
    description: Use the built-in React file manager instead of the native OS folder picker
  projects:
    type: boolean
    default: false
    description: Enable Projects pages and navigation (project management)
  codeReview:
    type: boolean
    default: false
    description: Enable AI-powered code review for pull requests
  collaboration:
    type: boolean
    default: false
    description: Enable agent collaboration, supervisor agent, and unified question pipeline (spec 093)
  bedrockIntegration:
    type: boolean
    default: true
    description: Enable project-bedrock memory integration UI and server actions (spec 098)
  whatsappDispatch:
    type: boolean
    default: false
    description: Enable WhatsApp-native task dispatch and interactive control (spec 101)
required:
  - envDeploy
  - debug
  - reactFileManager
  - projects
  - codeReview
  - collaboration
  - bedrockIntegration
  - whatsappDispatch
description: Feature flag toggles for runtime feature control

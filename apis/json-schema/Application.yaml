$schema: https://json-schema.org/draft/2020-12/schema
$id: Application.yaml
type: object
properties:
  name:
    type: string
    description: Human-readable application name
  slug:
    type: string
    description: URL-friendly identifier (unique)
  description:
    type: string
    description: Original user prompt / purpose description
  repositoryPath:
    type: string
    description: Absolute path to the primary repository
  additionalPaths:
    type: array
    items:
      type: string
    description: Additional linked repository/directory paths (JSON array)
  agentType:
    type: string
    description: Chosen agent executor type override
  modelOverride:
    type: string
    description: Chosen model override
  status:
    $ref: ApplicationStatus.yaml
    description: Current application status
  setupComplete:
    type: boolean
    description: Whether the initial setup workflow has completed successfully
  agentSessionId:
    type: string
    description: Persistent agent SDK session ID — set once on first session boot, never changes
  gitRemoteUrl:
    type: string
    description: Git remote URL (e.g. https://github.com/user/repo) once a remote is attached
  cloudDeploymentProvider:
    $ref: CloudDeploymentProvider.yaml
    description: Selected cloud deployment provider for this application
  cloudDeploymentStatus:
    $ref: CloudDeploymentStatus.yaml
    description: Current lifecycle state of the cloud deployment
  cloudDeploymentId:
    type: string
    description: Provider-specific deployment id used to poll status
  cloudDeploymentUrl:
    type: string
    description: Public URL of the most recent successful deployment
  cloudDeploymentError:
    type: string
    description: Error message from the last failed deployment attempt
  lastDeployedAt:
    type: string
    format: date-time
    description: Timestamp of the last deployment attempt (success or failure)
  bedrockEnabled:
    type: boolean
    default: false
    description: Whether project-bedrock memory integration is enabled for this application
required:
  - name
  - slug
  - description
  - repositoryPath
  - additionalPaths
  - status
  - setupComplete
  - bedrockEnabled
allOf:
  - $ref: SoftDeletableEntity.yaml
description: A persistent AI-powered application workspace

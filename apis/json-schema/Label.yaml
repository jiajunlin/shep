$schema: https://json-schema.org/draft/2020-12/schema
$id: Label.yaml
type: object
properties:
  projectId:
    $ref: UUID.yaml
    description: Project this label belongs to
  name:
    type: string
    description: Label display name
  color:
    type: string
    description: Hex color code for UI rendering (e.g., '#ef4444')
  parentId:
    $ref: UUID.yaml
    description: Optional parent label ID for one-level grouping
required:
  - projectId
  - name
  - color
allOf:
  - $ref: SoftDeletableEntity.yaml
description: A project-scoped label for categorizing work items

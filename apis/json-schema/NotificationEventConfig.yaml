$schema: https://json-schema.org/draft/2020-12/schema
$id: NotificationEventConfig.yaml
type: object
properties:
  agentStarted:
    type: boolean
    default: true
    description: Notify when agent starts running
  phaseCompleted:
    type: boolean
    default: true
    description: Notify when agent completes a workflow phase
  waitingApproval:
    type: boolean
    default: true
    description: Notify when agent is waiting for human approval
  agentCompleted:
    type: boolean
    default: true
    description: Notify when agent completes successfully
  agentFailed:
    type: boolean
    default: true
    description: Notify when agent execution fails
  prMerged:
    type: boolean
    default: true
    description: Notify when a pull request is merged on GitHub
  prClosed:
    type: boolean
    default: true
    description: Notify when a pull request is closed without merging on GitHub
  prChecksPassed:
    type: boolean
    default: true
    description: Notify when pull request CI checks pass
  prChecksFailed:
    type: boolean
    default: true
    description: Notify when pull request CI checks fail
  prBlocked:
    type: boolean
    default: true
    description: Notify when pull request has merge conflicts
  mergeReviewReady:
    type: boolean
    default: true
    description: Notify when feature is ready for merge review
  cloudDeploymentUpdated:
    type: boolean
    default: true
    description: Notify when cloud deployment status changes (spec 089)
  applicationUpdated:
    type: boolean
    default: true
    description: Notify when application row changes (setupComplete, status, gitRemoteUrl, cloudDeploymentProvider — spec 090)
  operationLogAppended:
    type: boolean
    default: true
    description: Notify when a new operation log entry is appended (spec 090)
  agentQuestionPending:
    type: boolean
    default: false
    description: Notify when a non-blocking AgentQuestion is raised by a running agent (spec 093). Default OFF — info-tier events go to the activity feed only unless the user opts in.
  agentQuestionBlocking:
    type: boolean
    default: true
    description: Notify when a blocking AgentQuestion pauses an agent and requires an answer (spec 093). Default ON — blocking-tier events MUST reach the user.
  agentMessageBlocked:
    type: boolean
    default: false
    description: Notify when an inter-agent message is rejected or undeliverable (spec 093). Default OFF — info-tier event.
  supervisorEscalated:
    type: boolean
    default: true
    description: Notify when the supervisor escalates a decision back to the user (spec 093). Default ON — actionable.
  supervisorFailed:
    type: boolean
    default: true
    description: Notify when the supervisor evaluator fails and the system falls back to standard human approval (spec 093, FR-22). Default ON — actionable.
required:
  - agentStarted
  - phaseCompleted
  - waitingApproval
  - agentCompleted
  - agentFailed
  - prMerged
  - prClosed
  - prChecksPassed
  - prChecksFailed
  - prBlocked
  - mergeReviewReady
description: Notification event type filters

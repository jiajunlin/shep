$schema: https://json-schema.org/draft/2020-12/schema
$id: ApiAsset.yaml
type: object
properties:
  name:
    type: string
    description: Human-readable API asset name
  baseUrl:
    type: string
    description: Base URL of the API (e.g. https://api.example.com/v1)
  applicationId:
    $ref: UUID.yaml
    description: Application this API asset belongs to
  ownerId:
    $ref: UUID.yaml
    description: Optional owner override (otherwise inherits from Application)
  exposure:
    $ref: Exposure.yaml
    description: Optional exposure override (otherwise inherits from Application)
  schemaPath:
    type: string
    description: Optional path to the API schema file (POSIX separators, repo-relative)
required:
  - name
  - applicationId
allOf:
  - $ref: SoftDeletableEntity.yaml
description: API asset — external or internal API surface attached to an Application

$schema: https://json-schema.org/draft/2020-12/schema
$id: CustomAgent.yaml
type: object
properties:
  agentType:
    type: string
    description: Stable agent type identifier (kebab-case, unique)
  name:
    type: string
    description: Human-readable display name
  description:
    type: string
    description: Short description of what this agent does
  createdBy:
    type: string
    description: Author of the agent
required:
  - agentType
  - name
  - description
  - createdBy
allOf:
  - $ref: BaseEntity.yaml
description: User-created agent type, editable in the agent editor

$schema: https://json-schema.org/draft/2020-12/schema
$id: Repository.yaml
type: object
properties:
  name:
    type: string
    description: Human-readable name for the repository (typically the directory name)
  path:
    type: string
    description: Absolute file system path to the repository root (unique)
  remoteUrl:
    type: string
    description: "Remote GitHub URL this repository was cloned from (normalized: lowercase, no .git suffix)"
  isFork:
    type: boolean
    description: Whether this repository was auto-forked by shep because the user lacked push access
  upstreamUrl:
    type: string
    description: "Original upstream URL when isFork is true (normalized: lowercase, no .git suffix)"
  bedrockEnabled:
    type: boolean
    description: Whether project-bedrock memory integration is enabled for this repository (defaults to false in persistence)
required:
  - name
  - path
allOf:
  - $ref: SoftDeletableEntity.yaml
description: A code repository tracked by the Shep platform

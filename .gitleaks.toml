[extend]
# Use the default gitleaks config as the base
useDefault = true

[allowlist]
description = "Allow mock/test tokens in Storybook stories and test files"
paths = [
  '''\.stories\.tsx$''',
  '''\.stories\.ts$''',
  '''\.test\.ts$''',
  '''\.test\.tsx$''',
  '''__tests__''',
  '''__mocks__''',
  '''\.spec\.ts$''',
]
regexes = [
  '''test-.*-\d+''',
  '''test-token''',
  '''test-api-key''',
  '''sk-test-token''',
  '''placeholder''',
  '''dummy''',
  '''fake''',
  '''mock''',
  '''example''',
]
